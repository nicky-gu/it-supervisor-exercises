一致性； c 所采用的设计方法和标准的适宜性； d 测试的可行性、完备性； e 软件运行和维护的可行性； f 压力测试对主要指标的验证； g 回归测试的验证、管控等管理事项。 ⑤督促承建单位解决软件详细设计中发现的问题和不合格项，并提出监理意见。","options":[{"label":"A","text":"abcde。"},{"label":"B","text":"abcdefg。"},{"label":"C","text":"defg。"},{"label":"D","text":"abcfg。"},{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①②⑤。"},{"label":"C","text":"②③④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"B","analysis":"监理在详细设计和测试需求评价时应遵守如下准则： a 软件各项需求的可追溯性； b 与概要(结构)设计的一致性； c 所采用的设计方法和标准的适宜性； d 测试的可行性、完备性； e 软件运行和维护的可行性； f 压力测试对主要指标的验证； g 回归测试的验证、管控等管理事项。——B正确。 第2版第22章习题20：设计阶段的需求管理主要包括以下哪几个过程（　　）。 ①需求获取。 ②需求分析。 ③需求规格编写。 ④需求验证。 ⑤需求计划。 【参考答案】D 【点评】设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。——D正确。","has_options":true},{"id":"ex_0303","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"验证需求可采用以下哪些方式进行（　　）。 ①审查需求文档。 ②依据需求编写监理验证用的测试用例。 ③敦促编写用户手册。 ④确定合格的标准。","knowledge":"2.其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①④。"},{"label":"D","text":"①②③。"}],"answer":"A","analysis":"其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。——A正确。","has_options":true},{"id":"ex_0304","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下属于软件工程实施阶段的主要监理活动的是（____）。 ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作。 ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量。 ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求。 ④及时对变更进行响应，并做好变更控制工作。","knowledge":"2.其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。——A正确。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"①④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"A","analysis":"软件工程实施阶段的主要监理活动如下： ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作； ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量； ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求； ④及时对变更进行响应，并做好变更控制工作。——A正确。","has_options":true},{"id":"ex_0305","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"2.要求承建单位制定软件编码规范，并督促承建单位实施。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0306","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"2.要求承建单位制定软件编码规范，并督促承建单位实施。软件编码规范应满足以下要求：(常考案例 重要性 ★★★) ①遵循开发流程，在设计的指导下进行代码编写； ②代码编写以实现设计的功能和性能为目标； ③程序具有良好的结构，能够提高程序的封装性、降低程序的耦合程度； ④程序可读性强，易于理解； ⑤软件易于使用和维护； ⑥软件具有良好的可扩展性。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0307","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"2.应在系统部署之前，审查软件产品是否具备系统集成实施的条件和环境。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0308","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"2.要求承建单位制定软件编码规范，并督促承建单位实施。软件编码规范应满足以下要求：（常考案例 重要性 ★★★） ①遵循开发流程，在设计的指导下进行代码编写； ②代码编写以实现设计的功能和性能为目标； ③程序具有良好的结构，能够提高程序的封装性、降低程序的耦合程度； ④程序可读性强，易于理解； ⑤软件易于使用和维护； ⑥软件具有良好的可扩展性。——A正确。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0309","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"软件工程在（____）过程中，从（____）等多个方面如何进行有效监管，需要监理人员掌握监理服务的关键活动、主要内容和要求，以及软件监理服务的监理要点、监理主要输出文档等。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0310","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"【参考答案】招标、设计、实施和验收，需求分析、设计、编码、测试到部署","knowledge":"","options":[],"answer":"招标、设计、实施和验收，需求分析、设计、编码、测试到部署","analysis":"","has_options":false},{"id":"ex_0311","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下说法错误的是（____）。\nA.用计算机科学理论和技术以及工程管理原则和方法，按预算和进度，实现满足用户要求的软件产品的定义、开发、发布和维护的工程或进行研究的科学。\nB.就绪可用软件产品：可供任何用户使用，不需要经过实施开发活动的软件产品。\nC.集成测试，也叫组装测试或联合测试。\nD.系统测试是技术测试的最后一个阶段，也称为交付测试。","knowledge":"【点评】软件工程在招标、设计、实施和验收过程中，从需求分析、设计、编码、测试到部署等多个方面如何进行有效监管，需要监理人员掌握监理服务的关键活动、主要内容和要求，以及软件监理服务的监理要点、监理主要输出文档等。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0312","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"单元测试，以下说法正确的有（____）。\n①对软件中的最小可测试单元进行检查和验证。\n②对于单元测试中单元的含义，一般来说，要根据实际情况去判定其具体含义。\n③总的来说，单元就是人为规定的最小的被测功能模块。\n④单元测试是在软件开发过程中要进行的最低级别的测试活动，软件的独立单元将在与程序的其他部分相隔离的情况下进行测试。\nA.①②③④。\nB.①④。\nC.②③④。\nD.①②。","knowledge":"【点评】应用计算机科学理论和技术以及工程管理原则和方法，按预算和进度，实现满足用户要求的软件产品的定义、开发、发布和维护的工程或进行研究的科学。——A正确。\n就绪可用软件产品：可供任何用户使用，不需要经过实施开发活动的软件产品。——B正确。\n集成测试，也叫组装测试或联合测试。——C正确。\n系统测试是对整套系统的测试，将硬件、软件、操作人员看作一个整体，检验它是否有不符合系统说明书的地方。——D错误，描述的是验收测试。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0313","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"软件工程规划的主要监理任务是为业主单位提供咨询服务，在业主单位的要求下，可以包含以下哪些内容（____）。\n①协助业主单位梳理业务目标，制定软件系统建设目标。\n②协助业主单位开展软件系统需求分析工作。\n③协助业主单位对软件系统建设方案进行可行性分析、必要性分析，确定软件系统的技术架构和建设方案。\n④协助业主单位确定软件系统的工程造价。\nA.①②③④。\nB.①②④。\nC.②③④。\nD.①②③。","knowledge":"【点评】单元测试：①对软件中的最小可测试单元进行检查和验证。②对于单元测试中单元的含义，一般来说，要根据实际情况去判定其具体含义，如C语言中单元指一个函数，Java中单元指一个类，图形化软件中单元可以指一个窗口或一个菜单等。③总的来说，单元就是人为规定的最小的被测功能模块。④单元测试是在软件开发过程中要进行的最低级别的测试活动，软件的独立单元将在与程序的其他部分相隔离的情况下进行测试。——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0314","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下软件工程监理过程，不属于招标阶段的是（____）。\nA.系统部署的监理。\nB.招标准备的监理。\nC.招标的监理。\nD.合同签订的监理。","knowledge":"【点评】软件工程规划的主要监理任务是为业主单位提供咨询服务，在业主单位的要求下，可以包含如下内容：①协助业主单位梳理业务目标，制定软件系统建设目标；②协助业主单位开展软件系统需求分析工作；③协助业主单位对软件系统建设方案进行可行性分析、必要性分析，确定软件系统的技术架构和建设方案；④协助业主单位确定软件系统的工程造价。——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0315","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下软件工程监理过程，属于设计阶段的是（____）。\n①计划制订的监理\n②需求分析的监理\n③概要(结构)设计的监理\n④详细设计的监理\n⑤招标的监理\n⑥合同签订的监理\nA.①②③④⑤⑥。\nB.①②④⑤⑥。\nC.②③④⑤⑥。\nD.①②③④。","knowledge":"【点评】招标阶段：①招标准备的监理；②招标的监理；③合同签订的监理——选A，不包括A。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0316","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下软件工程监理过程，不属于实施阶段的是（____）。\n①编码及测试的监理\n②系统部署的监理\n③概要(结构)设计的监理\n④详细设计的监理\nA.①②③④。\nB.③④。\nC.②③④。\nD.①②。","knowledge":"【点评】设计阶段：①计划制订的监理；②需求分析的监理；③概要(结构)设计的监理；④详细设计的监理——D正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0317","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下软件工程监理过程，属于验收阶段的是（____）。\n①项目初验的监理。\n②项目试运行的监理。\n③项目终验的监理。\n④培训的监理。\nA.①②③④。\nB.②③④。\nC.①③④。\nD.①②。","knowledge":"【点评】实施阶段：①编码及测试的监理；②系统部署的监理——选B，③④都不属于。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0318","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"简述软件工程招标阶段的主要监理活动。","knowledge":"【点评】验收阶段：①项目初验的监理；②项目试运行的监理；③项目终验的监理；④培训的监理——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0319","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下哪些是招标准备的监理内容（____）。\n①收集软件工程的相关资料，了解和掌握软件需求。\n②梳理软件工程建设需求，明确监理质量、进度等控制目标。\n③参与招标文件的编制，或审核招标文件技术需求、招标实施合规性等。\n④协助审查已有可利用产品的再用价值、可用性等。\nA.①②③④。\nB.①③④。\nC.②③④。\nD.①②③。","knowledge":"【点评】软件工程招标阶段的主要监理活动如下：\n①招标前收集相关资料，了解软件工程项目建设相关的业务目标、软件系统建设目标、现行和预期的业务模式、信息化基础和发展规划、软件系统建设需求等信息，协助业主单位开展招标准备工作，参与编制招标文件，或审核招标文件技术需求、招标实施合规性等；\n②接受业主单位委托参加招标活动，协助业主单位开展招标工作、选定软件工程的承建单位；\n③参与业主单位与承建单位合同谈判，协助业主单位签订承建合同，提出必要的监理意见。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0320","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下哪些是软件工程设计阶段的主要监理活动（____）。\n①审查承建单位提交的软件工程项目计划，促使项目计划合理、可行，并符合承建合同的要求。\n②参与调研工作，督促承建单位形成调研记录，监督承建单位系统需求分析过程，促使系统需求具有正确性、完备性、可测试性和一致性。\n③组织和参与对承建单位在设计阶段形成的文档的评审，促使设计阶段文档符合承建合同的要求，满足软件工程项目的系统需求，符合有关法规、标准的要求。\n④及时对变更进行响应，并做好变更控制工作。\n⑤收集软件工程的相关资料，了解和掌握软件需求。\n⑥梳理软件工程建设需求，明确监理质量、进度等控制目标。\nA.①②③④⑤⑥。\nB.①②④⑤。\nC.④⑤⑥。\nD.①②③④。","knowledge":"【点评】招标准备的监理内容具体如下：①收集软件工程的相关资料，了解和掌握软件需求。②梳理软件工程建设需求，明确监理质量、进度等控制目标。③参与招标文件的编制，或审核招标文件技术需求、招标实施合规性等。④协助审查已有可利用产品的再用价值、可用性等。——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0321","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下哪个不是设计阶段监理监理内容和要点（____）。\nA.参与业主单位与承建单位合同谈判，协助业主单位签订承建合同，提出必要的监理意见。\nB.应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。\nC.应根据下列准则审核项目计划，并提出监理意见。\nD.应要求承建单位提交项目计划。","knowledge":"【点评】软件工程设计阶段的主要监理活动如下：①审查承建单位提交的软件工程项目计划，促使项目计划合理、可行，并符合承建合同的要求；②参与调研工作，督促承建单位形成调研记录，监督承建单位系统需求分析过程，促使系统需求具有正确性、完备性、可测试性和一致性；③组织和参与对承建单位在设计阶段形成的文档的评审，促使设计阶段文档符合承建合同的要求，满足软件工程项目的系统需求，符合有关法规、标准的要求；④及时对变更进行响应，并做好变更控制工作。——D正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0322","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"简述需求分析的监理中，审查系统需求文档，需求规格说明书检查表的检查类目有哪些？","knowledge":"【点评】设计阶段监理监理内容①应要求承建单位提交项目计划。②应根据下列准则审核项目计划，并提出监理意见。③应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。——A正确。\n设计阶段监理内容和要点：\n①应要求承建单位提交项目计划。\n②应根据下列准则审核项目计划，并提出监理意见。\n●确定范围，明确与其他关联任务及计划的关系、边界；\n●遵循的标准；\n●项目的组织结构（包括外部组织）、人员职责及其能力要求；\n●项目环境，包括生产环境、测试环境、程序库、设备、设施、标准、规程和工具；\n●任务分解安排，包括人员、资源和相关的任务进度安排；\n●进度跟踪和报告方法；\n●软件产品或服务的质量特性的管理，必要时制订独立的质量保证计划；\n●软件配置管理，包括活动、技术及方法、工具、对供货单位的控制、记录的收集维护和保存；\n③应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。\n●与承建合同的一致性、可追溯性；\n●系统范围及工作任务分解的完整性；\n●项目过程及主要里程碑划分的合理性，包括适宜的软件生存周期模型；\n●项目规模估算方法的正确性，包括项目任务和工作产品规模、时间安排、资源使用等；\n●项目进度的合理性，包括项目质量保证计划、配置管理计划等；\n●项目计划中部署全部可用产品（软件和硬件）的可行性；\n●对项目风险有必要的识别、分析、处理和跟踪。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0323","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"以下有哪些是需求分析的监理监理内容和要点（____）。\n①要求承建单位提交需求分析过程的详细计划，审查后报业主单位。\n②监督承建单位按照计划开展需求分析的各项活动，并协调业主单位予以相应的配合。\n③宜组织业主单位及承建单位，定义并分析系统建设目标。\n④要求承建单位提交系统需求文档，需求文档应符合相关标准要求。\n⑤审查系统需求文档，组织业主单位和承建单位对需求规格说明书进行检查及对需求进行评审，形成需求规格说明书检查表、需求评审意见。\n⑥参与系统需求的联合评审，形成需求确认表。\n⑦在需求调研阶段，监理机构应要求承建单位开始编制系统验收初步方案。\n⑧督促承建单位解决系统需求分析中发现的问题和不合格项，提出监理意见。\nA.①②③④⑤⑥⑦⑧。\nB.④⑤⑥⑦⑧。\nC.①②③⑥⑦⑧。\nD.①②③④⑤⑥⑦。","knowledge":"【点评】审查系统需求文档，需求规格说明书检查表的检查类目有：清晰性、完整性、依从性、一致性、可行性、可管理性。\n\n需求分析的监理监理内容和要点如下：\n①要求承建单位提交需求分析过程的详细计划，审查后报业主单位。\n②监督承建单位按照计划开展需求分析的各项活动，并协调业主单位予以相应的配合。\n③宜组织业主单位及承建单位，定义并分析系统建设目标：如适用，宜定义和分析业务流程再造、业务持续改进、信息资源规划及业务指标评价体系。\n④要求承建单位提交系统需求文档，需求文档应符合相关标准要求。\n⑤审查系统需求文档，组织业主单位和承建单位对需求规格说明书进行检查及对需求进行评审，形成需求规格说明书检查表、需求评审意见。\n检查类目（背：清完依一 可行可管）：\n●清晰性（文档通用）\n●完整性（文档通用）\n●依从性（文档通用）\n●一致性（文档通用）\n●可行性（文档通用）\n●可管理性\n⑥参与系统需求的联合评审，形成需求确认表。评审时需要考虑的准则包括：\na.与承建合同的可追溯性、一致性；（通用）\nb.与业务目标和系统建设目标的可追溯性、一致性；（通用）\nc.软件设计的可行性；（通用）\nd.运行和维护的可行性。（通用）\n⑦在需求调研阶段，监理机构应要求承建单位开始编制系统验收初步方案。\n⑧督促承建单位解决系统需求分析中发现的问题和不合格项，提出监理意见。\n表22-2 需求规格说明书检查表\n\n检查类目 | 检查内容\n清晰性：系统的目标是否已定义；是否对关键术语和缩略语进行了定义和描述；所使用的术语是否和用户使用的一致；需求的描述是否清晰，不含糊；是否对整个系统进行了功能概述；是否已详细说明了软件环境(共存的软件)和硬件环境(特定的配置)；如果有可能影响实施的假设情况，是否已经声明；是否已经对每个业务逻辑进行输入、输出以及过程的详细说明；图表是否清楚，在不补充说明时。\n完整性：是否规定了用户要求的功能；是否完整、清晰、准确地反映用户的要求；是否列出了系统所必需的依赖、假设以及约束；是否对每个提交物或阶段实施都进行了需求说明；需求说明书是否已经包括了主要的质量属性，例如有效性、高效性、灵活性、完整性、互操作性、可靠性、健壮性、可用性、可维护性、可移植性、可重用性和可测试性等；是否有业务流程图和数据流程图；是否包含接口需求。\n依从性：是否遵从了该项目的文档编写标准。\n一致性：需求说明是否存在直接相互矛盾的条目；需求说明书是否与相关需求素材一致。\n可行性：所描述的功能是否必要，并充分满足用户/系统目标；需求说明书的描述是否满足下一阶段设计所需；是否已经详细说明已知的限制(局限)；是否已确定每个需求的优先级别。\n可管理性：是否将需求分别陈述，确保每个需求都是独立的，并且是可检查的；是否所有需求都可以回溯到相应的需求素材，反之亦然；是否已详细说明需求变更的过程。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0324","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"概要(结构)设计的监理中，概要(结构)设计检查表的检查类目有以下哪些（____）。\n①清晰性②完整性③依从性④一致性⑤可行性⑥管理性⑦功能性⑧接口\nA.①②③④⑤⑦⑧。\nB.①②③④⑤⑥⑦⑧。\nC.③④⑤⑥⑦⑧。\nD.①②③④⑤。","knowledge":"【点评】①②③④⑤⑥⑦⑧都是需求分析的监理内容和要点。——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0325","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"【点评】①清晰性②完整性③依从性④一致性⑤可行性⑥数据使用⑦功能性⑧接口⑨可维护性⑩性能⑪可靠性⑫易测性⑬可追溯性——A正确。\n概要(结构)设计的监理内容和要点如下：\n①督促承建单位按照计划的要求开展系统概要(结构)设计活动。\n②宜配合业主单位制定相应的业务指标评价体系，监督承建单位对系统结构开展合理的方案设计。\n③要求承建单位提交系统概要(结构)设计文档，概要(结构)设计文档应符合相关标准要求。\n④组织业主单位和承建单位对系统概要(结构)设计文档进行检查，形成概要(结构)设计检查表。\n检查类目（背：清完依一 可行 数功接维 性靠易追）：\n●清晰性（文档通用）\n●完整性（文档通用）\n●依从性（文档通用）\n●一致性（文档通用）\n●可行性（文档通用）\n●数据使用\n●功能性\n●接口\n●可维护性\n●性能\n●可靠性\n●易测性\n●可追溯性\n⑤协助业主单位以审核、确认、联合评审等方式对系统概要(结构)设计进行评价。监理在概要(结构)设计评价时应遵守如下准则：\na.与承建合同的可追溯性、一致性；（通用）\nb.与业务目标的符合性；（通用）\nc.系统需求的可追溯性、一致性；（通用）\nd.所使用的设计标准和方法的适宜性；（通用）\ne.软件满足指定需求的可行性；（通用）\nf.基于信息资源规划和业务指标评价体系的可测试性；\ng.业务流程再造、业务持续改进、信息资源开发的可行性；\nh.运行和维护的可行性。\n⑥监督承建单位及时解决系统概要(结构)设计中发现的问题和不合格项，并提出监理意见。\n表22-3 概要(结构)设计检查表\n\n检查类目 | 检查内容\n清晰性：是否所设计的架构都被清楚地表达了，包括数据流、控制流和接口；是否所有的假设、约束、策略及依赖都被记录了；是否定义了总体设计目标。\n完整性：是否所有以前的软件需求都已经被解决了。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0326","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"1.监理机构应督促承建单位开展详细设计活动。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0327","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"1.设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。——D正确。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0328","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"1.设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0329","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"编码及测试的监理内容有以下哪些（____）。","knowledge":"1.软件工程实施阶段的主要监理活动如下： ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作； ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量； ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求； ④及时对变更进行响应，并做好变更控制工作。——A正确。","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0330","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"1.要求承建单位为软件编码过程和单元测试过程的实施提交详细的计划，并督促承建单位按照计划的要求开展工作。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0331","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"1.要求承建单位提交系统部署计划。该计划应包括应用环境和基础设施需求、职责和进度安排。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0332","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.1 规划阶段监理活动 【点评】规划阶段典型监理工作具体包括以下几个方面：","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①②③④⑤。"},{"label":"C","text":"①②③⑤⑥。"},{"label":"D","text":"①③⑤⑥。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0333","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 《信息系统监理师教程 第2版 2024年1月出版》第440页 需求评审的主要内容包括： ①系统定义的目标是否与用户的需求一致； ②需求分析阶段提供的文档、资料是否齐全； ③需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求； ④与所有其他系统的重要接口是否都已得到描述； ⑤主要功能是否已包括在规定的需求范围之内，是否都已充分说明。 ⑥系统的行为和其必须处理的信息、必须完成的功能是否一致； ⑦设计的约束条件或限制条件是否符合实际； ⑧对开发过程中可能存在的技术风险是否采取了必要的规避措施； ⑨是否详细制定了检验标准，其能否对系统定义成功进行确认。 需求验证的基本方法包括： ①自查法:需求分析人员对自己完成的工作内容进行审查和验证，纠正存在的问题； ②用户审查法:将需求分析文档交给用户，由用户对需求分析进行审查； ③专家审查法:将需求分析文档交给专家，由专家对需求分析进行审查； ④原型法:通过建立原型系统对存在争议或不确定的需求进行验证，以此来确定需求是否正确。 招标：","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0334","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 【点评】需求验证的基本方法包括：①自查法 ②用户审查法 ③专家审查法 ④原型法","knowledge":"","options":[{"label":"A","text":"自查法。"},{"label":"B","text":"用户审查法。"},{"label":"C","text":"业主审查法。"},{"label":"D","text":"专家审查法。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0335","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 【点评】招标工作按照组织方式可以划分为自行招标和委托招标。","knowledge":"","options":[{"label":"A","text":"自行招标和委托招标。"},{"label":"B","text":"公开招标和邀请招标。"},{"label":"C","text":"公开招标和自行招标。"},{"label":"D","text":"自行招标和邀请招标。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0336","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 【点评】招标投标法规定:招标分为公开招标和邀请招标。","knowledge":"","options":[{"label":"A","text":"自行招标和委托招标。"},{"label":"B","text":"公开招标和邀请招标。"},{"label":"C","text":"公开招标和自行招标。"},{"label":"D","text":"自行招标和邀请招标。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0337","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2规划阶段典型监理工作 【点评】自行招标，即业主单位自己组织招标和评标，要求业主单位自身具备组织招标和评标的能力。","knowledge":"","options":[{"label":"A","text":"委托招标。"},{"label":"B","text":"公开招标。"},{"label":"C","text":"自行招标。"},{"label":"D","text":"邀请招标。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0338","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2规划阶段典型监理工作 【点评】委托招标，即委托有招标能力和招标资质的招标代理机构对项目进行招标，发布招标文件，接收投标文件，组织专家评审，确定招标入围推荐名次，发布招标公告等。","knowledge":"","options":[{"label":"A","text":"委托招标。"},{"label":"B","text":"公开招标。"},{"label":"C","text":"自行招标。"},{"label":"D","text":"邀请招标。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0339","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2规划阶段典型监理工作 【点评】邀请招标，是指招标人以投标邀请书的方式邀请特定的法人或者其他组织投标。","knowledge":"","options":[{"label":"A","text":"委托招标。"},{"label":"B","text":"公开招标。"},{"label":"C","text":"自行招标。"},{"label":"D","text":"邀请招标。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0340","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"以下说法错误的是( )。","knowledge":"20.1.2规划阶段典型监理工作 【点评】公开招标，是指招标人以招标公告的方式邀请不特定的法人或者其他组织投标。","options":[{"label":"A","text":"委托招标。"},{"label":"B","text":"公开招标。"},{"label":"C","text":"自行招标。"},{"label":"D","text":"邀请招标。"},{"label":"A","text":"公开招标的优点:最大限度地保证项目的公开、公平、公正、透明。"},{"label":"B","text":"公开招标的缺点:程序较为复杂，招投标耗时较久，费用支出也较多。"},{"label":"C","text":"邀请招标的缺点:采购风险较大。"},{"label":"D","text":"公开招标的优点:有效避免弄虚作假舞弊等行为。"}],"answer":"C","analysis":"(1) 公开招标的优点: ①最大限度地保证项目的公开、公平、公正、透明; ②促使供应商保质保量按时完成项目目标，并获得最具竞争力的价格; ③有效避免弄虚作假舞弊等行为。 (2) 公开招标的缺点: ①程序较为复杂，招投标耗时较久，费用支出也较多; ②采购风险较大，例如，投标者之间可能出现串通投标，任意提高或压低报价，给其他投标者造成困扰和损失;或者投标者以不合理的低价恶意抢标，可能导致项目偷工减料、交付延期等风险。——C错误。采购风险较大是公开招标的缺点。","has_options":true},{"id":"ex_0341","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 【点评】邀请招标，也称选择性招标，是由采购人根据供应商或承包商的资信和业绩，选择一定数目的法人或其他组织(不能少于3家)，向其发出投标邀请书，邀请他们参加投标竞争，从中选定中标供应商的一种招标方法。——D错误。","knowledge":"","options":[{"label":"A","text":"邀请招标，也称选择性招标。"},{"label":"B","text":"邀请招标最少选择3家供应商参加投标竞争。"},{"label":"C","text":"邀请招标的优点:招标工作量和招标费用相对较小。"},{"label":"D","text":"邀请招标最多选择3家供应商参加投标竞争。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0342","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.1.2 规划阶段典型监理工作 【点评】招投标注意事项 为避免招投标出现违规事项，国家有关部门对有关招标工作严格执行有关规定。依法应当公开招标的项目存在下列情形之一时，经招标项目有关监督管理部门审批、核准或认定后，方可采用邀请招标方式: ①涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的; ②项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的; ③采用公开招标方式的费用占项目合同金额的比例过大的。","knowledge":"","options":[{"label":"A","text":"涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的。"},{"label":"B","text":"项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的。"},{"label":"C","text":"项目技术复杂或有特殊要求，或者受自然地域环境限制，但有大量潜在投标人可供选择的。"},{"label":"D","text":"采用公开招标方式的费用占项目合同金额的比例过大的。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0343","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"招标阶段的监理要求具体有( )。 ①协助业主单位明确项目需求，确定项目建设目标和招标要求。 ②促使招标文件与用户需求、项目建设目标和范围相符合。 ③宜见证招标过程合法、合规。 ④协助业主单位选择适合的承建单位。 ⑤促使业主单位、承建单位所签订的承建合同在技术、经济上合理有效，满足法律法规和相关标准的要求。 ⑥在签订的承建合同中明确要求承建单位接受监理机构的监理。","knowledge":"20.1.2 规划阶段典型监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第440页","options":[{"label":"A","text":"①②④⑤⑥。"},{"label":"B","text":"①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0344","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.2实施阶段监理活动 【点评】及时按相关程序处理费用索赔申请----属于投资控制的具体工作。","knowledge":"","options":[{"label":"A","text":"投资控制的具体工作：总监理工程师应依据承建合同及其补充协议，对资金使用实施监督，并审核承建单位提交的工程阶段性报告和付款申请，总监理工程师签发工程款支付意见，报业主单位签认。"},{"label":"B","text":"合同管理的具体工作：监督合同执行情况，定期向业主单位提交监理报告，可以抄送承建单位。"},{"label":"C","text":"合同管理的具体工作：及时协调合同纠纷，公正地调查分析，提出监理意见。"},{"label":"D","text":"合同管理的具体工作：及时按相关程序处理费用索赔申请。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0345","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.2实施阶段监理活动 【点评】文档资料管理的具体工作如下： ①妥善管理工程实施阶段所产生的开工令、停工令、复工令、监理工作联系单、监理通知单、监理日志和工程备忘录等资料。——属于。","knowledge":"","options":[{"label":"A","text":"妥善管理工程实施阶段所产生的开工令，属于文档资料管理的具体工作。"},{"label":"B","text":"妥善管理工程实施阶段所产生的停工令，不属于文档资料管理的具体工作。"},{"label":"C","text":"妥善管理工程实施阶段所产生的复工令，属于文档资料管理的具体工作。"},{"label":"D","text":"监督业主单位、承建单位按照既定要求编制和管理项目文档资料，属于文档资料管理的具体工作。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0346","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.2实施阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》第456页 | 序号 | | 内容 ①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳ | 例子 | |:---:|:---:|:---|:---:| | ⑥ | 沟通协调 | 一．沟通协调的具体工作如下：","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0347","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 【点评】","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥⑦。"},{"label":"C","text":"②③④⑤⑥。"},{"label":"D","text":"③④⑤⑥⑦。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0348","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》第458页 | 序号 | | 内容 ①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳ | 例子 | |:---:|:---:|:---|:---:| | ② | 对实施方案的审查 | 1. 对实施方案的审查，监理机构应审核的内容如下： ●实施方案与法律法规和标准的符合性； ●实施方案的合理性和可行性； ●实施方案与合同、设计方案和实施计划的符合性； ●工程实施的组织机构。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0349","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》第458页 | 序号 | 内容 ①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳ | 例子 | |:---:|:---|:---| | ④ | 对质量问题的处理 | 1. 监理人员在实施阶段处理质量问题时应遵循一般性原则，主要有： (1) 当质量缺陷在萌芽状态时，分析质量缺陷产生的原因，采取果断措施，制止质量缺陷蔓延，例如，责令承建单位更换不合格的材料、设备或不称职的实施人员，或要求立刻改变不正确的实施方法。 (2) 当质量缺陷出现明显症状时，监理机构应立刻发出暂停施工的指令，直到承建单位采取了补救措施，并对质量缺陷进行了正确的补救后，才书面通知恢复施工。 (3) 当质量缺陷已对下个阶段或分项工程产生质量影响时，应拒绝签认工程计量，并要求承建单位进行返工或处理，直到质量缺陷解决为止。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0350","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0351","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第458页 ⑦硬件设备的验收","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0352","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第458页 ⑧质量事故处理程序","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0353","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第458页 ⑨项目延期处理程序","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0354","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.3实施阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第458页 ⑩索赔处理程序","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0355","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.4.4实施阶段监理流程 《信息系统监理师教程 第2版2024年1月出版》第462页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0356","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.5验收阶段监理基础工作监理流程 《信息系统监理师教程 第2版2024年1月出版》第464页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0357","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.5.1验收阶段监理要求 《信息系统监理师教程 第2版2024年1月出版》第464页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0358","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.5.2验收阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第464页 一、管理工作","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0359","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.5.2验收阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第464页 ③项目终验的监理","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0360","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"20.5.2验收阶段监理内容 《信息系统监理师教程 第2版2024年1月出版》第464页 ④验收阶段其他监理内容","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0361","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"规划阶段的监理活动具体包括以下几个方面（　　）。 ①协助业主单位构建信息系统架构。 ②可以为业主单位提供项目的规划的相关服务，为业主单位决策提供依据。 ③对项目需求、项目计划和初步设计方案进行审查。 ④协助业主单位策划招标方法，适时提出咨询意见。 ⑤参与编制可行性研究报告，协助编制投资概算。","knowledge":"6.监理工作不是千篇一律的，需要根据具体监理对象的特点进行调整。第21~25章在本章的基础上，针对不同监理对象介绍了更有针对性的监理方法。","options":[{"label":"A","text":"①②③。"},{"label":"B","text":"①②③④⑤。"},{"label":"C","text":"①③④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"D","analysis":"规划阶段的监理活动具体包括以下几个方面：","has_options":true},{"id":"ex_0362","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"5.本章重点介绍信息系统工程各阶段的基础监理工作，并提出相应的监理策略，引导监理成果的编制。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0363","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"以下属于需求评审的主要内容有（　　）。 ①系统定义的目标是否与用户的需求一致。 ②需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求。 ③主要功能是否已包括在规定的需求范围之内，是否都已充分说明。 ④设计的约束条件或限制条件是否符合实际。 ⑤是否详细制定了检验标准，其能否对系统定义成功进行确认。","knowledge":"5.招投标注意事项 为避免招投标出现违规事项，国家有关部门对有关招标工作严格执行有关规定。依法应当公开招标的项目存在下列情形之一时，经招标项目有关监督管理部门审批、核准或认定后，方可采用邀请招标方式: ①涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的； ②项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的； ③采用公开招标方式的费用占项目合同金额的比例过大的。","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①③⑤。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"②③④⑤。"}],"answer":"A","analysis":"需求评审的主要内容包括： ①系统定义的目标是否与用户的需求一致； ②需求分析阶段提供的文档、资料是否齐全； ③需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求； ④与所有其他系统的重要接口是否都已得到描述； ⑤主要功能是否已包括在规定的需求范围之内，是否都已充分说明。 ⑥系统的行为和其必须处理的信息、必须完成的功能是否一致； ⑦设计的约束条件或限制条件是否符合实际； ⑧对开发过程中可能存在的技术风险是否采取了必要的规避措施； ⑨是否详细制定了检验标准，其能否对系统定义成功进行确认。","has_options":true},{"id":"ex_0364","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"4.其中，监理内容是对关键监理活动进行的更细化、更深入的阐述。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0365","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"4.协助业主单位策划招标方法，适时提出咨询意见。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0366","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"4.协助做好招投标准备工作，提出适当的招标方法。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0367","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"4.邀请招标。 （1）邀请招标，也称选择性招标，是由采购人根据供应商或承包商的资信和业绩，选择一定数目的法人或其他组织(不能少于3家)，向其发出投标邀请书，邀请他们参加投标竞争，从中选定中标供应商的一种招标方法。 （2）邀请招标的优点: ①邀请招标能够按照项目需求特点和市场供应状态，有针对性地从已知了解的潜在投标人中，选择具有与招标项目需求匹配的资格能力、价值目标以及对项目重视程度均相近的投标人参与投标竞争，有利于投标人之间均衡竞争。 ②通过科学的评标标准和方法实现招标目标，招标工作量和招标费用相对较小，既可以省去招标公告和资格预审程序(招投标资格审查)时间，又可以获得基本或者较好的竞争效果。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0368","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"4. 协调业主单位配合承建单位的工程实施。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0369","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"3.本教程第三篇主要依据监理规范，介绍信息系统工程建设项目中监理机构应执行的监理任务，包括：①监理要求 ②监理活动(做什么) ③监理内容(怎么做) ④监理流程","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0370","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"3.对项目需求、项目计划和初步设计方案进行审查。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0371","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"3.协助组织有关评审活动，验证项目需求。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0372","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"3.公开招标。 （1）公开招标的优点: ①最大限度地保证项目的公开、公平、公正、透明； ②促使供应商保质保量按时完成项目目标，并获得最具竞争力的价格； ③有效避免弄虚作假舞弊等行为。 （2）公开招标的缺点: ①程序较为复杂，招投标耗时较久，费用支出也较多； ②采购风险较大，例如，投标者之间可能出现串通投标，任意提高或压低报价，给其他投标者造成困扰和损失;或者投标者以不合理的低价恶意抢标，可能导致项目偷工减料、交付延期等风险。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0373","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"3. 根据需要及时组织专题会议，解决工程实施过程中的各种专项问题，并做会议纪要，提交业主单位和承建单位。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0374","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"2.监理机构根据一系列程序文件指导日常监理工作，规范监理工作行为，以满足监理任务的要求并实现监理工作目标。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0375","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"2.可以为业主单位提供项目的规划的相关服务，为业主单位决策提供依据。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0376","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"2.根据业主单位的委托，可以参与编写初步设计方案，协助编制投资预算。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0377","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"2.招标投标法规定:招标分为公开招标和邀请招标。 ①公开招标，是指招标人以招标公告的方式邀请不特定的法人或者其他组织投标； ②邀请招标，是指招标人以投标邀请书的方式邀请特定的法人或者其他组织投标。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0378","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"2. 定期召开工作协调会，对工作中出现的问题提出监理意见；定期向业主单位汇报工作进度情况。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0379","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"以下说法错误的是（ ）。","knowledge":"2. 对实施方案的审查，实施方案的审核要点如下： ●承建单位的项目组织机构、管理制度和技术措施是否能满足项目实施需要； ●承建单位是否有完善的质量保证体系并能正常运行，项目组织机构的人员是否到位且能保证项目实施的需要； ●所引用的法律法规、标准规范是否是有效的、最新的； ●进度计划中的进度节点是否满足合同要求； ●施工安全技术措施是否得当。 |","options":[{"label":"A","text":"实施准备会议主要是要求承建单位落实实施计划、实施方案和必要的准备工作。会议内容应做会议纪要，并经三方签认。"},{"label":"B","text":"实施准备会议的会议议程主要有：三方分别介绍各自的组织机构、人员安排及其分工。"},{"label":"C","text":"实施准备会议的会议议程主要有：业主单位介绍项目开工准备情况。"},{"label":"D","text":"实施准备会议的会议议程主要不包括：承建单位介绍项目准备情况。"}],"answer":"D","analysis":"包括。","has_options":true},{"id":"ex_0380","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"监理人员在实施阶段处理质量问题时应遵循一般性原则，以下说法错误的是（ ）。","knowledge":"2. 实施准备会议的会议议程主要有： (1) 三方分别介绍各自的组织机构、人员安排及其分工； (2) 业主单位根据委托监理合同宣布对监理单位的授权； (3) 业主单位介绍项目开工准备情况； (4) 承建单位介绍项目准备情况；——D错误，包括。 (5) 业主单位和总监理工程师对实施准备情况提出意见和要求。 (6) 总监理工程师介绍监理的主要工作内容； (7) 研究确定各方在实施过程中参加项目例会的主要人员、召开例会的周期、地点及主要议题等。 |","options":[{"label":"A","text":"当质量缺陷在萌芽状态时，分析质量缺陷产生的原因，采取果断措施，制止质量缺陷蔓延。"},{"label":"B","text":"当质量缺陷出现明显症状时，监理机构应立刻发出暂停施工的指令，直到承建单位采取了补救措施，并对质量缺陷进行了正确的补救后，才书面通知恢复施工。"},{"label":"C","text":"当质量缺陷已对下个阶段或分项工程产生质量影响时，应拒绝签认工程计量，并要求承建单位进行返工或处理，直到质量缺陷解决为止。"},{"label":"D","text":"当质量缺陷已对下个阶段或分项工程产生质量影响时，也可以签认工程计量，要求承建单位进行返工或处理，直到质量缺陷解决为止即可。"}],"answer":"D","analysis":"","has_options":true},{"id":"ex_0381","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"实施阶段产品及服务的验收应注意（ ）。 ①产品和服务应与承建合同要求以及产品文档中的说明保持一致。 ②产品及服务的有效性和真实性。 ③必要时，监理机构可依据承建合同、技术标准或事先约定的方法检测产品及服务的质量。 ④必要时，监理机构应要求承建单位提交第三方测评机构出具的测评报告，并核验产品认证证书、检测报告的真实性、有效性；第三方测评机构应经业主单位和监理机构同意。","knowledge":"2. 分包单位资质审查流程如下： (1) 监理机构根据本项目对分包单位的管理要求，对分包单位资质材料和业绩材料进行审查，提出审查意见。 (2) 分包单位通过监理人员的审查后，交由总监理工程师/代表进行审核。 (3) 总监理工程师/代表根据监理人员的审查意见，以及分包单位的材料出具审核意见。 |","options":[{"label":"A","text":"②③④。"},{"label":"B","text":"③④。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"①②③。"}],"answer":"C","analysis":"","has_options":true},{"id":"ex_0382","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.监理是一项注重程序化的工作。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0383","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.协助业主单位构建信息系统架构。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0384","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.参与编制可行性研究报告，协助编制投资概算。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0385","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.招标工作按照组织方式可以划分为自行招标和委托招标。 ①自行招标，即业主单位自己组织招标和评标，要求业主单位自身具备组织招标和评标的能力。 ②委托招标，即委托有招标能力和招标资质的招标代理机构对项目进行招标，发布招标文件，接收投标文件，组织专家评审，确定招标入围推荐名次，发布招标公告等。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0386","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1. 与业主单位、承建单位共同建立必要的工作协调机制，运用监理会议、监理报告和沟通协调等组织协调的方法，做好监理机构内部协调、三方之间的协调、工程中各监理机构之间的协调工作，使项目各方能够充分协作。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0387","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"质量事故处理程序，以下说法错误的是（ ）。","knowledge":"1.硬件设备的验收，应在三方完成设备开箱检查、设备加电测试等工作后进行。可参考以下设备验收流程： (1) 承建单位按照要求提供拟到货设备的清单、序列号及相关质量证明文件后，提前三天通知业主单位和监理机构具体的到货时间和地点。 (2) 业主单位、监理机构、承建单位安排人员对到货设备进行现场开箱检查，主要检查到货设备的外包装和外观是否有破损或缺陷，设备品牌和型号是否与投标文件及合同要求的一致。","options":[{"label":"A","text":"要求承建单位在事故发生后立即采取措施，尽可能控制其影响范围，及时签发停工令，上报业主单位。"},{"label":"B","text":"审查承建单位提交的事故报告及复工申请，条件具备时，总监理工程师可以签发复工令，恢复施工。"},{"label":"C","text":"在接到事故报告后立即组织相关人员调查事故状况、分析原因，与业主单位、承建单位共同确定初步处理意见。"},{"label":"D","text":"发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核业主单位提交的整改方案并监督承建单位进行整改。"}],"answer":"D","analysis":"发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核承建单位提交的整改方案并监督承建单位进行整改。——D错误，不是业主单位，是审核承建单位提交的整改方案。","has_options":true},{"id":"ex_0388","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"项目延期处理程序，以下说法错误的是（ ）。","knowledge":"1.质量事故处理程序具体如下： (1) 要求承建单位在事故发生后立即采取措施，尽可能控制其影响范围，及时签发停工令，上报业主单位。 (2) 在接到事故报告后立即组织相关人员调查事故状况、分析原因，与业主单位、承建单位共同确定初步处理意见。 (3) 督促承建单位采取相应措施，查清事故原因，审核承建单位提交的事故解决方案及预防、补救措施，提出监理意见，提交业主单位签认。 (4) 审查承建单位提交的事故报告及复工申请，条件具备时，总监理工程师可以签发复工令，恢复施工。 (5) 发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核承建单位提交的整改方案并监督承建单位进行整改。整改完毕后，处理承建单位提交的复工申请。","options":[{"label":"A","text":"监理机构根据项目情况，分析延期原因、影响程度等，研究整改措施，确认其延期申请的合理性，与业主单位、承建单位协商确认后，由总监理工程师对项目延期申请予以确认。"},{"label":"B","text":"项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经业主单位签认后，做工程备忘录。"},{"label":"C","text":"组织审查进度纠偏措施的合理性、可行性，监理机构可出具监理意见并跟踪整改。"},{"label":"D","text":"当发生由于延期造成的索赔时，总监理工程师应综合考虑项目延期和费用索赔的关系，做出费用索赔和项目延期的建议。"}],"answer":"B","analysis":"项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经三方签认后，做工程备忘录。——不是业主单位，是三方签认。","has_options":true},{"id":"ex_0389","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"索赔处理程序有（ ）。 ①申请方应在合同规定的期限内向监理机构提交索赔申请。 ②总监理工程师指定监理人员收集与索赔有关的资料。 ③总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用。 ④总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见。 ⑤当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议。","knowledge":"1.项目延期处理程序具体如下： (1) 监理机构根据项目情况，分析延期原因、影响程度等，研究整改措施，确认其延期申请的合理性，与业主单位、承建单位协商确认后，由总监理工程师对项目延期申请予以确认。 (2) 项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经三方签认后，做工程备忘录。 (3) 组织审查进度纠偏措施的合理性、可行性，监理机构可出具监理意见并跟踪整改。 (4) 当发生由于延期造成的索赔时，总监理工程师应综合考虑项目延期和费用索赔的关系，做出费用索赔和项目延期的建议。","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"①②④⑤。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"①②③④⑤。"}],"answer":"D","analysis":"","has_options":true},{"id":"ex_0390","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"以下说法错误的是（ ）。","knowledge":"1.索赔处理程序具体如下： (1) 申请方应在合同规定的期限内向监理机构提交索赔申请。 (2) 总监理工程师指定监理人员收集与索赔有关的资料。 (3) 总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用。 (4) 总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见。 (5) 当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议。","options":[{"label":"A","text":"实施阶段监理流程有：①实施阶段监理工作流程。②合同管理监理工作流程。"},{"label":"B","text":"如果合同管理问题申请的理由充分、合理，监理机构应予以批准;三方就申请处理结果达成一致后，及时签署工程备忘录并落实合同变更，否则及时签发监理通知单，告知申请方不同意申请的意见并说明原因。"},{"label":"C","text":"承建单位做好项目实施前的各项准备工作后，向业主单位提出项目实施申请。"},{"label":"D","text":"条件具备时，监理机构应及时签发开工令;监理机构如认为不具备开工条件，应出具监理意见并跟踪整改。"}],"answer":"C","analysis":"承建单位做好项目实施前的各项准备工作后，向监理机构提出项目实施申请。——C错误。","has_options":true},{"id":"ex_0391","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.实施阶段监理流程： ①实施阶段监理工作流程。 ②合同管理监理工作流程。 ①实施阶段监理工作流程","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0392","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.监理机构在实施阶段的主要任务是受理项目实施申请，并对项目实施过程进行监理，对于其中发现的项目问题及时出具监理意见并跟踪整改。具体的处理流程如下： (1) 承建单位做好项目实施前的各项准备工作后，向监理机构提出项目实施申请。监理机构收到项目实施申请后，及时检查和落实各项准备工作的完成情况。 ①一般情况下，准许开工的条件至少应包括：完成了项目实施质量管理计划、系统设计方案和项目实施方案;合格的项目实施人员已经到位(以上内容监理机构已通过审核并进行了签认);项目实施所需的软硬件设施具备。 ②条件具备时，监理机构应及时签发开工令;监理机构如认为不具备开工条件，应出具监理意见并跟踪整改。 (2) 项目实施启动后，监理机构依据签认的项目质量管理计划、实施方案、实施计划和监理实施细则的要求对现场实施监理。对于监理实施过程中发现的问题及时出具监理意见并跟踪整改。项目实施过程的阶段性成果应进行三方签认。 (3) 项目实施过程结束后，承建单位及时提交项目实施报告，监理机构及时提交监理报告。 ②合同管理监理工作流程","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0393","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"验收阶段的监理要求具体包括：（ ） ①应审核项目测试验收方案(验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等)的符合性及可行性。 ②应协调承建单位配合第三方测试机构进行项目系统测评。 ③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求。 ④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。","knowledge":"1.合同管理具体的处理流程如下： ①业主单位或承建单位就合同管理相关问题(例如变更问题、延期问题、索赔问题等)提出申请，申请中应对相关问题产生的原因、责任归属、处理方式做出说明。其后，监理机构根据项目实际情况，收集相关信息，并进行相应的审查。 ②如果合同管理问题申请的理由充分、合理，监理机构应予以批准;三方就申请处理结果达成一致后，及时签署工程备忘录并落实合同变更，否则及时签发监理通知单，告知申请方不同意申请的意见并说明原因。 ③合同变更处理完毕后，项目实施过程根据变更予以一定的修正，监理机构须相应调整监理实施细则，落实合同变更内容。","options":[{"label":"A","text":"①③④。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"B","analysis":"","has_options":true},{"id":"ex_0394","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"以下说法错误的是（ ）。","knowledge":"1.验收阶段的监理要求具体包括： ①应审核项目测试验收方案(验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等)的符合性及可行性； ②应协调承建单位配合第三方测试机构进行项目系统测评； ③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求； ④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。","options":[{"label":"A","text":"项目验收中的管理工作包括项目初验、系统试运行和项目终验。"},{"label":"B","text":"项目初验的监理基础内容包括:初验条件的检查、初验前的监理准备工作、初验中的监理工作、初验验收会议的监理工作。"},{"label":"C","text":"系统试运行的监理基础内容包括：要求业主单位、承建单位以初验合格报告作为启动试运行的依据。"},{"label":"D","text":"验收阶段的其他监理内容包括：跟踪承建单位现场人员是否到位并正常工作。"}],"answer":"D","analysis":"跟踪承建单位现场人员是否到位并正常工作，属于系统试运行的监理基础内容。——D错误。","has_options":true},{"id":"ex_0395","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.一般情况下，项目验收中的管理工作包括项目初验、系统试运行和项目终验。 ①项目初验的监理 ②系统试运行的监理 ③项目终验的监理 ④验收阶段其他监理内容 ①项目初验的监理","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0396","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"1.项目初验，即初步验收，是指项目完成合同要求的全部内容后，对该项目是否符合设计要求、施工和设备安装是否符合质量要求等进行全面检测的过程。项目初验的监理基础内容包括： ①初验条件的检查。 ②初验前的监理准备工作。 ③初验中的监理工作。 ④初验验收会议的监理工作:协助业主单位安排会场(例如签到表、会签等);按会议议程执行;做好记录;会议纪要和验收报告落实签字。 ②系统试运行的监理","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0397","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"项目终验的监理基础内容包括：（ ）。 ①及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。 ②协调项目相关方确定终验方案（含承建单位总结报告）及终验形式(三方会议或专家会议)、参与人员、议程等。 ③准备好监理的发言材料（监理总结报告）。 ④项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。 ⑤三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。 ⑥业主单位同意进行终验，在终验申请中予以签认，并报业主单位签认。","knowledge":"1.系统试运行的监理基础内容包括： ①要求业主单位、承建单位以初验合格报告作为启动试运行的依据。 ②审核承建单位的试运行申请，若符合条件，协调三方允许系统进入试运行阶段。 ③有计划地监督系统的试运行，督促承建单位解决试运行中出现的问题。 ④跟踪承建单位现场人员是否到位并正常工作。 ⑤定时或不定时了解用户对现场人员是否满意，若有问题，核实后可对承建单位提出要求。 ⑥抽查承建单位现场人员的工作记录(解决用户问题)，对问题比较集中、有未解决的问题、有部分工作量调整的情况做好记录，根据实际情况可召开三方会议讨论解决方法、时间等。 ⑦督促承建单位及时解决出现的问题。 ⑧根据初验前备忘录的内容，核实承建单位落实情况。 ⑨试运行结束后，建议用户出具用户使用意见，要求承建单位出具试运行报告和试运行期间的问题总结报告(若有问题未解决，可作为试运行时间延长的依据)。","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①②④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"B","analysis":"","has_options":true},{"id":"ex_0398","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题(第20章)","category":"章节练习","stem":"验收阶段的其他监理内容包括（ ）。 ①对验收各阶段进度安排提出监理意见。 ②审核承建单位初验、终验和项目整改计划的可行性。 ③由总监理工程师审核承建单位提交的付款申请，根据承建合同规定的付款条件，签发工程款支付意见。 ④及时向业主单位、承建单位通报承建合同、协议及相关变更所规定项目内容的执行情况，提出监理意见。 ⑤协助业主单位与承建单位签署其他补充协议。 ⑥督促业主单位、承建单位及时整理项目文档。 ⑦督促承建单位完成承建合同及项目实施方案中确定的培训。","knowledge":"1.项目终验也称竣工验收，是指在通过初验并试运行合格后，对项目的总体进行检测和认证、综合评价和鉴定的活动。项目终验的监理基础内容包括： (1) 协助业主单位审核承建单位提交的终验计划及其方案，明确验收目标、各方责任、验收内容、验收标准、验收方式和验收结果等内容，并签署审核意见。 (2) 及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。 (3) 如果符合如下终验条件，在终验申请中予以签认，并报业主单位签认： ●项目建设内容按照合同要求全部完成;各种技术文档和验收资料完备; ●系统的功能和性能满足设计要求; ●系统已通过初验、试运行，用户出具了初验和试运行意见; ●初验和试运行中出现的问题已经得到解决; ●试运行时间符合承建合同的要求; ●完成了约定的培训工作，培训效果符合要求; ●承建单位提交了符合要求的终验方案和计划，并且已通过审核; ●业主单位同意进行终验。 (4) 如果不符合上述终验条件，向承建单位提出整改意见（若此时由于某些客观原因还有未完成的事项，需协调三方事先做好沟通，承建单位签好承诺书）。 (5) 协调项目相关方确定终验方案（含承建单位总结报告）及终验形式(三方会议或专家会议)、参与人员、议程等。 (6) 协助业主单位做好终验准备、组织项目终验;对于大型或重要信息系统工程建设项目，应业主要求，可以聘请有关专家参与终验评审，以评估项目完成情况。 (7) 准备好监理的发言材料（监理总结报告）。 (8) 根据已定的验收议程召开会议，做好记录，会议纪要和验收报告落实签字。 (9) 三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。 (10) 项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。 (11) 整理与项目有关的全部监理文档,并提交业主单位。 (12) 协助业主单位和承建单位完成项目移交工作。","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③⑤⑥⑦。"},{"label":"C","text":"①②③④⑤。"},{"label":"D","text":"①②③④⑤⑥⑦。"}],"answer":"D","analysis":"","has_options":true},{"id":"ex_0399","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2 招标阶段监理基础工作 《信息系统监理师教程 第2版 2024年1月出版》 第445页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0400","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.1 招标阶段监理要求 【点评】招标阶段的监理活动具体如下： ①在业主单位授权下，参与业主单位招标前的准备工作，协助业主单位编制项目的工作计划； ②在业主单位授权下，参与招标文件的编制，并对招标文件内容提出监理意见； ③在业主单位授权下，协助业主单位进行招标工作，如委托招标，审核招标代理机构资质是否符合行业管理要求； ④在向业主单位提供招投标咨询服务； ⑤在业主单位授权下，参与承建合同的签订过程，并对承建合同的内容提出监理意见。","knowledge":"","options":[{"label":"A","text":"③④⑤。"},{"label":"B","text":"①②④⑤。"},{"label":"C","text":"①③④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0401","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.2 招标阶段监理活动 【点评】招标阶段监理内容： ①编制工作计划 ②参与招标文件的编制 ③参与招标工作 ④招标咨询工作 ⑤承建合同签订的监理 ⑥审核承建单位及其人员的能力 ⑦招标阶段其他监理内容","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥⑦。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"③④⑤⑥⑦。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0402","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】根据招标工作的特点，监理机构协助业主单位制订的项目工作计划应包括以下几个方面的内容。 ①项目建设内容 ②组织管理 ③项目建设准备工作 ④总包、分包方式 ⑤项目建设的阶段划分及验收 ⑥质量管理计划","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥⑦。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"③④⑤⑥⑦。"},{"label":"D","text":"②③④⑤⑥⑦。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0403","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】监理机构在参与招标文件编制的过程中，应主要从以下几个方面提出监理意见： ①技术和质量的要求 ②项目涉及的主要产品和服务的要求 ③投标单位资质的要求 ④验收方法 ⑤时间进度的要求","knowledge":"","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"③④⑤。"},{"label":"C","text":"②③④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0404","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】应业主单位的请求，监理机构可以参与招标答疑工作。——A错误。","knowledge":"","options":[{"label":"A","text":"监理机构可以随时参与招标答疑工作。"},{"label":"B","text":"应业主单位的请求，监理机构可以对评标标准提出监理意见。"},{"label":"C","text":"对投标单位标书中的质量控制计划进行审查，提出监理意见。"},{"label":"D","text":"如果工程涉及分包，协助业主单位对分包单位进行审查。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0405","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】招标咨询工作的具体内容包括： ①向业主单位提供与项目有关的法律法规和标准等信息。 ②进行市场调查和询价，起草合同条款，为业主单位进行商务谈判提供咨询服务，协助业主单位与承建单位签订合理、有效的承建合同，并为业主单位在合同签订过程中遇到的问题提供咨询服务。 ③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。 ④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。 ⑤对业主单位项目资金使用情况提供咨询意见，尽量做到\"好钢用在刀刃上\"。","knowledge":"","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①②④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0406","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】承建合同签订的监理工作具体包括： ①参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。 ②如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理。 ③建议业主单位组织与合同执行或管理相关的部门参与合同评审工作。 ④协助业主单位对承建合同进行评审。 ⑤建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。 ⑥承建合同签订条款不得违背招投标文件约定的采购标的、数量、质量、价款或者报酬及付款方式、履约期限、违约责任、解决办法及有关影响采购标的使用效果的重要技术指标等实质性条款。","knowledge":"","options":[{"label":"A","text":"向业主单位提供与项目有关的法律法规和标准等信息。"},{"label":"B","text":"参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。"},{"label":"C","text":"如果软件工程项目涉及分包，应协助业主要求承建单位负责对分包单位进行管理。"},{"label":"D","text":"建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0407","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】审核承建单位及其人员能力时的质量控制要点包括：（背：文能技管经质） ①证明技术和管理能力的文件是否真实、齐全； ②承建单位的能力等级是否与本工程的规模相适应； ③承建单位的主要技术领域是否与本工程需要的技术相符合； ④拟派往本工程的项目管理人员是否具有相应的项目管理能力； ⑤其他技术人员的技术经历是否与本工程的技术要求相符合； ⑥承建单位是否建立了完善的质量管理体系。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0408","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】尽量避免方案变更导致项目变更，从而引发新的误解。——D错误，尽量避免，没办法完全避免。","knowledge":"","options":[{"label":"A","text":"协助业主单位组织召开业主单位、承建单位、监理单位三方参加的首次会议，明确项目沟通协调机制。"},{"label":"B","text":"合同中的质量条款应写清具体规格、型号、适用的标准等。"},{"label":"C","text":"合同中涉及变更、转让、解除等内容应详细说明。"},{"label":"D","text":"完全避免方案变更导致项目变更，从而引发新的误解。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0409","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.2.3 招标阶段监理内容 【点评】设计阶段的监理要求具体如下： ①应推动业主单位、承建单位对项目需求和设计进行规范化的技术描述，为项目实施提供优化的设计方案。 ②应促使项目计划、设计方案满足项目需求，符合相关的法律法规和标准，并与承建合同相符，具有可验证性。 ③应协助业主单位、承建单位消除设计文档在进入实施阶段前可预见的缺陷。 ④应协助业主单位组织专业人员评审设计方案。","knowledge":"","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"③④⑤⑥。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0410","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.1 设计阶段监理要求 【点评】设计阶段的监理活动具体如下： ①设计方案、测试验收方案、计划方案的审查 ②变更方案和文档资料的管理。","knowledge":"","options":[{"label":"A","text":"①②③。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"①②。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0411","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.2 设计阶段监理活动 【点评】设计阶段监理内容：（熟读/背：设测计变文其） ①对设计方案的审查 ②对测试验收方案的审查 ③对计划方案的审查 ④对设计变更的管理 ⑤对设计文档的管理 ⑥设计阶段其他监理内容","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0412","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 【点评】对于项目设计方案，监理机构应审查： ①设计方案的完整性。 ②与项目需求的符合性。 ③与承建合同、法律法规、标准的符合性。 ④设计合理性。 ⑤设计正确性。 ⑥设计可验证性 ⑦关键技术的实现方法、流程及技术保障措施的合理性。 ⑧项目实施的质量保证措施的可行性、合理性及其文档的完整性。 ⑨项目实施所需的各项资源是否已有效识别和配备。 ⑩是否实现了对软硬件资源的最佳利用 ⑪对整个系统的体系结构、开发平台和开发工具的选择、网络安全方案等要进行充分论证。 ⑫其他必要的内容。","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥⑦。"},{"label":"B","text":"①②③④⑤⑦。"},{"label":"C","text":"③④⑤⑥⑦。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0413","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 【点评】对计划方案的审查：计划方案应包括项目实施的 组织设计、人员要求、实施过程和进度安排等内容。——D对，ABC都是对测试验收方案的审查。","knowledge":"","options":[{"label":"A","text":"对测试验收方案的审查重点是 与设计方案的符合性。"},{"label":"B","text":"测试验收方案应包括测试用例设计、测试方法与流程设计、测试结果的判别方法等内容，监理机构主要对这三项内容与设计方案的符合性和可验证性等进行评审并提出评审意见。"},{"label":"C","text":"重点审查对关键部位的测试方案。"},{"label":"D","text":"计划方案应包括项目实施的 组织设计、人员要求、实施过程和进度安排等内容。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0414","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第452页 | 序号 | 监理内容 | 内容 | 例子 | |:---:|:---|:---|:---:| | ② | 对测试验收方案的审查 | 1.对测试验收方案的审查重点是 与设计方案的符合性。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0415","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 【点评】","knowledge":"","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①②④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0416","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 【点评】ACD是招标阶段的其他监理内容，不是设计阶段的。","knowledge":"","options":[{"label":"A","text":"参与招标工作。"},{"label":"B","text":"及时组织设计文件及设计方案交底会。"},{"label":"C","text":"招标咨询工作。"},{"label":"D","text":"审核承建单位及其人员的能力。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0417","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.3 设计阶段监理内容 【点评】设计文档审查完毕后，三方应对评审完毕的设计方案进行签认。——C错误，三方都要签认。","knowledge":"","options":[{"label":"A","text":"设计阶段监理流程有：①设计方案的报审流程②设计变更的控制流程。"},{"label":"B","text":"设计变更控制主要通过两个手段来实现:①变更流程的控制②变更内容的控制。"},{"label":"C","text":"设计文档审查完毕后，业主单位和监理单位应对评审完毕的设计方案进行签认。"},{"label":"D","text":"首先通过规范的变更流程来防止变更的随意性，其次变更的具体内容应得到有效的约束。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0418","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.3.4 设计阶段监理流程 《信息系统监理师教程 第2版 2024年1月出版》 第454页 |序号|监理流程|内容|例子| |---|---|---|---| | |设计阶段监理流程|1.设计阶段监理流程：（方便） ①设计方案的报审流程 ②设计变更的控制流程|| |①|设计方案的报审流程|1.设计方案的报审流程具体如下： ①承建单位完成项目设计方案后，应及时向监理机构提交设计方案评审申请。评审的输入文档主要包括设计文件本身、标准规范、项目需求书、承建合同等。 ②监理机构收到承建单位提交的设计评审申请后，协助业主单位组织人员进行设计文档完整性审查。如果发现设计文档存在不完整的问题，应及时要求承建单位进行必要的整改；承建单位整改完毕后，应重新提请审查。 ③设计文档完整性审查完毕后，监理机构应组织人员(必要时请业主单位派人参与)进行设计方案的详细审查。 ④设计文档审查完毕后，三方应对评审完毕的设计方案进行签认。由于信息系统工程自身的复杂性，设计方案评审的实施过程可能多种多样，既可以分阶段评审(例如软件开发项目的设计评审可以分为概要设计评审、详细设计评审两大阶段)，也可以分部分评审(例如网络集成项目可以分为系统设计方案评审和系统测试方案评审两大部分)，成熟一部分评审一部分。|| |②|设计变更的控制流程|1.设计变更控制主要通过两个手段来实现： ①变更流程的控制 ②变更内容的控制。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0419","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"20.4.2 实施阶段监理活动 【点评】项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见。——A错误，不是业主，是承建。","knowledge":"","options":[{"label":"A","text":"项目实施前，组织审核业主单位提交的质量管理计划，签署监理审核意见。"},{"label":"B","text":"项目实施前，组织业主单位、承建单位召开工程实施准备会议。"},{"label":"C","text":"项目实施过程中，按计划检查承建单位的项目实施状况、人员与实施方案的一致性。"},{"label":"D","text":"监理单位及时处理承建单位提交的关键环节的施工申请，审核其合理性后签认，报业主单位批准。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0420","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"进度控制的具体工作，以下说法错误的是（ ）。","knowledge":"20.4.2 实施阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》 第456页 |序号| |内容|例子| |---|---|---|---| |①|质量控制|1.质量控制的具体工作如下： ①项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见。 ②项目实施前，组织业主单位、承建单位召开工程实施准备会议。 ③依据确认的质量管理计划、实施方案、实施计划等文件，制定切合实际的监理实施细则，并根据质量控制点的设置原则合理设置质量控制点和选用合适的控制手段，主要的质量控制手段包括评审、测试、旁站和抽查。 ④组织对承建单位提供的产品及服务进行验收，对验收结果做验收记录，并对验收记录做三方签认手续;对不符合合同或相关标准规定的产品及服务应拒绝签认，没有被签认的产品及服务不得在工程实施中应用;具体检查项可依据相关标准及规范，组织业主单位、承建单位和监理单位共同协商确定。 ⑤项目实施过程中，按计划检查承建单位的项目实施状况、人员与实施方案的一致性。 ⑥执行已确定的阶段性质量监督、控制措施及方法，并做监理日志，出现质量问题时，可要求承建单位整改，并跟踪落实。 ⑦及时处理承建单位提交的关键环节的施工申请，审核其合理性后签认，报业主单位批准。 ⑧必要时，检查承建单位重要工程步骤的衔接工作，做监理日志。未经监理机构检查认可，承建单位不能进行与之相关的下一步骤的实施。 ⑨及时处理工程变更申请，审核变更的合理性，按变更控制程序处理，保证项目总体质量不受影响。 ⑩有分包单位时，应组织审核分包单位的工程实施资质。 ⑪出现质量事故时，及时按照质量事故处理程序进行处置。 ⑫若发现工程实施过程存在重大质量隐患，应及时向承建单位签发停工令，并报业主单位，监督承建单位进行整改。整改完毕后，及时处理承建单位的复工申请。","options":[{"label":"A","text":"项目实施前，组织审核承建单位提交的项目实施计划、实施方案，签署监理审核意见。"},{"label":"B","text":"项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见。"},{"label":"C","text":"定期检查、记录工程的实际情况，确定实际进度与计划相一致;若出现偏离，及时要求承建单位采取有效的纠偏措施。"},{"label":"D","text":"承建单位提交开工申请后，监理机构应审核开工申请，检查工程准备情况。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0421","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"简答一下，实施阶段监理活动包括哪些？","knowledge":"4.变更实施完毕后，承建单位应就变更后的设计文档提出评审申请。|","options":[],"answer":"","analysis":"实施阶段监理活动包括：（背：质进投合文沟） ①质量控制 ②进度控制 ③投资控制 ④合同管理 ⑤文档资料管理 ⑥沟通协调","has_options":false},{"id":"ex_0422","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"对设计变更的管理，以下说法错误的是（ ）。","knowledge":"3.重点审查对关键部位的测试方案，例如，主机网络系统软硬件测试方案、应用软件开发的模块功能测试方法等。 | | | ③ | 对计划方案的审查 | 1.计划方案应包括项目实施的 组织设计、人员要求、实施过程和进度安排等内容。 |","options":[{"label":"A","text":"控制设计变更，变更应由三方达成共识，并做工程备忘录。"},{"label":"B","text":"及时对合同的变更结果做工程备忘录。"},{"label":"C","text":"设计阶段协调的结果也应做工程备忘录。"},{"label":"D","text":"妥善保管设计阶段的监理文档。"}],"answer":"D","analysis":"对设计变更的管理 ①控制设计变更，变更应由三方达成共识，并做工程备忘录。 ②及时对合同的变更结果做工程备忘录。 ③设计阶段协调的结果也应做工程备忘录。——D错误，D是对设计文档的管理。","has_options":true},{"id":"ex_0423","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"3.变更是否实施、如何实施应充分协商，三方都可以提出变更申请。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0424","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"2.测试验收方案应包括测试用例设计、测试方法与流程设计、测试结果的判别方法等内容，监理机构主要对这三项内容与设计方案的符合性和可验证性等进行评审并提出评审意见。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0425","chapter":"第20章","time_label":"2025年5月","source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","stem":"2.首先通过规范的变更流程来防止变更的随意性，其次变更的具体内容应得到有效的约束。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0426","chapter":"","time_label":"2024年11月","source":"2024年11月信息系统监理师综合知识真题","category":"真题","stem":"2024年11月信息系统监理师综合知识真题（仅30题） 1、监理工程师在组织协调工作中，应坚持的基本原则不包括()。 A公平、公正、独立原则\t\tB科学原则\t\tC先进性原则\tD守法原则","knowledge":"","options":[{"label":"A","text":"laaS\tB.DaaS\tC.SaaS\tD.PaaS"},{"label":"A","text":"2001年\t\tB.1997年\t\tC.1984年\t\tD.1990年"},{"label":"A","text":"quality policy\tB.quality check1ist\t\tC.quality performance\tD.quality requirement"},{"label":"A","text":"质量方针B.质量检查表C.质量性能D.质量需求"},{"label":"A","text":"CPU和GPU\t\tB.TPU和DPU\t\tC云侧芯片和端侧芯片\t\tD训练芯片和推理芯片"},{"label":"A","text":"What you do\t\tB.What you have\tC.Who you are\t\tD.Where you are"},{"label":"A","text":"Iaas\tB.Paas\tC.Saas\tD.Laas"}],"answer":"B","analysis":"本题考查监理实施细则。参考《信息系统监理师教程(第2版)》第9.4小节，P234。","has_options":true},{"id":"ex_0427","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第69题】 -第12章信息管理 69、按照工程建设阶段划分，信息系统工程监理的相关信息可以分为招投标信息、系统分析信息、系统设计信息、项 目实施信息、系统验收信息。 需求规格说明书属 于 (  )","knowledge":"","options":[{"label":"A","text":"招标阶段信息     B、系统分析信息      C、系统实施信息      D 、系统  建立严格的项目资料管理制度，从制度上保护项目各方的知识产权。 (3)外购软件的知识产权保护控制。监理单位要在外购软件订单之前，对采购软件 的用户数、许可证书数和软件开被中限假灯让件和证明。 .监理单位要检查非自主产权软件的使用权合法文件和证明。 - - D正确 (4)待开发软件的知识产权保护控制。 监理单位要及时提醒建设单位在承建合同中明确规定知识产权归属，避免产生不 必要的知识产权纠纷。--B错 误","has_options":false},{"id":"ex_0431","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第64题】- 第10章信息系统工程的合同管理 64建设单位对于由承建单位造成的且实际发生的损失，向承建单位要求赔偿，称为(  ) A、索赔  B、变 更  C、反索赔  D、延 期","knowledge":"","options":[],"answer":"C","analysis":"P189 2.反索赔 反索赔是指建设单位向承建单位提出的索赔。--选C。建设单位向承建单位索赔的主要途径： 一是减少或防止可能产 生的索赔；二是反索赔，对抗(平衡)承建单位的索赔要求。建设单位向承建单位提出索赔的包括以下内容。","has_options":false},{"id":"ex_0432","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第63题】-第10章信息系统工程的合同管理 63、按照信息系统工程范围划分，信息系统工程合同可以分为： (  ) A、总承包合同、单项项目承包合同、分包合同","knowledge":"","options":[{"label":"B","text":"总承包合同、单价合同、分包合同"},{"label":"C","text":"总价合同、单项项目承包合同、分包合同 D 、总价合同、单价合同、成本加酬金合同 【参考答案】 A 【郑房新老师点评】P174 1.按信息系统工程范围划分 从信息系统工程的不同范围和数量进行划分，可以分为信息系统工程(小郑口诀：总单分) 总承包合同、单项项目承 包合同、分包合同"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0433","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 - 第61题】 -第9章变更控制 61、关于进度控制的描述， 正 确的 是 ( _  ) A 、制定的进度计划必须是现实可行的  B 、每个项 目必须建立变更控制系统管理进度变更 C 、每一次进度变更都要通过会议申请  D 、进度变更必须获得全部项 目干系人的书面批准","knowledge":"","options":[],"answer":"A","analysis":"P168 9.4.2对进度变更的控制 在控制进度变更中涉及很多问题 ，第一个要点是要保证项 目进度计划是现实的-A正 确 ，许多项 目，尤其信息技术 领域 ，经常会制订一些不切实际的进度计划 。第二个要点是要有强调遵守并达到项 目进度计划的重要性 。监理人员可 以执行一系列的实际检查 。来帮助他们管理项 目进度计划的变更 。有几种方法可以用来控制与人有关的进度变更。","has_options":false},{"id":"ex_0434","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第59题】 -第8章投资控制 59、监理工程师在进行预算审核时，采用(_)使用与预算编制过程基本相同的方法计算项目成本，优点是审核细致、 质量高、差错少。","knowledge":"","options":[{"label":"A","text":"全面审核法   B、分解对比审核法    C、重点审核法   D、经验审核法 【参考答案】A 【郑房新老师点评】 P147 1.全面审核法其具体计算和审核过程与编制过程基本相同。优点是全面细致、缺点是工作量过大，需要组织一批分专业 的计划预算工程师、经济师进行。"}],"answer":"","analysis":"","has_options":tru 代 ，而且所花费的成本可能还更低 。但是 ， 需要注意的是 ，在信息系统工程中采用最新的 、最先进的技 术 ，会给质量控制带来技术风险： 对总体设计方案中有关材料和设备进行比较，在价格合理基础上确认其符合 要求。 (6)审查承建单位对关键部位的测试方案 ，如主机网络系统软硬件测试方案 、应用软件开发的模块功能浏试方法等。 (7)协助承建单位建立、完善针对该信息工程建设的质量保证体系 ，包括完善计量及质量检测技术和手段。 (8)协助总承建单位完善现场质量管理制度 ，包括现场会议制度 、现场质量检验制度 、质量统计报表制度和质量事故 报告及处理制度等。 (9)组织设计文件及设计方案交底会  ，熟悉项 目设计 、实施及开发过程 ，根据有关设计规范 ，实施验收及软件工程验收 等规范、规程或标准，对有的工程部位下达质量要求标准。  --D不包括，并没有说规划 。","has_options":false},{"id":"ex_0444","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第44题】 -第6章质量控制-质量控制手段 44 、在信息系统工程中 ，承建单位编制了总体技术方案、工程实施方案、系统集成方案等重要文档 。将 (  ) 作为质 量控制手段 ，可以及时发现文档中存在的重大问题。","knowledge":"","options":[{"label":"A","text":"评 审    B、测 试      C 、旁 站    D 、抽 样 【参考答案】 A 【郑房新老师点评】 P89 评 审的主要目 的是本着公正的原则检查项 目的当前状态，项 目评审一般是在主要的项 目里程 碑接近完成时进行 ， 比如总体设计 、产品设计 、编码或测试完成的时候 。  通过专家评审 ，可以及时发现重大问题 ，并 给出处理意见。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0445","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第43题】 -第5章监理项目的组织和规划 43、关于监理规划的描述， 不正确的 是 (  ) A 、监理规划是监理单位实施监理项 目的行动指南 B 、监理规划是建设单位考核监理单位执行监理合同的重要依据 C 、监理规划的 目 的是增强监理单位中标的可能性 D 、监理规划是监理人员在项 目 中开展工作的依据和基础","knowledge":"","options":[],"answer":"c","analysis":"P60 监理大纲的 目 的是增强监理单位中标的可能性 表5-1监理大纲、监理规划和监理实施细则的主要区别","has_options":false},{"id":"ex_0446","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月-第39题】 -第4章监理单位的组织建设-监理工作的风险类别 39 、在软件开发过程中 ，监理工程师按照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但 仍有可能出现由于系统设计缺陷导致不能全部满足实际应用的情况 。这种属于 (  )  风险。 A 、技术资源  B 、工作技能  C 、管 理  D 、进 度","knowledge":"","options":[],"answer":"A","analysis":"4.2.1监理工作的风险类别 1.行为责任风险 行为责任风险来自三个方面： (1)监理工程师超出建设单位委托的工作范围 ，从事了自身职贵外的工作 ，并造成了工作上的损失； . (2)监理工程师未能正确地履行合同中规定的职责，在工作中发生失职行为造成损失； (3)监理工程师由于主观上的无 意行为未能严格履行职责并造成了损失。 2. 工作技能风脸 监理工程师由于他在某些方面工作技能的不足 ，尽管履行了合同中建设单位委托的职责 ，实际上并未发现本应该发现 的问题和隐患 。现代信息技术日新月异 ，并不是每一位监理工程师都能及时 、准确 、全面地掌握所有的相关知识和技 能的，无法完全避免这一类风险的发生。 3.技术资源风脸 即使监理工程师在工作中没有行为上的过错 ，仍然有可能承受一些风险 。例如在软件开发过程中 ， 监理工程师按 照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但仍有可能出现由于系统设计留有缺陷而 导致不能全部满足实际应用的情况--选A 。众所周知 ，某些工程上质量隐患的暴露需要一定的时间和诱因 ，利用现有的 技术手段和方法 ，并不可能保证所有问题都能及时发现 。 同时 ， 由于人力 、财力和技术资源的限制 ，监理无法对施工 过程的所有部位 、所有环节的问题都能及时进行全面细致的检查发现 ，必然需要面对风险。 4.管理风险 明确的管理目标 、合理的组织机构 、细致的职贵分工 、有效的约束机制 ，是监理组织管理的基本保证 。如果管理机制 不健全 ， 即使有高素质的人才 ，也会出现这样或那样的问题。","has_options":false},{"id":"ex_0447","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月-第38题】 -法律法规-超纲题 38 、 《关键信息基础设施安全保护条例》 的实施日期是 (  )。","knowledge":"","options":[{"label":"A","text":"2021 年 7 月 1 7 日     B、2021 年 7 月 3 0 日   C、2021 年 9 月 1 日     D、2021 年 9 月 1 7 日 【参考答案】 C 【郑房新老师点评】  《关键信息基础设施安全保护条例》  的实施日期是202 1 年9 月 1 日 . 郑房新老师  监理Q群423649123  高项扣扣群：658661882  中项扣扣群：725873151淘宝店铺：郑房新软考教育  或郑房新老师 国家法律法规数据库 关键信息基础设施安全保护条例 法律效力位阶：行政法规 制定机关：国务院 时效性：有效 施行日期：2021-09-01 公布日期：2021-07-30"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0448","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月-第36题】 -第4章监理单位的组织建设  36.关于监理单位权利和义务的描述，不正确的 是 ( _  ) 。 A 、监理单位应按照“守法、公平、公正、独立 ”的原则开展监理工作。 B 、监理单位应按照监理合同和所分配的承建任务取得收入。 C 、监理单位不得与被监理项目的承建单位存在隶属关系 D 、监理单位不得侵害建设单位和承建单位的知识产权","knowledge":"","options":[],"answer":"B","analysis":"P53  1.监理单位的权利与义务 在信息产业部正式颁布的《信息系统工程监理暂行规定》 中。第18条详细规定了监理单位的权利与义务： (1)应按照“ 守法、公平、公正、独立 ”的原则  - A 正 确，开展信息系统工程监理工作，维护建设单位与承建单位的合 法权益； (2)按照监理合同取得监理收入--B错误，是监理任务： (3)不承建信息系统工程； (4)不得与被监理项目的承建单位存在隶属关系和利益关系-C正 确，不得作为其投资者或合伙经营者； (5)不得以任何形式侵害建设单位和承建单位的知识产权；--D正确。 (6)在监理过程中因违犯国家法律、法规，造成重大质量、安全事故的，应承担相应的经济责任和法律赞任。","has_options":false},{"id":"ex_0449","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第34题】 -第2章信息系统项目管理 34、在信息系统项目建设过程中，可以采用的质量控制工具不包括： (_)","knowledge":"","options":[{"label":"A","text":"统计抽样 B、六西格玛    C、帕累托分析    D、挣值分析 【参考答案】 D 【郑房新老师点评】 P23 处理事故，例如决定是否返工，是否需要组织专门的小组负贵解决和纠正质量问题。 4)采取措施 使用质量控制工具和技术 (1)测试：单元测试、综合测试、系统测试等。 (2) 统计抽样和标准差、六西格玛等 。--A,B    包括 (3) 帕累托分析。--C 包括 (4)其他。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0450","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第33题】 - 第 1章信息系统工程监理引论 33、关于信息应用系统项目及项目管理的描述，不 正 确的是： (  ) A 、一般采取集中办公方式，项目实施过程可视性较好  B 、项目建设过程中工期经常会超出计划 C 、项目监理在项目执行过程中应被重视  D 、强项目管理能够确保顺利完成项目实施","knowledge":"","options":[],"answer":"A","analysis":"P15 建筑工程项目可视性强，信息系统工程可视性差 4。关于方法与手段 由 于  建筑工程可视性强，所以广泛采用现场监理手段，如旁站、巡视、进场材料核查、工序检查等等。同样的手段对 信息系统工程监理基本不适用，而需要独辟蹊径。例如，在设计阶段采用专家会审的方法，而在验收阶段则强调定量测 试等","has_options":false},{"id":"ex_0451","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第31题】 -第 19章信息应用系统建设基础知识 31、某政务应用软件项目覆盖省市县三级行政机构，规模大，安全性等级高。在设计阶段，建设单位组织了外部评审， 计划邀请9名专家组成评审委员会，其中软件专家人数最少为 (  ) A 、4  B 、5  C 、6  D 、7","knowledge":"","options":[],"answer":"B","analysis":"P450 2.外部评审 对规模等级大和安全性关键等级高的软件必须进行外部评审。外部评审由业主单位主持，承建单位组织，成立评 审委员会 。评审委员会由业主单位、承建单位和一定数量(占评审委员会总人数的50%以上)的软件专家组成员组成， 人数七人以上(单数),设主任一人、副主任若干人  。评审委员会与软件专家组共同进行评审。评审分专家组审查和评 委会评审两步完成。软件专家组进行审查，评审委员会进行评审。","has_options":false},{"id":"ex_0452","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第30题】 -第 19章信息应用系统建设基础知识 30.软件开发模型中，原型模型可以细分为 (  ) A 、增量模型和喷泉模型  B 、螺旋模型和喷泉模型  C 、渐进模型和螺旋模型  D 、增量模型和渐进模型","knowledge":"","options":[],"answer":"D","analysis":"P443 2.原型模型 原型模型也称演化模型，此方法主要针对所要开发的系统的需求不是很清楚，需要一个可实际运行的工作演示系统， 即原型，作为软件开发人员和用户学习研究、试验和确定软件需求的工作平台。  原型模型又可细分为增量模型和渐进模 型。--选D 1)原型化开发方法在实际应用中一般用的步骤 (1)快速分析。快速确定软件系统的基本要求。 (2)构造原型。尽快实现一个可运行的系统。 (3)运行和评价原型。验证原型的正确程度，根据用户的新设想，提出全面的修改意见。 (4)修正和改进。首先修改并确定需求规格说明，然后再重新构造或修改原型。 (5)判定原型是否完成。如果用户认可，迭代过程可以结束；否则，继续迭代。 (6)判断原型细部是否说明。 (7)原型细部的说明。 (8)判定原型效果。 (9)整理原型和提供文档。","has_options":false},{"id":"ex_0453","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 -第29题】 -第 19章信息应用系统建设基础知识 29 、关于面向对象的软件开发方法 (OMT)  的描述，不正确的 是(  ) A 、OMT的基础是对软件系统功能的逐层分解","knowledge":"","options":[{"label":"B","text":"OMT  的第一步是从问题的陈述入手，构造系统模型"},{"label":"C","text":"OMT  是一种自底向上和自顶向下相结合的方法"},{"label":"D","text":"OMT  提升了软件的 实施初始准备、记录、评审、批准和跟踪。 (5)监督承建单位依据书面规程，控制对基线的更改。监督承建单位依据书面规程， 由软件基线库生成软件产品并对其 发布进行控制。监督承建单位依据书面规程，记录配置项/单元的状态。 (6)控制承建单位编制软件配置管理报告，证明软件配置管理活动和软件基线库的内容，并提供给业主。 (7)监督承建单位依据书面规程，进行软件基线库审核。进行软件配置管理活动状态的跟踪和记录。 (8)定期审查软件配置管理活动和软件配置管理基线， 以验证它们与文档定义的一致性。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0457","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 - 第25题】 -第 16章信息网络系统建设设计阶段的监理 25、某信息网络系统服务器选型时，建设单位提出稳定可靠是第一位的 。监理工程师应建议使用(  ) 衡量服务器的可 靠性 。","knowledge":"","options":[{"label":"A","text":"RAID   B、MTBF      C、CPU 主 频   D、RAM 容 量 【参考答案】 B 郑房新老师  监理Q群423649123  高项扣扣群： 658661882   中项扣扣群： 725873151淘宝店铺： 郑房新软考教育   或郑房新老师 【郑房新老师点评】 P346 页系统可靠性。通常用MTBF (平均无故障时间)值衡量。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0458","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 - 第24题】 -第 14章信息网络系统监理基础 24 、(  ) 只有用于信息处理的基础物理环境(如电线、空调、地板等),灾难发生时，所有设备都必须运送到站点上， 同时从基础开始安装 ， 因此故障恢复时间可能会很长。 A 、热 站  B 、温 站  C 、冷 站  D 、设备站","knowledge":"","options":[],"answer":"C","analysis":"P308 (3)灾难恢复站点类型 (小郑口诀： 热镜像 ，冷基础 ，温站有个CPU) ·热站 (Hot Site) 在恢复站点，服务器、数据与应用程序与主服务器随时同 步 ( 镜 像 ) 运 行，这种方式的灾难恢复过程非常快速， 几乎难于察觉 。装备了数据中心 ，完全可以在灾难来临时发挥作用 。但由于这种方案意味着软硬件的重复投资 ， 因此 这种方案一般投资高昂。 ·冷站(Cold Site) 只有用于信息处理的基础物理环境(如电线 、 空调 、地板等)  ,灾难发生时 ，所有设备都必须运送到站点上 ， 同时 从基础开始安装 ， 因此故障恢复时间可能会很长。 ·温站(Warm Site) 用于信息处理的网络连接和一些外围设备只是部分进行了配置 ，如磁盘 、磁带 ，但主要的计算机系统没有备份 。 有 时 ，  温站装配 一 些小功率的CPU, 这样的安排有利于灾难发生时 ，计算机能立即投入使用 ， 同时 ，还比热站的费用 低 。","has_options":false},{"id":"ex_0459","chapter":"","time_label":"2023年5月","source":"2023年5月选择真题","category":"真题","stem":"【2023年05月 - 第23题】 - 第22 章分析设计阶段监理 23、软件质量保证的目标不包括： (  )","knowledge":"","options":[{"label":"A","text":"监督承建单位制定软件质量保证计划"},{"label":"B","text":"客观地验证软件产品及其活动是否遵守应用的标准、规程和需求"},{"label":"C","text":"促进各方及时处理软件项 目开发过程中的不一致问题"},{"label":"D","text":"记录并保管软件计划数据 ，审查软件项 目计划的活动情况 【参考答案】 D 【郑房新老师点评】 P561 页 2. 软件质量保证监理的 目标： (小郑口诀： 剑客出) (1)监督承建单位对软件质量保证活动做到有计划： (2)客 观地验证软件产品及其活动是否遵守应用的标准、规程和需求； (3)促 (3) 设置阶段性质量控制点 ，实施跟踪控制是工程质量控制的有效手段。","has_options":false},{"id":"ex_0501","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 - 第46题】第 6 章 质 量 控 制46、在设计阶段，监理人员质量控制的要点不 包 括 (  )A 、确保总体设计方案中已包括了建设单位的所有需求B 、总体方案应满足建设单位所提出的质量 、工期和造价等工程目标 C 、应对整个系统的体系结构、 网络安全方案等进行充分论证D 、组织设计文件及设计方案交底会 ，对项 目实施及开发过程进行规划","knowledge":"","options":[],"answer":"D","analysis":"P81-P826.3.3设计阶段的质量控制(1)了解建设单位建设需求和对信息系统安全性的要求 ，协助建设单位制定项 目质量目标规划和安全目标规划。(2)对各种设计文件，提出设计质量标准。(3)进行设计过程跟踪 ，及时发现质量问题 ，并及时与承建单位协调解决。(4)审查阶段性设计成果，并提出监理意见。(5)审查承建单位提交的总体设计方案，主要审查以下内容： 确保总体方案中已包括了建设单位的所有需求-A 包括；要满足建设单位所提出质量、工期和造价等工程目标； 总体方案要符合有关规范和标准--B包括；  质量保证措施的合理性、可行性；方案要合理可行，不仅要有明确的实施目标， 还要有可操作的实施步骤；对整个系统的体系结构、开发平台和开发工具 的选择、 网络安全方案等要进行充分论证-C 包 括 。 当前信息技术发展迅速 ，许多技术还没有达到成熟阶段，就被更先 进的技术所替代 ，而且所花费的成本可能还更低 。但是 ， 需要注意的是 ，在信息系统工程中采用最新的 、最先进的技术 ，会给质量控制带来技术风险： 对总体设计方案中有关材料和设备进行比较，在价格合理基础上确认其符合 要求。(6)审查承建单位对关键部位的测试方案 ，如主机网络系统软硬件测试方案 、应用软件开发的模块功能浏试方法等。(7)协助承建单位建立、完善针对该信息工程建设的质量保证体系 ，包括完善计量及质量检测技术和手段。(8)协助总承建单位完善现场质量管理制度 ，包括现场会议制度 、现场质量检验制度 、质量统计报表制度和质量事故 报告及处理制度等。(9)组织设计文件及设计方案交底会  ，熟悉项 目设计 、实施及开发过程 ，根据有关设计规范 ，实施验收及软件工程验收 等规范、规程或标准，对有的工程部位下达质量要求标准。  --D不包括，并没有说规划 。","has_options":false},{"id":"ex_0502","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 -第45题】 -第6章质量控制45关于监理单位在招投标阶段质量控制要点的描述， 不 正 确的 是(_) A 、应提出工程需求方案 ，确定工程的整体质量目标B 、协助评标时 ，应对投标单位标书中的质量控制计划进行审查C 、应对项 目招标文件进行审核 ，对涉及的商务内容和技术内容进行确认 D 、应参与招标文件的编制 ，并对可能影响工程质量的因素明确提出要求","knowledge":"","options":[],"answer":"A","analysis":"P80-P811.招投标过程的质量控制信息工程的招标一般由建设单位 、监理单位 、招标公司 、专家 、纪检或者公证部门参加 ，监理单位在招投标阶段质量 控制的注意要点有：(1) 协助建设单位提出工程需求方案，确定工程的整体质量目标--A错，只是协助而已；(2)参与标书的编制 ，并对工程的技术和质量 、验收准则 、投标单位资格等可能对工程质量有影响的因素明确提出要 求；(3)协助招标公司和建设单位制定评标的评定标准；(4)对项 目 的招标文件进行审核 ，对招标书涉及的商务内容和技术内容进行确认； (5)监理在协助评标时 ，应对投标单位标书中的质量控制计划进行审查 ，提出监理意见；(6)对招标过程进行监控 ，如招标过程是否存在不公正的现象等问题；(7)协助建设单位与中标单位洽商并签订工程合同 ，在合同中要对工程质量目标提出明确的要求。","has_options":false},{"id":"ex_0503","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category ter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月-第39题】 -第4章监理单位的组织建设-监理工作的风险类别39 、在软件开发过程中 ，监理工程师按照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但 仍有可能出现由于系统设计缺陷导致不能全部满足实际应用的情况 。这种属于 (  )  风险。A 、技术资源  B 、工作技能  C 、管 理  D 、进 度","knowledge":"","options":[],"answer":"A","analysis":"4.2.1监理工作的风险类别 1.行为责任风险行为责任风险来自三个方面：(1)监理工程师超出建设单位委托的工作范围 ，从事了自身职贵外的工作 ，并造成了工作上的损失；. (2)监理工程师未能正确地履行合同中规定的职责，在工作中发生失职行为造成损失； (3)监理工程师由于主观上的无意行为未能严格履行职责并造成了损失。2. 工作技能风脸监理工程师由于他在某些方面工作技能的不足 ，尽管履行了合同中建设单位委托的职责 ，实际上并未发现本应该发现 的问题和隐患 。现代信息技术日新月异 ，并不是每一位监理工程师都能及时 、准确 、全面地掌握所有的相关知识和技 能的，无法完全避免这一类风险的发生。3.技术资源风脸即使监理工程师在工作中没有行为上的过错 ，仍然有可能承受一些风险 。例如在软件开发过程中 ， 监理工程师按 照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但仍有可能出现由于系统设计留有缺陷而 导致不能全部满足实际应用的情况--选A 。众所周知 ，某些工程上质量隐患的暴露需要一定的时间和诱因 ，利用现有的 技术手段和方法 ，并不可能保证所有问题都能及时发现 。 同时 ， 由于人力 、财力和技术资源的限制 ，监理无法对施工 过程的所有部位 、所有环节的问题都能及时进行全面细致的检查发现 ，必然需要面对风险。4.管理风险明确的管理目标 、合理的组织机构 、细致的职贵分工 、有效的约束机制 ，是监理组织管理的基本保证 。如果管理机制 不健全 ， 即使有高素质的人才 ，也会出现这样或那样的问题。","has_options":false},{"id":"ex_0509","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月-第38题】 -法律法规-超纲题38 、 《关键信息基础设施安全保护条例》 的实施日期是 (  )。A、2021 年 7 月 1 7 日  B、2021 年 7 月 3 0 日  C、2021 年 9 月 1 日  D、2021 年 9 月 1 7 日","knowledge":"","options":[],"answer":"C","analysis":"《关键信息基础设施安全保护条例》  的实施日期是202 1 年9 月 1 日 . 国家法律法规数据库关键信息基础设施安全保护条例 法律效力位阶：行政法规制定机关：国务院时效性：有效 施行日期：2021-09-01公布日期：2021-07-30","has_options":false},{"id":"ex_0510","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月-第36题】 -第4章监理单位的组织建设  36.关于监理单位权利和义务的描述，不正确的 是 ( _  ) 。A 、监理单位应按照“守法、公平、公正、独立 ”的原则开展监理工作。 B 、监理单位应按照监理合同和所分配的承建任务取得收入。C 、监理单位不得与被监理项目的承建单位存在隶属关系 D 、监理单位不得侵害建设单位和承建单位的知识产权","knowledge":"","options":[],"answer":"B","analysis":"P53  1.监理单位的权利与义务在信息产业部正式颁布的《信息系统工程监理暂行规定》 中。第18条详细规定了监理单位的权利与义务：(1)应按照“ 守法、公平、公正、独立 ”的原则  - A 正 确，开展信息系统工程监理工作，维护建设单位与承建单位的合 法权益；(2)按照监理合同取得监理收入--B错误，是监理任务：(3)不承建信息系统工程；(4)不得与被监理项目的承建单位存在隶属关系和利益关系-C正 确，不得作为其投资者或合伙经营者；(5)不得以任何形式侵害建设单位和承建单位的知识产权；--D正确。(6)在监理过程中因违犯国家法律、法规，造成重大质量、安全事故的，应承担相应的经济责任和法律赞任。","has_options":false},{"id":"ex_0511","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 -第35题】 -第2章信息系统项目管理 35、监理活动的主要内容被概括为“ 四控、三管、一协调 ”,其中“ 四控 ”不包括。 A 、质量控制  B 、进度控制  C 、投资控制  D 、安全控制","knowledge":"","options":[],"answer":"D 监理内容监理活动的主要内容被概括为“ 四控、三管、一协调 ”。1)四控信息系统工程质量控制-A包括：信息系统工程进度控制-B包括：信息系统工程投资控制-C包括：信息系统工程变更控制。 2 ) 三 管信息系统工程合同管理：信息系统工程信息管理；信息系统工程安全管理。 一 协调在信息系统工程实施过程中协调有关单位及人员间的工作关系。","analysis":"","has_options":false},{"id":"ex_0512","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 -第34题】 -第2章信息系统项目管理34、在信息系统项目建设过程中，可以采用的质量控制工具不包括： (_)A、 统计抽样 B、六西格玛  C、帕累托分析  D、挣值分析","knowledge":"","options":[],"answer":"D","analysis":"P23 处理事故，例如决定是否返工，是否需要组织专门的小组负贵解决和纠正质量问题。 4)采取措施使用质量控制工具和技术(1)测试：单元测试、综合测试、系统测试等。(2) 统计抽样和标准差、六西格玛等 。--A,B  包括(3) 帕累托分析。--C 包括(4)其他。","has_options":false},{"id":"ex_0513","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 -第33题】 - 第 1章信息系统工程监理引论33、关于信息应用系统项目及项目管理的描述，不 正 确的是： (  )A 、一般采取集中办公方式，项目实施过程可视性较好  B 、项目建设过程中工期经常会超出计划C 、项目监理在项目执行过程中应被重视  D 、强项目管理能够确保顺利完成项目实施","knowledge":"","options":[],"answer":"A","analysis":"P15建筑工程项目可视性强，信息系统工程可视性差 4。关于方法与手段由 于  建筑工程可视性强，所以广泛采用现场监理手段，如旁站、巡视、进场材料核查、工序检查等等。同样的手段对 信息系统工程监理基本不适用，而需要独辟蹊径。例如，在设计阶段采用专家会审的方法，而在验收阶段则强调定量测 试等","has_options":false},{"id":"ex_0514","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月-第32题】 -  第19章信息应用系统建设基础知识32 、某政府单位批量替换了一批办公终端，其芯片架构由x86  改为了ARM,  为了使单位的业务应用系统能够在新环境 下正常使用，需要对其进行升级。这种软件升级属于 (  )","knowledge":"","options":[{"label":"A","text":"纠错性维护  B、适应性维护   C、预防性维护    D 、完善性维护【参考答案】 B【郑房新老师点评】 P45319.6.1软件维护类型 纠错性维护纠正在开发阶段产生而在测试和验收过程没有发现的错误。其主要内容包括：(1)设计错误； (2)程序错误； (3)数据错误； (4)文档错误。2.适应性维护(适应改变-适应环境)--选B为适应软件运行环境改变而作的修改。环境改变的主要内容包括：(1)影响系统的规则或规律的变化：(2)硬件配置的变化，如机型、终端、外部设备的改变等：(3)数据格式或文件结构的改变；(4) 软件支持环境的改变，如操作系统、编译器或实用程序的变化等。 完善性维护为扩充功能或改善
