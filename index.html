活中的重要程度，以及一旦遭到破坏、丧失功能或者数据被篡改、泄露、丢失、损毁后，对国家安全、社会秩序、公共利益以及公民、法人和其他组织的合法权益的侵害程度等因素，等级保护对象的安全保护等级分为五个等级。截至目前，等级保护经历了两个发展历程，即等保1.0和等保2.0两个典型阶段。第一级，等级保护对象受到破坏后，会对相关公民、法人和其他组织的合法权益造成损害，但不危害国家安全、社会秩序和公共利益：第二级，等级保护对象受到破坏后，会对相关公民、法人和其他组织的合法权益产生严重损害或特别严重损害，或者对社会秩序和公共利益造成危害，但不危害国家安全；第三级，等级保护对象受到破坏后，会对社会秩序和公共利益造成严重危害，或者对国家安全造成危害；第四级，等级保护对象受到破坏后，会对社会秩序和公共利益造成特别严重危害，或者对国家安全造成严重危害；第五级，等级保护对象受到破坏后，会对国家安全造成特别严重危害。【信息安全风险评估】32 信息安全风险评估的重要性主要体现在以下两个方面：(1)在信息系统应用过程中，信息安全风险评估必须满足业务不断增长而带来的安全实际要求；(2)信息安全风险评估必须响应国家法律法规的政策性要求。【关键信息基础设施保护】数据安全的三项基本特点是：机密性、完整性和可用性。 机密性机密性又称保密性，是指个人或团体的信息不为其他不应获得者获得。完整性数据完整性是指在传输、存储信息或数据的过程中，确保信息或数据不被未授权地篡改或在篡改后能够被迅速发现。可用性数据可用性是一种以使用者为中心的设计概念，其设计的重点在于让产品的设计能够符合使用者的习惯与需求。【数据安全主要防护技术】威胁数据安全的因素有很多，主要有以下几种常见情形：硬盘驱动器损坏、人为错误、黑客攻击、病毒侵害、信息窃取、自然灾害电源故障、电磁干扰计算机存储的信息越来越多、越来越重要，为防止计算机中的数据意外丢失，一般都用多种安全防护技术或手段来确保数据安全，常用的数据防护机制包括：(1) 磁盘阵列。磁盘阵列是指把多个类型、容量、接口甚至品牌一致的专用磁盘或普通硬盘连成一个阵列，使其以更快的速度、准确、安全的方式读写磁盘数据，从而提升数据读取速度和安全性的一种手段。(2) 数据备份。备份管理包括备份的可计划性、自动化操作、历史记录的保存或日志记录。33 (3) 双机容错。双机容错的目的在于保证系统数据和服务的在线性，即当某一系统发生故障时，仍然能够正常地向网络系统提供数据和服务，使系统不至于停顿。双机容错是为了保证数据不丢失和系统不停机。(4) 网络附加存储(NAS) 。NAS解决方案通常配置为作为文件服务的设备，由工作站或服务器通过网络协议和应用程序来进行文件访问，大多数NAS链接在工作站客户机和NAS 文件共享设备之间进行。这些链接依赖于企业的网络基础设施来正常运行。(5) 数据迁移。由在线存储设备和离线存储设备共同构成一个协调工作的存储系统，该系统在在线存储和离线存储设备间动态地管理数据，使得访问频率高的数据存放于性能较高的在线存储设备中，而访问频率低的数据存放于较为廉价的离线存储设备中。(6) 异地容灾。一种以异地实时备份为基础的高效、可靠的远程数据存储工作模式。在主数据中心基础上配备一个同城异地或外埠异地的备份数据中心，利用数据备份机制实现数据实时的存储保护，一旦主数据中心出现故障或遭遇水患、火灾、地震等灾难时，主数据中心瘫痪了，备份数据中心立即接管主数据中心，继续为系统运行提供数据存储、数据支撑等服务。(7) 存储区域网络(SAN) 。SAN 允许服务器在共享存储装置的同时仍能高速传送数据。这一方案具有带宽高、可用性高、容错能力强的优点，而且它可以轻松升级，容易管理，有助于改善整个系统的总体成本状况。SAN支持磁盘镜像技术、备份与恢复、档案数据的存档和检索、存储设备间的数据迁移以及网络中不同服务器间的数据共享等功能。典型的SAN 是一个机构的整个计算机网络资源的重要部分。34 第七章运行维护【运行维护服务能力模型】策划人员组织架构岗位职责人员储备人员培训绩效考核技术研发发现问题解决问题检查服务级别管理服务报告事件管理问题管理配置管理变更管理发布管理信息安全管理资源运维工具备品备件服务台知识库过程关键指标实施改进图运行维护服务能力模型【运行维护的实施】运维服务提供方按照审核通过的运行维护服务方案开展如下运行维护工作：(1)制定与运行维护服务方案相适应的实施计划；(2)建立运维项目相关方内外部的沟通协调机制；(3)对运维服务过程进行管理，保证实施计划的执行可追溯、服务结果可计量或可评价；(4)提交满足质量要求的运维服务过程交付物；(5)形成必要的过程记录文件，并对记录文件进行管理。【运维服务级别管理】运行维护服务根据其工作目标、工作内容、交付结果分为四大类：口调研评估。对运行维护对象的运行状况进行分析和评估，并提出方案建议。口例行操作。监控、预防性检查、常规作业口响应支持。事件驱动响应、服务请求响应、应急响应口优化改善适应性改进：为保持运行维护对象在新环境中可持续运行而实施的优化改进。35 增强性改进：采取改进措施，增强数据中心的安全性、可用性和可靠性。预防性改进：检测和纠正运行维护对象运行过程中潜在的问题或缺陷。【运维服务交付方式】表运维服务交付方式工作内容现场交付远程交付开始前了解现场交付内容、达到时间、之前的支持情况以及遗留问题，并与业主确认；复杂工作预案，审核后实施根据安全要求，准备资料工具等确保工作条件安全、稳定、可用交付中◆确定服务内容、操作流程和可能的风险◆遵守管理制度◆根据安全要求提供服务，做好服务记录◆完成确认的工作内容◆遇到无法解决的问题或业主额外要求，通知上级得到授权后再处理结束前遗留问题处理、安全检查确认工作完成情况，签署服务单恢复现场原状、离场许可结束许可结束后调查客户满意度、更新服务记录、就遗留问题寻找解决方案，跟踪解决【建立应急管理制度】业主单位负责制定应急响应制度，明确应急响应的目标、原则、范围及各项管理制度。具体要求如下：●应急管理制度要遵循统一领导、分级负责、预防为主、快速响应的原则；●与相关利益方就应急响应制度达成一致；●定期对应急响应制度进行评审；●在组织战略、业务流程、客户要求等发生重大变化时调整应急管理制度。【制定应急响应预案】36 结合信息系统现状和要求开展风险评估，从技术和管理等方面确定风险要素，制定应急响应预案，主要包括以下内容：●对风险要素进行评估，形成风险评估报告，并对识别的风险形成应对措施；●根据风险级别制定相应的应急响应预案；●应急响应预案可以分为总体预案和针对某个核心系统的专项预案；●应急响应预案的格式应该能够为应急响应组织进行系统恢复操作提供快速明确的指导；●应急响应预案要清晰、简洁，易于在紧急情况下执行，可使用检查列表；●应针对应急预案定期开展培训，至少每年举办一次。37 第八、九章监理概论【信息系统工程监理的重要性与迫切性】监理在工程建设过程中的重要性不言而喻，在信息系统工程建设项目中，其重要性更为突出，主要原因有：(1)随着信息化项目应用的普及，信息系统工程无论大小，一般都关系到国家、企业、单位的重要业务；(2)信息技术飞速发展，信息系统工程建设项目往往在还没有需求或需求还不明确时就付诸实施，因此在实施过程中需要不断修改；(3)由于用户需求的不断变化，以及其他内部或外部因素的影响，信息系统工程存在不能按预定进度执行的问题和风险；(4)信息系统工程建设项目的投资相对较大，如果管理不善会造成较大浪费；(5)信息系统工程的实施过程存在隐蔽工程，可视性差，如果过程监督缺失，容易产生工程隐患；(6)信息系统工程建设项目存在重建设、轻管理的问题，尤其是项目内容在技术上或专业上比较复杂时，业主单位缺乏足够的技术能力进行监管，需要懂专业的技术人员进行监督管理，并通过必要的信息化技术手段、方法和过程予以查验、审核，并确认其技术指标是否实现。【信息系统工程监理的地位和作用】◆信息系统工程监理为业主单位提供信息系统工程相关的技术建议◆信息系统工程监理代表业主单位对项目的实施过程进行全程跟踪和监督管理◆信息系统工程监理保证项目交付成果的质量◆信息系统工程监理协调项目干系人间的关系，促使项目建设过程中的各类项目信息得到全面有效的共享、一致的理解和认同，保证项目质量目标得到贯彻和落实38 【工程监理技术参考模型】监理运行周期规划部署实施招标设计实施验收信息资源系统运行维护运维招标运维实施评价及认定监理支撑要素监理法规及管理文件监理及相关服务合同监理及相关服务能力(人员、技术、资源、流程)三控两管一协调监理对象信息应用系统项目各方工作关系合同文档资料质量进度投资信息网络系统运行维护信息安全监理内容控制协调管理图工程监理技术参考模型【信息系统监理基本概念】业主单位(建设单位):具有信息系统工程(含运行维护)发包主体资格和支付工程及相关服务价款能力的单位。承建单位：具有独立企业法人资格，具有承接信息系统工程建设能力的单位。监理机构：当监理单位对信息系统工程建设项目实施监理及相关服务时，负责履行监理合同的组织机构。监理人员：(1)监理工程师：监理单位正式聘任的、取得国家相关主管部门颁发的信息系统工程监理工程师资格证书的专业技术人员。(2)总监理工程师：由监理单位法定代表人书面授权，全面负责监理及相关服务合同的履行、主持监理机构工作的监理工程师。(3)总监理工程师代表：由总监理工程师书面授权，代表总监理工程师行使其部分职责和权力的监理工程师。(4)监理员：经过监理及相关服务业务培训，具有同类工程相关专业知识，从事具体监理及相关服务工作的人员。监理资料和工具：监理大纲、监理规划、监理实施细则、监理意见、监理报告、监理工具。39 监理过程：(1)全过程监理：根据委托监理及相关服务合同要求开展工程建设及运行维护全过程的监理工作，包括部署实施部分中的招标、设计、实施和验收阶段，以及运行维护部分中的招标、实施和评价及认定阶段的监理工作。(2)里程碑监理：根据委托监理及相关服务合同和信息系统工程标准规范要求，对工程里程碑产生的结果进行确认的监理工作。(3)阶段监理：根据委托监理及相关服务合同要求开展某个或某些特定阶段的监理工作。监理形式：监理例会、签认、现场、旁站。【监理工作的风险类别】行为责任风险行为责任风险来自以下三个方面：(1)监理人员超出业主单位委托的工作范围，从事了自身职责外的工作，并造成了工作上的损失。(2)监理人员未能正确履行合同中规定的职责，在工作中发生失职行为造成损失。(3)监理人员由于主观上的无意行为，未能严格履行职责并造成了损失。工作技能风险监理人员由于在某些方面工作技能的不足，尽管履行了合同中业主单位委托的职责，实际上并未发现本应该发现的问题和隐患。现代信息技术日新月异，并不是每一位监理人员都能及时、准确、全面地掌握所有的相关知识和技能，因此这一类风险无法完全避免。技术资源风险即使监理人员在工作中没有行为上的过错，仍然有可能承受一些风险。例如，在软件开发过程中，监理人员按照正常的程序和方法，对开发过程进行了检查和监督，并未发现任何问题，但仍有可能出现由于系统设计本身存在缺陷而导致不能完全满足实际应用的情况。40 某些工程上质量隐患的暴露需要一定的时间和诱因，利用现有的技术手段和方法，并不可能保证所有问题都能及时发现。同时，由于人力、财力和技术资源的限制，监理人员无法对实施过程的所有部位、所有环节的问题都进行及时全面细致的检查、发现，因此必然需要面对风险。管理风险明确的管理目标、合理的组织机构、细致的职责分工、有效的约束机制，是监理单位组织管理的基本保证。如果管理机制不健全，即使有高素质的人才，也会出现这样或那样的问题和风险。【监理单位的风险防范方法】◆谨慎签订监理合同◆严格履行合同◆提高专业技能◆提高管理水平◆坚持守法、公正、独立、科学、保密的行为准则【信息系统工程监理服务成本】直接人力成本直接成本直接非人力成本间接人力成本间接成本间接非人力成本其他成本监理服务成本图监理服务成本【监理服务质量评价服务模型】41 业主单位和承建单位(需方单位和供方单位)监理服务质量需求持续改进监理服务持续改进监理服务质量满足监理单位监理服务提供监理服务质量评价监理服务质量评价监理服务特性与服务展现监理服务的约束条件监理服务需求图监理服务质量评价服务模型具体评价要求如下：(1)服务的内容。(2)服务的质量。(3)项目建设的效果。【监理大纲】监理大纲的内容：◆监理工作目标、依据和范围(1)监理工作目标。结合工程项目具体的建设内容，从质量控制、进度控制、投资控制、合同管理、信息管理、安全管理等方面的工作目标进行分析。(2)监理依据。主要是依据国家有关工程建设的政策、法律、法规、批准的建设计划、设计文件，工程建设的有关规程、规范、标准，以及招标文件中对监理范围的约定，对工程项目建设过程进行以控制投资、进度、质量和安全为核心的监督、管理、协调、服务，使工程项目尽可能好的实现投资目标、进度目标、质量目标和安全目标。(3)监理范围。根据项目招标需求或监理合同约定的监理服务范围，进行全过程监理、里程碑监理、阶段监理等。42 ◆项目监理机构及配备人员根据监理及相关服务招标文件或委托文件约定的工程类别、规模、服务内容、技术复杂程度、实施工期和实施环境等因素确定监理机构的组织形式和规模，并对人员按照职务进行分工。◆监理工作计划和各阶段监理工作(1)监理工作计划。在监理工作实施前，包括签订监理合同和组建监理机构的前后，监理单位就要以总监理工程师和专业监理工程师为主，开始逐步进行监理工作的计划。在这期间产生的计划性文件主要包括监理大纲、监理规划和监理实施细则，它们将成为监理工程师实施具体工作的重要指导文件。(2)各阶段监理工作。根据监理及相关服务招标文件或委托文件约定的工程类别和服务内容，对各阶段的监理工作进行描述。◆监理流程、成果和服务承诺(1)监理流程。包括展开监理信息搜集的步骤、监理意见的发布程序、监理会议召开的程序等，监理流程应符合监理规范等相关标准对监理工作的要求。(2)监理成果。交付物要列出清单。(3)服务承诺。根据工程招标文件与监理单位自身实力，对监理及相关服务提出可实施、可度量的服务承诺，严禁虚假承诺。【监理规划】监理规划是整个项目开展监理工作的依据和基础。监理规划相当于一个监理项目的“初步设计”,而监理实施细则相当于具体的“实施图设计”。监理单位在接受监理任务、开展监理投标和监理合同谈判时，应该根据业主单位对信息系统工程监理招标的要求和意图，向业主单位提供监理大纲，使业主单位通过监理大纲了解监理单位对该项目监理的行动纲要，增强业主单位对监理单位从事项目监理的信任感和认同感，促成双方合同洽谈和合同签约的成功。在合同签订后，监理单位应根据合同规定和要求，对监理大纲进一步细化，并向业主单位提交监理规划，作为监理单位对监理项目的行动指南，也可以作为业主单位考核监理单位对监理合同实际执行情况的重要依据。43 因此，监理规划在监理单位经营管理活动中有着重大的现实意义。【监理实施细则】监理实施细则是以被监理的信息系统工程建设项目为对象而编制的，用以指导监理单位各项监理活动的技术、经济、组织和管理的综合性文件。它是根据监理合同规定范围和业主单位的具体要求，由项目总监理工程师主持，监理工程师参加编制，在设计阶段监理工作的基础上，综合项目的具体情况，广泛收集工程信息和资料，以及征求监理工程师的意见和建议的情况下，结合监理的具体条件制定的指导整个监理机构开展监理工作的技术管理性文件。应该注意的是，对信息系统工程监理而言，仅仅有信息系统工程设计方案是无法完成监理实施细则的制定的。监理工程师应掌握系统设计中所确定的大量具体实施方法及开发的具体数据之后，编制出切合此项工程实际的监理实施细则。编写监理实施细则对实施监理工作意义重大，是监理工作必经的一个阶段。【三份文件的异同】(1) 监理大纲是在业主单位选择合适的监理单位时，监理单位为了获得监理任务，在项目监理招标阶段编制的项目监理单位方案性文件。它是监理单位参与投标时，投标文件内容的重要组成部分。编制监理大纲的目的是要使业主单位信服，采用本监理单位制定的监理方案，能够圆满实现业主单位的投资目标和建设意图，进而赢得竞争投标的胜利。由此可见，监理大纲是为监理单位的经营目标服务的，起着承接监理任务的作用。(2) 监理规划是在监理合同签订后，由监理单位制定的指导监理工作开展的纲领性文件。它的作用是指导监理单位规划自身的业务工作，并协调与业主单位在开展监理活动过程中统一认识、统一步调、统一行动。由于监理规划是在委托合同签订后编制的，监理委托关系和监理授权范围都已经很明确，工程项目特点及建设条件等资料也都比较翔实。因此监理规划在内容和深度等方面比监理合同更加具体化，更加具有指导监理工作的实际价值。44 (3)监理实施细则是在监理规划的指导下，监理机构已经建立，各项专业监理工作责任制已经落实，配备的监理工程师已经上岗，再由监理工程师根据专业项目特点及本专业技术要求所编制的，具有实施性和可操作性的业务性文件。监理实施细则由各专业监理工程师负责主持编制，并报送项目总监理工程师批准执行。监理大纲、监理规划和监理实施细则三者之间有一定的联系性，它们都是由监理单位对特定的监理项目编制的监理工作计划性文件，且编制的依据具有一定的共同性，编制的文件格式也具有一定的相似性。但由于监理大纲、监理规划和监理实施细则三者的作用不同、编制对象不同、编制负责人不同、编制时间不同、编制的目的不同等，在编制内容侧重点、深度、广度和细度诸方面有着显著区别。45 第十章质量控制【监理质量控制的意义】信息系统工程监理质量控制的特点和意义主要体现在以下几个方面：(1)监理单位受业主单位的委托，对工程质量形成的全过程进行控制，将对工程质量的保证和提高起到重要作用。(2)监理单位的质量控制可以促进承建单位的质量控制活动。(3)监理单位与承建单位、软硬件供应商、分包单位、外协单位等都是质量体系的共同体，没有这些单位的质量保证，承建单位的质量保证就不可能健全。(4)监理的过程性质量监督是对质量监督制度重大的改进和提高。(5)信息系统工程建设项目实体、功能和使用价值的各方面都应当列入项目的质量目标范围。【信息系统工程质量控制的特点】变更纠错代价故障定位可视性差质量纠纷理想进度图信息系统工程质量的特点【质量控制的基本原则】质量控制要与建设单位对工程质量的监督紧密结合质量控制要实施全过程控制质量控制要实施全面控制◆人的行为◆材料、配件、设备和系统◆实施方案与方法◆环境因素【质量保证体系的构成】承建方资质人46 【领导的责任】领导应对质量方针的制定与质量体系的建立、完善、实施和保持负全面责任。这是做好全面质量管理的关键。在信息系统工程建设项目中，作为工程主体的业主单位、承建单位、监理单位，其项目主管人员都需要建立起质量体系与组织，并担负质量体系有效运行的责任。【质量责任和权限】确定为达到规定的质量水平所必须进行的质量控制活动，明确规定项目组织体系中各部门及人员在进行这些质量活动时应承担的责任。明确规定从事各项质量活动人员的责任和权限，规定各项工作与流程之间的衔接、控制和协调措施。在一个机构完善且有效的质量体系中，其工作的重点是以实施全过程控制为主，实行预防与把关相结合，采取各种方法查明实际的或潜在的质量问题，并采取预防和补救措施。【组织结构】在实施全面质量管理时，通常可以将质量组织形式分为以下五类：◆质量预防组织。从事组织制订各类质量计划，预防质量缺陷，以便获得确定的质量水平的工作。◆质量改进组织。主要是针对功能和管理上发生的经常性缺陷，组织质量突破，把性能质量和质量管理提高到一个新的水平。◆质量保证组织。主要是组织对工程质量工作的审核，确保质量要求的实现，并保持稳定。◆接收组织。从事进场物品接收、工序制造接收、产品接收等工作。◆协调组织。主要是协调影响质量的有关部门的活动。必须着重指出：上述五种质量组织并不是必须有五种对应的机构，而是这五个方面的质量活动在组织上应是落实的，可以根据组织及项目的具体情况来进行设计。【资源和人员】资源和人员是质量体系的客观物质条件。质量保证能力主要表现为组织是否拥有能生产满足质量要求的资源条件、检测设备，并有一支经验丰富、训练有素的技术、管理队伍，这是质量体系的固有技术和物质基础。为确保各类人员的工作能力适应和满足工作的要求，监理单位应对员工必须具备的资格、经验、能力等基本素质以及需47 要进行的培训计划做出相应的具体规定。【工作流程】质量体系应具备以下几个功能：应能对所有影响质量的活动进行恰当而连续的控制；应重视并采取预防性措施，避免问题发生；应具有一旦发现问题能及时做出反应并加以纠正的能力。【三方协同的质量控制】质量控制体系是指为保证性能、过程或服务在质量上满足规定或潜在的要求，由组织机构、职责、程序、活动、能力和资源等构成的有机整体。信息系统工程项目是由项目建设单位、承建单位和监理单位共同完成的，因此，质量控制任务也应该由三方共同完成，三方都应该建立各自的质量保证体系。承建单位是工程建设的实施方，因此承建单位的质量管理体系能否有效运行是整个项目质量保证的关键。业主单位作为工程建设的投资方和用户方，应该建立较完整的工程项目管理体系，这是项目成功的关键因素之一。项目的质量控制体系以承建单位的质量管理体系为主体，在项目开始实施之前由承建单位建立，监理单位对组织结构、工序管理、质量目标、自测制度等要素进行检查。制订明确的质量计划建立和健全专职质量管理机构实现管理业务标准化，管理流程程序化配备必要的资源条件建立一套灵敏的质量信息反馈系统【质量保证体系的主要检查内容】监督、检查承建单位质量保证体系的主要内容图质量保证体系的主要检查内容48 【质量控制点】◆选择的质量控制点应该突出重点◆选择的质量控制点应该易于纠偏◆有利于三方共同从事工程质量的控制活动◆保持控制点设置的灵活性和动态性【招投标及准备阶段的质量控制】◆协助业主单位提出工程需求方案，确定工程的整体质量目标◆参与招标文件的编制，并对工程的技术和质量、验收准则、投标单位资格等可能对工程质量有影响的因素明确提出要求◆协助招标公司和业主单位制订投标文件的质量评定标准◆对招标文件进行审核，对其中涉及的质量内容进行确认◆协助业主单位评标时，应审查投标文件中的质量控制计划◆协助业主单位审核承建单位及其人员的能力◆对招标过程进行监督，例如，招标过程中是否存在不公正的现象等◆协助业主单位与中标单位洽商并签订承建合同，建议业主单位在承建合同中明确规定工程所包含的功能、技术要求、测试标准、验收要求、质量目标、质量责任、变更控制程序等有关内容【设计阶段的质量控制】◆充分了解业主单位的项目需求，协助业主单位制订项目质量目标规划◆对各种设计文件提出设计质量标准◆进行设计过程跟踪，审查阶段性设计成果，及时发现质量问题◆审查承建单位提交的设计方案◆审查承建单位对关键部位的测试方案，例如主机网络系统软硬件测试方案、应用软件开发的模块功能测试方法等◆审查承建单位的质量管理体系，包括是否具备完善的质量检测技术和手段等◆组织设计文件及设计方案交底会，帮助承建单位熟悉项目设计、开发及实施过程◆设计方案经监理工程师审定后，由总监理工程师审定签发◆设计方案未经批准，不得进行部署实施49 【实施阶段的质量控制】◆项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见；组织业主单位、承建单位召开工程实施准备会议◆制订切合实际的监理实施细则，并根据质量控制点的设置原则合理设置质量控制点◆组织对承建单位提供的产品及服务进行验收，对验收结果做验收记录，并对验收记录办理三方签认手续，对不符合合同或相关标准规定的产品及服务应拒绝签认◆项目实施过程中，按计划检查承建单位的项目实施状况、人员与实施方案的一致性，尤其注意对特种作业人员的现场资质审查◆执行已确定的阶段性质量监督、控制措施及方法，并做监理日志◆及时处理承建单位提交的关键环节的施工申请，审核其合理性后签认，报业主单位批准◆必要时，检查承建单位重要工程步骤的衔接工作，做监理日志。未经监理单位检查认可，承建单位不能进行与之相关的下一步骤的实施◆及时处理工程变更申请，审核变更的合理性，按变更控制程序处理，保证项目总体质量不受影响◆有分包单位时，应组织审核分包单位的工程实施资质◆出现质量事故时，及时按照质量事故处理程序进行处置◆若发现工程实施过程存在重大质量隐患，应及时向承建单位签发停工令，并报业主单位，监督承建单位进行整改。整改完毕后，及时处理承建单位的复工申请【验收阶段的质量控制】◆审核初验/终验计划及方案◆审核初验/终验条件◆处理初验/终验中发现的质量问题◆确认初验/终验结果【设置质量控制点的意义】◆便于对工程质量总目标的分解，可以将复杂的工程质量总目标分化为一系列简单分项的目标控制；50 ◆有利于监理工程师和承建单位的控制管理人员及时分析和掌握控制点所处的环境因素，易于分析各种干扰条件对有关分项目标产生的影响及其影响程度的测定；◆有利于监理工程师和承建单位的控制管理人员监测分项控制目标，计算分项控制目标值与实际目标值的偏差；◆由于质量控制点目标单一，且干扰因素便于测定，有利于监理工程师和承建单位的控制管理人员制定、实施纠偏措施和控制对策；◆通过对下层级质量控制点分项目标的实现，对上层级质量控制点分项目标提供保证，从而可以保证上层级质量控制点分项控制目标的实现，直到工程质量总目标的最终实现。【评审】评审过程：◆现场质量监理工程师收集方案、文档等资料，进行初审，并将初审结果上报总监理工程师。◆总监理工程师根据方案的重要性、时间要求、初审结果判断是否进行评审，并确定评审的时间、方式、内容、参加人员等，形成评审方案。◆承建单位和有关方面提交评审必需的其他材料。由总监理工程师组织专家、质量监理工程师和其他相关人员参加，对方案进行评审、讨论，得出评审结论。评审的过程应记录，并保存备案。在特殊情况下，评审可以通过远程方式异地进行，但要做好技术保密工作。必要时评审人员可以到现场进行实地考察。◆总监理工程师根据评审结论，组织现场监理工程师讨论，形成最终的监理意见，提交给业主单位和承建单位。◆业主单位和承建单位根据监理意见进行处理，处理结果由现场监理人员进行确认，并报总监理工程师签发。【测试】51 在整个质量控制过程中，可能需要业主单位、承建单位、监理单位和第三方测试机构对工程进行测试。业主单位的测试是为了验证系统是否满足业务需求，承建单位的测试是为了保证工程质量和进度，监理单位的测试是为了检查和确认工程质量，第三方测试是对工程做出客观的质量评价。虽然各自的工作重点不同，但都是为了更好地控制项目质量。【监督承建单位的测试工作】◆督促承建单位建立项目测试体系，成立独立的测试小组◆督促承建单位制订全过程的测试计划，从项目需求分析阶段开始，直到项目结束，要进行不间断地测试，并且随着项目进展，还要制订分系统的测试计划和详细测试方案◆对测试方案和测试计划进行审核，对承建单位选择的测试工具的有效性进行确认◆对测试结果的正确性进行审查◆对测试问题改进过程进行跟踪【亲自测试重要环节】◆现场抽查测试。当现场监理工程师发现质量疑点时，要进行现场抽查测试。例如，对于综合布线阶段，监理工程师除了在隐蔽工程实施过程中要旁站外，还要通过网络测试仪对布线质量进行抽测，以便能够分析网络综合布线的效果，这样◆可以有效保证网络综合布线的质量。另外，对于设备进货也要进行现场抽检。◆对于软件开发项目，监理单位要对重要的功能、性能、安全性等进行模拟测试，判断阶段性开发成果是否满足质量要求，并且作为进度控制和成本控制的依据。【第三方测试的监理】◆协助业主单位选择权威的第三方测试机构，一般应审查第三方测试机构的资质、测试经验以及承担该项目的测试工程师情况◆对第三方测试机构提交的测试计划进行确认◆协调承建单位、业主单位以及第三方测试机构的工作关系，并为第三方测试机构的工作提供必要的帮助◆对测试问题和测试结果进行评估【旁站】52 旁站监理是指监理人员在施工现场对某些关键部位或关键工序的实施全过程现场跟班的监督活动。旁站记录是监理工程师或总监理工程师依法行使有关签字权的重要依据，是对工程质量的签认资料。◆记录内容要真实、准确、及时◆对旁站的关键部位或关键工序，应按照时间或工序形成完整的记录◆记录表内容填写要完整，未经旁站人员和实施单位质检人员签字不得进入下道工序◆记录表内实施过程情况指所旁站的关键部位和关键工序实施情况，例如，人员上岗情况、材料使用情况、实施技术和操作情况、执行实施方案和强制性标准情况等◆完成的工程量应写清准确的数值，以便为投资控制提供依据◆监理情况主要记录旁站人员、时间、旁站监理内容、实施质量检查情况、评述意见等，将发现的问题做好记录，并提出处理意见◆质量管理体系运行情况主要记述旁站过程中承建单位质量管理体系的管理人员是否到位，是否按事先的要求对关键部位或关键工序进行检查，是否对不符合操作要求的实施人员进行督促，是否对出现的问题进行纠正◆若工程因意外情况发生停工，应写清停工原因及承建单位所做的处理【抽查】信息系统工程建设过程中的抽查主要针对计算机设备、网络设备、软件产品以及其他外围设备的到货验收检查，以及对项目实施过程有可能发生质量问题的环节随时进行检查。【到货验收的抽查】对于到货验收的抽查，主要是针对大量设备到货情况。例如，一次进来上百台不同型号的设备，这时就需要对不同型号的产品进行抽查。在抽查时，要有详细的记录。对于少量设备到货的情况，要逐一检查。在验收过程中，要详细记录查验设备的参数、功能、品牌、型号、产地、数量、外观及相关材料。53 【实施过程的抽查】在软件开发过程中，监理工程师可以随时抽查开发文档的编写情况，测试执行情况，功能和性能，已经完成的代码是否符合基本的开发规范等。54 第十一章进度控制【进度控制概念】表进度与进度控制的概念术语解释说明进度进度是指作业在时间上的排列，强调的是一种作业进展以及对作业的协调和控制。进度控制进度控制是指对工程项目的各建设阶段的工作程序和持续时间进行规划、实施、调整等一系列活动的总称。进度控制的基本思路是，比较实际状态和计划之间的差异，并做出必要的调整使项目向有利的方向发展，其目的是确保项目“时间目标”的实现。进度控制可以分成四个步骤：计划(Plan)、执行(Do) 、检查(Chec k) 和行动(Acti on), 简称PDC A。【进度控制流程-进度计划编制原则】◆应该对所有里程碑及其期限要求进行说明◆确切的工作程序能够得到详细说明◆进度应该与工作分解结构(WorkBreakdownStructure,WBS)保持一致，并明确表明全部任务开始和结束的时间节点◆全部进度必须体现时间的紧迫性，可能的话需要详细说明每件大事需要配置的资源◆项目越复杂，专业分工就越多，就更需要全面综合管理，需要有一个主体的协调的工作进度计划，以便支持对整个项目的建设进度进行控制【进度控制流程-进度计划编制的基本要求】◆保证项目在合同规定的时间内完成，实现项目的目标要求；◆实施进度安排应满足连续性和均衡性的要求；◆实施顺序的安排应进行优化，以便提高经济效益；◆应选择适当的计划图形，满足使用进度计划的要求；◆应遵循编制程序，提高进度计划的编制质量。55 【进度控制流程-进度计划】进度计划的内容：◆项目综合进度计划◆设备(材料)采购工作进度计划◆项目实施(开发)进度计划◆项目验收和投入使用进度计划【进度控制范围】【对工程建设全过程的控制】信息系统工程监理进度控制的目标是保证项目在计划的时间范围内投入使用，因此进度控制不仅包括实施阶段，还包括招标阶段、设计阶段、系统试运行及项目验收阶段。其时间范围应该涵盖工程建设的全过程。【对分项目、分系统的控制】信息系统工程由多个子项目组成，因此进度控制必须实现全方位的控制，既包括主要工程，也包括分部、分项工程，即对组成项目的各个子项目的进度进行控制管理，包括综合布线、设备采购、软件开发、硬件安装等。【进度控制方法】(1)从工程准备阶段开始直至竣工验收的全过程中，坚持采用动态管理和主动预控的方法进行控制。(2)在充分掌握第一手实际数据的前提下，采用实际值与计划值进行比较的方法进行检查和评价。(3)运用行政的方法进行进度控制，所谓行政方法主要是指通过承建单位的上级及建设单位的领导，利用其行政权力发布进度指令，进行指导、协调、考核，利用奖惩、表扬、批评的手段进行监督、督促，实施有效的控制。(4)发挥经济杠杆的作用，用经济手段对工程进度加以影响和制约。56 (5)利用管理技术的方法进行控制，这种方法要求监理单位必须具有较深厚的规划、控制和协调能力。所谓规划，就是确定进度总目标与分目标。所谓控制，就是运用动态方法和实际值与计划值比较的手段进行检查工程进度，发现偏差时，及时予以纠正。所谓协调，就是适时地协调参加工程建设的各单位之间的进度计划关系。【进度控制监理程序】审查进度计划：承建单位按时编制进度计划，监理分析审查计划可行性监控进度计划：发现偏差报总监，总监签发《监理通知》,要求承建单位按计划执行调整进度计划：召开各方协调会议，必须延长工期时，承建方应填报《工程延期申请表》工程进度报告：提供阶段性进度报告、进度月报、进度调整报告等进度报告项目延期管理：协商确认后无问题，总监签认申请。如有问题，出监理意见并跟踪整改【实施进度控制的基本措施】表实施进度控制的基本措施基本措施概念组织措施◆建立进度控制目标体系、进度报告制度及进度信息沟通协调机制、进度计划审核制度和进度计划实施中的检查分析制度、方案审查、工程变更管理制度◆落实监理单位进度控制的人员组成、具体控制任务和管理职责分工技术措施◆审查承建单位提交的进度计划，使承建单位能在合理的状态下施工◆编制进度控制工作细则，指导监理工程师实施进度控制◆采用进度控制技术及其他科学适用的进度控制方法，结合信息技术及信息系统的应用，对进度实施动态控制，进行进度动态比较，提供比较报告◆确定合理的工作定额，进行进度预测分析和进度统计57 图香蕉图续表实施进度控制的基本措施基本措施概念经济措施◆及时办理工程预付款及工程进度款支付手续◆对必须的应急赶工给予优厚的赶工费用；对合理的工期提前给予奖励；对工程延误收取误期损失赔偿金合同措施◆加强合同管理，协调合同工期与进度计划之间的关系，保证合同中进度目标的实现◆严格控制合同变更，对各方提出的工程变更，监理工程师应严格审查后再变更合同◆加强风险管理，在合同中应充分考虑风险因素对进度的影响，以及相应的处理方法◆加强索赔管理，公正地处理索赔【进度控制的技术手段-甘特图】监理工程师应将每天、每周或每月的进度实际情况记录在实施进度表内，并与计划进度相比较，以确定进度是超前还是落后，亦或按预定的进度进行。如果检查发现项目进度已经落后，则应立即提出监理报告，并与承建单位一起商讨对策，采取补救措施，改变落后情况。如果检查发现项目进度超前，也应分析原因，避免出现任务遗漏、工序不合理缩减等情形。甘特图虽然简单直观，但在计划与实际的对比上，很难准确表示出实际进度较计划进度超前或延迟的程度。【进度控制的技术手段-香蕉图】100%ES 曲线预测状态LS曲线时间实际完成情况曲线ES 曲线：最早时间计划LS 曲线：最迟时间计划注：工程施工进度曲线的切线斜率即为施工进度速度58 实施进度曲线图采用直角坐标，横轴代表工期或时间，纵轴代表项目完成的任务量或实施进度的累计。将有关数据表示在坐标图中，将不同时间和完成不同任务量的交点连起来，就形成了实际完成曲线。【网络图计划法】网络图是由箭头线和节点组成的用来表示工作流程的有向网状图形，包括单代号网络图和双代号网络图两种。双代号网络图又称箭头线式网络图，以箭头线表示工作，以节点表示工作的开始或结束状态及工作之间的连接点。在实施过程中，工期的超前和落后是经常发生的，为此，在利用网络图控制进度时的具体做法是：首先应掌握现状，看进度是超前还是落后；其次是分析现状，分析超前落后的主客观因素及对工期的影响程度；最后是研究解决工期超前或落后应采取的相应措施。应当注意的是，当工期拖延发生时，要合理采取措施，权衡进度、成本及质量之间的关系，具体包括：(1)采用无目标地补充设备、增加人员或加班加点的做法，往往既不经济，效果也不佳，还可能导致质量和效率降低；(2)压缩工期往往需要增加实施费用，采用一些特别措施更需要增加额外费用，但实施速度加快，工程可以提前交付使用，能够提前发挥组织效益和社会效益；(3)承建单位的超额支出，一般可以从合同条款和业主单位的奖励中得到补偿。【进度计划六时标图】表关键路径法的重要概念重要概念解释关键路径法一种进度网络分析技术，不考虑任何资源限制。总时差(总浮动时间TF)在不延误总工期的前提下，该活动的机动时间。自由时差(自由浮动时间FF)在不影响紧后活动的最早开始时间前提下，该活动的机动时间。59 ◆最早开始时间ES(Early Start)◆最早结束时间EF(Early Finish)◆最迟结束时间LF(Late Finish)◆最迟开始时间LS(Late Start)图六时标(单代号)网络图公式背记：总时差TF=LS-ES=LF-EF自由时差FF=min{ 紧后活动ES}-EFES持续时间EF活动编号LS总时差LF60 第十二章投资控制【项目投资过程】【规划成本管理】规划成本管理的依据：①项目章程②进度管理计划③风险管理计划④组织相关的成本控制程序成本管理计划是项目管理计划的组成部分，描述将如何规划、安排和控制项目成本。成本管理计划的内容包括：(1)成本管理过程及其工具与技术。(2)计量单位。例如，用于测量工作量的人日数、用于计量设备数量的单位等。(3)准确度。为成本估算规定的可接受的区间，例如±10%,其中可能包括一定数量的应急储备。(4)精确度。根据活动范围和项目规模，设定成本估算向上或向下取整的程度。(5)与工作分解结构(WBS)匹配的成本分配。WBS为成本管理计划提供了框架，以便据此规范地开展成本估算、预算和控制。(6)控制临界值。可能需要规定偏差临界值，用于监督成本绩效。它是在需要采取某种措施前允许出现的最大偏差，通常用偏离基准计划的百分数来表示。(7)绩效测量规则。需要规定用于绩效测量的挣值管理(EamedValueManagement,EVM)规则。(8)报告格式。需要规定各种成本报告的格式和编制频率。(9)其他细节。例如，对战略筹资方案的说明，记录项目成本的程序等。【成本估算】成本估算常用方法：①类比估算②参数估算③自下而上估算④三点估算⑤数据分析三点估算：◆最可能成本(Cm)。对所需进行的工作和相关费用进行比较现实的估算，所得到的活动成本。 ◆最乐观成本(C₀) 。基于活动的最好情况所得到的成本。◆最悲观成本(Cp)。基于活动的最差情况所得到的成本。◆三角分布：预期成本=(Cm+Co+Cp)÷361 ◆贝塔分布：预期成本=(C。+4×Cm+Cp)÷6成本估算的依据：①成本管理计划②质量管理计划③项目进度计划④市场条件影响⑤范围基准⑥资源需求⑦项目进度计划⑧经验教训登记册⑨组织内部的成本估算政策等【成本预算】信息系统工程建设成本的预算主要包含量级预算、预算估算和最终预算。这些方法的不同主要体现在其在什么时间进行、如何使用和精确度如何。◆量级预算提供了信息系统工程建设成本控制的一个粗略概念。它在信息系统工程建设早期甚至建设之前使用，信息系统工程建设相关人员使用该预算帮助决策。进行这种类型的预算通常是在工程建设完成之前2～3年。量级预算的精确度一般是从-25%～75% ,也就是项目的实际成本可能低于量级预算的25%,或高于量级预算的75%。对于目前的信息系统工程建设而言，该精确范围经常更广。例如，许多IT 项目专业人员为软件开发项目成本估算自动增加一倍。◆预算估算被用来将资金划入一个组织的预算。许多业主单位建立至少2年的预算。预算估算在信息系统工程完成前1～2年做出。其精确度一般在-10%～25% , 也就是项目的实际成本可能低于预算估算的10%,或高于预算估算的25%。◆最终预算提供精确的项目成本预算。常用于许多项目采购决策的制定，因为这些决策需要精确的预算。也常用于估算信息系统工程建设的最终成本，其精确度通常在-5%～10% ,也就是项目的实际成本可能低于最终预算的5%,或高于最终预算的10%。【成本预算的常用技术】◆成本汇总制定预算是汇总所有单个活动或工作包的估算成本，最终得出整个项目的总成本，建立一个经批准的成本基准的过程。◆储备分析可以建立项目管理储备的储备分析。管理储备是为了管理控制的目的而特别留出的项目预算，用来应对项目范围中不可预见的工作，目的是用来应对会影响项目的未知风险。管理储备不包括在成本基准中，但属于项目总预算和资金需求的一部分。62 当动用管理储备资助不可预见的工作时，就要把动用的管理储备增加到成本基准中，从而导致成本基准变更。◆历史信息审核审核历史信息有助于进行类比估算或参数估算。历史信息可以包括各种项目特征(参数),能够用于建立数学模型预测项目总成本。类比和参数模型的成本及准确性可能差别很大。在以下情况下，类比估算和参数估算将最为可靠：●用来建立模型的历史信息准确；●模型中的参数易于量化；●模型可以调整，以便对大项目、小项目和各项目阶段都适用。◆资金限制平衡应该根据对项目资金的限制来平衡资金支出。如果发现资金限制与计划支出之间的差异，则可能需要调整工作的进度计划，以平衡资金支出水平。这可以通过在项目进度计划中添加强制日期来实现。◆融资融资是指为项目获取资金。长期的基础设施、工业和公共服务项目通常会寻求外部融资。如果项目使用外部资金，出资实体可能会提出一些必须满足的要求。【成本控制】表预算审核方法预算审核方法解释全面审核法◆其具体计算和审核过程与编制过程基本相同◆优点是全面细致、质量高、差错少◆缺点是工作量过大，需要组织分专业的计划预算工程师、经济师重点审核法◆选择工程量大、造价高的项目重点审核◆如问题较多应扩大审核范围分解对比审核法◆按工程类别、工程部位进行分解，分别与审定标准预算作对比◆如超过预算的3%,即审核价格经验审核法◆根据以往的实践经验，审核容易发生差错的那些工程细目的方法63 ◆对造成成本基准变更的因素施加影响◆确保所有变更请求都得到及时处理◆当变更实际发生时，管理这些变更◆确保成本支出不超过批准的资金限额，既不超出按时段、按WBS 活动分配的限额，也不超出项目总限额◆监督成本绩效，找出并分析与成本基准间的偏差◆对照资金支出，监督工作绩效◆防止在成本或资源使用报告中出现未经批准的变更◆向相关方报告所有经批准的变更及其相关成本◆设法把预期的成本超支控制在可接受的范围内【信息工程项目投资构成】软硬件购置费应用软件开发费数据工程服务费单项工程(服务)费信息系统集成费IT基础设施建设费智能化、自动化系统建设费业主单位管理费信息技术服务费云计算服务费预备费工程监理费招标代理服务费第三方检测费建设其他费用信息系统工程项目总费用建设项目前期咨询费工程建设其他费用工程建设费用建设期利息图信息工程项目投资构成【工程监理费】工程监理费是付给信息系统工程建设项目监理单位的监理服务费用。工程监理的取费应综合考虑信息系统工程建设项目的监理特点、项目建设周期、地域分布、监理对象、监理难度等因素。一般采取以下几种主要的取费方式：64 ◆按照信息系统工程建设费(或合同价格)的百分比取费。◆主要根据信息系统工程的规模、类型(软件开发、硬件集成、网络和信息系统集成、机房工程等)、阶段、内容、复杂程度、监理成本等多方面因素综合计算。◆按照参与信息系统工程的监理人员服务费计取，例如小型信息系统工程、业主单位有特殊要求的工程等，按人/月取费。◆由业主单位和监理单位商定。不宜按上述办法计取的，可以由业主单位和监理单位按商定的其他办法计取。【预备费】预备费是指在项目立项阶段、可行性研究阶段、初步设计阶段难以事先预料，而在建设期间可能发生的工程费用。预备费包括基本预备费和价差预备费：◆基本预备费是指项目建设过程中可能发生的难以预料的工程费用支出，如工程设计变更或实施过程中增加工程量所增加的费用。◆价差预备费是指项目建设过程中由于物价、原料价格上涨、汇率、利息变化等因素影响而需增加的费用。【投资控制的原则】【动态控制原则】◆招标及设计阶段的成本控制是确定成本目标、编制成本计划、制定成本控制的方案，为今后的成本控制做好准备。◆实施阶段的成本控制是根据已经制定的成本控制方案进行动态纠偏，通过偏差分析找出引起偏差的原因，从而采取有针对性的纠偏措施，并根据项目实施情况调整成本控制方案。纠偏可以采用组织措施、经济措施、技术措施、合同措施等。例如：·寻找新的、更好更省的、效率更高的设计方案和实施方案·购买部分产品或服务，而不是完全由自己开发和生产·重新选择承建单位或供应商，但会产生风险，且选择需要时间·变更工程范围·索赔。65 ◆竣工阶段由于成本盈亏已基本定局，即使发生了偏差，也已来不及纠正，但也应尽可能将成本偏差控制到最小，总结经验教训。【投资最优化】【全面成本控制】【动态控制】【目标管理】【责、权、利相结合】【微观控制】【设计监理】【技术经济分析】技术经济分析方法是成本控制的基础，是一种综合评价方法，综合评价决定成本控制的合理性，分别有调查研究方法和理论研究法。【单方案经济评价方法】1)成本回收期法成本回收期法可以用于单方案评价，也可以用于多方案的比较，分为静态成本回收期与动态成本回收期。●静态成本回收期是指以工程项目的净收益补偿全部成本所需要的时间，通常情况下，成本回收期愈短愈好。对于单方案经济评价时，通常是将计算结果同国家或部门所规定的标准成本回收期(TM) 进行比较来确定其“经济合理性”。当所计算的成本回收期大于TM 时，一般应对技术方案做出总成本的削减修正措施，否则应予舍弃。●动态成本回收期是指给定基准收益率i,用项目方案的净现金收入求出偿还全部成本的时间。2)等效年值法等效年值法就是工程项目的所有现金流量都化为其等值的年金，用以评价方案经济效益的经济分析方法。等效年值是指把工程项目在寿命期内的所有收入和支出，按基准收益率折算成与其等值的各年年末的等效年金。66 这里所说的基准收益率是指最低要求的贴现率(亦称折现率),在国外又称作最低有吸引力的收益率，一般用代号MARR表示，是成本决策部门做出取舍决定的重要决策参数。通常情况下，如果把基准收益率定得太高，可能会使许多经济效果较好的方案被放弃；反之，如果基准收益率定得太低，又可能接受一些经济效果并不理想的方案。按照惯例，通常基准收益率应高于贷款的利率。很显然，由于一些成本方案大多带有一定的风险和不确定性，再加上市场经济供需要求对产品价格浮动的影响，如果基准收益率不高于贷款利率，就不值得进行投资。只有当方案的等效年值大于零，在经济上才是合理的。等效年值法可以用存储基金法或资金还原法计算。3)净现值法与净现值指数法净现值法是根据方案的净现值大小来评定方案经济效果的一种方法。这里的净现值(NetPresentValue,NPV)是指按基准收益率或设定的折现率，将各年的净现金流量折现到基准年的现值之和。基准年一般选在基建开始年。如果NPV>0, 表示技术方案本身的收益不仅可以达到基准收益率的水平，而且还有盈余；如果NPV=0, 表示方案的收益率正好等于基准收益率。在上述两种情况下，方案均可取。如果NPV<0, 则表示方案的收益率达不到基准收益率水平，应被舍弃。净现值指数法是将技术方案在寿命期的净现值与逐年成本的现值之和进行比较，该数值反映了单位成本现值所创造的现值收益。当NPV>0 或NPV=0 时，方案可行，否则应放弃。4)内部收益率法内部收益率法是目前国内外广泛采用的一种经济评价方法，根据内部收益率指标的大小对方案进行评价。内部收益率和净现值有密切关系，对一个技术方案来说，其净现值的大小与所选用的折现率有关。折现率愈小，净现值愈大；反之，折现率愈高，则净现值就愈小。【多方案经济评价方法】目前国内常用的设计方案、技术方案的经济计算方法主要有：不考虑时间价值的追加成本回收期与计算费用法；考虑时间价值的年成本法、净现值法和内部收益率法。1)追加成本回收期与计算费用法67 追加成本回收期(△T) 是一个相对经济效果指标，是指两个方案比较时，用成本大的方案年经营费的节约额，抵偿追加成本所需要的时间。当△T 小于或等于标准成本回收期时，则认为成本大的方案为优，反之则成本小的方案为优。计算费用法是很多个方案不考虑时间价值时进行经济比较常用的方法。年计算费用是指年生产成本与按标准成本效果系数换算的年成本费用总额。2)年成本法年成本法是在年产量相同的条件下简易而有效的一种方案比较方法。这种方法是把各方案中项目的寿命期内的现金支出(成本、年经营费、残值)按基准收益率折算成等值的等额年成本，然后进行比较，年成本最小的方案为优选方案。用这种方法进行对设计方案的成本控制比较适用于市场经济体制下考虑资金时间价值时的方案优选。3)追加成本净现值法当评选的两个方案均可行而计算经济效果进行优选时，如果第二方案的成本大于第一方案(这部分称为追加成本),就需要考虑这一部分追加成本在经济上是否更合算，把两个方案现金流量之差的净现值称为追加成本净现值(或差额成本净现值)。如果追加成本而增加的收益按基准收益率折现后的现值大于追加成本的折现值，即追加成本净现值大于零，则成本大的方案从整个时间看比成本小的方案经济，说明追加成本是合算的。追加成本净现值法的实质就在于此。由此可知，作为监理工程师，在控制成本和评价方案优劣时，要做到公正合理，并非只选用初期成本小的方案，而应当用追加成本净现值法对多种方案做出比较，再行择优选用。4)追加成本内部收益率法这是在方案经济比较中重要的方法之一。追加成本内部收益率是指两个对比方案净现金流量之差的各年折现值之和等于零时的折现率。采用此法进行方案比较时，如果计算出的追加成本内部收益率大于或等于基准收益率时，则成本大的方案比较经济，反之则成本小的方案比较经济。【投资控制的技术和方法】表投资控制的技术68 技术概念ABC分析法(帕累托图)也称费用比重分析法、不均匀分布定律法，其基本原理为“关键的少数和次要的多数”,抓住关键的少数可以解决问题的大部分。全寿命费用方法就工程项目建设而言，投资控制贯穿项目建设的全过程。挣值分析偏差分析在挣值管理中，偏差分析用以解释成本偏差、进度偏差的原因、影响和纠正措施。趋势分析趋势分析旨在审查项目绩效随时间的变化情况，以判断绩效是正在改善还是正在恶化。【成本控制中的方法与技术-挣值分析】◆计划工作量的预算成本BCWS(PV)◆已完成工作量的实际成本ACWP(AC)◆已完成工作量的预算成本BCWP(EV)◆项目的完工预算(BAC)◆进度偏差：SV=EV-PV◆成本偏差：CV=EV-AC◆进度绩效指数：SPI=EV/PV◆成本绩效指数：CPI=EV/AC◆项目的完工尚需估算(ETC)◆项目的完工估算(EAC)◆EAC=AC+ETC◆非典型偏差：ETC=BAC-EV◆典型偏差：ETC=(BAC-EV)/CPI【成本控制的基本措施】表成本控制的基本措施基本措施概念组织措施在项目监理机构中落实投资控制人员、任务分工和职能责任；69 编制各阶段投资控制计划和详细的工作流程技术措施◆监督承建单位制定先进的、经济合理的技术实施方案◆对设计变更进行技术经济比较，严格控制设计变更◆持续寻找通过设计挖潜节约投资的可能性◆审核承建单位编制的实施组织设计，对主要实施方案进行技术经济分析◆严把质量关，可以减少返工现象、缩短验收时间、节省费用开支经济措施◆人工费控制◆设备、软件及开发、实施费控制管理◆间接费及其他直接费控制合同措施监理工程师应合理利用合同的约束力对建设单位和承建单位进行成本控制。【工程计量与工程付款控制】信息系统工程计量是价款结算的基础。承建单位应建立、健全与成本核算有关的各项原始记录和工程量统计制度，认真填写工程量计算文件。实际工作中工程计量有以下两种情况：(1)由承建单位负责工程计量，并提供计量工作的记录正本和计算结果，经监理工程师和现场工程师定期检查确认。(2)如果由监理工程师负责工程计量，则承建单位必须提供有关资料，监理工程师和现场工程师的每月工程计量记录由承建单位审阅，作为实施付款的依据。【信息系统工程成本结算的审核】◆当信息系统工程竣工经验收之后，监理工程师应协助业主单位正确编制工程结算。项目的竣工结算既是应该做的，也是国家要求做的工作。◆国家规定，项目在验收后一个月内，应向主管部门和财政部门提交结算。◆在编制竣工结算之前，应对项目的所有财产和物资，包括各种设备等都要逐项清仓盘点，核实账物，清理所有债权债务，做到工完账清。70 ◆项目竣工结算是以实物量和货币为计量单位，综合反映竣工验收的项目的建设成果和财务状况的总结性文件。它是项目的实际造价和成本效益的总结，是项目竣工验收报告的重要组成部分，是项目竣工验收和动用验收结果的反映，是对项目进行财务监督的手段。◆项目竣工结算，由业主单位汇总编制，项目竣工结算必须内容完整、核对准确、真实可靠。【信息系统工程竣工结算的意义】可正确分析成本效果可分析工程建设和设计预算实际执行情况竣工结算的意义可分析总结项目成本使用中的经验与教训为修订预算定额提供依据资料图信息系统工程竣工结算的意义【信息系统工程竣工结算的编制与结算报表】竣工工程概况表竣工财务结算表交付使用财产总表工程项目竣工结算说明书竣工结算报表包图信息系统工程竣工结算的编制与结算报表71 第十三章合同管理【信息系统工程合同的分类-按照工程范围划分】【总承包合同】总承包合同是指业主单位以总承包的方式与承建单位签订的合同。所谓信息系统工程的总承包，是指承建信息系统工程任务的总承包。【单项承包合同】单项承包合同指合同业主单位将信息系统工程中的咨询、论证、分析、信息系统硬件建设、信息系统网络建设和信息系统软件建设等不同的工作任务，分别发包给不同的承建单位。在管理直接承包合同时应注意相应的禁止性规定，包括：·直接承包合同签订总承包合同，还是签订单项项目承包合同，可以由业主单位根据情况自行确定。但无论采取哪种形式，都不得签订支解承包合同。·民法典规定：发包人不得将应当由一个承包人完成的建设工程支解成若干部分发包给数个承包人。【分包合同】分包合同是指信息系统工程总承建单位承包某个信息系统项目以后，将其承包的某一部分或某几部分项目，再发包给分包单位，与其签订承包合同项下的分包合同。民法典规定：总承包人或者勘察、设计、施工承包人经发包人同意，可以将自己承包的部分工作交由第三人完成。第三人就其完成的工作成果与总承包人或者勘察、设计、施工承包人向发包人承担连带责任。这里有两个合同法律关系，一个是业主单位与总承建单位的承包合同关系，另一个是总承分包合同关系。总承建单位在原承包合同范围内向业主单位负责，分包单位与总承建单位在分包合同范围内向业主单位承担连带责任。因分包的项目出现问题，业主单位既可以要求总承建单位承担责任，也可以直接要求分包单位承担责任。签订分包合同应当同时具备两个条件：·总承建单位只能将自己承包的部分项目分包给具有相应资质条件的分包单位；· 分包项目必须经过业主单位同意。分包合同有一些禁止性规定，具体如下：72 ·禁止转包。所谓转包，是指承建单位将其承包的全部信息系统工程建设倒手转让给第三人，使该第三人实际上成为该建设项目新的承建单位的行为。民法典规定：承包人不得将其承包的全部建设工程转包给第三人或者将其承包的全部建设工程支解以后以分包的名义分别转包给第三人。·禁止承包人将工程分包给不具备相应资质条件的单位。·禁止将项目分包给不具备相应资质条件的单位。所谓相应的资质条件是指：有符合国家规定的民事主体；有相应的专业技术人员；有相应的技术装备；符合法律法规规定的其他条件。·禁止再分包。民法典规定：禁止分包单位将其承包的工程再分包。即承建单位只能在其承包项目的范围内分包一次，分包人不得再次向他人分包。·禁止分包主体结构。民法典规定：建设工程主体结构的施工必须由承包人自行完成。信息系统工程主体结构的实施必须由承建单位自行完成，不得向他人分包，否则签订的合同属于无效合同。【信息系统工程合同的分类-按照项目付款方式划分】表按项目付款方式划分合同的分类及适用范围分类适用范围总价合同适用于工程量不太大且能精确计算、工期较短、技术不太复杂、风险不大的项目。同时要求发包人必须准备详细全面的设计图纸和各项说明，使承包人能准确计算工程量。成本加酬金合同适用于需要立即开展工作的工程项目、新型的工程项目，或者风险很大的工程项目。单价合同这类合同的适用范围比较宽，其风险可以得到合理的分摊，并且能鼓励承包人通过提高工效等手段从成本节约中提高利润。【信息系统工程合同的作用】信息系统工程合同的科学性、公平性和法律效力，规范了合同各方的行为，使信息系统工程建设活动有章可循。信息系统工程合同的具体作用如下：73 ◆确定工程主要目标和活动依据合同确定的信息系统工程目标主要包括三个方面：(1)信息系统工程工期(2)信息系统工程质量、项目规模和范围(3)信息系统工程价格◆规定签约双方权利和义务◆确立监理工作依据【信息系统工程合同的主要内容】信息系统工程合同的内容较多，涉及工程设计、产品采购、实施等多方面。信息系统工程合同包括如下主要内容：(1)业主单位与承建单位的权利与义务是合同的基本内容(2)业主单位提交有关基础资料的期限(3)项目的质量要求和验收标准(4)承建单位提交各阶段项目成果的期限(5)项目费用和项目款的交付方式(6)知识产权归属(7)项目变更的约定(8)双方的其他协作条件(9)违约责任(10)争议处理●协商。通过双方友好协商，达成相互理解，处理好争议事项。●仲裁。根据合同约定提交仲裁机关进行裁决并解决争议。●诉讼。在争议出现后协商未解决且未选择仲裁的情况下，当事人任何一方可选择向人民法院提起诉讼，请求人民法院对合同争议依法予以处理。【合同管理的主要内容】【合同签订管理】74 监理协助业主单位，对业主单位与承建单位、设备材料供应单位等各方之间的各种合同进行分析、谈判、协商、拟定、签署等。【合同履行管理】监理工程师对各方关于合同约定的工期、质量和费用、争议解决及索赔处理等工作的管理。【合同档案管理】◆建立监理工作的合同档案管理体系◆制订监理工作的合同档案管理制度◆监理工程师必须掌握合同管理的知识【履约管理的主要内容】【履约管理的依据——合同分析】合同分析是从执行的角度分析、补充、解释合同，将合同目标和合同规定落实到合同实施的具体问题和具体事件上。合同分析主要包括以下几方面内容：(1)分析合同漏洞，解释争议内容。(2)分析合同风险，制定风险对策。(3)分解合同并落实合同责任。【履约管理的方式——合同控制】合同控制是指为保证合同所约定的各项义务的全面完成及各项权利的实现，以合同分析的成果为基准，对整个合同实施过程的全面监督、检查、对比、引导及纠正的管理活动。合同的控制方法分为主动控制和被动控制。主动控制是预先分析目标偏离的可能性，拟订和采取预防性措施，以保证目标得以实现；被动控制是从合同的执行中发现偏差，对偏差采取措施及时纠正的控制方式。合同控制的首要内容是对合同实施情况进行追踪，追踪的对象包括：●具体的合同事件●承建单位的工作●业主单位的工作75 ●总体情况【履约管理的保证——合同监督】合同监督就是要经常对合同条款与实际实施情况进行比对，以便根据合同来掌握项目的进展。保证设计、开发、实施的精确性，并符合合同要求。合同监督的另一个重要的内容是检查、解释双方来往的信函和文件，以及会议记录、业主单位指示等，因为这些内容对合同管理是非常重要的。合同的监督管理的具体工作体现在如下几个方面：●建立合同及信息管理制度，各方对项目的所有指令、批复、报告均以书面形式进行，并全部归档。●跟踪检查合同的执行情况，督促各方严格履行合同。●严格按规定的程序和时限对合同工期的延误和延期进行审核确认。●严格按规定的程序和时限对合同变更、索赔等事宜进行审核确认。●根据合同约定，审核承建单位提交的支付申请，签发付款凭证。●对项目质量、数量、内容等任何形式的变动，均须总监理工程师审核同意，并报业主单位批准后，项目变更通知书方能生效。●及时、详尽记录不可抗力发生时的现场情况。●协调、处理合同争端，及时记录和纠正承建单位的违约行为。【履约管理的重点——项目索赔管理】在信息系统工程实施过程中，项目监理机构合同管理人员要认真研究合同条件，关注信息系统工程建设动态，在合同履行出现困难时，积极找寻索赔依据，计算出索赔费用，及时提出合同索赔建议，做好索赔的协调工作。在分包合同履行中，监理机构也应加强合同管理，积极进行合同交底及合同履行的跟踪管理工作，在实施过程中注意正确履行监理的责任，严格控制索赔和反索赔事件的发生。【索赔的概念】广义索赔概念：索赔是指在合同履行过程中，对于并非自己的过错，而是应由对方或双方承担责任的情况造成的实际损失向对方提出经济补偿和(或)时间补偿的要求。76 ◆索赔的性质属于经济补偿行为，而不是惩罚，索赔属于正确履行合同的正当权利要求。◆导致索赔事件的发生，可以是一定行为造成，也可能是不可抗力事件引起，可以是对方当事人的行为导致的，也可能是任何第三方行为所导致的。◆索赔依据的基本要求是：真实性、全面性、法律证明效力、及时性。◆索赔的特征：(1)索赔是合同管理的重要环节(2)索赔有利于业主单位、承建单位双方自身素质和管理水平的提高(3)索赔是合同双方利益的体现(4)索赔是挽回成本损失的重要手段【索赔的概念-反索赔】反索赔是指业主单位向承建单位提出的索赔。业主单位向承建单位索赔的主要途径包括：一是减少或防止可能产生的索赔；二是反索赔，对抗(平衡)承建单位的索赔要求。业主单位向承建单位提出索赔的情况包括以下几种：1)工期延误反索赔工期延误反索赔指工期延误属于承建单位的责任时，业主单位对承建单位进行索赔，即由承建单位支付延期竣工违约金。业主单位在确定违约金的费率时，一般要考虑以下因素：业主单位盈利损失；项目拖期带来的附加监理费；由于本项目拖期竣工不能使用造成的损失。违约金的计算方法在每个合同文件中均有具体规定，一般按每延误一天赔偿一定的款额计算，累计赔偿额一般不超过原合同总额的10%。2)实施缺陷索赔实施缺陷索赔指承建单位的实施质量不符合实施技术规程的要求，或使用的设备和材料不符合合同规定，或在保修期未满以前未完成应该负责补修的项目时，业主单位有权向承建单位追究责任。如果承建单位未在规定的期限内完成修补工作，业主单位有权雇佣他人来完成工作，发生的费用由承建单位承担。3)对指定分包人的付款索赔77 对指定分包人的付款索赔指项目承建单位未能提供已向指定分包人付款的合理证明时，业主单位可以直接按照监理工程师的证明书，将承建单位未付给指定分包人的所有款项(扣除保留金)付给这个分包人，并从应付给承建单位的任何款项中如数扣回。4)业主单位合理终止合同或承建单位不正当放弃项目的索赔如果业主单位合理地终止承建单位的承建，或者承建单位不合理地放弃项目，则业主单位有权从承建单位手中收回由新的承建单位完成全部项目所需的项目款与原合同未付部分的差额。【索赔的处理】索赔处理程序具体如下：(1)申请方应在合同规定的期限内向监理机构提交索赔申请(2)总监理工程师指定监理人员收集与索赔有关的资料(3)总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用(4)总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见(5)当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议【索赔报告的内容】(1)总论部分●序言；●索赔事项概述；●具体索赔要求；●索赔报告编写及审核人员名单。(2)根据部分●索赔事件的发生情况；●已递交索赔意向书的情况；●索赔事件的处理过程；●索赔要求的合同根据；●所附的证据资料。78 (3)计算部分●索赔款的要求总额；●各项索赔款的计算，如额外开支的人工费、产品费、管理费和所失利润；●指明各项开支的计算依据及证据资料。(4)证据部分●政治、经济资料。●实施现场记录报表及来往函件。●项目财务报表。【索赔报告的审查要点】(1)监理工程师审核承建单位的索赔申请。(2)在接到正式索赔报告后，认真研究承建单位报送的索赔资料。(3)需要明确索赔成立条件，依据合同内涉及索赔原因的各条款内容，归纳出监理工程师判定承建单位索赔成立的条件。(4)当承建单位的费用索赔要求与项目延期要求相关联时，总监理工程师在做出费用索赔的批准决定时，应与项目延期的批准联系起来，综合做出费用索赔和项目延期的决定。【合同争议的处理和解决】◆任何争议首先应该以书面形式提交工程师，并将一份副本提交另一方，并应说明此提交件是根据相关规定做出的。◆除非本合同已否定或终止，承建单位无论在何种情况下都应继续完成项目。◆在总监理工程师签发合同争议处理意见后，业主单位或承建单位在合同规定的期限内未对合同争议处理决定提出异议，在符合实施合同的前提下，此意见应成为最后的决定，双方应执行。◆在合同争议的仲裁或诉讼过程中，监理单位在接到仲裁机关或法院要求提供有关证据的通知后，应公正地向仲裁机关或法院提供与争议有关的证据。79 ◆无论是通过仲裁还是诉讼途径，任何一种争议解决方法都将对合同争议双方产生法律效力。当发生合同争议时，双方可以协商解决，或是通过合同中约定的方式来解决争议。【合同违约概述】合同违约是指合同一方或双方由于自身、第三方或者不可抗力等因素违反合同中约定的义务、法律直接规定的义务及法律原则和精神所要求的义务。监理单位处理违约的工作思路：(1)在监理过程中发现违约事件可能发生时，应及时提醒有关方面，防止或减少违约事件的发生；(2)受损失方可向项目监理单位提出违约事件的申诉，监理工程师对违约事件进行调查、分析，提出处理方案；(3)对已发生的违约事件，要以事实为根据，以合同约定为准绳，公平处理；(4)在与双方协商一致的基础上，评估工期及费用损失的数量，由总监理工程师签发必要的凭证(如《监理通知》);(5)处理违约事件应在认真听取各方意见、与双方充分协商的基础上确定解决方案；(6)由违约一方提出要全部或部分中止合同要求时，监理单位应慎重处理。不可抗力事件发生后，承建单位应立即通知监理单位，在力所能及的条件下迅速采取措施，尽力减少损失，业主单位应协助承建单位采取措施不可抗力事件结束后的约定时间(如48小时)内，承建单位向监理单位通报受害情况和损失情况，及预计清理和修复的费用。不可抗力事件持续发生，承建单位通常应每隔7 天向监理单位报告一次受害情况。通常在不可抗力事件结束后1 4 天内，承建单位须向监理单位提交清理和修复费用的正式报告及有关资料。因不可抗力事件导致的费用及延误的工期，除合同另有约定外，通常由双方按以下方法分别承担：80 (1)项目本身的损害、因项目损害导致第三方人员伤亡和财产损失以及运至实施场地用于实施的材料和待安装的设备的损害，由业主单位承担；(2)业主单位、承建单位人员伤亡由其所在单位负责，并承担相应费用；(3)承建单位设备损坏及停工损失，由承建单位承担；(4)停工期间，承建单位应监理单位要求留在实施场地的必要的管理人员及保卫人员的费用，由发包人承担；(5)项目所需清理、修复费用，由业主单位承担；(6)延误的工期相应顺延。监理单位应特别注意，因合同一方延迟履行合同后发生不可抗力的，不能免除延迟履行方的相应责任，应承担因此造成的损失。【知识产权保护的监理】信息系统工程在需求方案、集成方案、选型采购、软件设计等方面涉及较多的知识产权问题，这些问题应该在有关合同中规定，并加以管理。知识产权保护的管理，应该坚持全过程的管理。【树立为业主单位和承建单位维权的意识】【建议业主单位制定知识产权管理制度】建立知识产权制度的意义在于：◆适应知识经济发展的要求，对于政府可以提高服务意识，对于企业可以全面提升核心竞争力，确保企业长期竞争优势；◆可以防范以及应对同行竞争企业侵害自己的知识产权，避免降低甚至失去自身的竞争优势；◆降低潜在的侵犯他人知识产权的法律风险，以免被拖入不必要的诉讼纠纷；◆成为企业新的、潜在的利润增长点，通过知识产权交易等策略实现其资本扩张与市场垄断。【监督承建单位实施知识产权管理制度】1)软件著作权保护◆及时进行软件著作权登记。◆开展软件盗版状况调查，摸清盗版环节的要害部位。81 ◆请求司法部门介入，对侵权进行行政查处与处罚，也可以选择向法院提起诉讼，追究侵权人的法律责任。2)专利权、商标和集成电路布图设计保护◆及时对符合条件的需要保护的产品或方法进行专利申请，包括发明、实用新型和外观设计。◆及时对需要保护的产品的名称进行商标注册。3)商业秘密保护◆制定知识产权保护规章制度，对员工进行相关教育宣传。◆与员工签订知识产权保护、商业秘密保护协议，约定违约赔偿金。◆对于公司中即将离职的容易接触到商业秘密的其他员工，建议在离职前商讨签订《竞业协议》,以要求该员工在离职后的一定期限内，不得在生产同类产品、经营同类业务或有其他竞争关系的用人单位内任职，也不得自己生产与原单位有竞争关系的同类产品或经营同类业务。◆需要特别注意的是，为了信息系统工程建设的需要，由业主单位提供给承建单位的资料，例如招标文件、图纸、进度要求等，也可能有与承建单位相关的保密约定，需要提醒承建单位注意遵守。4)防止侵犯他人知识产权【实施知识产权保护的监理措施】1)政策措施◆指定专人负责项目的知识产权工作。◆对项目执行中形成的资料、数据的保管和使用，对专利申请、植物新品种登记、软件登记等保护手续的履行等，要做出明确规定。◆要求承建单位处理好项目执行中涉及的其他成果的关系，确保计划项目成果的知识产权权属清晰。◆规定项目承建单位随时跟踪该领域的知识产权动态。◆对参与项目人员应当进行知识产权知识培训，并就项目的知识产权归属、资料数据保管与使用、技术秘密的保密义务等签订协议。82 2)技术措施◆保护业主单位的知识产权权益。◆项目文档的知识产权保护控制。◆外购软件的知识产权保护控制。◆待开发软件的知识产权保护控制。【知识产权管理体制】◆集中管理体制◆分散管理体制◆分门别类进行知识产权管理◆知识产权管理制度【可行性研究】项目必要性和可行性分析：◆政策可行性◆技术可行性◆资金可行性◆环境可行性等【招标工作时间节点】依据招标投标法的有关规定，招标工作需要关注的时间节点约定的主要条款有：第二十三条招标人对已发出的招标文件进行必要的澄清或者修改的，应当在招标文件要求提交投标文件截止时间至少十五日前，以书面形式通知所有招标文件收受人。该澄清或者修改的内容为招标文件的组成部分。第二十四条招标人应当确定投标人编制投标文件所需要的合理时间；但是，依法必须进行招标的项目，自招标文件开始发出之日起至投标人提交投标文件截止之日止，最短不得少于二十日。83 第四十六条招标人和中标人应当自中标通知书发出之日起三十日内，按照招标文件和中标人的投标文件订立书面合同。招标人和中标人不得再行订立背离合同实质性内容的其他协议。第四十七条依法必须进行招标的项目，招标人应当自确定中标人之日起十五日内，向有关行政监督部门提交招标投标情况的书面报告。84 第十四章信息管理【信息系统工程信息特点】信息系统工程信息具有如下的特点：(1) 现实性。现实性是信息系统工程信息的最基本性质。如果信息失真，不仅没有任何可利用的价值，反而会造成建设决策失误。(2) 适时性。适时性反映了信息系统工程信息具有突出的时间性的特点。某一信息对某一目标是适用的，但随着项目进程，该信息的价值将逐步降低或完全丧失。因此，信息的适时性是反映信息现实性的关键，对决策的有效性起着重大的影响。(3) 复杂性。现代信息系统工程信息量大，形式多样，相互关系复杂。不同的工程主体在不同的建设阶段所需的信息量和信息的类型也不尽相同。(4) 共用性。某些信息系统工程信息能为多种项目主体所共有、所共用，但对各项目主体的实施行为支持来说，其价值有所不同。(5) 增值性。信息如果经过分析和处理，往往会产生新的信息，使信息得到增值。【制定文档编制策略】支持有效文档编制策略的基本条件：◆文档需要覆盖整个项目生存期◆文档应是可管理的◆文档应适合于其读者◆文档效应应当贯穿项目的整个实施过程◆文档标准应被标识和使用◆应规定支持工具【监理单位产出文档】表监理单位的产出文档85 分类文件名称总体类文档监理大纲、监理合同、监理规划、监理实施细则、监理总结报告回应类文档提交资料回复单内部文档监理日志综合性文档监理月报、监理周报、专题监理报告、监理工作会议纪要、评审会议纪要、监理工程师通知单、工程暂停令招标阶段监理文档招标文件评价记录、投标文件评价记录、开标过程确认表、工程合同评审表、质量保证资料检查记录设计阶段监理文档软件开发文档审核表、软件开发进度计划检查表、工程设计方案审核表实施阶段监理文档设备开箱检验报告、设备安装调试记录、软件安装调试记录、工程进度计划检查表、项目付款阶段验收报告、合同阶段性支付申请表验收阶段监理文档工程验收方案审核表、初验报告、验收报告缺陷责任期监理文档项目各阶段培训检查记录、缺陷责任期服务检查表【工程监理月报】工程监理月报由总监理工程师组织编写，由各相关专业监理工程师参加，监理月报应含以下几个要素：◆工程概况◆监理工作统计◆工程质量控制◆工程进度控制◆管理协调◆监理总评价◆下月监理计划【工程监理验收报告】86 工程监理验收报告是信息工程项目验收阶段产生的主要监理文件，此阶段的主要监理工作是监督合同各方做好竣工准备工作，组织三方对工程系统进行验收测试，以检验系统及软硬件设备等是否达到设计要求。验收采用定量或定性分析方法，针对问题进行分析和研究，最后提出监理报告，因此工程验收监理报告包含验收测试结论与分析。工程监理验收报告的主体应该是验收测试结论与分析，必须包含以下几个要素：◆工程竣工准备◆验收测试方案与规范◆测试结果与分析(测试记录)◆验收测试报告【监理总结报告】工程监理总结报告由总监理工程师组织编写，由各相关专业监理工程师参加，综合各工程月报和所有的监理资料，对工程进度、工程质量、合同管理及其他事项进行统一的综合分析，总结出整体监理结论。工程监理总结报告应重点包含以下几个方面的内容：◆工程概况◆监理工作统计◆工程质量综述◆工程进度综述◆管理协调综述◆监理总体评价87 第十五章组织协调【组织协调的概念与内容】所谓协调，就是指联结、联合，调和所有的活动及力量。组织协调涉及建设单位、承建单位等多方关系，它贯穿于信息系统工程建设的全过程，贯穿于监理活动的全过程。社会团体是一个人际关系系统，它包括上下级之间、同级之间、同一部门内部职员之间以及不同部门的职员之间的关系：1)上下级关系系统2)领导者之间的关系系统3)同事之间的关系系统社会团体人际关系与其他单位人际关系相比，其特征既有共性方面又有个性方面。总体而言，社会团体人际关系的主要特征有如下几个方面：(1)权力交往关系(2)多重交往关系(3)隐秘交往关系【组织协调的基本原则】【公平、公正、独立原则】(1) 监理单位应是独立的第三方，不能同时既做信息系统工程的监理，又做系统集成业务。否则，在做监理工作时，可以很方便地获得其他承建单位的关键技术或思路，若在其他的项目集成中得到应用，显然是不公平的，甚至可能是违法的；如果是做系统集成未果，转而做监理，用自己的集成思路和技术水平要求承建单位修改技术方案或指导实施开发过程，显然不合理，也是不公平的。(2) 监理单位在处理事务时，敢于坚持正确观点，实事求是，不唯上级领导和业主单位的意见是从。同时也要坚持对问题的分析，敢于亮明观点，对承建单位的不合理或不科学的要求坚决提出改进意见。(3)监理单位在处理实际监理事务中，要有大局观，要全面地分析和思考，保持对问题的综合分析能力，不要被表面现象或局部问题所干扰。88 (4)信息系统工程涉及的技术一日千里、变化快，监理工程师在不断提高个人的专业技能并在实践中不断丰富个人的从业经验的同时，也要不断提高对相关知识的综合应用能力，对事务熟练的判断能力和处理能力，更要学会把专业知识和相关的技术规范、法规、法律等运用到监理实践活动中。【守法原则】(1)监理只在核定的业务范围内开展相应的监理工作；(2)与业主单位的监理合同具备法律效力，一旦生效就要严格地遵照执行和践约，不得无故或故意违背承诺，否则可能将是违法行为，要承担相应的责任；(3)自觉遵守业主单位所在地政府颁布的有关信息系统工程建设的法律、法规要求，并主动接受当地有关部门的指导和监督管理；(4)遵守业主单位的有关行政管理、经济管理、技术管理等方面的规章制度要求。【诚信原则】忠诚老实，为人做事守信用，诚信是做人的基本品德，也是考核任何一个单位信誉的核心内容。诚信原则要求一切市场参加者在不损害他人利益和社会公益的前提下追求自己的利益，目的是在当事人之间的利益关系和当事人与社会之间的利益关系中实现平衡，并维持市场道德秩序。法律绝不允许靠损害他人利益和社会利益获得利益。【科学原则】在监理实践中，要依据科学的方案(例如监理规划),运用科学的手段(例如测试设备或测试工具软件),采取科学的办法(例如收集数据),并在项目结束后，进行科学的总结(例如信息归纳整理)。监理要用科学的思维、科学的方法，对核心问题有预先控制措施上的认识，凡事要有证据，处理业务一定要有可靠的依据和凭证，判断问题时尽量用数据说服业主单位或承建单位，必要时，一定以书面材料(例如专题监理报告)说明立场和观点。【组织协调的方法一监理会议】会议纪要由监理工程师根据会议记录整理，主要内容包括：(1)会议地点和时间；(2)会议主持人；89 (3)出席者姓名、隶属单位、职务；(4)会议内容和决议事项(包括负责落实单位、负责人和时限要求);(5)其他事项。会议纪要的内容应真实，简明扼要。纪要经总监理工程师签认，发放到项目有关各方，并应有签收手续。会议纪要中的议定事项，有关方面应在规定的时限内落实。专题会议是为解决专门问题而召开的会议，由总监理工程师或授权监理工程师主持。专题会议应认真做好会前准备。监理工程师要认真做好会议记录，并整理会议纪要，由总监理工程师签认，发给项目有关方面。专题会议通常包括技术讨论会、现场(项目组织)协调会、紧急事件协调会和技术(或方案)评审会等。【组织协调的方法一监理报告】监理单位会向业主单位不定期提交以下监理工作报告：(1)关于项目优化设计、项目变更的建议；(2)投资情况分析预测及资金、资源的合理配置和投入的建议；(3)各阶段的测试报告和评价说明；(4)项目进度预测分析报告；(5)监理业务范围内的专题报告。90 第十六章项目管理【项目基础】项目是为创造独特的产品、服务或成果而进行的临时性工作。项目的临时性是指项目有明确的起点和终点。临时性并不一定意味着项目的持续时间短。项目启动背景法律要求干系人需求业务或技术战略创造、改进产品项目驱动变更项目创造业务价值将来状态项目项目驱动图项目基础某些项目可交付成果和活动中可能存在相同的元素，但这并不会改变项目本质上的独特性。项目驱动组织进行变更。从业务价值角度看，项目旨在推动组织从一个状态转到另一个状态，从而达成特定目标，获得更高的业务价值。业务价值是从组织运营中获得的可量化的净效益。在价值分析中，业务价值被视为回报，即以某种投入换取时间、资金、货物或无形的回报。项目的业务价值指特定项目的成果能够为干系人带来的效益。促进项目创建的因素大致可以归为以下四个基本类别：(1)符合法律法规或社会需求；(2)满足干系人的要求或需求；(3)创造、改进或修复产品、过程或服务；(4)执行、变更业务或技术战略。【项目环境】组织内多种因素的交互影响创造出一个独特的组织系统，该组织系统会影响项目的运行，并决定了组织系统内部人员的权力、影响力、利益、能力等，包括：治理框91 架、管理要素和组织结构类型。【组织结构类型】表组织结构类型-1组织结构类型项目特征工作安排人项目经理批准项目经理的角色资源可用性项目预算管理人项目管理人员矩阵-强按工作职能，项目经理作为一个职能中到高全职；指定工作角色中到高项目经理全职矩阵-弱工作职能低兼职；作为另一项工作的组成部分，并非指定工作角色(如协调员)低职能经理兼职矩阵-均衡工作职能低到中兼职；作为一种技能的嵌入职能，不可以是指定工作角色(如协调员)低到中混合兼职项目导向(复合、混合)项目高到几乎全部全职；指定工作角色高到几乎全部项目经理全职虚拟网络架构，带有与他人联系的节点低到中全职或兼职低到中混合全职或兼职混合型其他类型的混合混合混合混合混合混合92 PMO其他类型的混合高到几乎全部全职；指定工作角色高到几乎全部项目经理全职表组织结构类型-2组织结构类型项目特征工作安排人项目经理批准项目经理的角色资源可用性项目预算管理人项目管理人员系统型或简单型灵活；人员并肩工作极少或无兼职；工作角色(如协调员)指定与否不限极少或无负责人或操作员极少或无职能(集中式)正在进行的工作(例如，设计、制造)极少或无兼职极少或无职能经理兼职多部门(职能可复制，各部门几乎不会集中)其中之一：产品；生产过程；项目组合；项目集；地理区域；客户类型极少或无兼职；工作角色(如协调员)指定与否不限极少或无职能经理兼职【项目管理办公室(PMO)】PMO 的一个主要职能是对项目经理提供支持：■对PMO 所辖的全部项目的共享资源进行管理；■识别和制定项目管理方法、最佳实践和标准；指导、辅导、培训和监督；■通过项目审计，监督对项目管理标准、政策、程序和模板的遵守程度；■制定和管理项目政策、程序、模板和其他共享的文件(组织过程资产) ;■对跨项目的沟通进行协调。93 PMO 对与项目相关的治理过程进行标准化，并促进资源、方法论、工具和技术共享的一个组织结构。【PMO 类型】■支持型：担当顾问的角色，向项目提供模板、最佳实践，以及来自其他项目的信息和经验教训。(资源库)■控制型：不仅给项目提供支持，而且通过各种手段要求项目服从。(控制度：中)■指令型：直接管理和控制项目。项目经理由PMO 指定并向其报告。(控制度：高)【项目生命周期和项目阶段】高干系人的影响力、项目的风险与不确定性变更的代价低项目时间一(1)成本与人力投入在开始时较低，在工作执行期间达到最高，并在项目快要结束时迅速回落。(2)风险与不确定性在项目开始时最大，并在项目的整个生命周期中随着决策的制定与可交付成果的验收而逐步降低，做出变更和纠正错误的成本随着项目越来越接近完成而显著增高。【项目生命周期类型】【预测型生命周期】采用预测型开发方法的生命周期适用于已经充分了解并明确确定需求的项目，又称为瀑布型生命周期。执行工作结束项目项目项目管验收的可存档的项章程理计划交付成果目文件时间-启动组织与项目准备项目管理的输出94 在生命周期的早期阶段确定项目范围、时间和成本，对任何范围的变更都要进行严格管理，每个阶段只进行一次，每个阶段都侧重于某一特定类型的工作。【迭代型生命周期】采用迭代型生命周期的项目范围通常在项目生命周期的早期确定，但时间及成本会随着项目团队对产品理解的不断深入而定期修改。【增量型生命周期】迭代方法和增量方法的区别：迭代方法是通过一系列重复的循环活动来开发产品，而增量方法是渐进地增加产品的功能。【适应型(敏捷型)生命周期】=增量∩迭代采用适应型开发方法的项目又称敏捷型或变更驱动型项目，适合于需求不确定，不断发展变化的项目。通过多次迭代来开发可交付成果，并在迭代开始之前就得到了定义和批准，每次迭代(有时称为“冲刺”)结束时，客户会对具有功能性的可交付物进行审查。在审查时，关键干系人会提供反馈，项目团队会更新项目待办事项列表，以确定下一次迭代中特性和功能的优先级，如图11-13所示。适应型项目生命周期的特点是，先基于初始需求制订一套高层级的计划，再逐渐把需求细化到适合特定的规划周期所需的详细程度。【混合型生命周期】=预测型生命周期和适应型生命周期的组合项目生命周期具有复杂性和多维性。特定项目的不同阶段往往采用不同的生命周期，项目管理团队需要确定项目及其不同阶段最适合的生命周期。各生命周期的联系。【项目管理过程组】项目管理过程可分为以下五个项目管理过程组：(1)启动过程组：定义了新项目或现有项目的新阶段，启动过程组授权一个项目或阶段的开始。(2)规划过程组：明确项目范围、优化目标，并为实现目标制订行动计划。(3)执行过程组：完成项目管理计划中确定的工作，以满足项目要求。(4)监控过程组：跟踪、审查和调整项目进展与绩效，识别并启动相应变更。(5)收尾过程组：正式完成或结束项目、阶段或合同。95 不仅是整个项目，项目的每个阶段都可应用5个过程组以迭代方式顺序开展的项目：适应型项目往往可分解为一系列按先后顺序进行的、被称为“迭代期”的阶段。在每个迭代期都要利用相关的项目管理过程，为了有效管理高度复杂且充满不确定性和变更的项目，重复开展项目管理过程组会产生管理费用。【项目管理知识领域】大多数情况下，大部分项目通常使用的十大知识领域包括：(1)项目整合管理。识别、定义、组合、统一和协调各项目管理过程组的各个过程和活动。(2)项目范围管理。确保项目做且只做所需的全部工作，以成功完成项目。(3)项目进度管理。管理项目按时完成所需的各个过程。(4)项目成本管理。使项目在批准的预算内完成而对成本进行规划、估算、预算、融资、筹资、管理和控制。(5)项目质量管理。把组织的质量政策应用于规划、管理、控制项目和产品的质量，以满足干系人的期望。(6)项目资源管理。识别、获取和管理所需资源以成功完成项目。(7)项目沟通管理。确保项目信息及时且恰当地规划、收集、生成、发布、存储、检索、管理、控制、监督和最终处置。(8)项目风险管理。规划风险管理、识别风险、开展风险分析、规划风险应对、实施风险应对和监督风险。(9)项目采购管理。从项目团队外部采购或获取所需产品、服务或成果。(10)项目干系人管理。识别影响或受项目影响的人员、团队或组织，分析干系人对项目的期望和影响，制定合适的管理策略来有效调动干系人参与项目决策和执行。【三方一法】1.业主单位与项目管理业主单位与项目管理的关系为：(1)业主单位重点参与实施项目的立项管理与验收管理工作；96 (2)业主单位应密切关注整个项目管理过程，并给出相关反馈意见。2.承建单位与项目管理除立项阶段的立项准备、立项申请、立项审批之外，项目管理过程的其他要素都是承建单位要重点实施的。3.监理单位与项目管理监理单位在信息系统工程建设项目中重点涉及的项目管理工作包括：(1)进度控制、成本控制、质量控制(“三控”);(2)合同管理、文档管理(“两管”);(3)沟通与协调(“一协调”);(4)评估与验收(可融入“三控、两管、一协调”中)。监理单位还直接或间接涉及“项目组织与人员管理”“计划与执行管理”“执行与知识产权管理”等工作。如果业主单位与监理单位更早地合作，监理单位也可能与立项管理有关。这时监理单位可能是以咨询单位的身份介入信息系统工程建设项目的招投标等立项活动的。97 第十七章变更控制【工程变更的原因】◆项目外部环境发生变化，例如法律法规、行业标准及政策变化◆发生风险事件，为应对风险采取必要的调整措施◆业主单位由于机构重组等自身原因造成业务流程变化，或产生需求变化◆承建单位根据业主单位的要求，适当地调整设计方案或实施方案◆项目范围的定义存在错误或遗漏◆项目需求分析、总体设计不够充分详细，存在错误或遗漏◆项目执行过程与项目基准不一致带来的被动调整◆使项目增值，例如出现新技术，设计人员提出了新的设计方案或实现手段【变更控制的基本原则】快速响应变更申请任何变更都要得到三方确认明确界定变更目标防止变更范围扩大化变更控制的基本原则三方都有权提出变更加强变更风险以及变更效果评估及时公布变更信息选择冲击最小的方案图变更控制的基本原则【工程变更的影响】98 工程变更主要会对以下内容带来影响：◆项目范围◆工程进度、成本和质量◆工程需要的生产要素的需求和配置◆工程的组织和人员◆项目干系人【变更控制的工作程序】【及时了解变化】在项目实施过程中，监理工程师要经常关注与项目有关的主客观因素，及时发现和把握变化，认真分析变化的性质，确定变化的影响，适时地通报变化，要对整个项目的执行情况做到心中有数。【接受变更申请】变更申请单位提出变更申请，向总监理工程师提交书面工程变更单，由总监理工程师组织审核。工程变更单主要包括：变更原因，变更内容，并附工程变更情况说明。工程变更情况说明中可以包括变更情况描述、变更依据、变更前后的差别、变更方案、变更影响和风险、证明材料等内容。工程变更单应在预计可能变更的时间之前尽早提出。在特殊情况下，工程变更可以不受时间的限制。【变更初审】监理机构进行变更初审的目的主要包括：(1)确认变更申请在承建合同约定的期限内提交；(2)了解变更的实际情况，收集相关资料或信息，证明资料真实、齐全；(3)检查工程变更单的格式与完整性，包括申请文件填写齐全，签字、印章手续完备等，确保下一步变更评估所需的信息准备充分；(4)明确界定变更的目标；99 (5)根据收集的变更信息，对变更申请单位施加影响，确认变更的必要性，对于完全没有；必要的变更，可以驳回变更申请并给出监理意见，对于有必要的变更，可以进一步进行变更分析与评估。【变更分析与评估】总监理工程师应根据实际情况，参考变更文件及其他有关资料，按照承建合同的有关条款，对变更进行分析与评估，在工程变更单中签署监理意见。变更分析与评估的内容主要包括：(1)分析变更对工程项目的整体影响；(2)评估变更的合理性；(3)评估变更方案的可行性、合理性；(4)评估变更工作量；(5)评估变更费用和工期。总监理工程师应根据实际情况，参考变更文件及其他有关资料，按照项目合同的有关条款，指定监理工程师完成下列工作后，对工程变更的费用和工期做出评估：确定工程变更范围及其实施难度，确定工程变更内容的工作量，确定工程变更的单价或总价。【确定变更方案】总监理工程师组织三方进行协商和讨论，根据变更分析与评估的结果，确定最优变更方案。监理单位应协调业主单位、承建单位就变更的内容和方案达成一致，并在工程变更单中予以签认。对于一些较大或较关键的变更，可以召开变更方案论证会议，业主单位虽有最终的决策权，但可能技术上并不专业，可以由变更顾问委员会(由相关技术和经济方面的专家组成)提供论证意见。在确定变更方案的过程中，三方仍有可能做出驳回变更的决定。【签发工程变更单并公布变更】100 三方协商一致后，应把对变更申请批准或驳回的决定通知受此决定影响的每个干系人。如果变更申请得到批准，意味着项目基准将被调整，变更方案中的资源需求应及时到位。因此，需要签发工程变更单，并把变更方案告知有关实施部门和实施人员，为变更实施做好准备。如果变更申请被驳回，应通知有关人员放弃该变更申请。监理工程师要格外关注沟通，以帮助变更涉及的相关人员履行职责，以及向相关方传达决定。【监控变更实施】监理单位应要求承建单位在工程变更单签发前不得实施工程变更。监理单位应根据工程变更单监督承建单位实施变更，如果发现异常情况，要及时中止并重新评估变更。项目基准按工程变更单调整后，需要确认资源配置是否及时到位，若涉及人员的调整，则需要更加关注。变更实施完成并经监理工程师验收合格后，应按正常的支付程序办理变更费用的支付手续。监理单位应对工程变更过程及结果做工程备忘录，应妥善保存变更产生的相关文档，确保其完整、及时、准确、清晰。【变更效果评估】在变更实施结束后，要对变更效果进行分析和评估，判断变更后的项目是否已纳入正常轨道。变更效果评估的首要依据是项目的基准，评估内容主要包括：(1)结合变更的初衷，评估变更所要达到的目的是否已达成；(2)评估变更方案中的技术论证、经济论证内容与实施过程的差距，并推动解决；(3)评估变更的可能影响，变更的影响是多面的，既需要对业主单位可视的成果、交付期等的变更进行评估，也需要对业主单位不可视的项目内部工作的变更进行评估，如承建单位的人员分工、管理工作、资源配置等；(4)基准管理，项目基准是变更的依据，每次变更通过评审后，都需要更新项目基准。变更控制方法与技术包括：专家判断、变更控制工具、数据分析、决策、会议【项目暂停与复工管理】101 签发“项目部分暂停指令”前，应征求建设单位意见；签发项目暂停指令后，监理工程师应协同有关单位按合同约定，处理好因项目暂停所诱发的各类问题。如项目暂停是由于业主单位原因：◆监理工程师应在暂停原因消失，具备复工条件时，及时签发复工令，指令承建单位复工。如项目暂停是由于承建单位原因：◆承建单位在具备复工条件时，应填写“复工报审表”报项目监理部审批，由总监理工程师签发审批意见，承建单位在接到同意复工的指令后，才能继续实施。【投资变更控制】对成本变更的控制措施主要包括：(1)对可能导致成本变更的因素施加影响(2)确保按照约定的变更控制程序处理成本变更(3)保证潜在的成本超支不超过授权的项目阶段投资和总体投资(4)监督成本绩效，找出并准确记录所有的与成本基准的偏差(5)成本产生超出合理范围的正、负偏差时，应查明原因，大量的成本节余未必是好事，可能潜藏计划无效、功能遗漏、质量下降等隐患(6)防止错误的、不恰当的或未批准的变更被纳入费用或资源使用报告中【需求变更控制的原则】◆每个项目合同必须包括一个控制系统，通过它对项目计划、流程、预算、进度或可交付成果的变更申请进行评估◆每一项项目变更必须用变更申请单提出，它包括对需要批准的变更的描述以及该项变更在计划、流程、预算、进度或可交付的成果上可能引起的变更◆变更必须获得项目各方责任人的书面批准◆在准备审批变更申请单前，监理工程师必须与总监理工程师商议所有提出的变更◆变更申请单批准以后，必须修改项目整体计划，使之反映出该项变更，并且使该变更单成为这个计划的一部分102 【合同变更控制】合同变更的一般程序具体如下：(1)当事人一方要求变更合同时，应当首先向另一方用书面的形式提出；(2)另一方当事人在接到有关变更项目合同的建议后，应及时做出书面答复，如同意，即表明承建合同的变更发生法律效力；(3)变更合同的建议与答复，必须在双方协议的期限之内，或者在法律或法令规定的期限之内；(4)合同变更如涉及国家指令性项目时，必须在变更合同之前报请有关部门批准；(5)因合同变更发生的纠纷，依双方约定的解决方式或法定的解决方式处理。103 第十八章风险管理【风险的定义与属性】风险是一种不确定的事件或条件，一旦发生，会对项目目标产生某种正面或负面的影响。【风险管理过程】表风险管理过程风险类型内容风险规划定义如何实施项目风险管理活动。风险识别识别单个项目风险及整体项目风险的来源，并记录风险特征。风险分析包含定性分析和定量分析。定性分析指通过评估单个项目风险发生的概率和影响以及特征对风险进行优先级排序；定量分析指对已识别的项目风险统计可量化数据并建立数学模型进行分析。风险应对对已识别的单个或整体项目风险选择应对策略并商定应对措施。风险监控在整个项目期间，监督风险应对计划的实施、跟踪已识别风险、识别和分析新风险、评估风险管理的有效性。【风险规划】主要依据1.项目管理计划2.组织过程资产3.项目干系人风险规划产出1.风险管理计划图风险规划过程项目风险规划应遵循以下原则：●全面性原则：项目各阶段的主要风险以及风险事件的后果是不同的，应从各阶段的典型风险出发，全面考虑各类风险；104 ●灵活性原则：项目风险规划难以充分地预料到所有风险，故在规划时就应保证一定的灵活性，能够随时根据实际变化进行调整；●职责的明确性原则：项目风险规划应明确从事项目风险管理的人员与职责。一份完整的项目风险管理计划至少包括以下内容：◆方法论◆角色与职责◆预算◆沟通计划◆风险分类◆风险概率与影响。◆干系人风险承受度◆跟踪【风险识别】图风险识别过程风险登记册至少包括以下内容：◆风险事件◆风险源◆风险影响◆风险措施◆风险状态◆责任人105 图定性风险分析过程【风险定性分析的技术与方法】风险定性分析采用的主要方式是：首先是专家判断，在此基础上利用风险概率影响矩阵对各项风险进行定性评估；其次是对风险紧迫性、风险数据质量进一步分析和评估(可利用如故障树分析、层次分析等方法或技术)。【风险定性分析的成果】综合考虑每个风险的发生概率及其影响，排定相对的优先级关系；也可根据组织对不同目标的重视程度，选择维度(例如进度、成本、目标、质量等)排列风险优先级。根据风险定性分析的结果，风险登记册应更新项目风险相对排序，并把更新后的风险登记册纳入项目文档。图定量风险分析过程【风险定量分析的成果】定量风险分析的成果是进一步更新风险登记册，更新内容主要包括：106 (1)概率分析。对项目可能的进度与成本进行估算，分析结果包括进度/成本概率分布、进度/成本累积概率分布。可以综合考虑分析结果与干系人的风险承受度，来量化成本和进度的应急储备。当遇到风险时，可以将相关风险的定量分析的结果作为应对依据。(2) 量化风险优先级清单。风险的成本估算完成后，可以针对风险表中的每个风险计算其风险严重程度，或依据敏感性分析确定各敏感因素的重要程度，并列出风险优先级清单。(3) 风险应对建议。风险报告可能根据定量风险分析的结果，针对整体项目风险的最大可能性或关键单个项目风险提出应对建议。这些建议将成为规划风险应对过程的输入。图风险应对过程【风险应对-应对策略】通常有以下七种风险应对策略可供使用：回避、转移、减轻、接受、开拓、分享、增强。前三种策略来应对可能给项目目标带来消极影响的风险；利用后三种策略来应对可能给项目带来积极影响的风险；第四种策略(接受)既可用来应对消极风险或威胁，也可用来应对积极风险或机会。(1)回避风险回避是指在风险还未发生时，主动放弃或改变计划，不再实施可能导致风险的活动，以完全消除威胁。选择此策略要充分考虑并权衡风险回避的成本和效益。107 (2)转移风险转移是指把某项风险的部分或全部消极影响连同应对责任转移给第三方。转移风险是把风险管理责任简单地推给另一方，而并非消除风险。选择此策略要充分考虑风险转移成本与所避免的风险损失。(3)减轻风险减轻是指通过采取一定的行动，把不利风险事件的概率或影响降低到可接受的范围内。这是一种积极主动的策略。选择此策略时要考虑风险减轻实施成本与风险应对回报相匹配。(4)接受因为几乎不可能消除项目的全部威胁，所以就需要采用风险接受策略。该策略可以是被动或主动的。例如，当出现未识别的风险时，只能被动地接受风险。最常见的主动接受策略是建立应急储备，安排一定的时间、资金或资源来应对风险。(5)开拓如果项目希望机会得以实现，就可对具有积极影响的风险采取本策略。本策略旨在消除与某个特定积极风险相关的不确定性，确保机会肯定出现。(6)分享风险分享是指把应对机会的部分或者全部责任分配给第三方。当与第三方共享机会能够获得更大的价值时，可选择本策略。(7)增强风险增强是指通过增加机会的发生概率和积极影响，促使机会的发生。图风险监控过程108 风险监控过程中应及时反馈风险监控成果，以采取措施应对已发生风险或潜在风险。为此，可使用下面的方法和技术：(1)审计风险审计是一种审计类型，可以用于评估风险管理的有效性。应确保按项目风险管理计划所规定的频率开展风险审计。在实施审计前，应明确风险审计的程序和目标。监控风险事件时，可利用绩效信息对项目执行的趋势进行分析(例如挣值分析法等),对项目总体绩效进行监控。(2)审查应该定期安排风险审查，来检查和记录风险应对在处理整体项目风险和已识别单个项目风险方面的有效性。通过风险审查，识别出新的项目风险(例如已商定应对措施所引发的次生风险),重新评估当前风险，关闭已过时风险，讨论风险发生所引发的问题，以及总结可用于当前项目后续阶段或未来类似项目的经验教训。【风险评估技术与方法】表风险评估技术使用场景技术类型使用场景头脑风暴法可以与其他风险评估方法一起使用，也可以单独使用来激发风险管理过程任何阶段的想象力。结构化/半结构化访谈主要用于识别风险或评估现有风险应对措施的效果，适用于某个过程或项目生命周期的任何阶段德尔菲法用于风险管理过程或项目生命周期的任何阶段情景分析可用来帮助决策并规划未来战略，也可以用来分析现有的活动，在风险识别、风险分析中都可以发挥作用检查表可用来识别潜在危险、风险或者评估控制效果，适用于项目生命周期的任何阶段风险概率影响矩阵风险概率影响(P-1)矩阵是用于识别风险和对其进行优先级排序的有效工具。故障树分析可以用来对故障的潜在原因及途径进行定性分析，也可以在掌握基109 本事项概率的相关数据之后，定量计算重大事件的发生概率SWOT分析除了用来识别风险，也可以用来考察项目的优势可以抵消威胁的程度，以及机会可以克服劣势的程度决策树分析可用于项目风险管理，以便在不确定的情况下选择最佳行动步骤蒙特卡罗模拟通常用来评估各种可能结果的分布及值的频率敏感性分析能够帮助风险管理人员精准地确定风险的影响程度，确定敏感性因素和不敏感因素110 第十九章监理支撑要素【法律的基本概念】狭义的法律是指拥有立法权的国家机关，依照一定的立法程序，制定和颁布的规范性文件。广义的法律是指法的整体，包括法律、有法律效力的解释及其行政机关为执行法律而制定的规范性文件。我国现行的法律体系是以宪法为核心，以法律为主干，包括行政法规、地方性法规等规范性文件在内的，由七个法律部门、三个层次的法律规范构成的中国特色社会主义法律体系。【诉讼时效-民事诉讼时效】诉讼时效，是指民事诉讼中权利人请求人民法院保护自己的合法民事权益的法定期限。超过了诉讼时效，虽然可以提起诉讼，但所主张的权利不受法律保护。民法典第一编第188条规定：向人民法院请求保护民事权利的诉讼时效期间为三年。法律另有规定的，依照其规定。诉讼时效期间自权利人知道或者应当知道权利受到损害以及义务人之日起计算。法律另有规定的，依照其规定。但是，自权利受到损害之日起超过二十年的，人民法院不予保护，有特殊情况的，人民法院可以根据权利人的申请决定延长。【诉讼时效-刑事追诉时效】民事诉讼中称为诉讼时效。刑事诉讼中所称的“追诉时效”,是指法律规定的对犯罪分子追究刑事责任的有效期限。超过追诉期限的，就不再追究刑事责任；已经追究的，应当撤销案件，或者不起诉，或者终止审理。《中华人民共和国刑法》第87条规定，犯罪经过下列期限不再追究：(1)法定最高刑不满5年有期徒刑的，经过5年。(2)法定最高刑为5年以上不满10年有期徒刑的，经过10年。(3)法定最高刑为10年以上有期徒刑的，经过15年。111 (4)法定最高刑为无期徒刑、死刑的，经过20年。如果20年以后认为必须追诉的，要报请最高人民检察院核准。行政诉讼起诉期限是指公民、法人或其他组织(统称行政相对人)认为自己的合法权益受到具有国家行政职权的机关、机构、组织及其工作人员具体行政行为的侵害，依法向人民法院提起行政诉讼请求保护其合法权益的法定期限。《中华人民共和国行政诉讼法》第39条规定：公民、法人或者其他组织直接向人民法院提起诉讼的，应当在知道做出具体行政行为之日起3个月内提出。法律另有规定的除外。【标准的概念】标准是通过标准化活动，按照规定的程序经协商一致制定，为各种活动或其结果提供规则、指南或特性，供共同使用和重复使用的文件，是标准化活动的核心产物。标准是研究制定法律、技术法规、政策和规划的依据，是企业从事生产经营活动、消费者选择产品和服务的主要依据。标准化是指“为了在一定范围内获得最佳秩序，对现实问题或潜在问题制定共同使用和重复使用的条款的活动”。【监理合同的特征】(1)监理合同的当事人双方应当是具有民事权利能力和民事行为能力、取得法人资格的企事业单位、其他社会组织，个人在法律允许范围内也可以成为合同当事人。委托人必须是有国家批准的信息系统建设和运行项目，落实投资计划的企事业单位、其他社会组织及个人。监理人必须是依法成立、具有法人资格的监理单位，并且具有所承担项目的监理业务能力。(2)监理合同的订立必须符合工程项目建设和运行程序。(3)监理合同的目的是服务，即监理工程师凭借自己的知识、经验、技能，受业主委托，为其签订的合同的履行实施提供监督、管理以及咨询等相关技术服务。【监理合同-条款结构】合同条款的组成结构应至少包括以下几个方面：112 (1)合同内所涉及的词语定义和遵循的法规；(2)监理服务内容和范围；(3)监理服务周期；(4)监理单位的权利和义务；(5)委托人的权利和义务；(6)监理及相关服务费用计取方式；(7)监理及相关服务费用支付方式；(8)监理单位违约责任；(9)委托人违约责任；(10)合同生效、变更与终止；(11)争议的解决办法；(12)双方约定的其他事项等。【监理服务能力】人员、技术、资源和流程体现了监理单位的监理服务能力。监理单位应根据监理及相关服务范围，在人员、技术、资源、流程四个方面，建立和完善服务能力体系。【技术一质量管理】八项质量管理原则如下：●以顾客为中心。组织依存于其顾客，因此组织应理解顾客当前和未来的需求，满足顾客要求并争取超越顾客期望。●领导作用。领导者确立本组织统一的宗旨和方向。他们应该创造并保持员工能充分参与实现组织目标的内部环境。●全员参与。各级人员是组织之本，只有他们的充分参与，才能使他们为组织获益。●过程方法。将相关活动和资源作为过程进行管理，可以更有效地得到期望的结果。●管理的系统方法。识别、理解和管理作为体系的相互关联的过程，有助于组织实现其目标的效率和有效性。●持续改进。组织总体业绩的持续改进应是组织的一个永恒的目标。●基于事实的决策方法。有效决策是建立在数据和信息分析基础上的。113 ●与供方互利的关系。组织与供方是相互依存的，互利的关系可增强双方创造价值的能力。【资源一监理知识库及监理案例库】进行知识管理工作时，应开展以下工作：①知识体系构建。需具备提供监理服务所需的知识体系和能力。知识体系包括但不限于：●基础知识：与信息技术相关的基本知识。●业务知识：与需方行业相关的业务知识。●专业知识：从事咨询服务必备的专业知识，如业务分析、战略规划、体系结构设计及风险评估等。●管理知识：与咨询相关的项目管理、服务管理和IT治理知识等。①知识采集。需具备知识采集渠道和机制，根据知识体系的结构，建立对各类知识进行分类采编的渠道。②知识检查。需具备知识检查和更新机制，确保知识的适用性、准确性和时效性。③知识应用。需提供知识查询、分析、管理及应用方法和工具，并进行必要的培训，发挥知识价值。④知识评价。应从知识的使用频度、适用性和价值等方面进行综合评价，建立知识评价体系。⑤知识维护。需具备相应方法和工具提供知识生命周期管理，具备知识采集、知识审核、知识归类、知识存档、知识检索、知识使用、知识评价、知识统计分析、知识使用者权限管理和知识备份等功能。114 第二十章信息系统工程建设监理【规划阶段监理活动】【协助业主单位构建信息系统架构】◆可以协助业主单位从业务入手，基于行业理解开展需求调研工作；◆可以协助业主单位根据业务现状和信息化现状制定业务目标和信息化目标；◆可以协助业主单位根据需求调研的结果、业务目标和信息化目标，梳理业务架构和信息系统建设需求，引导业主单位通过信息系统的建设与应用，提升整体的业务水平；◆可以协助业主单位采用成熟的规划方法形成信息资源架构、应用系统架构和技术体系架构。【为业主单位提供项目规划相关服务，为业主单位决策提供依据】◆提出总体规划咨询意见；◆提出可行性研究编制要求和具体内容的分析意见；◆提出初步设计编制要求和具体建设内容的分析意见，确定分项建设任务的技术要求；◆提出分项建设任务的深化设计方案的编制要求、建设实施的管理约束等咨询意见或建议；◆协助组织技术方案专家论证、技术评审等活动；◆系统性监督整体及分项技术方案的优化、调整和完善，为建设实施阶段奠定基础。【对项目需求、项目计划和初步设计方案进行审查】◆审查项目需求和初步设计方案是否按照要求进行了规范化的技术描述，能够为项目实施提供优化的设计方案；◆审查项目计划、初步设计方案是否满足项目需求，符合相关的法律法规和标准，与合同相符，具有可验证性；◆协助业主单位消除初步设计文档在进入实施阶段前可预见的缺陷。【协助业主单位策划招标方法，适时提出咨询意见】115 ◆提出招投标拆包、分包的咨询意见；◆提出分项建设任务的技术约束要求的咨询意见；◆提出分项建设任务的评标评分约定的咨询意见等。【规划阶段监理活动一初步设计方案】◆参照充分的设计依据◆进行翔实的现场勘察◆突出项目的设计亮点◆重点介绍初步设计方案(相对可行性研究报告批复内容)有重大变更的内容◆合理制定项目建设的标准规范【规划阶段监理活动一需求评审】◆系统定义的目标是否与用户的需求一致◆需求分析阶段提供的文档、资料是否齐全◆需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求◆与所有其他系统的重要接口是否都已得到描述◆主要功能是否已包括在规定的需求范围之内，是否都已充分说明◆系统的行为和其必须处理的信息、必须完成的功能是否一致◆设计的约束条件或限制条件是否符合实际◆对开发过程中可能存在的技术风险是否采取了必要的规避措施◆是否详细制定了检验标准，其能否对系统定义成功进行确认【招标阶段监理活动】◆在业主单位授权下开展所有工作◆参与业主单位招标前的准备工作，协助业主单位编制项目的工作计划◆参与招标文件的编制，并对招标文件内容提出监理意见◆协助业主单位进行招标工作，如委托招标，审核招标代理机构资质是否符合行业管理要求116 ◆向业主单位提供招投标咨询服务◆参与承建合同的签订过程，并对承建合同的内容提出监理意见【编制工作计划】◆项目建设内容◆组织管理◆项目建设准备工作◆项目建设的阶段划分及验收◆质量管理计划◆总包、分包方式【参与招标文件的编制】◆技术和质量的要求◆项目涉及的主要产品和服务的要求◆投标单位资质的要求◆验收方法◆时间进度的要求【招标阶段监理活动--承建合同签订的监理】◆参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理◆如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理◆建议业主单位组织与合同执行或管理相关的部门参与合同评审工作◆协助业主单位对承建合同进行评审，对合同的相关内容提出监理意见◆建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据117 ◆承建合同签订条款不得违背招投标文件约定的采购标的、数量、质量、价款或者报酬及付款方式、履约期限、违约责任、解决争议办法及有关影响采购标的使用效果的重要技术指标等实质性条款【招标阶段监理活动--审核承建单位及其人员的能力】◆证明技术和管理能力的文件是否真实、齐全◆承建单位的能力等级是否与本工程的规模相适应◆承建单位的主要技术领域是否与本工程需要的技术相符合◆拟派往本工程的项目管理人员是否具有相应的项目管理能力◆其他技术人员的技术经历是否与本工程的技术要求相符合◆承建单位是否建立了完善的质量管理体系【设计阶段监理活动一设计文档的管理工作】◆要求业主单位和承建单位妥善保管有关资料，包括招投标文件、承建合同等◆妥善保管设计阶段的监理文档◆监督检查项目文档的时效性和可用性◆对项目中各方提出保密要求的信息实施保密，加强知识产权的保护◆对设计阶段三方共同参与的过程和活动做工程备忘录，并由三方签认【实施阶段监理活动】◆应审核项目实施方案的合法性、合理性，实施方案与设计方案的符合性◆应促使项目中所使用的产品和服务符合承建合同、法律法规和标准◆应审核项目实施计划，对于计划的调整应合理、受控◆应促使项目实施过程满足承建合同的要求，并与设计方案、项目计划相符【实施阶段的进度控制】◆项目实施前，组织审核承建单位提交的项目实施计划、实施方案，签署监理审核意见118 ◆承建单位提交开工申请后，监理机构应审核开工申请，检查工程准备情况。工程实施条件具备时，总监理工程师应签发开工令，并报业主单位签认，通知承建单位开始工程实施◆定期检查、记录工程的实际情况，确定实际进度与计划相一致；若出现偏离，及时要求承建单位采取有效的纠偏措施◆组织审查进度纠偏措施的合理性、可行性，如果发现问题，要求承建单位及时整改并跟踪落实◆及时按项目延期处理程序处理工程延期申请【实施阶段监理活动一对实施方案的审查】◆承建单位的项目组织机构、管理制度和技术措施是否能满足项目实施需要◆承建单位是否有完善的质量保证体系并能正常运行，项目组织机构的人员是否到位且能保证项目实施的需要◆所引用的法律法规、标准规范是否是有效的、最新的◆进度计划中的进度节点是否满足合同要求◆施工安全技术措施是否得当【实施阶段监理活动一对质量问题的处理】◆承建单位原因造成质量缺陷→由承建单位承担全部责任◆承建单位的实施方案不合理导致质量缺陷→承建单位应向业主单位承担合同责任◆承建单位的操作人员违反操作规程造成质量事故→按照质量事故处理程序，由承建单位承担责任，同时挽回事故造成的损失◆监理机构因未检查出实施方案的不合理之处，也要根据监理合同向业主单位承担责任◆监理机构应及时将检查结果报告给业主单位【实施阶段监理活动一实施阶段产品及服务的验收】◆产品和服务应与承建合同要求以及产品文档中的说明保持一致◆产品及服务的有效性和真实性119 ◆必要时，监理机构可依据承建合同、技术标准或事先约定的方法检测产品及服务的质量。对于数量较大的同类型产品及服务，监理机构可采取抽样方法◆必要时，监理机构应要求承建单位提交第三方测评机构出具的测评报告，并核验产品认证证书、检测报告的真实性、有效性；第三方测评机构应经业主单位和监理机构同意。【实施阶段监理活动一质量事故处理程序】◆要求承建单位在事故发生后立即采取措施，尽可能控制其影响范围，及时签发停工令，上报业主单位◆在接到事故报告后立即组织相关人员调查事故状况、分析原因，与业主单位、承建单位共同确定初步处理意见◆督促承建单位采取相应措施，查清事故原因，审核承建单位提交的事故解决方案及预防、补救措施，提出监理意见，提交业主单位签认◆审查承建单位提交的事故报告及复工申请，条件具备时，总监理工程师可以签发复工令，恢复施工◆发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核承建单位提交的整改方案并监督承建单位进行整改。整改完毕后，处理承建单位提交的复工申请【实施阶段监理活动一项目延期处理程序】◆监理机构根据项目情况，分析延期原因、影响程度等，研究整改措施，确认其延期申请的合理性，与业主单位、承建单位协商确认后，由总监理工程师对项目延期申请予以确认◆项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经三方签认后，做工程备忘录◆组织审查进度纠偏措施的合理性、可行性，监理机构可出具监理意见并跟踪整改◆当发生由于延期造成的索赔时，总监理工程师应综合考虑项目延期和费用索赔的关系，做出费用索赔和项目延期的建议120 【实施阶段监理活动一索赔处理程序】◆申请方应在合同规定的期限内向监理机构提交索赔申请◆总监理工程师指定监理人员收集与索赔有关的资料◆总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用◆总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见◆当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议【实施阶段监理活动一审核分包单位的工程实施资质】◆审查承建合同是否允许分包，分包的范围和工程部位是否可以进行分包◆审查分包单位的资质材料是否包括营业执照、企业资质等级证书、有关技术与管理人员的资格证书等。其中，分包单位的名称应按企业法人营业执照全称填写◆审查分包单位业绩，业绩是指分包单位近三年完成的与分包工程内容类似的工程及质量情况◆总监理工程师/代表根据监理人员的审查意见，以及分包单位的材料出具审核意见121 【验收阶段监理活动一初验条件】◆招投标文件及合同文件(包括合同附件、补充协议、后期出现的变更等)要求的系统功能已实现，未完善工作已通过三方会议达成备忘录◆承建单位提交了自测报告及初验申请◆工程建设文档齐备，且经监理机构审核确认◆验收方案经审核确认◆监理机构抽检测试或第三方测试已完成，承建单位对于不合格项进行了整改并复测通过【验收阶段监理活动一系统试运行】◆要求业主单位、承建单位以初验合格报告作为启动试运行的依据◆审核承建单位的试运行申请，若符合条件，协调三方允许系统进入试运行阶段◆有计划地监督系统的试运行，督促承建单位解决试运行中出现的问题◆跟踪承建单位现场人员是否到位并正常工作◆定时或不定时了解用户对现场人员是否满意，若有问题，核实后可对承建单位提出要求◆抽查承建单位现场人员的工作记录(解决用户问题)◆督促承建单位及时解决出现的问题◆根据初验前备忘录的内容，核实承建单位落实情况◆试运行结束后，建议用户出具用户使用意见，要求承建单位出具试运行报告和试运行期间的问题总结报告【验收阶段监理活动--终验条件】◆项目建设内容按照合同要求全部完成◆各种技术文档和验收资料完备◆系统的功能和性能满足设计要求◆系统已通过初验、试运行，用户出具了初验和试运行意见◆初验和试运行中出现的问题已经得到解决122 ◆试运行时间符合承建合同的要求◆完成了约定的培训工作，培训效果符合要求◆承建单位提交了符合要求的终验方案和计划，并且已通过审核◆业主单位同意进行终验123 第二十一章基础设施建设监理【招标阶段监理活动】【招标阶段监理活动-梳理工程需求】◆工程建设目标◆工程建设范围◆基础设施工程中的功能、性能和安全需求◆工程投资规模◆工程进度计划◆工程建设应遵循的法律、法规、技术标准和管理标准◆若存在现有基础设施，应考虑目标系统与现有系统的兼容性，以保护业主单位的原有投资【招标阶段监理活动一招标文件的监理】监理机构应协助业主单位，根据初步设计方案概算清单编制采购工程量清单，分项设计设备、系统的技术指标，作为基础设施工程项目招标的技术要求。【技术需求要点】◆工程/项目总的需求◆工程/项目的技术和质量要求◆工程/项目的时间和进度要求◆主要设备、产品及服务的要求◆投标文件、合同主要条款的要求；投标单位的资质要求◆验收方法、移交规程◆分包合同要求、可向所有投标单位公布的有关评分规则【设计阶段监理活动】基础设施工程设计阶段的主要监理活动如下：124 (1)协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程；(2)确定工程/项目各方往来文档的种类、格式、签批人等事宜；(3)协助业主单位组织、评审承建单位制订的计划、设计方案；(4)监督承建单位系统需求分析过程，促使需求具备正确性、完备性、可测试性和一致性；(5)审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见；(6)协助业主单位组织设计交底工作，记录交底结果；(7)审核设计变更的合理性，并对变更引起的质量、进度和投资变化提出监理意见，协调业主单位和承建单位就设计变更内容达成一致；(8)审核工程设计方案，并提出监理意见等。【设计阶段监理活动一审查工程设计方案】◆审查设计文件：是否符合合同要求和设计规范，勘查成果是否能够作为初步设计和施工图设计的依据，施工图设计文件能否指导施工；◆审查设计说明：工程概况、设计依据、技术方案措施及总体要求是否合理，内容是否详尽；◆审查设计图纸：是否符合机房、网络、管线路由的实际情况，是否详细具体，设计审核◆责任人签字是否齐全◆审查概预算编制是否符合相关规定，能否满足工程项目的投资需求【设计阶段监理活动一协助业主单位组织设计交底工作】◆设计会审交底前应让相关参建方到现场考察，核对设计图纸，审查设计文件，并征求参建各方意见◆召开设计技术交底会，澄清设计技术细节，并作会议纪要◆审查设计人员是否对会审交底的意见做出说明，并形成会议纪要，按照要求由设计人员修改设计文件，并对修改文件进行核查125 【实施阶段监理活动一监理目标】基础设施工程实施阶段的监理要点主要包括以下内容。(1) 严把进场原材料、设备质量关。具体包括：①对项目进场的原材料、半成品、构配件及设备应进行报验认定，合格后方可使用、安装。②各种产品必须有出厂证明、检测报告、技术合格证或质量证明文件，对需使用的材料配件，在使用前抽检或试验，按规定进行，规格、数量、材质应合格。③对新材料、新型制品要有技术鉴定文件，必要时可征得厂家提供支撑材料，或亲赴厂家考察、查证和确认。④所有设备应有合格证，在安装前按说明书要求进行质量检查。国家有特殊要求的材料、配件、设备要有相应的批准证书。严格禁止未经检验或检验不合格的原材料、半成品、构配件、设备在项目上使用。(2)严把工序关对未经监理机构验收或经验收不合格的工序不予签认，且不得进入下一道工序施工，特别是重点部位工序。(3) 严格现场旁站监理机构应根据项目特点确定各主要分部、分项工程的关键部位和关键工序。对关键部位和关键工序，应从施工材料检验到施工质量验收进行全过程现场跟班旁站监理，监督相关施工方案及工程建设强制性标准的情况。(4) 做好隐蔽工程检查签认工作。隐蔽工程完成后，应先由承建单位进行自检，由专职质量人员检查。自检合格后，承建单位通知监理机构到场检验，并提交自检资料。监理机构应按照如下程序对隐蔽工程施工进行监理：①承建单位在隐蔽工程开工前必须进行报验。②审核承建单位提交的隐蔽工程报验申请和隐蔽工程自检记录。③在隐蔽工程施工过程中，按照监理实施细则确定的程 序，依据设计要求和相关标准、规范的要求，现场检查隐蔽工程，对验收合格的隐蔽工程进行签认。126 ④如检查发现不合格，发监理通知单要求承建单位整改，整改完毕后应重新进行验收；对特殊设计或者与原设计变更较大的隐蔽工程，应通知设计单位到场共同检查签认。⑤未经验收或验收不合格的隐蔽工程，监理机构应拒绝签认，并要求承建单位不得进行下一道工序的实施。对未经检查签认的隐蔽工程，承建单位不得擅自隐蔽。当监理机构对已验收的隐蔽工程的质量有怀疑时，可以要求承建单位对已验收的隐蔽工程进行重新检查。承建单位应按照要求进行配合，并在检查后进行恢复。(5) 做好检验批、分项、分部工程验收工作。当检验批、分项、分部工程完成后，承建单位先进行自检，确认其符合相关标准、规范后，向监理机构提交验收申请，由监理机构检查、验证。可按照合同的要求，依据施工图及相关文件、标准、规范等进行检查、检验。若其质量符合要求，则通过验收。如果在检查中发现其存在质量问题，发监理通知单要求承建单位限期整改，待质量达到要求后，再予以验收。(6) 监督承建单位严格按进度计划组织实施。承建单位应严格按照合同规定的或经批准的进度计划组织实施，须及时向监理机构递交周、月度、季度的项目进展报告，监理机构定期向业主单位报告各项工程实际进度、与计划进度的对比以及形象进度情况。【实施阶段的质量控制--隐蔽工程的检查】◆应在隐蔽部位隐蔽前进行检查验收◆对需要进行中间验收的单项工程和部位及时进行检查，不应影响后续施工◆承建单位应为检验和验收提供便利条件【实施阶段监理活动--安全监督管理】◆施工准备阶段，审查承建单位提交的实施组织设计方案中的安全技术措施◆审查承建单位安全生产许可证的有效性◆查验承建单位生产管理人员的安全考核合格证书◆查验特殊工种作业人员的特种作业操作资格证书◆检查承建单位的安全生产规章制度127 ◆检查安全防范用具、施工工具、装备配备情况，不允许带不合格器具到施工现场作业【验收阶段监理活动】基础设施工程验收阶段的主要监理活动如下：(1)协调业主单位和承建单位就验收方案内容(验收目标、双方责任、验收提交清单、验收标准、验收方式验收环境等)达成一致，填报工程备忘录，经三方签认；(2)处理承建单位提交的工程验收申请，审核其中的验收计划、验收方案等；(3)检查确认项目达到验收条件，并签署监理意见；(4)协助业主单位按照项目验收方案所规定的验收内容和方式组织初验、试运行和终验，对其结果进行确认，对验收过程中发现的问题提出监理意见，并要求承建单位进行整改；(5)敦促业主单位、承建单位按照事先约定，编制、签署并妥善保存验收阶段的各类项目文档，敦促业主单位和承建单位及时整理并妥善保管整个项目的相关文档；(6)编制项目监理总结报告，整理并向业主单位提交项目有关的全部监理文档；(7)协助业主单位完成验收工作，协助业主单位和承建单位完成项目移交工作；(8)督促承建单位完成项目实施方案中确定的培训工作。【验收阶段监理活动一检查竣工验收条件】◆检查承建单位是否完成工程设计和合同约定的各项内容◆确认工程质量是否符合有关工程建设强制性标准◆确认工程质量是否符合合同及设计文件的要求◆检查有无完整的技术档案和施工管理资料◆检查有无公安消防环保、气象等部门出具的认可文件或准许使用文件【出入口控制(门禁)系统监理要点】安全防范系统工程出入口控制(门禁)系统的监理要点具体如下：(1) 出入口控制(门禁)系统的功能检测。具体包括：128 ①系统主机在离线的情况下，出入口(门禁)控制器独立工作的准确性、实时性和储存信息的功能；②系统主机对出入口(门禁)控制器在线控制时，出入口(门禁)控制器工作的准确性、实时性和储存信息的功能，以及出入口(门禁)控制器和系统主机之间的信息传输功能；③检测掉电后系统启用备用电源应急工作的准确性、实时性、信息的存储和恢复能力；④通过系统主机、出入口(门禁)控制器及其他控制终端，实时监控出入控制点的人员状况；⑤系统对非法强行入侵及时报警的能力；⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生；⑦出入口管理系统的数据存储记录保存时间应满足管理要求。(2) 系统的软件检测。具体包括：①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，包括：●软件设计与需求的一致性；●程序与软件设计的一致性；●文档描述与程序的一致性、完整性、准确性和标准化程度等。【入侵报警系统监理要点】安全防范系统工程入侵报警系统的监理要点具体如下：(1)探测器的盲区检测，防动物侵入功能检测；129 (2)探测器的防破坏功能检测应包括报警器的防拆报警功能，信号线开路、短路报警功能，电源线被剪的报警功能；(3)探测器的灵敏度检测；(4)系统功能检测应包括系统的布设、撤出功能，关机报警功能，系统后备电源自动切换功能等；(5)系统通信功能检测应包括报警信息传输，报警响应功能；(6)系统的联动功能检测应包括报警信号对相关报警现场照明系统的自动触发，对监控摄像机的自动启动，视频安全防范监视画面的自动调入，相关的出入口自动启闭，录像设备的自动启动等；(7)报警系统管理软件(含电子地图)功能检测；(8)报警信号联网上传功能的检测；(9)报警系统报警事件存储记录的保存时间应满足管理要求。【巡更管理系统监理要点】安全防范系统工程巡更管理系统的监理要点具体如下：(1)按照巡更路线图检查系统的巡更终端、读卡机的响应功能；(2)检查巡更管理系统的编程、修改功能，撤防、布防功能；(3)检查系统的运行状态、信息传输、故障报警和指示故障位置的功能；(4)检查巡更管理系统对巡更人员的监督和记录情况，安全保障措施，对意外情况及时报警的处理手段；(5)对在线联网式巡更管理系统，还需要检查电子地图上的显示信息，遇有故障时的报警信号，与视频安全防范监控系统的联动功能；(6)巡更系统的数据存储记录保存时间应满足管理要求。【防鼠害监理要点】安全防范系统工程防鼠害的监理要点具体如下：(1)机房内所有的孔洞在施工完成后都应及时封堵；(2)所有的线槽都应盖好、密封；(3)所有电缆竖井都应用防火泥封堵。130 第二十二章软件工程监理【软件测试类型】表测试类型名称解释单元测试对软件中的最小可测试单元进行检查和验证集成测试也叫组装测试或联合测试，在单元测试的基础上，将所有模块按照设计要求(如根据结构图)组装成为子系统或系统，进行集成测试系统测试对整套系统的测试，将硬件、软件、操作人员看作一个整体，检验它是否有不符合系统说明书的地方验收测试也称为交付测试，部署软件之前的最后一个测试操作，是在软件产品完成了单元测试、集成测试和系统测试之后，在产品发布之前所进行的软件测试活动【规划阶段监理活动】◆协助业主单位梳理业务目标，制定软件系统建设目标◆协助业主单位开展软件系统需求分析工作◆协助业主单位对软件系统建设方案进行可行性分析、必要性分析，确定软件系统的技术架构和建设方案◆协助业主单位确定软件系统的工程造价【招标阶段监理活动】◆收集软件工程的相关资料，了解和掌握软件需求◆梳理软件工程建设需求，明确监理质量、进度等控制目标◆参与招标文件的编制，或审核招标文件技术需求、招标实施合规性等◆协助审查已有可利用产品的再用价值、可用性【设计阶段监理活动】131 ◆审查承建单位提交的软件工程项目计划，促使项目计划合理、可行，并符合承建合同的要求◆参与调研工作，督促承建单位形成调研记录，监督承建单位系统需求分析过程，促使系统需求具有正确性、完备性、可测试性和一致性◆组织和参与对承建单位在设计阶段形成文档的评审，促使设计阶段文档符合承建合同的要求，满足软件工程项目的系统需求，符合有关法规、标准的要求◆及时对变更进行响应，并做好变更控制工作【设计阶段监理活动一需求管理】设计阶段的需求管理主要包括四个过程，即需求获取、需求分析、需求规格编写和需求验证。其中，验证需求可采用以下方式进行：◆审查需求文档◆依据需求编写监理验证用的测试用例◆敦促编写用户手册◆确定合格的标准【实施阶段监理活动】【实施阶段的质量控制--软件编码规范】◆遵循开发流程，在设计的指导下进行代码编写◆代码编写以实现设计的功能和性能为目标◆程序具有良好的结构，能够提高程序的封装性、降低程序的耦合程度◆程序可读性强，易于理解◆软件易于使用和维护◆软件具有良好的可扩展性【验收阶段监理活动】【验收阶段监理活动一初验】初验条件：132 ◆软件产品已纳入配置管理并可交付◆已提交承建合同规定的项目文档◆软件系统已通过测试初验活动：◆依据承建合同，与业主单位和承建单位一起，对软件系统功能的完成情况进行检查，形成软件系统功能检查表◆依据承建合同，审核承建单位提交的初验申请◆要求承建单位提交验收方案。验收方案应包括验收范围、各方责任、验收标准、验收方式和验收成果等内容◆协助业主单位组织项目初验◆对验收中发现的问题予以记录◆协助业主单位组织对初验中发现的质量问题进行评估，根据质量问题的性质和影响范围，确定整改要求和整改后的确认方式，必要时，应组织重新验收◆参与对初验结果的确认，签署初验报告【验收阶段监理活动一系统试运行】◆要求承建单位提交系统试运行计划，报业主单位审核确认后，督促其实施◆如需要进行新旧系统切换，在系统切换前要求承建单位提交系统切换及数据迁移申请，审核后报业主单位确认◆督促承建单位做好试运行记录，及时解决试运行过程中发现的问题和不合格项，形成系统问题跟踪记录◆系统试运行发生项目变更的，宜组织业主单位和承建单位对变更风险进行评估，包括对新旧系统的影响，对费用、效益、质量和进度等的影响，做好与变更有关的申请、评估、计划、实施、验证等活动的记录和文档资料的保管◆要求承建单位提交系统试运行报告◆协调业主单位和/或使用单位提交系统使用意见133 【验收阶段监理活动一项目终验】◆协助业主单位确认是否满足终验条件◆审核承建单位提交的终验方案◆参与终验，签署终验报告，验收活动和结果应形成文档◆督促承建单位解决终验中发现的问题和不合格项◆要求承建单位提交项目移交申请，宜包括软件交付清单、相关工程文档和必要的联系信息，并做好交接记录，形成软件工程项目移交清单◆审核承建单位所提供的工程各阶段形成的技术、管理文档的内容和种类，确保验收文档符合相关标准◆依据承建合同审核承建单位提交的工程结算◆完成工程监理总结报告，整理工程有关的全部监理文档，并移交业主单位【软件支持监理一配置管理监理】◆敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线◆监督承建单位配置管理的执行情况，包括控制软件项的修改和发行，记录和报告软件项的状态和修改申请◆与业主单位、承建单位共同对配置管理做出要求，应包含如下内容：◆配置项的完整性、协调性和正确性◆对配置项的储存、处理和交付的控制【软件支持监理一软件工程质量保证】◆要求承建单位制订执行质量保证过程活动和任务的计划文档◆开展质量保证活动的质量标准、方法、规程和工具◆质量记录的标识、收集、归档、维护和处理的规程◆开展质量保证活动的资源、日程和职责◆活动和任务◆要求承建单位实施计划中的以及持续的质量保证活动和任务◆要求承建单位编制并保存质量活动和任务及其实施情况、发现的问题以及解决办法的过程记录◆存在分包工程时，协助业主单位要求承建单位对分包单位进行必要的质量管理、过程控制并承担各自角色的责任，落实到位134 第二十三章数据中心监理【信息资源规划】信息资源规划需要对数据中心所要收纳、管理和提供服务的信息资源进行全面的规划，并将信息资源的集成、共享发挥到最符合业务协同的理想状态。信息资源规划的重点是分析数据流、建立数据模型，形成数据信息资源应用与管理标准体系，整合所有业务信息数据资源，提出数据集成、信息共享和应用协同的方法，实现信息资源从效率到效能、从分散到集约、从封闭到开放的转变。【数据中心管理制度】◆出入口门禁管理办法◆各角色人员职责明示◆设备故障报告流程◆安全事故报告流程◆故障、事故处理确认流程等【招标阶段监理活动一承建单位合同或服务级别协议(SLA)】◆审核合同范围、双方职责、权利和义务的描述与招标文件的一致性，比对合同或协议与招标文件、投标文件可能存在的差异◆审核采购货物参数和服务级别指标的明确性◆审核实施工艺、工序及验收指标的合规性◆审核交付过程与交付成果的可操作性与合规性【设计阶段监理活动】【设计阶段监理活动一规章管理制度体系的咨询和监理】◆业主单位、承建单位与监理单位的工作范围与协作交接的流程◆各方服务交付环节与产出物规格◆工作的责任人与职责135 ◆各方质量保证体系落实与生效的制度◆工作合格标准◆工程变更程序与手续【设计阶段监理活动一深化设计方案和图纸的审核】◆施工方案和施工组织设计范围与合同要求的一致性◆工程质量技术保障措施的完备性、合规性◆施工图施工部位技术指标参数与工程量的明确性◆统计资料或管理图表和工序要求与施工动态的符合性◆设计变更与技术核定的一致性、合规性【设计阶段监理活动一设计方案的评审要点】◆设计方案整体架构要做到层次明了、架构清晰、主次分明、易读易懂◆每一项设计内容要做到有分析、有结论，结论要明确，描述要精练◆设计思路和设计展示要基于科学、严谨、有依据的数据推导过程和分析，切忌猜测◆设计方案应充分展示高度的逻辑思维、判断和推导，语言表述能够被读懂◆设计方案一定要基于广泛收集的、可靠的数据，论据完整、可信◆设计方案应适当以图表展示，结合必要的文字表述，既简练又达意◆设计方案应具备完整性，宜以“发现问题→分析问题→解决问题→关闭问题”的闭环思路进行表述◆设计方案既要提出解决方案，也要提出必要的辅助性、支撑性的建议【实施阶段的监理活动】(1)监督承建单位严格按照设计图纸、施工标准和规范进行施工(2)督促承建单位建立健全工程质量保证体系，落实现场工程质量自检制度、重要结构部位和隐蔽工程质量预检复检制度、设备材料质量检查制度。(3) 加强对施工各阶段的质量、投资、进度、安全控制管理，确保工程质量。136 (4) 协助业主单位严格控制工程变更，及时做好工程结算。对于确因以下客观原因发生变更的，报业主单位审批方能组织洽商：(5)协调业主单位、承建单位、材料设备供应商等各方工作，有效推进施工进度。(6)协助业主单位、承建单位认真落实安全管理制度，保障施工安全。(7)对数据中心工程的信息系统软硬件实施过程进行旁站和检查，实施随工检测，做好监理记录。(8)对数据中心工程的信息资源(数据)实施过程进行审查和组织评审，做好监理记录。(9)对数据中心工程的人员及相关规章制度实施过程进行咨询和协调，做好监理记录。【实施阶段监理活动一信息资源(数据)监理】◆监督承建单位根据需求方案进行信息资源规划，提高数据中心应用系统数据管理质量，实现信息资源整合与应用系统集成，检查承建单位建设方案是否满足业主单位需求以及标准要求，提出监理意见◆检查承建单位的数据交换和共享技术实施过程是否符合信息资源规划，所采用的信息共享服务内容是否满足业主单位应用需求，提出监理意见◆做好对数据中心信息资源(数据)的监理检查并记录。具体包括：◆检测部位：应是能体现数据中心的信息资源接收、处理、交换、展示等核心功能的节点部位◆主体项目检测内容：用户视图与数据流、数据结构与建模、数据接口规范等。应以技术规范或设计方案、技术方案中预定的指标与实际检测指标为记录内容◆一般项目检测内容：系统调试、试运行情况【验收阶段监理活动一项目验收条件】◆经过业主单位批准的工程技术文件完成各项施工◆完成调试及自检，并出具系统自检记录◆工程质量检验合格，并出具工程质量检测记录137 ◆完成系统试运行，并出具系统试运行报告◆系统检测合格，并出具系统检测记录◆完成技术培训，并出具培训记录【验收阶段监理活动一工作建议报告】◆分析服务交付过程，提出改善建议◆分析未达成服务级别协议的情况，提出改善建议◆分析用户不满意的情况，提出改善建议◆分析服务过程，改善服务交付，挖掘服务价值◆建立内部主动服务改进机制，跟踪服务改善情况138 第二十四章信息安全监理【规划阶段监理活动】◆促使业主单位充分考虑信息系统工程的信息安全规划和设计◆建议业主单位基于业务开展风险评估工作◆协助业主单位根据系统的安全风险、法律法规和政策的约束，确定信息系统工程的安全目标和安全需求◆检查业主单位提出的安全需求与安全目标是否一致，与国家和地方的信息安全法律、法规、政策、标准是否符合◆审核信息安全设计方案中涉及网络安全等级保护、商用密码应用系统建设、关键信息基础设施保护的内容◆协助业主单位制定信息安全管理制度，开展或完善安全体系建设◆如适用，宜协助业主单位依据国家等级保护相关标准，确定信息安全保护等级，协助业主单位完成信息系统定级及备案工作◆如适用，宜协助业主单位按照相关规定完成信息安全方案评估工作，评估结果作为项目规划立项的重要依据和申报资金的必备材料；◆配合业主单位按相关规定完成立项文件编制及送审工作，并及时获得相关管理部门的批复意见。【规划阶段监理活动一安全风险评估】◆对预期的信息系统展开全方位的风险评估◆确定预期信息系统的资产，并明确资产的价值。资产包括：信息资产、纸质文件、软件资产、物理资产、人员、公司形象和声誉、服务等。资产的评估应当从关键业务开始，最终覆盖所有的关键资产◆对预期信息系统进行细致周密的脆弱性和威胁分析，发现它的脆弱点及所引发的威胁被利用后所造成的损失等◆对风险进行优先级排序，并形成安全措施需求清单◆如适用，建立与业务战略相一致的安全规划，制定总体的安全方针，并得到最高管理者的认可139 【安全需求确定】监理机构应从如下方面协助业主单位确定需求：◆协助业主单位通过风险评估，明确信息系统工程建设的安全目标，从安全目标导出安全需求◆应检查业主单位提出的安全需求与安全目标的一致性，与国家和地方信息安全法律法规、标准和政策的符合性◆如适用，监理机构宜检查信息系统工程的项目建议书、可行性研究报告、初步设计方案是否包含明确的安全需求【规划阶段监理活动一商用密码应用方案】信息系统密码应用等级保护能力要求◆物理和环境安全◆网络和通信安全◆设备和计算安全◆应用和数据安全◆管理制度◆人员管理要求◆建设运行要求◆应急处置要求【规划阶段监理活动一方案审核】关键信息基础设施安全防护方案的审核：◆关键信息基础设施识别◆落实关键信息基础设施安全防护要求◆关键信息基础设施检测评估◆关键信息基础设施保护制度建设◆关键信息基础设施采购要求140 【招标阶段监理活动一协助编写或审核招标文件】◆信息安全技术要求应能满足既定的安全目标与安全需求，包括功能、性能、技术指标、信息安全规划目标、国产化等◆对投标单位综合履约能力的要求，应与信息安全项目相匹配◆投标单位的资质要求，例如信息安全服务相关资质、类似项目成功案例等◆投标单位和项目组人员的资格要求，例如信息安全领域的相关资格、工作年限和项目经验等◆投标单位的服务过程管理、质量保障体系、应急响应能力等要求◆新建工程项目对原有信息系统安全性的可能影响及处理措施◆如适用，审核是否明确了信息系统安全建设等级及相关测评要求，并协助采购相关测评服务◆根据公安部门发布的测评机构目录，协助业主单位采购信息安全等级测评服务◆根据国家密码管理部门发布的测评机构目录，协助业主单位采购密码测评服务【招标阶段监理活动一根据业主单位委托参与评标工作】◆协助审查投标单位的资质能力，例如信息安全服务和信息系统集成等资质及类似成功案例◆协助审查投标单位项目组人员的资格能力，例如信息安全领域的相关资格、工作年限和项目经验等◆协助审查投标单位的服务过程管理、质量保障体系、应急响应能力，投标单位对原有信息系统安全性的可能影响及处理措施等◆协助确定满足需求的投标方案和投标单位【招标阶段监理活动一承建合同的监理】◆信息安全相关建设内容和技术要求应与投标文件一致◆应包括适用的保密条款、安全风险控制和安全责任条款◆应包括项目验收和安全测评的标准、方法及交付文档◆应包括工程变更和扩展引发安全问题的处理方法141 ◆检查承建合同中安全功能、技术要求、测试标准、验收要求和质量责任条款的合理性◆若发现安全需求缺失或不当，应及时告知业主单位◆若项目中涉及内部敏感信息，监理机构应促使各方(业主单位、承建单位、监理机构、测评机构等)签署保密协议【设计阶段监理活动一体系结构设计的审核】◆根据安全技术要求，选择安全模型时应考虑以下内容：◆安全体系结构设计的合理性◆安全解决方案的针对性◆安全控制措施的有效性◆残余风险◆安全设计与安全目标和安全需求的一致性◆安全控制措施应覆盖物理、主机、网络、应用、数据和信息安全管理等方面◆项目各阶段的安全风险分析和控制措施的全面性、合理性◆安全性检验手段应具有可操作性、有效性◆如适用，应督促承建单位组织相关部门和有关安全技术专家对体系结构设计的合理性、确定性进行论证和审定【设计阶段监理活动一详细设计监理工作】◆复核承建单位资质、拟派人员资格◆审核工程实施方案，检查实施方案与承建合同、设计方案的一致性◆审核承建单位提交的工程进度计划，保证信息系统工程中的各项安全控制措施实施符合总体时间安排◆审核承建单位提交的开工报审材料，具备开工条件且经业主单位批准后，及时签发开工令◆督促承建单位实地了解建设环境及现状，熟悉规划设计文件，并在此基础上开展深化设计工作142 ◆协调相关方，落实物理环境、电力供应、网络通信等相关资源配置◆审核深化设计阶段各方提出的变更文件◆及时出具书面审核意见，并监督相关方按照要求在规定时间内落实◆根据项目实际需求，配合业主单位组织深化设计评审工作【设计阶段监理活动一深化设计方案的审核】◆承建单位应踏勘机房场地，了解安全设备部署的物理位置◆承建单位应检查机房出入口门禁系统，确认物理访问控制措施是否满足等级保护要求◆承建单位应检查机房防盗报警系统、机柜接地系统及其他防护设施，确认安全物理环境是否满足等级保护要求◆承建单位应了解安全设备部署环境的线缆敷设要求及网络架构，确保安全设备接入的网络链路顺畅【项目实施方案的审核一管理措施实现方案】安全管理制度的建设和修订：◆明确应用范围◆规定行为规范◆评估与完善安全管理机构和人员的设置：◆安全组织确定◆角色说明◆人员安全管理【实施阶段监理活动一工程实施方案的审核】◆实施方案与设计方案的符合性◆详细的工程实施计划、工程控制过程安全设备安装调试计划143 ◆工程实施组织中的安全◆如存在项目分包，审核分包工程实施的安全管理措施◆依据体系结构设计和详细设计所采用的安全技术框架、安全管理策略，形成工程实施方案的配套文件◆如适用，督促承建单位组织相关部门和有关安全技术专家对工程实施方案的合理性、正确性进行论证和审定【实施阶段监理活动一安全控制措施的审核】◆确认集成到信息系统工程中的安全控制措施及其配置◆确认安全控制措施达到设计要求，有效降低风险◆工程实施部署后，督促承建单位对系统的运行情况进行监控，及时发现安全控制措施状态变化及安全事件，并进行适当的处置◆如适用， 服务和安全机制，保障信息安全◆安全技术体系应符合“深度防御”和“动态保障”等基本原则◆应制定信息系统不同层面、不同产品和系统的安全配置基线和标准作业流程(SOP)◆应建立持续的安全审计和安全监控机制，定期开展配置检查、漏洞扫描、渗透测试等技术检测【信息系统安全测评的合规性要求】◆应做好与安全测评机构的沟通，在工程验收阶段和系统运行阶段按需开展安全测评◆应协调信息系统各相关方配合测评机构开展测评工作147 ◆应做好安全测评过程中相关的技术准备、文档准备和人员准备◆应对安全测评中发现的问题及时进行安全加固、安全优化等整改工作【应急管理的合规性要求】◆应参照GB/T20986《信息安全技术网络安全事件分类分级指南》对信息安全事件进行分类、分级◆应参照GB/T20985《信息技术安全技术信息安全事件管理》建立应急响应小组，制定应急响应流程，实施信息安全事件管理各过程的主要活动◆应确保信息安全应急管理的人员、预案、操作、工具、资源可用性◆应制定信息系统总体应急预案和各类子预案，定期进行应急预案的培训、演练和修订【业务连续性的合规性要求】◆应以保护组织的核心业务、核心价值，保障组织的业务持续开展为出发点，进行业务影响分析(BIA)◆应基于风险评估和业务影响分析结论，制订业务连续性计划和灾难恢复计划◆应基于信息系统的不同层面、不同应用、不同资产，分别制定恢复时间目标(RTO)、恢复点目标(RPO) 指标◆应根据业务连续性计划和指标，建立业务连续性保障能力【网络安全审查的合规性要求】◆关系国家安全和公共利益的系统所使用的重要技术产品和服务，应遵从国家网络安全审查制度◆应依据产品和服务的安全性与可控性的审查结论，从技术和背景两方面评估使用信息技术产品和服务的安全风险◆应评估信息技术产品和服务的提供商及其供应链的安全风险◆应按需要求信息技术产品和服务的提供商做出安全性承诺【物理安全】148 (1) 电子设备机房的安全设计应符合GB/T9361《计算机场地安全要求》的规定。(2)机房物理位置选择在遵照相关技术规范的前提下，以等级保护第三级为例(下同)还必须考虑以下因素：等级保护第三级以上系统，机房场地应避免设在建筑物的高层或地下室，以及用水设备的下层或隔壁。(3) 物理访问控制。具体包括：●等级保护第三级以上系统，应对机房进行区域划分，区域和区域之间设置物理隔离装置，在重要区域前设置交付或安装等过渡区域；●等级保护第三级以上系统，重要区域应配置电子门禁系统，控制、鉴别和记录进入的人员。(4) 防盗窃防破坏。具体包括：●等级保护第三级以上系统，机房应安装采用光、电等技术的机房防盗报警系统；●等级保护第三级以上系统，机房应设置监控报警系统。(5) 防雷击。等级保护第三级以上系统，应在供配电系统上设置防浪涌保护装置，防止感应雷，同时建议在使用电缆的重要弱电设备端口安装防浪涌保护装置。(6) 防火。具体包括：●等级保护第三级以上系统，机房应设置火灾自动消防系统，能够自动检测火情、自动报警，并自动灭火；●等级保护第三级以上系统，机房及相关的工作房间和辅助房间应采用具有耐火等级的建筑材料和装饰材料；●等级保护第三级以上系统，机房应采取区域隔离防火措施，将重要设备与其他设备隔离开，物理隔断在吊顶之上和防静电地板以下应安装防火板与建筑结构闭合。(7) 防水和防潮。等级保护第三级以上系统，在存在水管穿越的区域，以及安装精密空调的区域，应安装对水敏感的检测仪表或元件，对机房进行防水检测和报警。(8) 防静电。等级保护第三级以上系统，机房的地面应采用防静电地板。149 (9) 温湿度控制。等级保护第三级以上系统，机房应设置温、湿度自动调节设施，使机房温、湿度的变化在设备运行所允许的范围之内。(10) 电力供应。等级保护第三级以上系统，应设置冗余或并行的电力电缆线路为计算机系统供电，有条件的建议机房所在建筑部署备用供电系统(如柴油/汽油发电机)。(11)电磁防护。具体包括：●等级保护第三级以上系统，应保证机房采用接地方式防止外界电磁干扰和设备寄生耦合干扰；●等级保护第三级以上系统，应对关键设备和磁介质进行电磁屏蔽(使用屏蔽机柜安装关键设备，使用电磁屏蔽防潮柜存放磁介质)。(12)机房环境监控。适时关注机房环境监控的关键部位和技术实现符合相关要求。(13)对于涉及敏感数据或关键的系统链路，还应考虑其他必要措施。【网络安全】◆各种服务器及网络核心设备宜放置在专门的电子设备机房◆信息网络平台中涉及的防火墙、防病毒系统等网络安全软硬件设备应通过国家相关安全测评认证机构的认证◆结构安全◆访问控制◆网络设备防护◆安全审计◆边界完整性◆入侵防范◆恶意代码防范【应用系统安全】◆身份鉴别◆访问控制◆安全审计◆剩余信息保护◆入侵防范◆恶意代码防范◆资源控制150 【数据备份与灾难恢复】◆数据完整性◆数据保密性◆备份和恢复151 第二十五章运行维护监理【信息系统运行维护服务对象】运行维护监理：监理单位受业主单位委托，依据国家有关法律法规、标准规范和监理合同，对信息系统完成建设并投入使用后的运行维护工作实施的监督管理。例行操作监理：对于运行维护中的日常预定工作，监理机构实施的监理。响应支持监理：对于运行维护服务请求或故障申报的即时处理工作，监理机构实施的监理。优化改善监理：对于运行维护对象的功能和性能调优工作，监理机构实施的监理。调研评估监理：对于运行维护对象的调查研究或分析评价工作，监理机构实施的监理。【运行维护监理与建设监理的对比一质量控制】四控：质量控制、进度控制、投资控制、安全控制五管：合同管理、文档资料管理、配置管理、应急管理、效能管理一协调：组织协调表质量控制建设监理运行维护监理质量目标质量目标聚焦在最终成果上，在项目进度和成本范围内，成果物的质量达成就意味着工程质量目标的达成质量目标除了有成果性的(如升级、改造等),还有过程性的，它要求在执行过程中都要保证某种要求的实现或不可突破质量控制方法常规的监理质量控制方法还有另一项重要的质量控制方法，即绩效考核。通过客观、量化的绩效考核，评价运维服务提供方的工作质量，实时发现问题，督促运维服务提供方持续不断地改进、完善，直至问题得到彻底解决质量影响要素具体如下：152 (1)要控制质量，首先要控制运维服务人员的工作能力、水平和效果。(2)定位故障比较困难。(3)改正错误的代价往往较大，并且可能引发其他质量问题。(4)质量认定的范围较大。【招标阶段监理活动一明确运行维护需求】◆根据运维招标特点编制监理规划，经业主单位签认后，作为监理工作的指导文件◆协助业主单位进行招标策划工作，根据业主单位需求及相关法律法规、政策和标准，确定运行维护任务和服务标准，作为后续监理工作的依据之一◆明确运行维护需求，包括运行维护对象、运行维护流程、运行维护组织及管理模式等，形成合法合规的、有针对性的、符合实际运行维护需要的招标要求【招标阶段监理活动--合同及SLA监理】协助业主单位审核合同条款和SLA 内容，重点审核：◆合同条款中运行维护服务期限、服务范围、服务内容、服务级别(SLA)、人员投入、运行维护评估、付款节点、服务变更控制及奖惩条款等内容◆SLA 中服务目录定义完整性、文件规范性、考核评估机制有效性和完整性◆SLA是否明确了服务项目、服务内容、服务时间、服务频度、交付方式及交付结果等◆管理运行维护招标阶段所产生的与监理相关的文档资料，包括需求说明、招标文件、运行维护合同、运行维护SLA 等◆可从运行维护人员、资源、技术和过程，以及运行维护预算的分析论证等方面向业主单位提供咨询服务◆签订的运维服务合同中，应明确要求运维服务提供方接受监理单位的监理【实施阶段监理活动一配置管理流程】①配置经理。具体职责包括：●确定配置管理过程的计划；153 ●对配置项进行识别和控制；●判断配置项的修改与更换，并与变更管理委员会保持紧密沟通；●确保配置管理过程在整个组织内得到良好的传达和沟通；●组织配置审计工作。②配置管理员。具体职责包括：●收集和记录配置信息；●维护配置项信息，确保配置项信息是最新的。③配置审核员。具体职责为：定期对配置项的一致性和准确性进行核查。【实施阶段监理活动一配置管理】◆协助运维服务提供方建立配置管理岗位体系，明确配置经理、配置管理员、配置审核员、变更经理、变更控制委员会等的岗位职责◆审核运维服务提供方提交的运行维护配置管理计划、配置方法、技术方案、使用工具等，并提出监理意见◆跟踪和检查运维服务提供方对于配置项的规划、识别、实施和管理工作◆配置项规划和管理数据库；◆对配置项的识别、收集、分析等过程；◆配置项基线管理机制；◆配置项校验、审计机制。◆检查运行维护过程中配置项的变更及发布管理过程◆对配置管理进行抽检【实施阶段监理活动一应急管理】应急事件主要包括以下情况：◆大范围系统中断◆区域性系统崩溃◆关键业务中断◆大范围病毒暴发154 ◆系统严重破坏◆数据严重破坏等【应急管理活动及内容】◆督促运维服务提供方建立应急预案◆应急组织结构；◆应急管理制度；◆风险识别评估；◆应急响应预案；◆应急培训；◆应急演练；◆检验分析；◆完善和改进。◆评审应急管理方案◆风险识别和分析；◆应急资源；◆组织结构和人员；◆检测和预警机制；◆应急响应流程、操作规范；◆保障措施等◆督促运维服务提供方做好针对各类运行维护对象的日常监测预警◆检查运维服务提供方对应急管理方案的培训和演练工作◆在应急事件发生时，督促项目各方做好应急调度和应急处置工作◆在应急事件关闭后，督促各方完成应急事件的索赔、总结、评价和改进工作【实施阶段监理活动一效能管理】◆制定绩效考核管理办法◆明确绩效考核内容◆日常管理155 ◆巡检情况◆故障/问题处理◆派工服务◆电话服务考核◆文档考核◆合同执行情况考核◆用户满意度与特殊事件考核◆明确考核执行的组织结构◆明确考核方法◆日常考核◆过程考核◆事后考核◆绩效考核指标◆考核结果的利用◆协助业主单位建立运维绩效考核管理体系，主要包括：考核范围；绩效考核原则、指标、内容、流程、制度、办法、组织结构、指标项◆协助业主单位做好运维项目绩效考核管理体系的执行工作◆收集绩效考核指标项量化数值、数据或记录等，进行绩效考核打分◆提交绩效考核报告和监理意见◆结合阶段绩效考核结果和实际运维情况，协助业主单位优化和完善运维绩效考核管理体系◆建立运行维护管理组织架构、工作协调组织结构◆建立三方的信息传递机制，包括信息沟通、汇报、审批等流程◆建立三方的协调机制，定期召开运行维护工作监理例会，并形成会议纪要◆协调业主单位与运维服务提供方之间的关系，并通过运行维护管理制度约束各方◆如需要，召开运行维护工作监理专题会议，并形成会议纪要【评估阶段监理活动一主要监理活动】156 ◆协助业主单位对运行维护对象的实际运行效果进行评估，主要包括对基础设施、软件、数据和信息安全等各类运行维护对象的性能状况进行调查和评价◆对运维服务提供方提交的服务验收申请、计划及其方案等进行审核◆协助业主单位制定绩效考核办法、方案和指标体系◆根据绩效考核办法和方案进行绩效考核，对运行维护服务进行评估，形成运行维护服务评估报告◆协助业主单位完成服务验收【评估阶段监理活动一服务验收过程】◆审查服务商提交的验收申请◆检查服务商提交的验收文档，并输出监理意见◆协助业主单位组织验收会议，并签订验收报告◆协助业主单位做好服务移交工作◆根据运行维护合同，签发运行维护费用支付意见157 【基础设施类运行维护服务的监理要点】表基础设施类运行维护服务的监理要点运行维护服务监理要点例行操作监理要点①监督检查例行操作的计划性和完整性；②对设施监控的不间断性、问题汇报和分析的及时性进行监督；③监督检查定期保养、配置备份等常规操作的计划性、准确性、记录的完整性及可追溯性；④宜要求运维服务提供方利用运行维护系统和工具，对基础设施开展运行维护活动，系统和工具应包括资源管理、监测与分析、阈值预警、监控管理和过程管理等功能。响应支持监理要点①检查运维服务提供方的响应支持服务与运行维护SLA的符合性；②依据运行维护SLA、维护手册或维护规程，监督、检查运维服务提供方的响应支持服务，包括处理的及时性、处理过程的严谨性及准确性、文档提交的准确性等；③宜要求运维服务提供方建立故障诊断知识库，应包括常见故障的原因与现象、故障排除步骤、故障诊断方法、故障诊断与修复原则等；④对服务商响应支持服务中存在的问题及时提出纠正和改进建议。优化改善监理要点①对优化改善方案进行审核，方案应明确优化改善的目标、内容、步骤、人员、预算、进度、衡量指标、风险预案和回退方案等内容；②宜对优化改善建议报告进行审核，报告应区分不同的优化改善类型(适应性改进、纠正性改进、改善性改进、预防性改进),评估报告内容的合理性并向用户提出合理建议调研评估监理要点①对评估计划进行审核，应明确调研评估的目标、内容、步骤、人员、进度、交付成果和沟通计划等内容；②持续跟踪调研评估的执行和评估结果的改进情况；③对调研报告进行审核，应包括现状评估、访谈调研、需求分析和评估建议等内容。158 【软件类运行维护服务的监理要点】表软件类运行维护服务的监理要点运行维护服务监理要点例行操作监理要点①督促运维服务提供方根据软件运行维护对象的特点，确定例行操作的周期、范围、人员、内容、目标，并编制运行维护指导手册；②对软件例行巡检、缺陷管理、变更管理、补丁程序管理、发布管理、版本管理、文档管理等运行维护活动实施监督管理；③对系统恢复过程进行跟踪和监督，重点审核系统恢复申请信息、数据备份情况、故障原因分析结果、恢复方案等文档；④依据维护计划、维护手册或维护规程，监督运维服务提供方的例行维护活动，审核运维服务提供方提供的例行维护实施方案、维护记录、维护报告等文档；⑤跟踪系统变更过程，监督变更过程的规范性；⑥督促运维服务提供方在运行维护过程中记录运行状态、异常处理记录，提供趋势分析及可能的风险消除建议，以及例行操作交付过程中的其他报告；⑦督促运维服务提供方对软件缺陷实施统一管理，形成缺陷管理表，并定期对缺陷状态进行确认；⑧可要求运维服务提供方利用运行维护管理平台自动实现对软件各类资源的数据采集、状态监控和性能分析、更新软件分发。响应支持监理要点①检查运维服务提供方的响应支持服务与运行维护SLA的符合性；②依据运行维护SLA、维护手册或维护规程，监督、检查运维服务提供方的响应支持服务，包括处理的及时性、处理过程的严谨性及准确性、文档提交的准确性等；③对运维服务提供方响应支持服务中存在的问题及时提出纠正和改进建议；④宜要求运维服务提供方建立故障诊断知识库，应包括常见故障的原因159 与现象、故障排除步骤、故障诊断方法、故障诊断与修复原则等。优化改善监理要点①跟踪系统缺陷诊断分析和修复过程，督促运维服务提供方及时进行缺陷修复；②跟踪软件优化过程，评估优化效果；③对软件优化方案的合理性、可行性进行审核；④监督运维服务提供方将例行操作、响应支持服务过程中发现的问题和解决过程进行分类汇总，形成运行维护常见问题集与知识库。调研评估监理要点同基础设施类调研评估监理要点160 【数据类运行维护服务的监理要点】表数据类运行维护服务的监理要点运行维护服务监理要点例行操作监理要点①督促运维服务提供方建立数据运行维护各项管理制度；②督促运维服务提供方根据监控记录、运行条件和状况进行预防性检查及趋势分析；③监督运维服务提供方的数据类日常运行维护操作行为，包括数据采集、存储、变更、迁移、转移、备份、分发和销毁等；④针对运维服务提供方提交的数据备份计划，审核其在备份方式、备份技术及安全方面的合理性，并监督其实施过程；⑤要求运维服务提供方采用工具化管理模块或第三方的各类数据监测工具，对数据的存储与传输状态进行记录和监控。响应支持监理要点①要求运维服务提供方基于用户对应用系统可持续性运行的基本需求和目标，配置各类数据资源保障措施；②依据响应支持服务的服务计划和指导手册，监督运维服务提供方在数据变更、数据恢复、故障排查、疑难解答等方面的响应支持服务，审核确认各类响应支持服务的工作记录；③督促运维服务提供方对数据问题实施统一管理，形成问题管理表，并定期对问题状态进行确认；④对运维服务提供方响应支持服务中存在的问题及时提出纠正和改进建议；⑤跟踪并确认运维服务提供方响应支持服务结果和改进措施的执行结果。优化改善监理要点①应协调业主单位和运维服务提供方确定优化改善服务的原则与方向，对数据资源优化方案的合理性、可行性进行评审；②跟踪数据资源优化活动，督促运维服务提供方及时对数据资源问题进行修复；③督促运维服务提供方将例行操作服务、响应支持服务过程中发现的问题和解决过程进行分类汇总，形成运行维护常见问题集与知识库，提高服务能力和服务效率；④跟踪数据资源优化结果，评估优化效果。调研评估监理要点同基础设施类调研评估监理要点161 【信息安全类运行维护服务的监理要点】表信息安全类运行维护服务的监理要点运行维护服务监理要点例行操作监理要点①督促运维服务提供方按照基础设施、应用系统和数据等对象安全属性的不同，采用不同的运行维护方法，设计详细的安全运行维护方案，并对方案进行审核；②依据安全运行维护相关管理制度和系统安全定级情况，督促服务商对基础设施、应用系统和数据定期开展安全巡检、安全加固、脆弱性检查、渗透性测试、安全风险评估等服务，以评估其是否能符合业主单位的安全要求。响应支持监理要点①督促运维服务提供方提交安全事件应急响应支持方案，并对方案进行审核；②对影响核心应用系统和数据安全的事件进行全程跟踪检查，审核事件处理过程的合规性、技术处理手段的正确性，并记录处理过程；③督促运维服务提供方及时纠正响应支持过程中的问题，如安全功能、安全性能等，监理单位对问题进行审核；④督促运维服务提供方在安全事件处理后提交分析报告，对报告中的风险判定、分析、解决方案、预防或整改措施等内容进行审核。优化改善监理要点①依据安全运行维护相关管理制度和系统安全定级情况，督促运维服务提供方对安全运行维护方案进行调整和适应性改进，包括但不限于安全巡检、安全加固、脆弱性检查、渗透性测试、安全风险评估、应急保障等方案和措施；②建议运维服务提供方在安全运行维护过程中，优化完善安全运行维护方案，并对优化完善后的方案进行评审；③可根据对安全运行维护记录、趋势的分析，结合安全运行的需求，发现安全运行过程的脆弱点，督促服务商有针对性地进行改进性作业和预防性改进。调研评估监理要点同基础设施类调研评估监理要点162"}],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":69,"question":"【2023年05月 -第69题】 -第12章信息管理69、按照工程建设阶段划分，信息系统工程监理的相关信息可以分为招投标信息、系统分析信息、系统设计信息、项 目实施信息、系统验收信息。 需求规格说明书属 于 (   )A、招标阶段信息     B、系统分析信息      C、系统实施信息      D 、系统验收信息【参考答案】B【郑房新老师点评】 P25712.3.2 按工程建设阶段分类招投标阶段信息主要包括招标书、投标书、中标通知书、承建合同及段产生的文件。系统分析信息主要包括需求规格说明书、功能界定书等系统分析阶段产生的文件。 --选B 系统设计信息主要包括系统概要设计说明书、系统详细设计说明书、明书等设计文件。系统实施信息主要指承建单位、监理单位和建设单位在实施过程中质量作业记录，包括设备验收记录、设备安装记录、 软件开发记录、软件测试记录、系统错误记录等。系统验收信息主要包括测试计划、测试报告、验收计划、验收报告及工程竣工总结报告。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":68,"question":"【2023年05月 -第68题】-第11章信息安全管理68、某信息应用系统对于系统可靠性和持续运行要求较高，应采用 (_)   备份方式，当一台主机出现故障，可及时启动另一台主机接替原主机任务。A 、全备份   B 、磁盘镜像    C 、双机容错    D 、存储保护【参考答案】 C【郑房新老师点评】 P245双机容错双机容错是计算机应用系统稳定、可靠、有效、持续运行的重要保证。它通过系统冗余的方法解决计算机应用系 统的可靠性问题，并具有安装维护简单、稳定可靠、监测直观等优点。  当一台主机出现故障，双机容错软件可及时启 动另一台主机接替原主机任务，采用智能型磁盘阵列可保证数据永不丢失，采用双机容错软件可保证系统永不停机，保证 数据永不丢失和系统永不停机，保证了用户数据的可靠性和系统的持续运行。它的基本架构共分两种模式：双机互备援(dual    active)  模式和双机热备份 (hot     standby)模式。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":67,"question":"【2023年05月 -第67题】-第11章信息安全管理67 、 (_)   表现在使服务器充斥大量要求响应的信息，消耗网络带宽或系统资源，导致网络或系统不胜负荷，以至于 瘫痪而停止提供正常的网络服务，是目前最为常见的网络攻击方法。A 、逻辑炸弹攻击   B 、特洛伊木马攻击   C 、异步攻击     D 、拒绝服务攻击【参考答案】 D【郑房新老师点评】 P227  ( 小郑口诀：看到瘫痪选拒绝-DOS。)(13)拒绝服务攻击DOSDOS攻击行为表现在使服务器充斥大量要求响应的信息，消耗网络带宽或系统资源，导致网络或系统不胜负荷， 以至 于瘫痪而停止提供正常的网络服务，是目前最为常见的网络攻击方法。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":66,"question":"【2023年05月 -第66题】 -第11章信息安全管理66 、管理在信息安全中举足轻重 ，信息系统安全的管理体系由 (    )组成。 A、法律管理、制度管理、培训管理   B、行业管理、法律管理、标准管理 【参考答案】A【郑房新老师点评】 P2163。管理体系管理是信息系统安全的灵魂 。信息系统安全的管理体系由(  小郑口诀：法制培) 法律管理、制度管理和培训管理 三部分组成。管理安全设置的机制有：人员管理、培训管理、应用系统管理、软件管理、设备管理、文档管理、数据管 理、操作管理、运行管理和机房管理。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":65,"question":"【2023年05月 -第65题】 -第10章信息系统工程的合同管理65、关于知识产区保护的措施， 不正确的 是 (_)A 、为保护建设单位的知识产区，监理单位要求承建单位遵守相关法律 B 、监理单位与建设单位的合同中应明确工程涉及的知识产权归属C 、监理单位应保护建设单位的知识产权，要求承建单位不得使用盗版软件 D 、监理单位要求承建单位出具非自主产权软件的使用权合法文件和证明【参考答案】 B【郑房新老师点评】 P2082技术措施根据北京市地方标准 DB11/T160-2002《 信息系统监理规范》 中的要求，在项目监理的整个过程中，必须对建设单 位和承建单位有关技术方案、软件文档、源代码及有关技术秘密等涉及知识产权的内容进行检查、监督和保护。具体 监理措施包括：(1)保护建设单位的知识产权权益。监理会根据信息系统工程建设项目的性质审查承建单位的资质，要求承建单位遵守 知识产权保护的相关法律法规--A正 确，确保在项目实施过程中采取正版软件， 坚决不使用盗版软件-C正 确。(2)项目文档的知识产权保护控制。监理单位协助建设单位在承建合同中明确知识产权及其相关资源如何所有或共享， 建立严格的项目资料管理制度，从制度上保护项目各方的知识产权。(3)外购软件的知识产权保护控制。监理单位要在外购软件订单之前，对采购软件的用户数、许可证书数和软件开被中限假灯让件和证明。 .监理单位要检查非自主产权软件的使用权合法文件和证明。 D正确(4)待开发软件的知识产权保护控制。 监理单位要及时提醒建设单位在承建合同中明确规定知识产权归属，避免产生不 必要的知识产权纠纷。--B错 误","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":64,"question":"【2023年05月 -第64题】- 第10章信息系统工程的合同管理64建设单位对于由承建单位造成的且实际发生的损失，向承建单位要求赔偿，称为(    ) A、索赔   B、变 更    C、反索赔  D、延 期【参考答案】C【郑房新老师点评】 P1892.反索赔反索赔是指建设单位向承建单位提出的索赔。--选C。建设单位向承建单位索赔的主要途径： 一是减少或防止可能产 生的索赔；二是反索赔，对抗(平衡)承建单位的索赔要求。建设单位向承建单位提出索赔的包括以下内容。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":63,"question":"【2023年05月 -第63题】-第10章信息系统工程的合同管理63、按照信息系统工程范围划分，信息系统工程合同可以分为： (    ) A、总承包合同、单项项目承包合同、分包合同B、总承包合同、单价合同、分包合同C、总价合同、单项项目承包合同、分包合同 D 、总价合同、单价合同、成本加酬金合同【参考答案】 A【郑房新老师点评】P1741.按信息系统工程范围划分从信息系统工程的不同范围和数量进行划分，可以分为信息系统工程(小郑口诀：总单分) 总承包合同、单项项目承 包合同、分包合同","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":62,"question":"【2023年05月 - 第62题】 -第9章变更控制 62.合同变更的一般特征不 包 括 (    )A 、项目合同的双方当事人必须协商一致         B、改变了合同的内容或标的C 、其法律后果是产生新的债权和债务关系      D 、能够规避项 目风险【参考答案】 D【郑房新老师点评】 P1699.4.4对合同变更的控制项目合同变更一般特征有如下几点： (小郑口诀：致内务)(1)项目合同的双方当事人必须协商一致；(2)改变合同的内容与标的： (3)合同变更的法律后果是将产生新的债权和债务关系。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":61,"question":"【2023年05月 - 第61题】 -第9章变更控制61、关于进度控制的描述， 正 确的 是 ( _  )A 、制定的进度计划必须是现实可行的    B 、每个项 目必须建立变更控制系统管理进度变更C 、每一次进度变更都要通过会议申请    D 、进度变更必须获得全部项 目干系人的书面批准【参考答案】 A【郑房新老师点评】 P1689.4.2对进度变更的控制在控制进度变更中涉及很多问题 ，第一个要点是要保证项 目进度计划是现实的-A正 确 ，许多项 目，尤其信息技术 领域 ，经常会制订一些不切实际的进度计划 。第二个要点是要有强调遵守并达到项 目进度计划的重要性 。监理人员可 以执行一系列的实际检查 。来帮助他们管理项 目进度计划的变更 。有几种方法可以用来控制与人有关的进度变更。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":60,"question":"【2023年05月 -第60题】-第9章变更控制60关于变更控制基本原则的描述，不正确的 是( _ ) A 、在项目实施过程中，变更处理越早，损失越小B 、变更需要获得三方(建设单位、监理单位、承建单位)的确认C 、在进行变更决策时，成员要对变更保密，防止动摇军心 D 、防止变更范围的扩大化对项目变更范围要有明确的界定 【参考答案】 C【郑房新老师点评】 P163-P1649.2.1对变更申请快速响应 项目变更是正常的、不可避免的。在项目实施过程中，变更处理越早，损失越小--A正 确；变更处理越迟，难度越大， 损失也越大 。项 目在失控的情况下 ，任何微小变化的积累 ，最终都会对项 目 的质量、成本和进度产生较大影响 ，这是一 个从量变到质变的过程 ， 因此监理单位在接到变更申请之后 ，要快速按照变更处理程序进行变更处理 ，并迅速下达是否 可以进行变更的监理通知。9.2.2任何变更都要得到三方确认任何变更都要得到三方(建设单位、监理单位和承建单位)书面的确认-B正 确 ，并且要在接到变更通知单之后才能 进行 ，严禁擅自变更 ，在任何一方或者两方同意下做出变更而造成的损失应该由变更方承担。9.2.3 明确界定项目变更的目标变更的真实 目 的是为了解决问题 ，如果变更后项 目 的 目标模糊不清 ，那么在实施过程中就难以确定努力的方向， 即使完成了项 目 ，也难以确定完成的 目标是否真的达到当时想象中的 目标。9.2.4防止变更范围的扩大化对项目变更范围要有明确的界定，而且三方对变更范围的理解上没有任何的异议--D 正 确。9.2.5三方都有权提出变更一般地说 ，承建单位和建设单位是变更的主要申请方 ，但是并不是说监理单位就不可以提出变更 ，监理单位也可 以根据项 目实施的情况 ，提出变更 ， 比如在监理过程中发现了前期设计的缺陷 ，发现原来计划采购的设备有了更新的产品 ，而且价格下降 ，这时也要主动提出变更申请。9.2.6加强变更风险以及变更效果的评估变更对项 目质量 、进度 、成本都会产生影响 ，要多方面评估变更的风险 ，制定详细的变更风险处理措施 ，并且要 对变更实施过程进行监控 ，对变更实施效果进行评估 ，如果发现异常情况 ，要及时中止变更 ，对变更重新进行评估。9.2.7及时公布变更信息只有项 目 的关键人员才清楚和控制着项 目变更的全过程 ，而其他人员未获得项自变更的全面信息 ， 因此在决策层 做出变更决策时， 应及时将变更信息公之于众，这样才能调整所有人员的工作，朝着新的方向努力-C 错 误。9.2.8选择冲击最小的方案项 目 的 目标 、预算 、项 目 的进度以及承建单位是决定项 目计划的主要因素 ，做出项 目变更时 ，力求在尽可能小的 变动幅度内对这些主要因素进行微调 。如果它们发生较大的变动 ，就意味着项 目计划的彻底变更 ，这会使 目前的工作 陷入瘫痪状态。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":59,"question":"【2023年05月 -第59题】 -第8章投资控制59、监理工程师在进行预算审核时，采用(_)使用与预算编制过程基本相同的方法计算项目成本，优点是审核细致、 质量高、差错少。A、 全面审核法   B、分解对比审核法    C、重点审核法   D、经验审核法【参考答案】A【郑房新老师点评】 P1471.全面审核法其具体计算和审核过程与编制过程基本相同。优点是全面细致、缺点是工作量过大，需要组织一批分专业 的计划预算工程师、经济师进行。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":58,"question":"【2
