":"章节练习","stem":"第1题 监理工程师在组织协调工作中，应坚持的基本原则不包括()。","knowledge":"","options":[{"label":"A","text":"公平、公正、独立原则"},{"label":"B","text":"科学原则"},{"label":"C","text":"先进性原则"},{"label":"D","text":"守法原则"}],"answer":"C","analysis":"本题考查组织协调的基本原则。参考《信息系统监理师教程(第2版)》第15.2小节，P359。","has_options":true},{"id":"ex_0572","chapter":"","time_label":"综合","source":"信息系统监理师_真题与练习题合集","category":"章节练习","stem":"【2023年05月 -第1题】 -第 14章信息网络系统监理基础1、计算机网络系统可以划分成网络基础平台、 网络服务平台、 网络安全平台、  (  ) 和环境平台。A 、 网络管理平台  B 、 网络调度平台  C 、 网络计费平台  D 、 网络计算平台","knowledge":"","options":[],"answer":"A","analysis":"P292-293  页信息网络系统的体系框架： (小郑口诀： 基服安管环) :  基础平台 、 网络服务平台、网络安全平 台 、 (网络管理平 台)和环境平 台。","has_options":false}];
const CHAPTERS = ["第20章", "第21章", "第22章", "第23章", "第24章", "第25章"];
const TIMES = ["2023年5月", "2024年11月", "2025年", "2025年5月", "综合"];
const LS_KEY = 'it-supervisor-wrong-book-v3';

let mode = 'list';
let filtered = [...ALL_DATA];
let quizIdx = 0;
let quizOrder = [];
let quizAnswered = false;
let wrongBook = new Set();

const chSel = document.getElementById('chapterFilter');
CHAPTERS.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; chSel.appendChild(o); });
const tSel = document.getElementById('timeFilter');
TIMES.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tSel.appendChild(o); });

function loadWrongBook() {
  try { const arr = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); wrongBook = new Set(arr); }
  catch(e) { wrongBook = new Set(); }
  updateWrongBadge();
}
function saveWrongBook() { localStorage.setItem(LS_KEY, JSON.stringify([...wrongBook])); updateWrongBadge(); }
function updateWrongBadge() { const el = document.getElementById('wrong-count'); const n = wrongBook.size; el.textContent = n ? `(${n})` : ''; }
function isWrong(id) { return wrongBook.has(id); }
function markWrong() { wrongBook.add(quizOrder[quizIdx]); saveWrongBook(); document.getElementById('btn-mark-wrong').classList.add('hidden'); document.getElementById('btn-remove-wrong').classList.remove('hidden'); }
function removeWrong() { wrongBook.delete(quizOrder[quizIdx]); saveWrongBook(); document.getElementById('btn-mark-wrong').classList.remove('hidden'); document.getElementById('btn-remove-wrong').classList.add('hidden'); }
function clearWrongBook() { if(!confirm('确定要清空所有错题吗？')) return; wrongBook.clear(); saveWrongBook(); renderWrongList(); }

function onFilterChange() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const ch = document.getElementById('chapterFilter').value;
  const tm = document.getElementById('timeFilter').value;
  filtered = ALL_DATA.filter(item => {
    if(ch && item.chapter !== ch) return false;
    if(tm && item.time_label !== tm) return false;
    if(q) { const hay = (item.stem + ' ' + item.knowledge + ' ' + item.answer + ' ' + item.analysis).toLowerCase(); return hay.includes(q); }
    return true;
  });
  if(mode === 'list') renderList();
  else if(mode === 'quiz') { quizIdx = 0; quizOrder = filtered.map(d => d.id); renderQuiz(); }
  else if(mode === 'wrong') renderWrongList();
  updateStats();
}
function updateStats() {
  const el = document.getElementById('stats');
  if(mode === 'wrong') {
    const arr = ALL_DATA.filter(d => [...wrongBook].includes(d.id));
    const ch = document.getElementById('chapterFilter').value;
    const tm = document.getElementById('timeFilter').value;
    const q = document.getElementById('search').value.trim().toLowerCase();
    let cnt = arr.filter(item => {
      if(ch && item.chapter !== ch) return false;
      if(tm && item.time_label !== tm) return false;
      if(q) { const hay = (item.stem + ' ' + item.knowledge + ' ' + item.answer + ' ' + item.analysis).toLowerCase(); return hay.includes(q); }
      return true;
    }).length;
    el.textContent = `错题: ${cnt} / ${wrongBook.size}`;
  } else {
    el.textContent = `共 ${filtered.length} 题 (选择 ${filtered.filter(d=>d.has_options).length})`;
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + m).classList.add('active');
  ['view-list','view-quiz','view-wrong'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('view-' + m).classList.remove('hidden');
  if(m === 'list') renderList();
  else if(m === 'quiz') { quizIdx = 0; quizOrder = filtered.map(d => d.id); renderQuiz(); }
  else if(m === 'wrong') renderWrongList();
  updateStats();
}

function escapeHtml(t) { return (t||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(t, q) { if(!q) return escapeHtml(t); const r = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")","gi"); return escapeHtml(t).replace(r,'<mark>$1</mark>'); }

function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const container = document.getElementById('view-list');
  container.innerHTML = '';
  if(!filtered.length) { container.innerHTML = '<div class="empty-state">没有找到匹配的题目</div>'; return; }

  filtered.forEach((item, fidx) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.id = item.id;
    const isW = isWrong(item.id);
    const metaParts = [item.chapter, item.time_label].filter(Boolean);

    let bodyHtml = '';
    if(item.knowledge) {
      bodyHtml += `<div class="knowledge-box"><span class="label">📖 知识点</span><div class="box-content">${highlight(item.knowledge, q)}</div></div>`;
    }
    bodyHtml += `<div style="font-size:1rem;font-weight:600;margin:0.75rem 0;">${highlight(item.stem, q)}</div>`;
    if(item.has_options) {
      const opts = item.options.map(o => `<div class="option"><span class="opt-label">${o.label}</span><span>${escapeHtml(o.text)}</span></div>`).join('');
      bodyHtml += `<div class="options-list">${opts}</div>`;
    }
    if(item.answer) {
      bodyHtml += `<div class="answer-box"><span class="box-label">✅ 参考答案</span><div class="box-content">${highlight(item.answer, q)}</div></div>`;
    }
    if(item.analysis) {
      bodyHtml += `<div class="analysis-box"><span class="box-label">💡 解析</span><div class="box-content">${highlight(item.analysis, q)}</div></div>`;
    }
    bodyHtml += `<div class="action-bar">
      <button class="btn btn-outline" onclick="toggleItem('${item.id}')">收起</button>
      ${isW
        ? `<button class="btn btn-success" onclick="removeWrongById('${item.id}')">已掌握</button>`
        : `<button class="btn btn-danger" onclick="addWrongById('${item.id}')">加入错题本</button>`}
    </div>`;

    div.innerHTML = `<div class="list-header" onclick="toggleItem('${item.id}')">
      <span class="num">#${fidx+1}</span>
      <div class="title">${highlight(item.stem, q)} ${isW?'<span class="wrong-badge">❌ 错题</span>':''}</div>
      <div class="meta">${metaParts.join('<br>')}</div>
    </div>
    <div class="list-body">${bodyHtml}</div>`;
    container.appendChild(div);
  });
}
function toggleItem(id) { const el = document.querySelector(`.list-item[data-id="${id}"]`); if(el) el.classList.toggle('open'); }
function addWrongById(id) { wrongBook.add(id); saveWrongBook(); renderList(); }
function removeWrongById(id) { wrongBook.delete(id); saveWrongBook(); renderList(); }

function renderQuiz() {
  if(!quizOrder.length) {
    document.getElementById('quiz-container').innerHTML = '<div class="empty-state">当前筛选条件下没有题目<br><button class="btn btn-primary" onclick="setMode('list')" style="margin-top:1rem;">返回列表</button></div>';
    return;
  }
  if(!document.getElementById('quiz-stem')) {
    document.getElementById('quiz-container').innerHTML = `
      <div class="quiz-progress"><div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-fill"></div></div><span class="quiz-progress-text" id="quiz-progress-text"></span></div>
      <div class="quiz-stem" id="quiz-stem"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div id="quiz-result-area"></div>
      <div class="quiz-nav">
        <button class="btn btn-secondary" onclick="quizPrev()">← 上一题</button>
        <div class="quiz-nav-center">
          <button class="btn btn-danger" id="btn-mark-wrong" onclick="markWrong()">标记错题</button>
          <button class="btn btn-success hidden" id="btn-remove-wrong" onclick="removeWrong()">已掌握</button>
        </div>
        <button class="btn btn-primary" onclick="quizNext()">下一题 →</button>
      </div>`;
  }
  const id = quizOrder[quizIdx];
  const item = ALL_DATA.find(d => d.id === id);
  quizAnswered = false;
  document.getElementById('quiz-progress-text').textContent = `${quizIdx+1} / ${quizOrder.length}`;
  document.getElementById('quiz-fill').style.width = `${((quizIdx+1)/quizOrder.length)*100}%`;
  let stemHtml = escapeHtml(item.stem);
  if(item.knowledge) {
    stemHtml = `<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.75rem;padding:0.5rem;background:#f8fafc;border-radius:0.5rem;"><b>📖 知识点：</b>${escapeHtml(item.knowledge)}</div>` + stemHtml;
  }
  document.getElementById('quiz-stem').innerHTML = stemHtml;
  const optsDiv = document.getElementById('quiz-options');
  optsDiv.innerHTML = '';
  if(item.has_options) {
    item.options.forEach(opt => {
      const div = document.createElement('div');
      div.className = 'quiz-opt';
      div.innerHTML = `<span class="opt-label">${opt.label}</span><span>${escapeHtml(opt.text)}</span>`;
      div.onclick = () => selectOption(opt.label, item.answer);
      optsDiv.appendChild(div);
    });
  } else {
    optsDiv.innerHTML = '<div style="color:var(--muted);padding:1rem;text-align:center;">本题无选项，请直接查看答案</div>';
  }
  document.getElementById('quiz-result-area').innerHTML = '';
  document.getElementById('btn-mark-wrong').classList.toggle('hidden', isWrong(item.id));
  document.getElementById('btn-remove-wrong').classList.toggle('hidden', !isWrong(item.id));
}
function selectOption(label, correctAnswer) {
  if(quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  const ca = (correctAnswer || '').trim();
  opts.forEach(el => {
    const l = el.querySelector('.opt-label').textContent.trim();
    el.classList.add('disabled');
    if(l === ca) el.classList.add('correct');
    else if(l === label && l !== ca) el.classList.add('wrong');
  });
  const item = ALL_DATA.find(d => d.id === quizOrder[quizIdx]);
  const isCorrect = label === ca;
  const resDiv = document.createElement('div');
  resDiv.className = 'quiz-result ' + (isCorrect ? 'correct-res' : 'wrong-res');
  let html = `<div style="font-weight:700;margin-bottom:0.5rem;">${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</div>`;
  html += `<div><b>参考答案：</b>${escapeHtml(ca || '(无)')}</div>`;
  if(item.analysis) html += `<div style="margin-top:0.5rem;"><b>💡 解析：</b>${escapeHtml(item.analysis)}</div>`;
  resDiv.innerHTML = html;
  document.getElementById('quiz-result-area').appendChild(resDiv);
  if(!isCorrect && !isWrong(item.id)) { wrongBook.add(item.id); saveWrongBook(); document.getElementById('btn-mark-wrong').classList.add('hidden'); document.getElementById('btn-remove-wrong').classList.remove('hidden'); }
}
function quizPrev() { if(quizIdx > 0) { quizIdx--; renderQuiz(); } }
function quizNext() { if(quizIdx < quizOrder.length - 1) { quizIdx++; renderQuiz(); } }

function renderWrongList() {
  const container = document.getElementById('wrong-list');
  let arr = ALL_DATA.filter(d => [...wrongBook].includes(d.id));
  const q = document.getElementById('search').value.trim().toLowerCase();
  const ch = document.getElementById('chapterFilter').value;
  const tm = document.getElementById('timeFilter').value;
  if(q || ch || tm) {
    arr = arr.filter(item => {
      if(ch && item.chapter !== ch) return false;
      if(tm && item.time_label !== tm) return false;
      if(q) { const hay = (item.stem + ' ' + item.knowledge + ' ' + item.answer + ' ' + item.analysis).toLowerCase(); return hay.includes(q); }
      return true;
    });
  }
  if(!arr.length) { container.innerHTML = '<div class="empty-state">错题本为空<br>在刷题时答错或手动标记的题目会出现在这里</div>'; return; }
  container.innerHTML = '';
  arr.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.id = item.id;
    const metaParts = [item.chapter, item.time_label].filter(Boolean);
    div.innerHTML = `<div class="list-header" onclick="toggleItem('${item.id}')">
      <span class="num">#${i+1}</span>
      <div class="title">${escapeHtml(item.stem)} <span class="wrong-badge">❌ 错题</span></div>
      <div class="meta">${metaParts.join('<br>')}</div>
    </div>
    <div class="list-body">
      ${item.answer ? `<div class="answer-box"><span class="box-label">✅ 参考答案</span><div class="box-content">${escapeHtml(item.answer)}</div></div>` : ''}
      ${item.analysis ? `<div class="analysis-box"><span class="box-label">💡 解析</span><div class="box-content">${escapeHtml(item.analysis)}</div></div>` : ''}
      <div class="action-bar">
        <button class="btn btn-outline" onclick="toggleItem('${item.id}')">收起</button>
        <button class="btn btn-success" onclick="removeWrongById('${item.id}')">已掌握，移除</button>
      </div>
    </div>`;
    container.appendChild(div);
  });
}
function startWrongReview() {
  const ids = [...wrongBook];
  let arr = ALL_DATA.filter(d => ids.includes(d.id));
  const ch = document.getElementById('chapterFilter').value;
  const tm = document.getElementById('timeFilter').value;
  if(ch || tm) {
    arr = arr.filter(item => {
      if(ch && item.chapter !== ch) return false;
      if(tm && item.time_label !== tm) return false;
      return true;
    });
  }
  if(!arr.length) { alert('当前筛选条件下没有错题'); return; }
  quizOrder = arr.map(d => d.id);
  quizIdx = 0;
  setMode('quiz');
}

document.addEventListener('keydown', e => {
  if(mode !== 'quiz') return;
  if(e.key === 'ArrowLeft') quizPrev();
  if(e.key === 'ArrowRight') quizNext();
  if(e.key >= '1' && e.key <= '4') {
    const item = ALL_DATA.find(d => d.id === quizOrder[quizIdx]);
    if(item && item.has_options && !quizAnswered) {
      const idx = parseInt(e.key) - 1;
      const labels = item.options.map(o => o.label);
      if(idx < labels.length) selectOption(labels[idx], item.answer);
    }
  }
});

loadWrongBook();
onFilterChange();
setMode('list');
</script>
</body>
</html>
