<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息系统监理师 · 练习题合集（精校版）</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #d97706;
    --bg: #f1f5f9;
    --card: #fff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  .header { background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%); color: #fff; padding: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header h1 { font-size: 1.1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .header-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .header input, .header select { padding: 0.5rem 0.75rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; min-width: 120px; background: rgba(255,255,255,0.95); }
  .header input { flex: 1; min-width: 160px; }
  .stats { font-size: 0.8rem; opacity: 0.9; }
  .mode-tabs { display: flex; gap: 0.25rem; margin-top: 0.5rem; }
  .mode-tab { padding: 0.4rem 0.9rem; border-radius: 0.375rem; border: none; background: rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .mode-tab.active { background: #fff; color: var(--primary); font-weight: 600; }
  .mode-tab:hover { background: rgba(255,255,255,0.35); }

  .container { max-width: 900px; margin: 0 auto; padding: 1rem; min-height: 60vh; }

  /* List Mode */
  .list-item { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; margin-bottom: 1rem; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.1s; }
  .list-item:hover { transform: translateY(-1px); }
  .list-header { padding: 1rem 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
  .list-header .num { background: var(--primary); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 0.25rem; white-space: nowrap; }
  .list-header .title { flex: 1; font-weight: 600; font-size: 0.95rem; line-height: 1.5; }
  .list-header .meta { font-size: 0.75rem; color: var(--muted); white-space: nowrap; text-align: right; }
  .list-body { padding: 0 1.25rem 1.25rem; display: none; border-top: 1px solid var(--border); }
  .list-item.open .list-body { display: block; }
  .list-item.open .list-header { background: #f8fafc; }

  .knowledge-box { background: #fefce8; border-left: 4px solid #eab308; padding: 0.75rem 1rem; margin: 0.75rem 0; border-radius: 0 0.5rem 0.5rem 0; font-size: 0.9rem; color: #713f12; }
  .knowledge-box .label { font-weight: 700; color: #854d0e; margin-bottom: 0.25rem; }
  .options-list { margin: 0.75rem 0; display: grid; gap: 0.5rem; }
  .option { padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: 0.5rem; cursor: pointer; transition: all 0.15s; background: #fff; display: flex; align-items: center; gap: 0.5rem; }
  .option:hover { border-color: var(--primary); background: #eff6ff; }
  .option .opt-label { font-weight: 700; color: var(--primary); min-width: 1.5rem; }
  .option.selected { border-color: var(--primary); background: #eff6ff; }
  .option.correct { border-color: var(--success); background: #f0fdf4; }
  .option.wrong { border-color: var(--danger); background: #fef2f2; }

  .answer-box { background: #eff6ff; border-left: 4px solid var(--primary); padding: 0.75rem 1rem; margin-top: 0.75rem; border-radius: 0 0.5rem 0.5rem 0; }
  .analysis-box { background: #f0fdf4; border-left: 4px solid var(--success); padding: 0.75rem 1rem; margin-top: 0.5rem; border-radius: 0 0.5rem 0.5rem 0; }
  .box-label { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.25rem; display: block; }
  .answer-box .box-label { color: var(--primary); }
  .analysis-box .box-label { color: var(--success); }
  .box-content { font-size: 0.9rem; line-height: 1.7; }

  .action-bar { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; font-weight: 500; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

  /* Quiz Mode */
  .quiz-container { background: var(--card); border-radius: 1rem; box-shadow: var(--shadow); padding: 1.5rem; min-height: 60vh; display: flex; flex-direction: column; }
  .quiz-progress { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .quiz-progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #3b82f6); border-radius: 4px; transition: width 0.3s; }
  .quiz-progress-text { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
  .quiz-stem { font-size: 1.15rem; font-weight: 600; line-height: 1.7; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
  .quiz-options { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
  .quiz-opt { padding: 1rem 1.25rem; border: 2px solid var(--border); border-radius: 0.75rem; cursor: pointer; font-size: 1rem; transition: all 0.15s; display: flex; align-items: center; gap: 0.75rem; background: #fff; }
  .quiz-opt:hover { border-color: var(--primary); background: #eff6ff; transform: translateX(4px); }
  .quiz-opt .opt-label { font-weight: 700; color: var(--primary); font-size: 1.1rem; min-width: 2rem; text-align: center; }
  .quiz-opt.correct { border-color: var(--success); background: #f0fdf4; }
  .quiz-opt.wrong { border-color: var(--danger); background: #fef2f2; }
  .quiz-opt.disabled { opacity: 0.6; pointer-events: none; }

  .quiz-result { background: #f8fafc; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; animation: fadeIn 0.3s; }
  .quiz-result.correct-res { border: 2px solid var(--success); }
  .quiz-result.wrong-res { border: 2px solid var(--danger); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 1rem; }
  .quiz-nav-center { display: flex; gap: 0.5rem; }

  .wrong-badge { display: inline-flex; align-items: center; gap: 0.25rem; background: var(--danger); color: #fff; font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 0.25rem; margin-left: 0.5rem; }

  .wrong-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .wrong-list-header h2 { font-size: 1.1rem; }

  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.5; }

  mark { background: #fef08a; padding: 0 2px; border-radius: 2px; }
  .hidden { display: none !important; }

  @media (max-width: 640px) {
    .header-row { flex-direction: column; align-items: stretch; }
    .header input { width: 100%; }
    .quiz-stem { font-size: 1rem; }
    .quiz-opt { padding: 0.85rem 1rem; font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📘 信息系统监理师 · 练习题合集（精校版）</h1>
  <div class="header-row">
    <input type="text" id="search" placeholder="搜索题目内容..." oninput="onFilterChange()">
    <select id="chapterFilter" onchange="onFilterChange()"><option value="">全部章节</option></select>
    <select id="timeFilter" onchange="onFilterChange()"><option value="">全部时间</option></select>
    <span class="stats" id="stats"></span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('list')" id="tab-list">📋 列表模式</button>
    <button class="mode-tab" onclick="setMode('quiz')" id="tab-quiz">🎯 刷题模式</button>
    <button class="mode-tab" onclick="setMode('wrong')" id="tab-wrong">❌ 错题本 <span id="wrong-count"></span></button>
  </div>
</div>

<div class="container">
  <div id="view-list"></div>
  <div id="view-quiz" class="hidden">
    <div class="quiz-container" id="quiz-container">
      <div class="quiz-progress">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-fill"></div></div>
        <span class="quiz-progress-text" id="quiz-progress-text">1 / 100</span>
      </div>
      <div class="quiz-stem" id="quiz-stem"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div id="quiz-result-area"></div>
      <div class="quiz-nav">
        <button class="btn btn-secondary" onclick="quizPrev()">← 上一题</button>
        <div class="quiz-nav-center">
          <button class="btn btn-danger" id="btn-mark-wrong" onclick="markWrong()">标记错题</button>
          <button class="btn btn-success hidden" id="btn-remove-wrong" onclick="removeWrong()">已掌握</button>
        </div>
        <button class="btn btn-primary" onclick="quizNext()">下一题 →</button>
      </div>
    </div>
  </div>
  <div id="view-wrong" class="hidden">
    <div class="wrong-list-header">
      <h2>❌ 我的错题本</h2>
      <div>
        <button class="btn btn-primary" onclick="startWrongReview()">🎯 开始复习</button>
        <button class="btn btn-secondary" onclick="clearWrongBook()">清空</button>
      </div>
    </div>
    <div id="wrong-list"></div>
  </div>
</div>

传输功能； ③检测掉电后系统启用备用电源应急工作的准确性、实时性、信息的存储和恢复能力； ④通过系统主机、出入口(门禁)控制器及其他控制终端，实时监控出入控制点的人员状况； ⑤系统对非法强行入侵及时报警的能力； ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生； ⑦出入口管理系统的数据存储记录保存时间应满足管理要求。——D正确。 出入口控制(门禁)系统的软件检测。具体包括： ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，包括： a 软件设计与需求的一致性； b 程序与软件设计的一致性； c 文档描述与程序的一致性、完整性、准确性和标准化程度等。 第2版第21章习题38: 入口控制(门禁)系统的软件检测。具体包括以下哪些（____）。 ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论。 ⑤系统对非法强行入侵及时报警的能力。 ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生。 【参考答案】D 【点评】出入口控制(门禁)系统的软件检测。具体包括： ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，——D正确。包括： a 软件设计与需求的一致性； b 程序与软件设计的一致性； c 文档描述与程序的一致性、完整性、准确性和标准化程度等。 第2版第21章习题39: 以下属于安全防范系统工程视频监控系统的监理要点的是（____）。 ①系统功能检测 ②图像质量检测 ③系统整体功能检测 ④系统联动功能检测应包括与出入口控制(门禁)系统、入侵报警系统、巡更管理系统等的联动控制功能 ⑤视频安全防范监控系统的图像记录保存时间应满足管理要求 【参考答案】A 【点评】安全防范系统工程视频监控系统的监理要点具体如下：","has_options":true},{"id":"ex_0019","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"8.系统功能与主要性能检验应由具有检测资质的机构检测，并出具检测报告，检测内容、合格判据应执行GB/T9361《计算机场地安全要求》的有关规定。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0020","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"7.检查现场的设备安装必须符合GB/T2887《计算机场地通用规范》的有关规定和设计文件要求。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0021","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"通用布缆系统工程验收阶段的监理内容具体有哪些？","knowledge":"6. 施工过程的监理。 实施过程监理关注点（常考：参数）： ①机架、配线箱等设备的规格、容量、位置应符合设计文件要求，垂直偏差度不应大于3mm。 ②为便于施工和维护人员操作，机柜单排安装时，前面净空不应小于1000mm，后面及侧面净空不应小于800mm；多排安装时，列间距不应小于1200mm。以便人员施工、维护和通行。相邻机架设备应靠近，同列机架和设备的机面应排列平齐。 ③在数据中心的主机房内通道与设备间的距离还应符合下列规定： a 用于搬运设备的通道净宽不应小于1.5m。 b 面对面布置的机柜(架)正面之间的距离不宜小于1.2m。 c 背对背布置的机柜(架)背面之间的距离不宜小于0.8m。 d 当需要在机柜(架)侧面和后面维修测试时，机柜(架)与机柜(架)、机柜(架)与墙之间的距离不宜小于1.0m。 e 成行排列的机柜(架)，其长度超过6m时，两端应设有通道；当两个通道之间的距离超过15m时，在两个通道之间还应增加通道。通道的宽度不宜小于1m，局部可为0.8m。 ④在公共场所安装配线箱时，壁嵌式箱体底面距地不宜小于1.5m，墙挂式箱体底面距地不宜小于1.8m。 ⑤缆线桥架的安装应符合下列规定： a 安装位置应符合施工图要求，左右偏差不应超过50mm； b 安装水平度每米偏差不应超过2mm； c 垂直安装应与地面保持垂直，垂直度偏差不应超过3mm； d 桥架截断处及拼接处应平滑、无毛刺； e 吊架和支架安装应保持垂直，整齐牢固，无歪斜现象； f 金属桥架及金属导管各段之间应保持连接良好，安装牢固； g 采用垂直槽盒布放缆线时，支撑点宜避开地面沟槽和槽盒位置，支撑应牢固。 习题32续：","options":[{"label":"A","text":"①②⑤⑥。 B.①③④⑤⑥。 C.①②③④⑤⑥。 D.①②③④⑤。"},{"label":"A","text":"①⑤。 B.②③④⑤。 C.①②③④⑤。 D.①②③。"}],"answer":"","analysis":"通用布缆系统工程验收阶段的监理内容具体如下：①工程自测。②竣工文档的审查。 (1) 工程自测。 承建单位应对完成的工程进行自测，监理机构对承建单位的自测进行检查，具体如下： ●检查承建单位的测试仪器的有效性和可用性； ●要求承建单位对通用布缆系统工程包括的所有链路进行测试，并提交自测报告； ●审核承建单位提交的测试报告，测试应符合设计方案依据的验收标准； ●对于测试不合格的链路，监理机构应要求承建单位在测试报告中记录，采取整改措施，直至复测合格； ●监理机构应对布缆系统、无线信号进行抽检测试，验证承建单位施工及测试记录，采取整改措施，并向业主单位提交抽检测试报告。 (2) 竣工文档的审查。 通用布缆系统工程中，承建单位的竣工文档主要包括以下内容： ●承建合同，招标文件，投标文件，设计方案，工程实施组织设计方案，工程施工报告，隐蔽工程记录，变更记录，自测报告，信息点分布图(表)，园区、楼宇、水平配线表，楼层平面图及无线设备点位图，无线设备信息表，竣工图纸等。 习题33续： 第2版第21章习题34：以下属于计算机网络系统工程设计阶段的监理内容的是（ ）。 ①系统需求分析的审核。 ②工程设计方案的审核。 ③工程设计方案中网络基础设施的审核。 ④工程设计方案中网络服务的审核。 ⑤工程设计方案中网络管理系统的审核。 ⑥网络安全性设计的审核。 【参考答案】C 【点评】计算机网络系统工程设计阶段的监理内容具体如下： ①系统需求分析的审核。 ②工程设计方案的审核。 ③工程设计方案中网络基础设施的审核。 ④工程设计方案中网络服务的审核。 ⑤工程设计方案中网络管理系统的审核。 ⑥网络安全性设计的审核。——C正确。 习题34续： 第2版第21章习题35：以下属于计算机网络系统工程实施阶段的监理内容的是（ ）。 计算机网络系统工程实施阶段的监理内容具体如下： ①工程实施方案的审核。 ②工程实施过程的监理。 ③主要设备到货验收的监理。 ④系统安装调试的监理。 ⑤验收测试的监理。 【参考答案】C 【点评】计算机网络系统工程实施阶段的监理内容具体如下：","has_options":true},{"id":"ex_0022","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"6.安全防范系统的电缆桥架、电缆沟、电缆竖井、电线导管的施工及线缆敷设应符合GB/T2887《计算机场地通用规范》的有关规定，如有特殊要求应以设计施工图为准。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0023","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"5. 线材、连接硬件验收。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0024","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"5. 验收测试的监理。——C正确。 习题35续：（页面内容较少，为习题35的延续部分） 计算机网络系统工程实施阶段监理内容对应教材第490页。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0025","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"5.安全防范系统线缆敷设、设备安装前，现场应具备下列条件:预埋管、预件、桥架等的安装符合设计要求，机房、弱电竖井的施工已结束。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0026","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"5.安全防范系统线缆敷设、设备安装前，现场应具备下列条件：预埋管、预件、桥架等的安装符合设计要求，机房、弱电竖井的施工已结束。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0027","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"安全防范系统工程入侵报警系统的监理要点，以下哪些属于？（ ） ①探测器的盲区检测，防动物侵入功能检测。 ②探测器的防破坏功能检测应包括报警器的防拆报警功能，信号线开路、短路报警功能，电源线被剪的报警功能。 ③探测器的灵敏度检测。 ④系统功能检测应包括系统的布设、撤出功能，关机报警功能，系统后备电源自动切换功能等。 ⑤系统通信功能检测应包括报警信息传输，报警响应功能。 ⑥报警系统报警事件存储记录的保存时间应满足管理要求。 ⑦报警系统管理软件(含电子地图)功能检测。 ⑧报警信号联网上传功能的检测。","knowledge":"5.视频安全防范监控系统的图像记录保存时间应满足管理要求。——A 正确。","options":[{"label":"A","text":"②③④⑤⑥⑦。"},{"label":"B","text":"③④⑤⑥⑦⑧。"},{"label":"C","text":"①②③⑥⑦⑧。"},{"label":"D","text":"①②③④⑤⑥⑦⑧。"}],"answer":"D","analysis":"","has_options":true},{"id":"ex_0028","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"4. 承建单位质量保证措施的审核。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0029","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"4. 系统安装调试的监理。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0030","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"4.督促承建单位完善质量保证体系，把影响工序质量的因素都纳入受控状态。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0031","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"4.系统联动功能检测应包括与出入口控制(门禁)系统、入侵报警系统、巡更管理系统等的联动控制功能。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0032","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3.通用布缆系统:能支持广泛应用范围的结构化信息布缆系统,一般由双绞线、光缆、同轴电缆、无线等传输媒体组成。----C 正确。(含水平子系统、工作区子系统、管理子系统、垂直子系统、建筑群子系统、设备间子系统) 重点：","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0033","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3. 施工准备的审核。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0034","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3. 主要设备到货验收的监理。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0035","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3.检查承建单位用于工程的材料、构配件应符合国家相应的法律法规和标准规范的要求,并与正式设计文件、合同的内容相符合，设备及器材的进场验收按照GB50339《智能建筑工程质量验收规范》的相关规定执行。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0036","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3.系统整体功能检测: ①功能检测应包括视频安全防范监控系统的监控范围，矩阵监控主机的切换、控制、编程、巡检、记录等功能； ②对数字视频录像式监控系统，还应检查主机死机记录，图像显示和记录速度，图像质量，对前端设备的控制功能，通信接口功能，远端联网功能等； ③对数字硬盘录像监控系统，除检测其记录速度外，还应检测记录的检索、回放等功能。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0037","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3. 主要设备到货验收的监理。 ①监理机构应组织对承建单位提供的主要网络设备、产品及服务进行验收。 ②对于数量较大的同类产品，监理机构可进行抽验检查。 ③监理机构应从如下方面对主要网络设备进行到货验收，并提出监理意见： ●外包装检查； ●开箱检查，包括设备型号、类别、数量、附件及文档等； ●记录各个产品的唯一性标识，例如产品序列号等； ●必要时，可确认主要设备的合法性； ●对设备的配置信息等进行加电自测试；","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0038","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"3.检查承建单位用于工程的材料、构配件应符合国家相应的法律法规和标准规范的要求,并与正式设计文件、合同的内容相符合，设备及器材的进场验收按照GB503339《智能建筑工程质量验收规范》的相关规定执行。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0039","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下说法错误的是（ ）。","knowledge":"2.电子设备机房系统包含：①安全防范系统工程②环境系统工程③动力环境监控系统工程","options":[{"label":"A","text":"隐蔽工程是指基础设施工程施工过程中，施工后形成的不可见的部分。"},{"label":"B","text":"抽检测试是指按照约定的抽样原则，对工程所用材料或需要检测的部分进行检查或测试的监理活动。"},{"label":"C","text":"通用布缆系统是指能支持广泛应用范围的结构化信息布缆系统，一般由双绞线、光缆、同轴电缆、无线等传输媒体组成。"},{"label":"D","text":"信息系统工程基础设施包括通用布缆系统和计算机网络系统。"}],"answer":"D","analysis":"隐蔽工程:基础设施工程施工过程中，施工后形成的不可见的部分。----A正确。 抽检测试:按照约定的抽样原则，对工程所用材料或需要检测的部分进行检查或测试的监理活动。----B正确。 通用布缆系统:能支持广泛应用范围的结构化信息布缆系统，一般由双绞线、光缆、同轴电缆、无线等传输媒体组成。----C正确。 信息系统工程基础设施包括:①通用布缆系统②计算机网络系统③电子设备机房系统。----D错误，还包括电子设备机房系统。","has_options":true},{"id":"ex_0040","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"2.抽检测试:按照约定的抽样原则,对工程所用材料或需要检测的部分进行检查或测试的监理活动。----B 正确。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0041","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下内容属于通用布缆系统工程的是（ ）。 ①保护设施的安装和检查。②机柜、机架的安装和检查。③信息插座的安装和检查。④连接硬件的安装和检查。⑤线缆敷设和检查。⑥设备和线缆的标识、记录的检测等。","knowledge":"2.电子设备机房系统包含:①安全防范系统工程②环境系统工程③动力环境监控系统工程","options":[{"label":"A","text":"④⑤⑥。"},{"label":"B","text":"①②③⑤⑥。"},{"label":"C","text":"①④⑤⑥。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"D","analysis":"通用布缆系统工程包括但不限于如下内容：①保护设施的安装和检查；②机柜、机架的安装和检查；③信息插座的安装和检查；④连接硬件的安装和检查;⑤线缆敷设和检查;⑥设备和线缆的标识、记录的检测等。----D正确。","has_options":true},{"id":"ex_0042","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"2. 工程分包的审核。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0043","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"2. 工程实施过程的监理。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0044","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"2.督促承建单位对各类探测器、控制器、执行器等部件的电气性能和功能进行自检，自检采用逐点测试的形式进行。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0045","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"2.图像质量检测:在摄像机标准照度下进行图像清晰度及抗干扰能力的检测。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0046","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下属于安全防范系统工程视频监控系统的监理要点的是（ ）。 ①系统功能检测 ②图像质量检测 ③系统整体功能检测 ④系统联动功能检测应包括与出入口控制(门禁)系统、入侵报警系统、巡更管理系统等的联动控制功能 ⑤视频安全防范监控系统的图像记录保存时间应满足管理要求","knowledge":"2. 入口控制(门禁)系统的软件检测。具体包括： ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，——D 正确。包括： a 软件设计与需求的一致性； b 程序与软件设计的一致性； c 文档描述与程序的一致性、完整性、准确性和标准化程度等。","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①④⑤。"},{"label":"C","text":"②③④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"A","analysis":"","has_options":true},{"id":"ex_0047","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.信息系统工程基础设施包括：①通用布缆系统②计算机网络系统③电子设备机房系统。----不包括A，A属于信息系统工程基础设施。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0048","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.隐蔽工程:基础设施工程施工过程中,施工后形成的不可见的部分。----A 正确。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0049","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.信息系统工程基础设施包括:①通用布缆系统②计算机网络系统③电子设备机房系统。----D 错误,还包括电子设备机房系统。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0050","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"计算机网络系统工程包括以下哪些内容（ ）。 ①网络系统的体系结构和网络拓扑的设计。②网络地址、路由规划和子网划分。③网络系统的接口和整体连通性设计。④网络安全性、可靠性设计。⑤设备和线缆的标识、记录的检测。⑥设备安装、调试和网络系统集成成的检查。","knowledge":"1.通用布缆系统工程包括但不限于如下内容:①保护设施的安装和检查;②机柜、机架的安装和检查;③信息插座的安装和检查;④连接硬件的安装和检查;⑤线缆敷设和检查;⑥设备和线缆的标识、记录的检测等。----D 正确。","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①②③④⑥。"},{"label":"D","text":"①②③⑥。"}],"answer":"C","analysis":"计算机网络系统工程包括但不限于如下内容①网络系统的体系结构和网络拓扑的设计；②网络地址、路由规划和子网划分；③网络系统的接口和整体连通性设计；④网络安全性、可靠性设计；⑤设备安装环境和条件的检查，应检查主要网络设备的安放环境是否符合设备的运行要求；⑥设备安装、调试和网络系统集成成的检查；⑦工程实施的安全性检查等。----C正确。 计算机网络系统工程：","has_options":true},{"id":"ex_0051","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"电子设备机房系统工程包括以下哪些内容（ ）。 ①供配电系统工程。②空调系统工程。③消防系统工程。④安全防范系统工程。⑤环境系统工程。⑥动力环境监控系统工程。","knowledge":"1.计算机网络系统工程包括但不限于如下内容①网络系统的体系结构和网络拓扑的设计;②网络地址、路由规划和子网划分;③网络系统的接口和整体连通性设计;④网络安全性、可靠性设计;⑤设备安装环境和条件的检查，应检查主要网络设备的安放环境是否符合设备的运行要求;⑥设备安装、调试和网络系统集成成的检查;⑦工程实施的安全性检查等。----C 正确。","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①②④⑤⑥。"},{"label":"D","text":"①②③④。"}],"answer":"B","analysis":"在信息系统工程中，电子设备机房系统工程是为了保证计算机、电信等所有电子设备的安全有效运行而提供的配套工程，包括但不限于如下内容:①供配电系统工程;②空调系统工程③消防系统工程④安全防范系统工程;⑤环境系统工程;⑥动力环境监控系统工程。----B正确。 电子设备机房系统工程：","has_options":true},{"id":"ex_0052","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下是基础设施工程招标阶段的主要监理活动的有（ ）。 ①协助业主单位明确工程需求。②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划。③宜了解业主单位估算的工程总投资，了解招投标分包策略。④对本阶段的工作进度提出监理意见。⑤妥善保管招标阶段所产生的与监理相关的文档资料。⑥协助业主单位参与招标文件的编制或对招标文件提出监理意见。","knowledge":"1.在信息系统工程中，电子设备机房系统工程是为了保证计算机、电信等所有电子设备的安全有效运行而提供的配套工程，包括但不限于如下内容:①供配电系统工程;②空调系统工程③消防系统工程④安全防范系统工程;⑤环境系统工程;⑥动力环境监控系统工程。----B 正确。 (机房工程整体解决方案：精密空调系统、配电列头柜系统、消防报警系统、新风系统、空调系统、UPS系统、视频CCTV系统、消防检测系统、消防系统、综合布线系统、门禁系统、照明系统、防火玻璃隔断、门禁管理系统、红外防盗系统、地板系统、供配电系统、天花骨架、集中监控系统)","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①③④⑤⑥。"},{"label":"D","text":"①②③⑥。"}],"answer":"B","analysis":"基础设施工程招标阶段的主要监理活动如下： ①协助业主单位明确工程需求； ②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划； ③宜了解业主单位估算的工程总投资，了解招投标分包策略； ④协助业主单位参与招标文件的编制或对招标文件提出监理意见； ⑤可协助评标，对投标文件与招标文件的符合性及投标文件的合理性提出监理意见； ⑥对本阶段的工作进度提出监理意见； ⑦参与承建合同的签订过程，促使合同相关条款符合业主单位招标文件的要求； ⑧与业主单位、承建单位以及相关单位建立信息沟通和协调机制，明确本阶段需要各方提交的文档； ⑨妥善保管招标阶段所产生的与监理相关的文档资料，包括需求说明、招投标文件和监理文档等。----B正确。","has_options":true},{"id":"ex_0053","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"基础设施工程招标阶段的主要监理内容，以下说法错误的是（ ）。","knowledge":"1.基础设施工程招标阶段的主要监理活动如下: ①协助业主单位明确工程需求; ②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划; ③宜了解业主单位估算的工程总投资，了解招投标分包策略; ④协助业主单位参与招标文件的编制或对招标文件提出监理意见; ⑤可协助评标，对投标文件与招标文件的符合性及投标文件的合理性提出监理意见； ⑥对本阶段的工作进度提出监理意见； ⑦参与承建合同的签订过程，促使合同相关条款符合业主单位招标文件的要求； ⑧与业主单位、承建单位以及相关单位建立信息沟通和协调机制，明确本阶段需要各方提交的文档； ⑨妥善保管招标阶段所产生的与监理相关的文档资料，包括需求说明、招投标文件和监理文档等。——B正确。","options":[{"label":"A","text":"梳理工程需求。"},{"label":"B","text":"质量控制。"},{"label":"C","text":"招标文件的监理。"},{"label":"D","text":"承建合同的监理。"}],"answer":"B","analysis":"基础设施工程招标阶段的主要监理内容如下：①梳理工程需求②招标文件的监理③承建合同的监理——不包括B。","has_options":true},{"id":"ex_0054","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"通常情况下，招标文件技术需求部分的要点内容有以下哪些（ ）。 ①工程/项目总的需求。②投标单位的资质要求。③工程/项目的技术和质量要求。④工程/项目的时间和进度要求。⑤主要设备、产品及服务的要求。⑥验收方法、移交规程。⑦投标文件的要求。⑧分包合同的要求。⑨合同主要条款约定要求。⑩可以向所有投标单位公布的有关评分规则等。","knowledge":"1.梳理工程需求 监理机构应依据项目概算批复文件及初步设计方案，从如下几个方面梳理业主单位对基础设施工程的需求： ①工程建设目标；②工程建设范围；③基础设施工程中的功能、性能和安全需求；④工程投资规模；⑤工程进度计划；⑥工程建设应遵循的法律、法规、技术标准和管理标准；⑦若存在现有基础设施，应考虑目标系统与现有系统的兼容性，以保护业主单位的原有投资。——A正确。","options":[{"label":"A","text":"④⑤⑥⑦⑧⑨⑩。"},{"label":"B","text":"①②③④⑤⑥⑦⑧⑨⑩。"},{"label":"C","text":"①②③④⑤⑥⑦⑧。"},{"label":"D","text":"①②③⑤⑥⑧⑨。"}],"answer":"B","analysis":"通常情况下，招标文件技术需求部分的要点内容如下：①工程/项目总的需求；②投标单位的资质要求；③工程/项目的技术和质量要求；④工程/项目的时间和进度要求；⑤主要设备、产品及服务的要求；⑥验收方法、移交规程；⑦投标文件的要求；⑧分包合同的要求；⑨合同主要条款约定要求；⑩可以向所有投标单位公布的有关评分规则等。——B正确。","has_options":true},{"id":"ex_0055","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"监理机构参与承建合同的签订，协助业主单位对承建合同的如下哪些内容进行检查（ ）。 ①工程建设目标、范围。②业主单位和承建单位的责任、权利和义务。③工程使用的主要技术标准。④基础设施工程中各系统的功能和性能要求、测试和验收要求。⑤要求承建单位按照项目管理计划实施项目。⑥明确监理机构在工程款支付中的作用和操作手续。","knowledge":"1.招标文件的监理 (1)监理机构应协助业主单位，根据初步设计方案概算清单编制采购工程量清单，分项设计设备、系统的技术指标，作为基础设施工程项目招标的技术要求。 (2)通常情况下，招标文件技术需求部分的要点内容如下：①工程/项目总的需求；②投标单位的资质要求；③工程/项目的技术和质量要求；④工程/项目的时间和进度要求；⑤主要设备、产品及服务的要求；⑥验收方法、移交规程；⑦投标文件的要求；⑧分包合同的要求；⑨合同主要条款约定要求；⑩可以向所有投标单位公布的有关评分规则等。——B正确。","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①③⑤。"},{"label":"C","text":"②④⑥。"},{"label":"D","text":"①②③④。"}],"answer":"A","analysis":"监理机构参与承建合同的签订，协助业主单位对承建合同的如下内容进行检查：①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。——B正确。（注：原答案点评写的B正确，但实际应为A正确）","has_options":true},{"id":"ex_0056","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"承建合同的监理机构参与承建合同的签订，协助确定合同付款约定。参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的（ ），不高于合同金额的（ ）；进度款按不低于工程价款的（ ），不高于工程价款的（ ）向承包人支付工程进度款。","knowledge":"1.承建合同的监理 监理机构参与承建合同的签订，协助业主单位对承建合同的如下内容进行检查： ①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。 对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。","options":[{"label":"A","text":"30%、30%、60%、90%。"},{"label":"B","text":"10%、50%、60%、90%。"},{"label":"C","text":"10%、30%、60%、90%。"},{"label":"D","text":"30%、50%、60%、90%。"},{"label":"A","text":"①③⑤⑥。"},{"label":"B","text":"②③④⑤⑥。"},{"label":"C","text":"①②③④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"C","analysis":"对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。——C正确。 承建合同的监理（续）： ①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。 对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。——C正确。 第2版第21章习题12：以下是基础设施工程设计阶段的主要监理活动的有（ ）。 ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程 ②确定工程/项目各方往来文档的种类、格式、签批人等事宜 ③协助业主单位组织、评审承建单位制订的计划、设计方案 ④协助业主单位组织设计交底工作，记录交底结果 ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见 ⑥审核工程设计方案，并提出监理意见等。 【参考答案】C 【点评】基础设施工程设计阶段的主要监理活动如下： ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程； ②确定工程/项目各方往来文档的种类、格式、签批人等事宜； ③协助业主单位组织、评审承建单位制订的计划、设计方案； ④监督承建单位系统需求分析过程，促使需求具备正确性、完备性、可测试性和一致性； ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见； ⑥协助业主单位组织设计交底工作，记录交底结果； ⑦审核设计变更的合理性，并对变更引起的质量、进度和投资变化提出监理意见，协调业主单位和承建单位就设计变更内容达成一致； ⑧审核工程设计方案，并提出监理意见等。——C正确。","has_options":true},{"id":"ex_0057","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下属于基础设施工程设计阶段的主要监理内容有（ ）。 ①质量控制 ②投资控制 ③文档资料管理 ④协调 ⑤梳理工程需求 ⑥承建合同的监理","knowledge":"1.基础设施工程设计阶段的主要监理活动如下： ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程； ②确定工程/项目各方往来文档的种类、格式、签批人等事宜； ③协助业主单位组织、评审承建单位制订的计划、设计方案； ④监督承建单位系统需求分析过程，促使需求具备正确性、完备性、可测试性和一致性； ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见； ⑥协助业主单位组织设计交底工作，记录交底结果； ⑦审核设计变更的合理性，并对变更引起的质量、进度和投资变化提出监理意见，协调业主单位和承建单位就设计变更内容达成一致； ⑧审核工程设计方案，并提出监理意见等。——C正确。","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"③④⑤⑥。"},{"label":"C","text":"②③④⑤⑥。"},{"label":"D","text":"①②③④。"}],"answer":"D","analysis":"基础设施工程设计阶段的主要监理内容如下①质量控制②投资控制③文档资料管理④协调——D 正确,不包括⑤⑥。","has_options":true},{"id":"ex_0058","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"在质量控制方面的主要监理内容包括以下哪些（ ）。 ①审查设计人员的执业资格是否能够满足设计工作要求。②检查勘察、测量设备是否满足勘察、测量要求。③审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。④检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。","knowledge":"1.质量控制 在质量控制方面的主要监理内容包括： (1) 审查设计人员的执业资格是否能够满足设计工作要求。 (2) 检查勘察、测量设备是否满足勘察、测量要求。 (3) 审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。 (4) 检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。 (5) 审查工程设计方案的如下内容： ●审查设计文件:是否符合合同要求和设计规范，勘查成果是否能够作为初步设计和施工 ●图设计的依据，施工图设计文件能否指导施工； ●审查设计说明:工程概况、设计依据、技术方案措施及总体要求是否合理，内容是否详尽； ●审查设计图纸:是否符合机房、网络、管线路由的实际情况，是否详细具体，设计审核责任人签字是否齐全；——D正确 审查概预算编制是否符合相关规定，能否满足工程项目的投资需求。 (6) 组织承建单位确认工程建设目标、关键部位、工艺工序质量要求、进度要求，督促承建单位制订项目计划，适时开展深化设计活动。 (7) 协助业主单位组织设计交底工作，具体包括： ●设计会审交底前应让相关参建方到现场考察，核对设计图纸，审查设计文件，并征求参建各方意见； ●召开设计技术交底会，澄清设计技术细节，并做会议纪要； ●审查设计人员是否对会审交底的意见做出说明，并形成会议纪要，按照要求由设计人员修改设计文件，并对修改文件进行核查。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②③。"},{"label":"C","text":"①④。"},{"label":"D","text":"①②③。"},{"label":"A","text":"审查设计人员的执业资格是否能够满足设计工作要求。"},{"label":"B","text":"协助业主制定建设工程造价目标。"},{"label":"C","text":"审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化。"},{"label":"D","text":"宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案。"}],"answer":"A","analysis":"在质量控制方面的主要监理内容包括：(1)审查设计人员的执业资格是否能够满足设计工作要求。(2)检查勘察、测量设备是否满足勘察、测量要求。(3)审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。(4)检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。——A正确。 第2版第21章习题16：以下不是在投资控制方面的主要监理的内容的是（ ）。 【参考答案】A 【点评】投资控制 在投资控制方面的主要监理的内容包括： (1) 协助业主制定建设工程造价目标； (2) 审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化； (3) 宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案；——选A，不包括A。 投资控制：","has_options":true},{"id":"ex_0059","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"以下哪个不是在协调方面要做到的点（ ）。","knowledge":"1.投资控制 在投资控制方面的主要监理的内容包括： (1) 协助业主制定建设工程造价目标； (2) 审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化； (3) 宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案；——选A，不包括A。","options":[{"label":"A","text":"做好设计阶段文档收集、分类、分析、存储、传递和应用等工作，保证设计文档收集及时、准确、完整。"},{"label":"B","text":"配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作。"},{"label":"C","text":"监控设计资料和设计文件的交付进度。"},{"label":"D","text":"审查设计文件中所列设备、材料价格、用量的合理性。"}],"answer":"A","analysis":"协调:在协调方面要做到以下几点: (1) 配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作; (2) 监控设计资料和设计文件的交付进度; (3) 审查设计文件中所列设备、材料价格、用量的合理性。——选A，不包括A。","has_options":true},{"id":"ex_0060","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.文档资料管理: 做好设计阶段文档收集、分类、分析、存储、传递和应用等工作，保证设计文档收集及时、准确、完整。 协调：","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0061","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.协调:在协调方面要做到以下几点: (1) 配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作; (2) 监控设计资料和设计文件的交付进度; (3) 审查设计文件中所列设备、材料价格、用量的合理性。——选A，不包括A。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0062","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1. 工程实施组织设计方案的审核。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0063","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1. 工程实施方案的审核。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0064","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.安全防范施工质量检查和观感质量验收，应根据合同技术文件、设计施工图纸，从以下几个方面进行监理： ①电(光)缆敷设与布线应检验管线的防水、防潮，电缆排列位置，布放、绑扎质量，桥架的架设质量，缆线在桥架内的安装质量，焊接及插接头安装质量和接线盒接线质量等； ②对接地线应检验接地材料、接地线焊接质量、接地电阻等； ③对系统的各类探测器、摄像机、云台、防护罩、控制器、辅助电源、电锁、对讲设备等的安装部位、安装质量和观感质量等进行检验，应符合GB/T2887《计算机场地通用规范》的有关规定； ④同轴电缆的敷设，摄像机、机架、监视器等的安装质量检验，应符合GB/T2887《计算机场地通用规范》的有关规定； ⑤控制柜/箱与控制台的安装质量检验，应符合GB/T2887《计算机场地通用规范》的有关规定。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0065","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1.系统功能检测:云台转动，镜头、光圈的调节，调焦变倍，图像切换，防护罩功能的检测。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0066","chapter":"第21章","time_label":"2025年","source":"第2版 监理练习题(第21章)","category":"章节练习","stem":"1. 出入口控制(门禁)系统的功能检测。具体包括： ①系统主机在离线的情况下，出入口(门禁)控制器独立工作的准确性、实时性和储存信息的功能； ②系统主机对出入口(门禁)控制器在线控制时，出入口(门禁)控制器工作的准确性、实时性和储存信息的功能，以及出入口(门禁)控制器和系统主机之间的信息传输功能； ③检测掉电后系统启用备用电源应急工作的准确性、实时性、信息的存储和恢复能力； ④通过系统主机、出入口(门禁)控制器及其他控制终端，实时监控出入控制点的人员状况； ⑤系统对非法强行入侵及时报警的能力； ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生； ⑦出入口管理系统的数据存储记录保存时间应满足管理要求。——D 正确。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0067","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.1 概述 【点评】基础设施。具体包括：①为软件运行提供基础运行环境的设施，例如综合布线系统、电子设备机房等；为软件提供安全网络环境的设备设施，例如路由器、交换机、防火墙；②入侵检测器、负载均衡器、电信线路等；③计算机设备，例如服务器、存储设备等；④安装运行在计算机硬件中、支撑应用软件运行的系统软件，例如操作系统软件、数据库软件、中间件等。——A 正确。","knowledge":"","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"①③④。"},{"label":"C","text":"①②④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0068","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.1 概述 【点评】应用软件。具体包括：①通用软件，例如企业管理软件、辅助设计与辅助制造软件等；——A 错误。②行业应用软件，例如通信软件、金融财税软件、工业控制软件等。——B、D 正确。信息安全。具体包括：①信息安全咨询，例如信息安全规划、信息安全管理体系优化、信息安全风险评估；②信息安全实施，例如信息安全加固和优化、信息安全检查和测试、信息安全监控；③信息安全管理及培训。——C 正确。","knowledge":"","options":[{"label":"A","text":"企业管理软件属于行业应用软件。"},{"label":"B","text":"金融财税软件属于行业应用软件。"},{"label":"C","text":"信息安全。具体包括：①信息安全咨询 ②信息安全实施 ③信息安全管理及培训。"},{"label":"D","text":"通信软件属于行业应用软件。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0069","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.1 概述 【点评】运行维护监理：监理单位受业主单位委托，依据国家有关法律法规、标准规范和监理合同，对信息系统完成建设并投入使用后的运行维护工作实施的监督管理。——B 错误。打桩的是：调研评估监理。","knowledge":"","options":[{"label":"A","text":"优化改善监理：对于运行维护对象的功能和性能调优工作，监理机构实施的监理。"},{"label":"B","text":"运行维护监理：对于运行维护对象的调查研究或分析评价工作，监理机构实施的监理。"},{"label":"C","text":"响应支持监理：对于运行维护服务请求或故障申报的即时处理工作，监理机构实施的监理。"},{"label":"D","text":"例行操作监理：对于运行维护中的日常预定工作，监理机构实施的监理。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0070","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.1.1 基本概念 【点评】运行维护监理服务的实际工作，总结出了\"四控、五管、一协调\"的运行维护监理方法论，具体包括：（运维监理特有：背：质进投安 合文配应效 协调）①质量控制 ②进度控制 ③投资控制 ④安全控制 ⑤合同管理 ⑥文档资料管理 ⑦配置管理 ⑧应急管理 ⑨效能管理 ⑩组织协调。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0071","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.1.2 运行维护监理与建设监理的对比 点评:背) 1. 三控：(质进投) ①质量控制(10章) | ②进度控制(11章) ③投资控制(12章) 2. 两管：(合信) ①合同管理(13章) ②信息管理(14章)】","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0072","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.2 运行维护-招标阶段监理工作 《信息系统监理师教程 第2版》 第581页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0073","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.2.1 运行维护-招标阶段-监理活动 【点评】运行维护招标阶段的主要监理内容如下：①明确运行维护需求（和活动一样）②协助业主单位招标（和活动一样）③合同及SLA监理（和活动一样）","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0074","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.2.2 运行维护-招标阶段-监理内容 【点评】监理机构应协助业主单位进行招标工作，具体如下:(熟读/背 蓝色字体)(1) 在业主单位许可及授意下，可参与招标文件的编制工作，对招标文件中的技术和质量要求、服务级别、投标单位资质要求、应急响应、交付、评估方法等提出监理意见。——A 正确。重点审核招标文件 以下内容：●投标单位能力证明文件的要求是否合理，与业主单位需求是否一致，招标文件中所附运行维护服务合同模板的通用条款和专项条款是否合理；●运行维护服务要求是否满足业主单位需求、关键技术标准和服务标准；●评标标准是否合理。——D错误，属于。(2) 在业主单位的授权下，可参与招标答疑工作，协助业主单位对运行维护服务所涉及的服务要求、技术指标向投标单位解释，并保存会议纪要和相关文件。——B正确。(3) 在业主单位的授权下，可协助业主单位参与评标活动，对于投标文件与招标文件的符合性及投标文件的合理性提出监理意见。——C正确。","knowledge":"","options":[{"label":"A","text":"在业主单位许可及授意下，可参与招标文件的编制工作，对招标文件中的技术和质量要求、服务级别、投标单位资质要求、应急响应、交付、评估方法等提出监理意见。"},{"label":"B","text":"在业主单位的授权下，可参与招标答疑工作，协助业主单位对运行维护服务所涉及的服务要求、技术指标向投标单位解释，并保存会议纪要和相关文件。"},{"label":"C","text":"在业主单位的授权下，可协助业主单位参与评标活动，对于投标文件与招标文件的符合性及投标文件的合理性提出监理意见。"},{"label":"D","text":"评价标准是否合理不是监理重点审核招标文件的内容。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0075","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.2.3 运行维护-招标阶段-主要输出文档 【点评】信息系统运行维护的质量控制与信息系统工程建设的质量控制思路基本相似，但在质量控制点、控制措施等方面又有区别，主要体现在以下两点：①质量目标有区别。信息系统工程建设的质量目标聚焦在最终成果上，在项目进度和成本范围内，成果物的质量达成就意味着工程质量目标的达成。而运行维护工作的质量目标除了有成果性的(如升级、改造等)，还有过程性的，它要求在执行过程中都要保证某种要求的实现或不可突破。②质量控制方法有区别。除常规的监理质量控制方法外，运行维护监理工作还有另一项重要的质量控制方法，即绩效考核。通过客观、量化的绩效考核，评价运维服务提供方的工作质量，实时发现问题，督促运维服务提供方持续不断地改进、完善，直至问题得到彻底解决。——C错误，质量控制方法有区别。","knowledge":"","options":[{"label":"A","text":"信息系统运行维护的质量是运行维护监理工作的核心，是决定整个信息系统运行维护成败的关键，也是一个运行维护项目是否成功的最根本标志。"},{"label":"B","text":"质量控制贯穿运行维护监理工作的始终，也是运行维护服务实践活动的出发点、核心点。"},{"label":"C","text":"信息系统运行维护的质量控制与信息系统工程建设的质量控制方法没有区别。"},{"label":"D","text":"信息系统运行维护的质量控制与信息系统工程建设的质量控制的质量目标有区别。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0076","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.1 运行维护-质量控制 《信息系统监理师教程 第2版》 第585页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0077","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.2 运行维护-进度控制 【点评】投资控制的要点具体如下：（熟读/背：蓝色字体）①投资控制与绩效考核的结果是息息相关的，通过对绩效考核结果的分析，可以找到运维服务中的不足，通过控制费用促进运维服务提供方完善改进；②在没有突发意外的情况下，项目实际费用不应超过项目计划费用；③应重视预算阶段的工作，考虑周全，尽量把有限的预算合理化分配；④以动态控制原则为指导进行费用计划值与实际值的比较；⑤有必要使用信息化手段辅助控制费用，尤其是对绩效考核的奖惩，功过不能相抵。——D正确。","knowledge":"","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"①②③。"},{"label":"C","text":"①②④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0078","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.3 运行维护-投资控制 【点评】投资控制的方法：（熟读/背：蓝色字体）①固定运行维护费的控制方法：如果运行维护合同签订的是固定运行维护费，监理机构应跟踪合同执行全部过程，分块评价运行维护服务商对每部分合同内容的执行情况。②不固定运行维护费的控制方法：不固定运行维护费是指在运行维护合同中约定发生某种运行维护事件或工作时，运维服务提供方应按什么标准进行服务、服务单价是多少、用户按什么标准计算工时、如何支付该项费用。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0079","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.3 运行维护-投资控制 【点评】投资控制活动及内容具体如下：①协助业主单位对运维服务提供方的技术方案、实施方法、管理方案、所采用的运维设施及设备等方面做出必要的经济可行性评审，并提出有效建议。②在运行维护实施过程中，按阶段提交运行维护费用支付情况的监理报告，协助业主单位掌握运行维护预算执行情况。重点关注：a 以年、季度等为周期，审核运维服务提供方的预算执行情况和支付申请，结合绩效考核签发支付意见；b 针对非固定运行维护费，依据服务标准、工时、付费方式和计费标准等内容进行审核，对运维服务提供方的实际有效工时进行记录，并提出核算过程与结论，结合绩效考核提出监理意见。③针对运行维护过程中的索赔事项，审核各项索赔金额。④审核运行维护各阶段付款申请，核算运维过程的实际工作量，出具支付意见。重点关注： a 由总监理工程师依据运行维护合同、SLA及相关补充协议，审核运维服务提供方提交的阶段性运行维护总结报告和付款申请，满足付款条件时，总监理工程师签发支付意见，报送业主单位；b 如果不具备支付条件，或总监理工程师不建议支付，应提出监理意见，对问题进行说明，并要求整改，整改完成后再进行审核。——B正确。","knowledge":"","options":[{"label":"A","text":"①②③。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"①③④。"},{"label":"D","text":"①②④。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0080","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.3 运行维护-投资控制 【点评】","knowledge":"","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②③。"},{"label":"C","text":"③④。"},{"label":"D","text":"①②。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0081","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.4 安全控制 【点评】协助业主单位进行运行维护安全规划。主要包括：a 人员安全管理；b 物理与环境保护；c 输入输出控制；d 突发事件应急计划；e 数据完整性与有效性；f 文档安全管理；g 安全教育与培训。——选D。","knowledge":"","options":[{"label":"A","text":"abcdefe。"},{"label":"B","text":"abcefg。"},{"label":"C","text":"abdfeg。"},{"label":"D","text":"abcdfeg。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0082","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.4 安全控制 《信息系统监理师教程 第2版》 第589页 | 序号 | 安全控制 | 内容 | 例子 | | 2 | 安全控制活动及内容 | 1. 安全控制活动及内容具体如下：①协助业主单位根据系统的可用性、保密性、完整性及可维护性等方面，评审安全运行保障方案，避免引起技术及管理方面的冲突。②协助业主单位进行运行维护安全规划。主要包括：a 人员安全管理；b 物理与环境保护；c 输入输出控制；d 突发事件应急计划；e 数据完整性与有效性；f 文档安全管理； | |","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0083","chapter":"第25章","time_label":"2025年5月","source":"第2版 监理练习题(第25章)","category":"章节练习","stem":"25.3.4 安全控制 【点评】文档资料管理的主要监理内容如下：①协助业主单位、运维服务提供方建立运行维护过程的文档管理体系和管理计划。②按照运行维护服务过程中统一的表格模板要求，督促各方编制运维文档。③检查和评审运维服务提供方在运行维护服务过程提交的各类文档和单据。④督促项目各方落实运行维护文档资料的归档、保存、 ①②③④。 C. ②③④。 D. ①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0115","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.1.1 基本概念【点评】信息安全监理-规划设计阶段-主要任务：（熟读/背：蓝色关键字） ● 配合业主单位和相关供应商进行充分沟通，分析原有系统的脆弱性及面临的安全威胁，形成安全需求。 ● 配合业主单位完成网络安全等级保护方案、商用密码应用系统建设方案编制及审核工作，并及时出具监理意见 ● 协助业主单位开展方案评估工作，并配合完成规划设计资料报审 ● 配合业主单位开展关键信息基础设施分析识别工作、安全防护方案编制工作并及时出具监理意见 ——A正确。","knowledge":"","options":[{"label":"A","text":"①②③④。 B. ①④。 C. ②③④。 D. ①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0116","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.1.2 信息安全建设阶段划分及监理任务【点评】","knowledge":"","options":[{"label":"A","text":"信息安全监理-招标阶段-主要任务：对招标文件编制、招投标过程、合同签订过程进行合规性审核，并出具监理意见。"},{"label":"B","text":"协助业主单位梳理并制定工程建设管理规范以及配套管理制度是信息安全监理-深化设计阶段-主要任务。"},{"label":"C","text":"核查专用安全设备、商用密码产品的准予销售证明材料及专业测评机构出具的测评报告是信息安全监理-实施阶段-主要任务。"},{"label":"D","text":"核查安全测评报告结论是信息安全监理-测试评估阶段-主要任务。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0117","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.1.2 信息安全建设阶段划分及监理任务【点评】监理机构可以通过向业主单位提供规划设计咨询监理服务，协助业主单位完成相关信息安全方案，实现如下监理目标：（熟读/背：蓝色关键字） ①建议并协助业主单位在规划设计阶段开展风险评估； ②协助业主单位明确信息系统工程的安全目标； ③协助业主单位确定信息系统工程的安全需求； ④协助业主单位申报信息系统工程安全保护等级手续。——A正确。","knowledge":"","options":[{"label":"A","text":"①②③④。 B. ①③④。 C. ②③④。 D. ①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0118","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.2 信息安全监理规划设计阶段监理工作【点评】信息系统规划设计阶段的主要监理活动如下： ①促使业主单位充分考虑信息系统工程的信息安全规划和设计； ②建议业主单位基于业务开展风险评估工作； ③协助业主单位根据系统的安全风险、法律法规和政策的约束，确定信息系统工程的安全目标和安全需求； ④检查业主单位提出的安全需求与安全目标是否一致，与国家和地方的信息安全法律、法规、政策、标准是否符合； ⑤审核信息安全设计方案中涉及网络安全等级保护、商用密码应用系统建设、关键信息基础设施保护的内容； ⑥协助业主单位制定信息安全管理制度，开展或完善安全体系建设； ⑦如适用，宜协助业主单位依据国家等级保护相关标准，确定信息安全保护等级，协助业主单位完成信息系统定级及备案工作； ⑧如适用，宜协助业主单位按照相关规定完成信息安全方案评估工作，评估结果作为项目规划立项的重要依据和申报资金的必备材料； ⑨配合业主单位按相关规定完成立项文件编制及送审工作，并及时获得相关管理部门的批复意见。——C正确。","knowledge":"","options":[{"label":"A","text":"①②⑤⑥⑦。 B. ③④⑤⑥⑦。 C. ①②③④⑤⑥⑦。 D. ①②③④⑤。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0119","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.2.1 信息安全监理规划设计阶段-监理活动【点评】信息安全监理规划设计阶段-监理内容：（熟读/背：风需规二审）","knowledge":"","options":[{"label":"A","text":"①②③④。 B. ②③④。 C. ①②④。 D. ①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0120","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.2.2 信息安全监理规划设计阶段-监理内容【点评】监理机构应从如下方面对业主单位的风险评估工作提出建议： ①对预期的信息系统展开全方位的风险评估。 ②确定预期信息系统的资产，并明确资产的价值。 ③对预期信息系统进行细致周密的脆弱性和威胁分析，发现它的脆弱点及所引发的威胁被利用后所造成的损失等。 ④对风险进行优先级排序，并形成安全措施需求清单。 ⑤如适用，建立与业务战略相一致的安全规划，制定总体的安全方针，并得到最高管理者的认可。——B正确。","knowledge":"","options":[{"label":"A","text":"②③④⑤。 B. ①②③④⑤。 C. ①②⑤。 D. ①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0121","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.2.2 信息安全监理规划设计阶段-监理内容【点评】网络安全等级保护方案的审核：①进行安全需求分析，形成需求分析报告。②开展总体安全设计，形成总体安全设计方案。③开展安全建设项目规划，形成安全建设项目规划方案。——A正确。 商用密码应用系统建设方案的审核：①商用密码应用技术方案。②商用密码应用管理方案。③信息系统密码应用等级保护能力要求。——B错误、C正确。 协助业主单位通过风险评估，明确信息系统工程建设的安全目标，从安全目标导出安全需求。——D正确。","knowledge":"","options":[{"label":"A","text":"网络安全等级保护方案的审核包括：①进行安全需求分析，形成需求分析报告。②开展总体安全设计，形成总体安全设计方案。③开展安全建设项目规划，形成安全建设项目规划方案。"},{"label":"B","text":"信息系统密码应用等级保护能力要求不是商用密码应用系统建设方案的审核内容。"},{"label":"C","text":"商用密码应用技术方案是商用密码应用系统建设方案的审核内容。"},{"label":"D","text":"协助业主单位通过风险评估，明确信息系统工程建设的安全目标，从安全目标导出安全需求。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0122","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.2.2 信息安全监理规划设计阶段-监理内容【点评】安全监理规划-招标阶段-监理内容：（背） ①协助招标准备工作（通用） ②协助编写或审核招标文件（通用） ③根据业主单位委托参与评标工作（通用） ④承建合同的监理（通用）","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0123","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.3.2 安全监理-招标阶段-监理内容【点评】信息安全系统设计阶段的主要监理活动如下：（熟读） ①促使业主单位和承建单位就信息安全需求进行充分沟通，并形成一致的理解； ②建议承建单位根据信息安全风险评估报告和信息安全需求进行安全设计，在此期间若发现新的风险或安全需求，应及时通知业主单位和承建单位； ③督促承建单位对信息系统工程的安全技术要求进行规范化描述，形成安全设计方案（包括体系结构设计和详细设计）； ④如适用，对已确定将要实行等级保护的系统，应审核设计方案是否符合相应等级保护对应的安全技术要求； ⑤审核承建单位的体系结构设计和详细设计，确保设计依据合规、安全控制措施能满足安全技术要求； ⑥协助业主单位和监理单位与信息安全相关主管部门进行充分的沟通和协调，确保安全设计方案的合规性要求； ⑦建议承建单位在进行安全设计时，充分考虑新建项目对现有系统和目标系统安全性可能造成的影响，并在设计方案中有所体现； ⑧确保安全设计方案满足信息安全需求且具有可验证性，符合相关的法律法规、政策和标准，并与信息系统工程整体建设相符； ⑨要求承建单位提交工程设计方案和工程实施组织设计方案，监理机构对其中的安全涉及内容进行审核； ⑩协助业主单位配合承建单位完成工程设计前的安全需求调查和分析工作，就设计阶段的各种变更对工程安全性的可能影响提出监理意见； ⑪督促承建单位提供与安全设计方案配套的其他安全输入。——D正确。","knowledge":"","options":[{"label":"A","text":"①②③④⑤。 B. ①③④⑤⑥。 C. ①②⑤⑥。 D. ①②③④⑤⑥。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0124","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.4 安全监理-设计阶段监理工作《信息系统监理师教程 第2版》第554页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0125","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.4.1 安全监理-设计阶段监理活动【点评】安全监理规划-设计阶段监理内容：（背）","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0126","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.4.2 安全监理-设计阶段监理内容【点评】监理机构应从如下方面对系统体系结构设计进行审核，并提出监理意见： ①安全设计与安全目标和安全需求的一致性。 ②根据安全技术要求，选择安全模型时应考虑以下内容：a安全体系结构设计的合理性；b安全解决方案的针对性；c安全控制措施的有效性；d残余风险。 ③安全控制措施应覆盖物理、主机、网络、应用、数据和信息安全管理等方面。 ④项目各阶段的安全风险分析和控制措施的全面性、合理性。 ⑤安全性检验手段应具有可操作性、有效性。 ⑥如适用，应督促承建单位组织相关部门和有关安全技术专家对体系结构设计的合理性、确定性进行论证和审定。——A正确。","knowledge":"","options":[{"label":"A","text":"①②③④⑤。 B. ②③④⑤。 C. ①②④⑤。 D. ①②③④。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0127","chapter":"第24章","time_label":"2025年5月","source":"第2版 监理练习题(第24章)","category":"章节练习","stem":"24.4.2 安全监理-设计阶段监理内容【点评】监理机构应从如下方面对系统详细设计进行审核，并提出监理意见： ①详细设计应遵循体系结构设计，确定并明晰系统安全设计要素，如安全功能和性能、系统接口、安全控制措施、安全规范等； ②安全控制措施应考虑计算机设备、设施(包括机房建筑、供电、空调等)、通信与网络设备、存储设备、身份 :"C","text":"①②③④。"},{"label":"D","text":"①③⑤。"}],"answer":"A","analysis":"数据中心涉及的管理制度包括但不限于： ①出入口禁管理办法； ②各角色人员职责明示； ③设备故障报告流程； ④安全事故报告流程； ⑤故障、事故处理确认流程。——A正确。","has_options":true},{"id":"ex_0178","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"服务类管理岗位人员及主要职能包括（ ）。 ①参与数据中心网络的架构设计、建设，负责其日常维护、优化等工作。 ②负责数据中心网络安全策略的评估、制定和实施。 ③负责数据中心网络线路、网络设备及域名等的日常运维、监控和管理。 ④负责相关业务上线的网络方案的测试、实施及保障。 ⑤负责对数据中心管理制度的监督执行、检查和考核。","knowledge":"23.1.2 数据中心工程主要建设任务","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①②③⑤。"},{"label":"C","text":"①②③。"},{"label":"D","text":"④⑤。"}],"answer":"A","analysis":"服务类管理岗位人员及主要职能 数据中心管理岗以数据中心管理员为主，根据需要可适当配备其他必要的人员。其主要职责包括但不限于： ①参与数据中心网络的架构设计、建设，负责其日常维护、优化等工作； ②负责数据中心网络安全策略的评估、制定和实施； ③负责数据中心网络线路、网络设备及域名等的日常运维、监控和管理； ④负责相关业务上线的网络方案的测试、实施及保障； ⑤负责对数据中心管理制度的监督执行、检查和考核。——A正确。","has_options":true},{"id":"ex_0179","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★☆ 序号\t主要建设任务\t内容 5\t主要人员的角色、职能\t1.数据中心人员主要分为两大类:研发实施类的技术岗位、服务类的管理岗位。","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0180","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"23.2 招标阶段监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第525页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0181","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"监理机构应对招标文件重点审核以下哪些内容（ ）。 ①审核招标方式与立项批复招标方式的符合性。 ②结合工程建设需求和现状，审核招标内容与工程初步设计及概算批复的符合性。 ③审核投标单位资质要求的合理性，注意规避可能存在的歧视和违规性表述。 ④审核招标文件获取及递交时间的合规性。 ⑤审核资格审查程序和条件的合规性。 ⑥审核投标保证金、履约保证金约定的合理性。 ⑦审核评标办法、评分标准的合理性。 ⑧审核废标条件的合规性。","knowledge":"23.2.1 招标阶段监理活动","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧。"},{"label":"B","text":"②③④⑤⑥⑦⑧。"},{"label":"C","text":"①②③⑦⑧。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"A","analysis":"监理机构应对招标文件重点审核以下内容：①审核招标方式与立项批复招标方式的符合性； ②结合工程建设需求和现状，审核招标内容与工程初步设计及概算批复的符合性； ③审核投标单位资质要求的合理性，注意规避可能存在的歧视和违规性表述； ④审核招标文件获取及递交时间的合规性； ⑤审核资格审查程序和条件的合规性； ⑥审核投标保证金、履约保证金约定的合理性； ⑦审核评标办法、评分标准的合理性； ⑧审核废标条件的合规性； ⑨根据工程初步设计报告、招标技术需求等，审核工程质量要求和进度要求的合规性； ⑩根据工程/项目的初步设计报告、概预算批复意见和当前市场行情等，审核安全生产和文明施工等措施费用与计价合规性； ⑪审核变更、计量、材料及人工费调整、违约、结算审计等约定的合规性； ⑫响应业主单位提出的其他咨询要求，提出监理意见和建议。——A正确。","has_options":true},{"id":"ex_0182","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"23.2.2 监理要点","knowledge":"","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"A","analysis":"监理机构可以根据数据中心建设需求及招标文件，对承建合同或服务级别协议(SLA)的如下方面进行重点审核，并提出咨询意见： ①审核合同范围、双方职责、权利和义务的描述与招标文件的一致性，比对合同或协议与招标文件、投标文件可能存在的差异； ②审核采购货物参数和服务级别指标的明确性； ③审核实施工艺、工序及验收指标的合规性； ④审核交付过程与交付成果的可操作性与合规性。——A正确。","has_options":true},{"id":"ex_0183","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"23.2.2 监理要点","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨。"},{"label":"B","text":"①③④⑥⑨。"},{"label":"C","text":"①②⑥⑦⑧⑨。"},{"label":"D","text":"①②③④⑤⑥⑦。"},{"label":"B","text":"①③④⑥⑨。"},{"label":"C","text":"①②⑥⑦⑧⑨。"},{"label":"D","text":"①②③④⑤⑥⑦。"}],"answer":"A","analysis":"数据中心工程设计阶段的主要监理活动如下： ①根据数据中心工程建设实际需要，可向业主单位提供咨询服务，协助建立起符合项目建设需求的规章制度体系； ②根据合同要求，对承建单位报送的开工手续进行审查，对开工条件进行核验，出具监理意见，签发开工令； ③开展工程协调服务，协助业主单位组织设计交底，记录交底结果，组织承建单位确认工程建设目标、关键部位、工艺工序质量要求和进度要求； ④督促承建单位制订工程计划，按照计划对工程建设现场进行实地勘查； ⑤依据承建合同，审查承建单位提交的工程计划和深化设计方案，提出监理意见，协助承建单位进行完善，直至满足业主单位工程要求； ⑥协助业主单位组织评审承建单位制订的工程计划和深化设计方案； ⑦监督承建单位对数据中心应用系统开展信息资源规划需求分析，检查信息资源规划需求成果是否符合合同与深化设计方案的要求，提出监理意见； ⑧监督承建单位根据信息资源规划需求分析成果开展信息系统设计，并协助业主单位组织对承建单位信息系统设计成果进行评审； ⑨监督承建单位根据已通过评审的信息系统设计方案开展信息系统开发。——A正确。","has_options":true},{"id":"ex_0184","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理练习题(第23章)","category":"章节练习","stem":"23.3 设计阶段监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第527页","knowledge":"","options":[],"answer":"","analysis":"","has_options":false},{"id":"ex_0185","chapter":"第23章","time_label":"2025年5月","source":"第2版 监理 (第22章)","category":"章节练习","stem":"22.5.2 软件工程监理验收阶段监理内容【点评】系统试运行的监理内容具体如下：（背：计迁问变报协） ①要求承建单位提交系统试运行计划，报业主单位审核确认后，督促其实施； ②如需要进行新旧系统切换，在系统切换前要求承建单位提交系统切换及数据迁移申请，审核后报业主单位确认； ③督促承建单位做好试运行记录，及时解决试运行过程中发现的问题和不合格项，形成系统问题跟踪记录；（通用） ④系统试运行发生项目变更的，宜组织业主单位和承建单位对变更风险进行评估，包括对新旧系统的影响，对费用、效益、质量和进度等的影响，做好与变更有关的申请、评估、计划、实施、验证等活动的记录和文档资料的保管； ⑤要求承建单位提交系统试运行报告； ⑥协调业主单位和/或使用单位提交系统使用意见。——A正确。","knowledge":"","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"②③④⑤。"},{"label":"C","text":"④⑤⑥。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0270","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"22.5.2 软件工程监理验收阶段监理内容 【点评】系统终验的监理内容具体如下：（背：条方报问 移标结移） ①协助业主单位确认是否满足终验条件； ②审核承建单位提交的终验方案； ③参与终验，签署终验报告，验收活动和结果应形成文档； ④督促承建单位解决终验中发现的问题和不合格项； ⑤要求承建单位提交项目移交申请，宜包括软件交付清单、相关工程文档和必要的联系信息，并做好交接记录，形成软件工程项目移交清单； ⑥审核承建单位所提供的工程各阶段形成的技术、管理文档的内容和种类，确保验收文档符合相关标准； ⑦依据承建合同审核承建单位提交的工程结算； ⑧完成工程监理总结报告，整理工程有关的全部监理文档，并移交业主单位。——B正确。","knowledge":"","options":[{"label":"A","text":"⑥⑦⑧。"},{"label":"B","text":"①②③④⑤⑥⑦⑧。"},{"label":"C","text":"①②③⑥⑦⑧。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0271","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"22.5.2 软件工程监理验收阶段监理内容 【点评】在工作过程中，监理机构的工作内容和要点如下： ①对文档内容的要求。 ②对文档设计、开发的要求。 ③对文档编制过程的要求。 ④对文档维护的要求。——B正确。","knowledge":"","options":[{"label":"A","text":"①④。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":"","has_options":true},{"id":"ex_0272","chapter":"第22章","time_label":"2025年5月","source":"第2版 监理练习题(第22章)","category":"章节练习","stem":"22.6.1 文档编制过程的监理 【点评】软件工程配置管理过程的监理内容和要点如下： ①敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线。 ②监督承建单位配置管理的执行情况，包括控制软件项的修改和发行，记录和报告软件项的状态和修改申请。 ③与业主单位、承建单位共同对配置管理做出要求，----选D,不包括D。","knowledge":"","options":[{"label":"A","text":"敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线。"},{"label":"B","text":"监督
