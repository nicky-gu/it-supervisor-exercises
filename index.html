 第581页 | 序号 | 监理活动 | 内容 | 例子 | | 1 | 监理活动 | 1. 运行维护招标阶段的主要监理活动如下:(熟读/背 蓝色字体)①明确运行维护需求:协助业主单位明确运行维护的主要任务和服务标准;②招标:协助业主单位编制招标文件,满足运行维护需求;③签署合同及SLA:协助业主单位与运维服务提供方签署运行维护服务合同和运行维护服务级别协议(SLA)。 | | 第2版第25章习题8：运行维护招标阶段的主要监理内容有哪些？ 【参考答案】 【郑房新老师点评】运行维护招标阶段的主要监理内容如下：①明确运行维护需求（和活动一样）②协助业主单位招标（和活动一样）③合同及SLA监理（和活动一样）","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":25,"question":"25.2.2 运行维护-招标阶段-监理内容 《信息系统监理师教程 第2版》 第581页 | 序号 | 监理内容 | 内容 | 例子 | | 1 | 监理内容 | 1. 运行维护招标阶段的主要监理内容如下:(熟读/背 蓝色字体)①明确运行维护需求（和活动一样）②协助业主单位招标（和活动一样）③合同及SLA监理（和活动一样） | | 第2版第25章习题9：监理机构应协助业主单位进行招标工作，以下说法错误的是（____）。 【参考答案】 D 【郑房新老师点评】监理机构应协助业主单位进行招标工作，具体如下:(熟读/背 蓝色字体)(1) 在业主单位许可及授意下，可参与招标文件的编制工作，对招标文件中的技术和质量要求、服务级别、投标单位资质要求、应急响应、交付、评估方法等提出监理意见。——A 正确。重点审核招标文件 以下内容：●投标单位能力证明文件的要求是否合理，与业主单位需求是否一致，招标文件中所附运行维护服务合同模板的通用条款和专项条款是否合理；●运行维护服务要求是否满足业主单位需求、关键技术标准和服务标准；●评标标准是否合理。——D错误，属于。(2) 在业主单位的授权下，可参与招标答疑工作，协助业主单位对运行维护服务所涉及的服务要求、技术指标向投标单位解释，并保存会议纪要和相关文件。——B正确。(3) 在业主单位的授权下，可协助业主单位参与评标活动，对于投标文件与招标文件的符合性及投标文件的合理性提出监理意见。——C正确。","options":[{"label":"A","text":"在业主单位许可及授意下，可参与招标文件的编制工作，对招标文件中的技术和质量要求、服务级别、投标单位资质要求、应急响应、交付、评估方法等提出监理意见。"},{"label":"B","text":"在业主单位的授权下，可参与招标答疑工作，协助业主单位对运行维护服务所涉及的服务要求、技术指标向投标单位解释，并保存会议纪要和相关文件。"},{"label":"C","text":"在业主单位的授权下，可协助业主单位参与评标活动，对于投标文件与招标文件的符合性及投标文件的合理性提出监理意见。"},{"label":"D","text":"评价标准是否合理不是监理重点审核招标文件的内容。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":25,"question":"25.2.3 运行维护-招标阶段-主要输出文档 《信息系统监理师教程 第2版》 第584页 | 序号 | 主要输出文档 | 内容 | 例子 | | 1 | 主要输出文档 | 1.运行维护招标阶段的主要输出文档如下：(熟读)①监理规划；②服务需求研讨会议纪要；③招标需求文件评审的监理意见；④招标答疑纪要或备忘录；⑤合同评审的监理意见；⑥SLA评审的监理意见。 | | 第2版第25章习题12：以下说法错误的是（ ）。 【参考答案】C 【郑房新老师点评】信息系统运行维护的质量控制与信息系统工程建设的质量控制思路基本相似，但在质量控制点、控制措施等方面又有区别，主要体现在以下两点：①质量目标有区别。信息系统工程建设的质量目标聚焦在最终成果上，在项目进度和成本范围内，成果物的质量达成就意味着工程质量目标的达成。而运行维护工作的质量目标除了有成果性的(如升级、改造等)，还有过程性的，它要求在执行过程中都要保证某种要求的实现或不可突破。②质量控制方法有区别。除常规的监理质量控制方法外，运行维护监理工作还有另一项重要的质量控制方法，即绩效考核。通过客观、量化的绩效考核，评价运维服务提供方的工作质量，实时发现问题，督促运维服务提供方持续不断地改进、完善，直至问题得到彻底解决。——C错误，质量控制方法有区别。","options":[{"label":"A","text":"信息系统运行维护的质量是运行维护监理工作的核心，是决定整个信息系统运行维护成败的关键，也是一个运行维护项目是否成功的最根本标志。"},{"label":"B","text":"质量控制贯穿运行维护监理工作的始终，也是运行维护服务实践活动的出发点、核心点。"},{"label":"C","text":"信息系统运行维护的质量控制与信息系统工程建设的质量控制方法没有区别。"},{"label":"D","text":"信息系统运行维护的质量控制与信息系统工程建设的质量控制的质量目标有区别。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":25,"question":"25.3.1 运行维护-质量控制 《信息系统监理师教程 第2版》 第585页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":25,"question":"25.3.2 运行维护-进度控制 《信息系统监理师教程 第2版》 第587页 | 序号 | 进度控制 | 内容 | 例子 | | 1 | 相关的监理工作 | 1. 进度控制相关的监理工作包括如下内容：①对运维服务提供方的整体运行维护计划进行审核，内容包括：a 进度计划的科学性和可执行性；b 进度计划的合理性，包括时间计划合理性，任务安排合理性，工具、人员投入合理性。②根据进度计划设置关键进度检查点。③针对进度检查点进行审核，发现偏差时可以组织多方会议会商，修正进度计划。 | | 第2版第25章习题16：投资控制的要点具体有以下哪些（ ）。 ①投资控制与绩效考核的结果是息息相关的，通过对绩效考核结果的分析，可以找到运维服务中的不足，通过控制费用促进运维服务提供方完善改进。②在没有突发意外的情况下，项目实际费用不应超过项目计划费用。③应重视预算阶段的工作，考虑周全，尽量把有限的预算合理化分配。④以动态控制原则为指导进行费用计划值与实际值的比较。⑤有必要使用信息化手段辅助控制费用，尤其是对绩效考核的奖惩，功过不能相抵。 【参考答案】D 【郑房新老师点评】投资控制的要点具体如下：（熟读/背：蓝色字体）①投资控制与绩效考核的结果是息息相关的，通过对绩效考核结果的分析，可以找到运维服务中的不足，通过控制费用促进运维服务提供方完善改进；②在没有突发意外的情况下，项目实际费用不应超过项目计划费用；③应重视预算阶段的工作，考虑周全，尽量把有限的预算合理化分配；④以动态控制原则为指导进行费用计划值与实际值的比较；⑤有必要使用信息化手段辅助控制费用，尤其是对绩效考核的奖惩，功过不能相抵。——D正确。","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"①②③。"},{"label":"C","text":"①②④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":25,"question":"25.3.3 运行维护-投资控制 《信息系统监理师教程 第2版》 第587页 | 序号 | 投资控制 | 内容 | 例子 | | 1 | 投资控制概述 | 1.信息系统运行维护的投资控制是对运行维护费用预算的实际执行情况进行监督、控制和评价的过程。 | | | 2 | 投资控制的要点 | 1. 投资控制的要点具体如下：（熟读/背：蓝色字体）①投资控制与绩效考核的结果是息息相关的，通过对绩效考核结果的分析，可以找到运维服务中的不足，通过控制费用促进运维服务提供方完善改进；②在没有突发意外的情况下，项目实际费用不应超过项目计划费用；③应重视预算阶段的工作，考虑周全， 的监理内容被概括为\"三控、两管、一协调\"，各是什么？ 【参考答案】 【郑房新老师点评】1. 三控：(质进投) ①质量控制 ②进度控制 ③投资控制 2. 两管：(合信) ①合同管理 ②信息管理 3. 一协调：组织协调。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":3,"question":"3. 信息系统工程的运行维护监理与建设监理既有一致性，也有差异性，如表25-1所示。 第2版第25章习题7：运行维护招标阶段的主要监理活动有哪些？ 【参考答案】 【郑房新老师点评】运行维护招标阶段的主要监理活动如下：①明确运行维护需求：协助业主单位明确运行维护的主要任务和服务标准；②招标：协助业主单位编制招标文件，满足运行维护需求；③签署合同及SLA：协助业主单位与运维服务提供方签署运行维护服务合同和运行维护服务级别协议(SLA)。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":3,"question":"3. 可从运行维护人员、资源、技术和过程，以及运行维护预算的分析论证等方面向业主单位提供咨询服务。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":3,"question":"3. 合同及SLA监理 《信息系统监理师教程 第2版》 第582页 | 序号 | 合同及SLA监理 | 内容 | 例子 | | 1 | 合同及SLA监理 | 完成招标工作后，监理机构需要协助业主单位推进合同谈判及签订工作。运行维护合同的主要附件是运维服务级别协议(SLA)。 | | | 2 | 合同及SLA相关的监理内容 | 一、合同及SLA相关的监理内容如下：1.协助业主单位审核合同条款和SLA内容 2.管理运行维护招标阶段所产生的与监理相关的文档资料，包括需求说明、招标文件、运行维护合同、运行维护SLA等。3.可从运行维护人员、资源、技术和过程，以及运行维护预算的分析论证等方面向业主单位提供咨询服务。4.签订的运维服务合同中，应明确要求运维服务提供方接受监理单位的监理。1.协助业主单位审核合同条款和SLA内容，重点审核：（展开）①合同条款中运行维护服务期限、服务范围、服务内容、服务级别(SLA)、人员投入、运行维护评估、付款节点、服务变更控制及奖惩条款等内容；②SLA中服务目录定义完整性、文件规范性、考核评估机制有效性和完整性；③SLA是否明确了服务项目、服务内容、服务时间、服务频度、交付方式及交付结果等。二、可参考下面的运维服务级别协议(SLA)的示例，定义有关SLA的约束要求，如表25-4所示。(看几眼) | | 第2版第25章习题11：以下哪些是运行维护招标阶段的主要输出文档？（ ）。 ①监理规划。②服务需求研讨会议纪要。③招标需求文件评审的监理意见。④招标答疑纪要或备忘录。⑤合同评审的监理意见。⑥SLA评审的监理意见。 【参考答案】A 【郑房新老师点评】运行维护招标阶段的主要输出文档如下：(熟读)①监理规划；②服务需求研讨会议纪要；③招标需求文件评审的监理意见；④招标答疑纪要或备忘录；⑤合同评审的监理意见；⑥SLA评审的监理意见。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①③⑤⑥。"},{"label":"C","text":"②③④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":3,"question":"3. 运行维护-质量控制活动及内容 《信息系统监理师教程 第2版》 第586页 | 序号 | 质量控制活动及内容 | 内容 | 例子 | | 1 | 质量控制活动及内容 | 1.质量控制活动及内容具体如下：(熟读/背：蓝色字体)①督促运维服务提供方建立运行维护质量保证体系。②以运行维护合同、SLA为依据，监督运行维护质量保证体系的落实及其日常运行情况。③针对运行维护过程中的关键事件进行重点控制 ④督促运维服务提供方开展巡检，并抽查巡检相关记录 ⑤检查备品、备件的准备情况 ⑥宜定期对运行维护服务质量进行考核、评估。⑦可对运行维护过程中的测试实施质量进行审查。⑧对运行维护文档质量进行评审。 | | 第2版第25章习题15：进度控制相关的监理工作，不包括以下哪个？（ ）。 【参考答案】A 【郑房新老师点评】进度控制相关的监理工作包括如下内容：①对运维服务提供方的整体运行维护计划进行审核，内容包括：a进度计划的科学性和可执行性；b进度计划的合理性，包括时间计划合理性，任务安排合理性，工具、人员投入合理性。②根据进度计划设置关键进度检查点。③针对进度检查点进行审核，发现偏差时可以组织多方会议会商，修正进度计划。——选A。不包括A。","options":[{"label":"A","text":"确保承建合同中所提供的安全产品和服务满足招标文件要求。"},{"label":"B","text":"针对进度检查点进行审核，发现偏差时可以组织多方会议会商，修正进度计划。"},{"label":"C","text":"根据进度计划设置关键进度检查点。"},{"label":"D","text":"对运维服务提供方的整体运行维护计划进行审核。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":2,"question":"2. 协助业主单位招标 《信息系统监理师教程 第2版》 第582页 | 序号 | 监理活动 | 内容 | 例子 | | 1 | 协助业主单位招标 | 1.监理机构应协助业主单位进行招标工作，具体如下：(熟读/背 蓝色字体)(1) 在业主单位许可及授意下，可参与招标文件的编制工作，对招标文件中的技术和质量要求、服务级别、投标单位资质要求、应急响应、交付、评估方法等提出监理意见。重点审核招标文件以下内容：●投标单位能力证明文件的要求是否合理，与业主单位需求是否一致，招标文件中所附运行维护服务合同模板的通用条款和专项条款是否合理；●运行维护服务要求是否满足业主单位需求、关键技术标准和服务标准；●评标标准是否合理。(2) 在业主单位的授权下，可参与招标答疑工作，协助业主单位对运行维护服务所涉及的服务要求、技术指标向投标单位解释，并保存会议纪要和相关文件。(3) 在业主单位的授权下，可协助业主单位参与评标活动，对于投标文件与招标文件的符合性及投标文件的合理性提出监理意见。2.表25-3展示了服务级别目标和测量的示例，服务目标应尽量量化。(看几眼) | | 表25-3 服务级别目标和测量示例 | 服务活动 | 描述 | 测量标准 | 目标 | | 电话支持响应 | 服务商接到事件报告后做出回复的确认时间 | 必须在30分钟内确认 | 95%以上响应率 | | 远程支持响应 | 服务商接到事件报告后做出回复的时间 | 必须在60分钟内确认 | 95%以上响应率 | | 现场响应 | 服务商接到事件报告后到达事件现场的时间 | 要求小于48小时 | 事件中95%以上在指定时间到达 | | 运维事件解决 | 从接到事件报告开始，进行事件的分析解决，到事件解决完毕所经历的时间 | 每种故障级别预期解决时间：平均故障解决时间≤48小时 故障级别1≤24小时 故障级别2≤72小时 故障级别3≤一周 故障级别4≤两周 | 事件中95%以上在指定时间内得到分配和修复 | 第2版第25章习题10：以下哪些是合同及SLA相关的监理内容？（ ）。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":2,"question":"2. 管理运行维护招标阶段所产生的与监理相关的文档资料，包括需求说明、招标文件、运行维护合同、运行维护SLA等。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_lab 大。 【参考答案】A 【郑房新老师点评】质量影响要素具体如下：①要控制质量，首先要控制运维服务人员的工作能力、水平和效果。②定位故障比较困难。③改正错误的代价往往较大，并且可能引发其他质量问题。④质量认定的范围较大。——A正确。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"①②④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第25章)","category":"章节练习","chapter":"第25章","time_label":"2025年5月","question_number":1,"question":"1.制定绩效考核管理办法。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.1 概述《信息系统监理师教程 第2版》第541页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.1.1 基本概念《信息系统监理师教程 第2版》第541页 | 序号 | 基本概念 | 内容 | 例子 | |:---:|:---|:---|:---:| | 7 | 等级保护实施基本流程 | 1.等级保护实施基本流程包括：①等级保护对象定级与备案阶段 ②总体安全规划阶段 ③安全设计与实施阶段 ④安全运行与维护阶段 ⑤定级对象终止阶段。 | | 第2版第24章习题2：关键信息基础设施安全保护包括以下哪些方面（ ）。 ①分析识别 ②安全保护 ③检测评估 ④监测预警 ⑤主动防御 ⑥事件处置 【参考答案】A 【郑房新老师点评】关键信息基础设施安全保护包括六个方面：①分析识别 ②安全保护 ③检测评估 ④监测预警 ⑤主动防御 ⑥事件处置。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥。 B. ①②③⑤⑥。 C. ②③④⑤⑥。 D. ①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.1.1 基本概念《信息系统监理师教程 第2版》第541页 | 序号 | 基本概念 | 内容 | 例子 | |:---:|:---|:---|:---:| | 14 | 关键信息基础设施安全保护 | 关键信息基础设施安全保护包括六个方面：①分析识别 ②安全保护 ③检测评估 ④监测预警 ⑤主动防御 ⑥事件处置。 | | 第2版第24章习题3：以下说法错误的是（ ）。 【参考答案】C 【郑房新老师点评】","options":[{"label":"A","text":"商用密码是指采用特定变换的方法对不属于国家秘密的信息进行加密保护、安全认证的技术、产品和服务。"},{"label":"B","text":"国家密码管理部门负责管理全国的商用密码工作。"},{"label":"C","text":"市级商用密码工作由国家密码管理部门负责管理。"},{"label":"D","text":"国家网信、商务、海关、市场监督管理等有关部门在各自职责范围内，负责商用密码有关管理工作。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.1.1 基本概念《信息系统监理师教程 第2版》第541页 | 序号 | 基本概念 | 内容 | 例子 | |:---:|:---|:---|:---:| | 9 | 密码 | 1.密码是指按特定法则编成,用以对通信双 的是（ ）。 【参考答案】D 【郑房新老师点评】","options":[{"label":"A","text":"信息安全监理-招标阶段-主要任务：对招标文件编制、招投标过程、合同签订过程进行合规性审核，并出具监理意见。"},{"label":"B","text":"协助业主单位梳理并制定工程建设管理规范以及配套管理制度是信息安全监理-深化设计阶段-主要任务。"},{"label":"C","text":"核查专用安全设备、商用密码产品的准予销售证明材料及专业测评机构出具的测评报告是信息安全监理-实施阶段-主要任务。"},{"label":"D","text":"核查安全测评报告结论是信息安全监理-测试评估阶段-主要任务。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.1.2 信息安全建设阶段划分及监理任务《信息系统监理师教程 第2版》第543页 表24-1 信息安全监理各阶段主要任务 | 序号 | 阶段 | 信息安全监理主要任务 | |:---:|:---|:---| | 1 | 规划设计阶段 | 信息安全监理-规划设计阶段-主要任务：（熟读/背：蓝色关键字）●配合业主单位和相关供应商进行充分沟通，分析原有系统的脆弱性及面临的安全威胁，形成安全需求。●配合业主单位完成网络安全等级保护方案、商用密码应用系统建设方案编制及审核工作，并及时出具监理意见 ●协助业主单位开展方案评估工作，并配合完成规划设计资料报审 ●配合业主单位开展关键信息基础设施分析识别工作、安全防护方案编制工作并及时出具监理意见 | | 2 | 招标阶段 | 信息安全监理-招标阶段-主要任务：（熟读/背：蓝色关键字）●对招标文件编制、招投标过程、合同签订过程进行合规性审核，并出具监理意见——A正确。 | | 3 | 深化设计阶段 | 信息安全监理-深化设计阶段-主要任务：（熟读/背：蓝色关键字）●协助业主单位梳理并制定工程建设管理规范以及配套管理制度——B正确。●督促承建单位进场完成现场踏勘，进行差距分析，并对网络安全等级保护、商用密码安全应用等安全方案进行深化设计 ●审核深化设计方案及相关方提出的变更申请，必要时配合业主单位组织专家评审 | | 4 | 实施阶段 | 信息安全监理-实施阶段-主要任务：（熟读/背：蓝色关键字）●核查专用安全设备、商用密码产品的准予销售证明材料及专业测评机构出具的测评报告——C正确。●督促承建单位在等级保护对象定级、规划设计、实施过程中，对工程的质量、进度、文档和变更等方面的工作进行内部控制和科学管理 ●监理机构对承建单位的管理成果进行监督 | | 5 | 测试评估阶段 | 信息安全监理-测试评估阶段-主要任务：（熟读/背：蓝色关键字）●建议业主单位委托主管单位授权的专业检测机构开展测试评估工作且应当将测评结果报相应的主管部门备案 ●跟踪测评过程，督促相关方按计划完成测评工作 ●根据检测评估发现的高风险项及测试评估单位给出的整改建议，督促相关方落实整改措施 | | 6 | 验收阶段 | 信息安全监理-验收阶段-主要任务：（熟读/背：蓝色关键字）●核查安全测评报告结论——D错误，是验收阶段。●整理监理档案，配合整理业主单位档案，指导承建单位完成档案组卷工作 ●协助编制或审核验收方案 ●配合完成其他各项验收准备工作 | 第2版第24章习题7：监理机构可以通过向业主单位提供规划设计咨询监理服务，协助业主单位完成相关信息安全方案，实现如下哪些监理目标（ ）。 ①建议并协助业主单位在规划设计阶段开展风险评估。 ②协助业主单位明确信息系统工程的安全目标。 ③协助业主单位确定信息系统工程的安全需求。 ④协助业主单位申报信息系统工程安全保护等级手续。 【参考答案】A 【郑房新老师点评】监理机构可以通过向业主单位提供规划设计咨询监理服务，协助业主单位完成相关信息安全方案，实现如下监理目标：（熟读/背：蓝色关键字） ①建议并协助业主单位在规划设计阶段开展风险评估； ②协助业主单位明确信息系统工程的安全目标； ③协助业主单位确定信息系统工程的安全需求； ④协助业主单位申报信息系统工程安全保护等级手续。——A正确。","options":[{"label":"A","text":"①②③④。 B. ①③④。 C. ②③④。 D. ①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.2 信息安全监理规划设计阶段监理工作《信息系统监理师教程 第2版》第544页 | 序号 | 监理工作 | 内容 | 例子 | |:---:|:---|:---|:---:| | 1 | 监理目标 | 1.监理机构可以通过向业主单位提供规划设计咨询监理服务，协助业主单位完成相关信息安全方案，实现如下监理目标：（熟读/背：蓝色关键字）①建议并协助业主单位在规划设计阶段开展风险评估；②协助业主单位明确信息系统工程的安全目标；③协助业主单位确定信息系统工程的安全需求；④协助业主单位申报信息系统工程安全保护等级手续。 | | 第2版第24章习题8：信息系统规划设计阶段的主要监理活动有以下哪些？（ ）。 ①促使业主单位充分考虑信息系统工程的信息安全规划和设计。 ②建议业主单位基于业务开展风险评估工作。 ③协助业主单位根据系统的安全风险、法律法规和政策的约束，确定信息系统工程的安全目标和安全需求。 ④检查业主单位提出的安全需求与安全目标是否一致，与国家和地方的信息安全法律、法规、政策、标准是否符合。 ⑤审核信息安全设计方案中涉及网络安全等级保护、商用密码应用系统建设、关键信息基础设施保护的内容。 ⑥协助业主单位制定信息安全管理制度，开展或完善安全体系建设。 ⑦如适用，宜协助业主单位依据国家等级保护相关标准，确定信息安全保护等级，协助业主单位完成信息系统定级及备案工作。 【参考答案】C 【郑房新老师点评】信息系统规划设计阶段的主要监理活动如下： ①促使业主单位充分考虑信息系统工程的信息安全规划和设计； ②建议业主单位基于业务开展风险评估工作； ③协助业主单位根据系统的安全风险、法律法规和政策的约束，确定信息系统工程的安全目标和安全需求； ④检查业主单位提出的安全需求与安全目标是否一致，与国家和地方的信息安全法律、法规、政策、标准是否符合； ⑤审核信息安全设计方案中涉及网络安全等级保护、商用密码应用系统建设、关键信息基础设施保护的内容； ⑥协助业主单位制定信息安全管理制度，开展或完善安全体系建设； ⑦如适用，宜协助业主单位依据国家等级保护相关标准，确定信息安全保护等级，协助业主单位完成信息系统定级及备案工作； ⑧如适用，宜协助业主单位按照相关规定完成信息安全方案评估工作，评估结果作为项目规划立项的重要依据和申报资金的必备材料； ⑨配合业主单位按相关规定完成立项文件编制及送审工作，并及时获得相关管理部门的批复意见。——C正确。","options":[{"label":"A","text":"①②⑤⑥⑦。 B. ③④⑤⑥⑦。 C. ①②③④⑤⑥⑦。 D. ①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.2.1 信息安全监理规划设计阶段-监理活动《信息系统监理师教程 第2版》第544页 | 序号 | 监理活动 | 内容 | 例子 | |:---:|:---|:---|:---:| | 1 | 监理活动 | 1.信息系统规划设计阶段的主要监理活动如下：①促使业主单位充分考虑信息系统工程的信息安全规划和设计；②建议业主单位基于业务开展风险评估工作；③协助业主单位根据系统的安全风险、法律法规和政策的约束，确定信息系统工程的安全目标和安全需求；④检查业主单位提出的安全需求与安全目标是否一致，与国家和地方的信息安全法律、法规、政策、标准是否符合；⑤审核信息安全设计方案中涉及网络安全等级保护、商用密码应用系统建设、关键信息基础设施保护的内容；⑥协助业主单位制定信息安全管理制度，开展或完善安全体系建设；⑦如适用，宜协助业主单位依据国家等级保护相关标准，确定信息安全保护等级，协助业主单位完成信息系统定级及备案工作； | | | | | ⑧如适用，宜协助业主单位按照相关规定完成信息安全方案评估工作，评估结果作为项目规划立项的重要依据和申报资金的必备材料；⑨配合业主单位按相关规定完成立项文件编制及送审工作，并及时获得相关管理部门的批复意见。 | | 第2版第24章习题9：信息安全监理规划设计阶段-监理内容有哪些？（ ）。 ①安全风险评估 ②安全需求确定 ③网络安全等级保护方案的审核 ④商用密码应用系统建设方案的审核 【参考答案】A 【郑房新老师点评】信息安全监理规划设计阶段-监理内容：（熟读/背：风需规二审）","options":[{"label":"A","t on_number":24,"question":"24.2.2 信息安全监理规划设计阶段-监理内容《信息系统监理师教程 第2版》第545页 | 序号 | | 内容 | 例子 | |:---:|:---|:---|:---:| | 2 | 安全需求确定 | 监理机构应从如下方面协助业主单位确定需求：①协助业主单位通过风险评估，明确信息系统工程建设的安全目标，从安全目标导出安全需求；②应检查业主单位提出的安全需求与安全目标的一致性，与国家和地方信息安全法律法规、标准和政策的符合性；③如适用，监理机构宜检查信息系统工程的项目建议书、可行性研究报告、初步设计方案是否包含明确的安全需求。 | | | 3 | 网络安全等级保护方案的审核 | 网络安全等级保护方案的审核：①进行安全需求分析，形成需求分析报告。②开展总体安全设计，形成总体安全设计方案。③开展安全建设项目规划，形成安全建设项目规划方案。 | | | 4 | 商用密码应用系统建设方案的审核 | 1.商用密码：①商用密码应用技术方案。②商用密码应用管理方案。③信息系统密码应用等级保护能力要求。 | | | 5 | 关键信息基础设施安全防护方案的审核 | 1.关键信息基础设施安全防护方案的审核：①关键信息基础设施识别 协助业主单位分析识别关键信息基础设施承载的关键业务，开展业务依赖性识别、关键资产识别、风险识别等活动。②落实关键信息基础设施安全防护要求 ③关键信息基础设施检测评估 ④关键信息基础设施保护制度建设 ⑤关键信息基础设施采购要求 | | 第2版第24章习题12：安全监理规划-招标阶段-监理内容有哪些？ 【参考答案】 【郑房新老师点评】安全监理规划-招标阶段-监理内容：（背） ①协助招标准备工作（通用） ②协助编写或审核招标文件（通用） ③根据业主单位委托参与评标工作（通用） ④承建合同的监理（通用）","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.3.2 安全监理-招标阶段-监理内容《信息系统监理师教程 第2版》第553页 | 序号 | 监理内容 | 内容 | 例子 | |:---:|:---|:---|:---:| | 1 | 监理内容 | 1.安全监理规划-招标阶段-监理内容：（背）①协助招标准备工作（通用）②协助编写或审核招标文件（通用）③根据业主单位委托参与评标工作（通用）④承建合同的监理（通用） | | 第2版第24章习题13：信息安全系统设计阶段的主要监理活动有以下哪些（ ）。 ①促使业主单位和承建单位就信息安全需求进行充分沟通，并形成一致的理解。 ②建议承建单位根据信息安全风险评估报告和信息安全需求进行安全设计，在此期间若发现新的风险或安全需求，应及时通知业主单位和承建单位。 ③督促承建单位对信息系统工程的安全技术要求进行规范化描述，形成安全设计方案（包括体系结构设计和详细设计）。 ④如适用，对已确定将要实行等级保护的系统，应审核设计方案是否符合相应等级保护对应的安全技术要求。 ⑤审核承建单位的体系结构设计和详细设计，确保设计依据合规、安全控制措施能满足安全技术要求。 ⑥协助业主单位和监理单位与信息安全相关主管部门进行充分的沟通和协调，确保安全设计方案的合规性要求。 【参考答案】D 【郑房新老师点评】信息安全系统设计阶段的主要监理活动如下：（熟读） ①促使业主单位和承建单位就信息安全需求进行充分沟通，并形成一致的理解； ②建议承建单位根据信息安全风险评估报告和信息安全需求进行安全设计，在此期间若发现新的风险或安全需求，应及时通知业主单位和承建单位； ③督促承建单位对信息系统工程的安全技术要求进行规范化描述，形成安全设计方案（包括体系结构设计和详细设计）； ④如适用，对已确定将要实行等级保护的系统，应审核设计方案是否符合相应等级保护对应的安全技术要求； ⑤审核承建单位的体系结构设计和详细设计，确保设计依据合规、安全控制措施能满足安全技术要求； ⑥协助业主单位和监理单位与信息安全相关主管部门进行充分的沟通和协调，确保安全设计方案的合规性要求； ⑦建议承建单位在进行安全设计时，充分考虑新建项目对现有系统和目标系统安全性可能造成的影响，并在设计方案中有所体现； ⑧确保安全设计方案满足信息安全需求且具有可验证性，符合相关的法律法规、政策和标准，并与信息系统工程整体建设相符； ⑨要求承建单位提交工程设计方案和工程实施组织设计方案，监理机构对其中的安全涉及内容进行审核； ⑩协助业主单位配合承建单位完成工程设计前的安全需求调查和分析工作，就设计阶段的各种变更对工程安全性的可能影响提出监理意见； ⑪督促承建单位提供与安全设计方案配套的其他安全输入。——D正确。","options":[{"label":"A","text":"①②③④⑤。 B. ①③④⑤⑥。 C. ①②⑤⑥。 D. ①②③④⑤⑥。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4 安全监理-设计阶段监理工作《信息系统监理师教程 第2版》第554页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4.1 安全监理-设计阶段监理活动《信息系统监理师教程 第2版》第554页 | 序号 | 设计阶段监理活动 | 内容 | 例子 | |:---:|:---|:---|:---:| | 1 | 主要监理活动 | 1.信息安全系统设计阶段的主要监理活动如下：（熟读）①促使业主单位和承建单位就信息安全需求进行充分沟通，并形成一致的理解；②建议承建单位根据信息安全风险评估报告和信息安全需求进行安全设计，在此期间若发现新的风险或安全需求，应及时通知业主单位和承建单位；③督促承建单位对信息系统工程的安全技术要求进行规范化描述，形成安全设计方案（包括体系结构设计和详细设计）；④如适用，对已确定将要实行等级保护的系统，应审核设计方案是否符合相应等级保护对应的安全技术要求；⑤审核承建单位的体系结构设计和详细设计，确保设计依据合规、安全控制措施能满足安全技术要求；⑥协助业主单位和监理单位与信息安全相关主管部门进行充分的沟通和协调，确保安全设计方案的合规性要求；⑦建议承建单位在进行安全设计时，充分考虑新建项目对现有系统和目标系统安全性可能造成的影响，并在设计方案中有所体现；⑧确保安全设计方案满足信息安全需求且具有可验证性，符合相关的法律法规、政策和标准，并与信息系统工程整体建设相符；⑨要求承建单位提交工程设计方案和工程实施组织设计方案，监理机构对其中的安全涉及内容进行审核；⑩协助业主单位配合承建单位完成工程设计前的安全需求调查和分析工作，就设计阶段的各种变更对工程安全性的可能影响提出监理意见；⑪督促承建单位提供与安全设计方案配套的其他安全输入。 | | 第2版第24章习题14：安全监理规划-设计阶段监理内容有？ 【参考答案】 【郑房新老师点评】安全监理规划-设计阶段监理内容：（背）","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4.2 安全监理-设计阶段监理内容《信息系统监理师教程 第2版》第555页 | 序号 | | 内容 | 例子 | |:---:|:---|:---|:---:| | 一 | 安全监理规划-设计阶段监理内容 | 一、安全监理规划-设计阶段监理内容：（背：衔接）1.体系结构设计的审核 2.详细设计的审核 | | 第2版第24章习题15：监理机构应从以下哪些方面对系统体系结构设计进行审核，并提出监理意见（ ）。 ①安全设计与安全目标和安全需求的一致性。 ②如适用，应督促承建单位组织相关部门和有关安全技术专家对体系结构设计的合理性、确定性进行论证和审定。 ③安全控制措施应覆盖物理、主机、网络、应用、数据和信息安全管理等方面。 ④项目各阶段的安全风险分析和控制措施的全面性、合理性。 ⑤安全性检验手段应具有可操作性、有效性。 【参考答案】A 【郑房新老师点评】监理机构应从如下方面对系统体系结构设计进行审核，并提出监理意见： ①安全设计与安全目标和安全需求的一致性。 ②根据安全技术要求，选择安全模型时应考虑以下内容：a安全体系结构设计的合理性；b安全解决方案的针对性；c安全控制措施的有效性；d残余风险。 ③安全控制措施应覆盖物理、主机、网络、应用、数据和信息安全管理等方面。 ④项目各阶段的安全风险分析和控制措施的全面性、合理性。 ⑤安全性检验手段应具有可操作性、有效性。 ⑥如适用，应督促承建单位组织相关部门和有关安全技术专家对体系结构设计的合理性、确定性进行论证和审定。——A正确。","options":[{"label":"A","text":"①②③④⑤。 B. ②③④⑤。 C. ①②④⑤。 D. ①②③④。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4.2 安全监理-设计阶段监理内容《信息系统监理师教程 第2版》第555页 | 序号 | | 内容 | 例子 | |:---:|:---|:---|:---:| | 1 | 体系结构设计的审核 | 1.监理机构应从如下方面对系统体系结构设计进行审核，并提出监理意见：①安全设计与安全目标和安全需求的一致性。②根据安全技术要求，选择安全模型时应考虑以下内容：a安全体系结构设计的合理性；b安全解决方案的针对性；c安全控制措施的有效性；d残余风险。③安全控制措施应覆盖物理、主机、网络、应用、数据和信息安全管理等方面。④项目各阶段的安全风险分析和控制措施的全面性、合理性。⑤安全性检验手段应具有可操作性、有效性。⑥如适用，应督促承建单位组织相关部门和有关安全技术专家对体系结构设计的合理性、确定性进行论证和审定。 | | 第2版第24章习题16：监理机构应从以下哪些方面对系统详细设计进行审核，并提出监理意见（ ）。 ①详细设计应遵循体系结构设计，确定并明晰系统安全设计要素，如安全功能和性能、系统接口、安全控制措施、安全规范等。 ②安全控制措施应考虑计算机设备、设施。 ③选择具体的安全产品和服务，设计安全产品和服务中应具备的安全机制。 ④安全产品采购和使用应符合国家有关规定。 ⑤可预先对产品进行选型测试。 ⑥工程实施组织设计，相关的操作指南或手册。 ⑦为系统用户提供安全运行指南。 ⑧应督促承建单位组织相关部门和有关安全技术专家对详细设计的合理性、正确性进行论证和审定。 【参考答案】A 【郑房新老师点评】监理机构应从如下方面对系统详细设计进行审核，并提出监理意见： ①详细设计应遵循体系结构设计，确定并明晰系统安全设计要素，如安全功能和性能、系统接口、安全控制措施、安全规范等； ②安全控制措施应考虑计算机设备、设施(包括机房建筑、供电、空调等)、通信与网络设备、存储设备、身份鉴别、访问控制、安全审计、系统和信息集成、产品和服务获取、配置管理、应急计划、事件响应、安全评估与认证、安全意识和培训等方面，以及针对特定需求的安全控制措施； ③选择具体的安全产品和服务，设计安全产品和服务中应具备的安全机制(例如配置策略等)； ④安全产品采购和使用应符合国家有关规定； ⑤可预先对产品进行选型测试； ⑥工程实施组织设计，相关的操作指南或手册； ⑦为系统用户和管理员提供安全运行指南； ⑧应督促承建单位组织相关部门和有关安全技术专家对详细设计的合理性、正确性进行论证和审定。 ——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧。 B. ①②③⑧。 C. ①④⑤⑥⑦⑧。 D. ②③④⑤⑥⑦。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4.2 安全监理-设计阶段监理内容《信息系统监理师教程 第2版》第555页 | 序号 | | 内容 | 例子 | |:---:|:---|:---|:---:|","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.4.3 安全监理-深化设计阶段监理活动 《信息系统监理师教程 第2版》第556页 深化设计阶段监理活动表格： ①复核承建单位资质、拟派人员资质；(通用) ②审核工程实施方案，检查实施方案与承建合同、设计方案的一致性； ③审核承建单位提交的工程进度计划，保证信息系统工程中的各项安全控制措施实施符合总体时间安排； ④审核承建单位提交的开工报审材料，具备开工条件且经业主单位批准后，及时签发开工令； ⑤督促承建单位实地了解建设环境及现状，熟悉规划设计文件，并在此基础上开展深化设计工作； ⑥协调相关方，落实物理环境、电力供应、网络通信等相关资源配置； ⑦审核深化设计阶段各方提出的变更文件； ⑧及时出具书面审核意见，并监督相关方按照要求在规定时间内落实； ⑨根据项目实际需求，配合业主单位组织深化设计评审工作。 郑房新老师陪你一起刷题 13 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 第2版第24章习题18：安全监理-实施阶段-监理活动有以下哪些（____）。 ①在工程实施前，督促承建单位提供工程实施方案，确定项目组织结构。 ②确保工程实施方案合规、合理、可操作、可核查，满足承建合同提出的建设内容和技术要求，并与安全设计方案相符。 ③检查工程实施过程与工程实施方案的一致性。 ④监督承建单位落实安全控制措施，确保其有效实施，且达到设计要求。 ⑤确保工程中所使用的产品和服务符合安全设计方案，符合相关法律法规。 ⑥监督对安全设备的到货验收，督促承建单位规范进行设备安装及系统调试。 ⑦对安全子系统或安全设备进行功能与性能符合性检查。 ⑧督促承建单位做好工程实施中的安全管理工作。 ⑨如工程实施中存在重大变更，督促承建单位履行变更程序，并协调业主单位对系统安全性进行再评估。 【参考答案】A 【郑房新老师点评】安全监理-实施阶段-监理活动：(熟读/背:实施阶段通用) ①在工程实施前，督促承建单位提供工程实施方案，确定项目组织结构； ②确保工程实施方案合规、合理、可操作、可核查，满足承建合同提出的建设内容和技术要求，并与安全设计方案相符； ③检查工程实施过程与工程实施方案的一致性； ④监督承建单位落实安全控制措施，确保其有效实施，且达到设计要求； ⑤确保工程中所使用的产品和服务符合安全设计方案，符合相关法律法规； ⑥监督对安全设备的到货验收，督促承建单位规范进行设备安装及系统调试； ⑦对安全子系统或安全设备进行功能与性能符合性检查； ⑧督促承建单位做好工程实施中的安全管理工作； ⑨如工程实施中存在重大变更，督促承建单位履行变更程序，并协调业主单位对系统安全性进行再评估。第三级以上信息系统发生重大变更时，信息系统的责任单位应将变更情况及时上报相应的主管部门，并按照主管部门的要求办理相关事项。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨。"},{"label":"B","text":"①②③⑤⑥⑦⑧⑨。"},{"label":"C","text":"①③④⑤⑥⑦⑧⑨。"},{"label":"D","text":"①②③④⑤⑥⑦⑧。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.5 安全监理-实施阶段监理工作 《信息系统监理师教程 第2版》第559页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.5.1 安全监理-实施阶段-监理活动 《信息系统监理师教程 第2版》第559页 安全监理-实施阶段-监理活动表格： ①在工程实施前，督促承建单位提供工程实施方案，确定项目组织结构；(实施阶段通用) ②确保工程实施方案合规、合理、可操作、可核查，满足承建合同提出的建设内容和技术要求，并与安全设计方案相符；(实施阶段通用) ③检查工程实施过程与工程实施方案的一致性；(实施阶段通用) ④监督承建单位落实安全控制措施，确保其有效实施，且达到设计要求； ⑤确保工程中所使用的产品和服务符合安全设计方案，符合相关法律法规；(实施阶段通用) ⑥监督对安全设备的到货验收，督促承建单位规范进行设备安装及系统调试；(实施阶段通用) ⑦对安全子系统或安全设备进行功能与性能符合性检查；(实施阶段通用) ⑧督促承建单位做好工程实施中的安全管理工作；(实施阶段通用) ⑨如工程实施中存在重大变更，督促承建单位履行变更程序，并协调业主单位对系统安全性进行再评估。第三级以上信息系统发生重大变更时，信息系统的责任单位应将变更情况及时上报相应的主管部门，并按照主管部门的要求办理相关事项。(实施阶段通用) 郑房新老师陪你一起刷题 14 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 第2版第24章习题19：安全监理-实施阶段-监理内容有哪些？ 【参考答案】 【郑房新老师点评】安全监理-实施阶段-监理内容：(熟读/背:蓝色字体 实施阶段通用) ①工程实施方案的审核 ②安全控制措施的审核 ③安全设备的验收 ④工程实施中的安全管理。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.5.2 安全监理-实施阶段-监理内容 《信息系统监理师教程 第2版》第560页 安全监理-实施阶段-监理内容表格： ①工程实施方案的审核 ②安全控制措施的审核 ③安全设备的验收 ④工程实施中的安全管理。 第2版第24章习题20：信息安全系统测试评估阶段的主要监理活动有如下哪些（____）。 ①依据相关规定，第三级以上信息系统的安全系统、商用密码应用系统建设完成后，业主单位应当委托公安部门、国家密码管理部门推荐或指定的测评机构进行等级保护、商用密码应用安全性评估，评估通过后系统方可投入运行，评估结果作为项目建设验收的必备材料。 ②提醒业主单位与测评机构签署委托测评协议文本，根据业主单位委托审核协议文本，出具监理意见。 ③提醒业主单位与测评机构及时签署保密协议，以约束测评相关方现在及将来的行为。 ④提醒测试评估单位，如无业主单位授权，不得对关键信息基础设施实施漏洞探测、渗透性测试等可能影响或者危害关键信息基础设施安全的活动。 ⑤提醒相关单位在现场测评开始前对系统及数据进行备份，并对可能出现的事件制定应急处理方案。 ⑥督促测试单位及时编制测试方案、测试报告等测试相关文件，并组卷归档。 郑房新老师陪你一起刷题 15 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 习题20续： 【参考答案】A 【郑房新老师点评】信息安全系统测试评估阶段的主要监理活动如下：(熟读/背:蓝色字体 实施阶段通用) ①依据相关规定，第三级以上信息系统的安全系统、商用密码应用系统建设完成后，业主单位应当委托公安部门、国家密码管理部门推荐或指定的测评机构进行等级保护、商用密码应用安全性评估，评估通过后系统方可投入运行，评估结果作为项目建设验收的必备材料。监理机构应配合测评机构完成等级保护测评、密码应用安全性评估工作，并协助业主单位完成评估结果备案。 ②提醒业主单位与测评机构签署委托测评协议文本，根据业主单位委托审核协议文本，出具监理意见。 ③提醒业主单位与测评机构及时签署保密协议，以约束测评相关方现在及将来的行为。保密协议应规定测评相关方保密方面的权利与义务。测评过程中获取的相关系统数据信息及测评工作的成果属被测评单位所有，测评方如需引用或公开，应得到相关单位的授权，否则相关单位将按照保密协议的要求追究测评单位的法律责任。 ④提醒测试评估单位，如无业主单位授权，不得对关键信息基础设施实施漏洞探测、渗透性测试等可能影响或者危害关键信息基础设施安全的活动。对基础电信网络实施漏洞探测、渗透性测试等活动，应当事先向国务院电信主管部门报告。 ⑤提醒相关单位在现场测评开始前对系统及数据进行备份，并对可能出现的事件制定应急处理方案。 ⑥督促测试单位及时编制测试方案、测试报告等测试相关文件，并组卷归档。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①②③⑤⑥。"},{"label":"C","text":"②③④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.6 安全监理-测试评估阶段监理工作 《信息系统监理师教程 第2版》第361页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","questi 文件，督促承建单位进行系统测试和试运行，对信息系统工程进行安全符合性检查…… ②监督系统测试过程，复核测试评估结论，确保建设成果满足规划设计要求； ③复核项目范围内的软硬件数量、部署位置、运行状态，确保符合招投标文件、承建合同的要求； ④协助业主单位建立验收工作机构，做好验收筹备工作，组织项目终验会议； ⑤协助验收工作机构审核承建单位提供的工程验收方案，并提出监理意见； ⑥协助业主单位对承建单位提供的验收申请资料进行评审，并提出监理意见； ⑦组织业主单位、承建单位分析相关专家评审意见，并对整改结果进行复核； ⑧适用时，可建议业主单位委托第三方机构进行安全测评和风险评估； ⑨督促承建单位及时整改发现的问题；(所有阶段都能写) ⑩协助业主单位收集工程设计和实施中的各种关键文档，做好监理文档的组卷归档工作。 郑房新老师陪你一起刷题 17 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 第2版第24章习题22：以下哪些是物理安全方面的关键技术要求（____）。 ①电子设备机房的安全设计应符合GB/T 9361《计算机场地安全要求》的规定。 ②机房环境监控。 ③物理访问控制。 ④防盗窃防破坏。 ⑤防雷击。 ⑥防火。 ⑦防水和防潮。 ⑧防静电。 ⑨温湿度控制。 ⑩电力供应。 ⑪电磁防护。 【参考答案】A 【郑房新老师点评】物理安全方面的关键技术要求如下： ①电子设备机房的安全设计应符合GB/T 9361《计算机场地安全要求》的规定。 ②机房物理位置选择在遵照相关技术规范的前提下，以等级保护第三级为例(下同)还必须考虑以下因素：等级保护第三级以上系统，机房场地应避免设在建筑物的高层或地下室，以及用水设备的下层或隔壁。 ③物理访问控制。 ④防盗窃防破坏。 ⑤防雷击。 ⑥防火。 ⑦防水和防潮。 ⑧防静电。 ⑨温湿度控制。 ⑩电力供应。 ⑪电磁防护。 ⑫机房环境监控。 ⑬对于涉及敏感数据或关键的系统链路，还应考虑其他必要措施。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨⑩⑪。"},{"label":"B","text":"⑤⑥⑦⑧⑨⑩⑪。"},{"label":"C","text":"②③④⑤⑥⑦⑧⑨⑩⑪。"},{"label":"D","text":"①②③④⑤⑥⑦⑧⑨⑩。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.9.1 物理安全 《信息系统监理师教程 第2版》第571页 物理安全关键技术表格： ①电子设备机房的安全设计应符合GB/T 9361《计算机场地安全要求》的规定。 ②机房物理位置选择在遵照相关技术规范的前提下，以等级保护第三级为例(下同)还必须考虑以下因素：等级保护第三级以上系统，机房场地应避免设在建筑物的高层或地下室，以及用水设备的下层或隔壁。 郑房新老师陪你一起刷题 18 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 物理安全关键技术续： ③物理访问控制。具体包括： a 等级保护第三级以上系统，应对机房进行区域划分，区域和区域之间设置物理隔离装置，在重要区域前设置交付或安装等过渡区域； b 等级保护第三级以上系统，重要区域应配置电子门禁系统，控制、鉴别和记录进入的人员。 ④防盗窃防破坏。具体包括： a 等级保护第三级以上系统，机房应安装采用光、电等技术的机房防盗报警系统； b 等级保护第三级以上系统，机房应设置监控报警系统。 ⑤防雷击。等级保护第三级以上系统，应在供配电系统上设置防浪涌保护装置，防止感应雷，同时建议在使用电缆的重要弱电设备端口安装防浪涌保护装置。 ⑥防火。具体包括： a 等级保护第三级以上系统，机房应设置火灾自动消防系统能够自动检测火情、自动报警，并自动灭火； b 等级保护第三级以上系统，机房及相关的工作房间和辅助房间应采用具有耐火等级的建筑材料和装饰材料； c 等级保护第三级以上系统，机房应采取区域隔离防火措施，将重要设备与其他设备隔离开，物理隔断在吊顶之上和防静电地板以下应安装防火板与建筑结构闭合。 ⑦防水和防潮。等级保护第三级以上系统，在存在水管穿越的区域，以及安装精密空调的区域，应安装对水敏感的检测仪表或元件，对机房进行防水检测和报警。 ⑧防静电。等级保护第三级以上系统，机房的地面应采用防静电地板。 ⑨温湿度控制。等级保护第三级以上系统，机房应设置温、湿度自动调节设施，使机房温、湿度的变化在设备运行所允许的范围之内。 ⑩电力供应。等级保护第三级以上系统，应设置冗余或并行的电力电缆线路为计算机系统供电，有条件的建议机所在建筑部署备用供电系统(如柴油/汽油发电机)。 ⑪电磁防护。具体包括： a 等级保护第三级以上系统，应保证机房采用接地方式防止外界电磁干扰和设备寄生耦合干扰； b 等级保护第三级以上系统，应对关键设备和磁介质进行电磁屏蔽(使用屏蔽机柜安装关键设备，使用电磁屏蔽防潮柜存放磁介质)。 ⑫机房环境监控。适时关注机房环境监控的关键部位和技术实现符合相关要求。 ⑬对于涉及敏感数据或关键的系统链路，还应考虑其他必要措施。 第2版第24章习题23：以下哪些是网络安全方面的关键技术要求（____）。 ①各种服务器及网络核心设备宜放置在专门的电子设备机房。 ②信息网络平台中涉及的防火墙、防病毒系统等网络安全软硬件设备应通过国家相关安全测评认证机构的认证。 ③结构安全。 ④访问控制。 ⑤网络设备防护。 ⑥安全审计。 ⑦边界完整性。 ⑧入侵防范。 ⑨恶意代码防范。 郑房新老师陪你一起刷题 19 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 习题23续： 【参考答案】A 【郑房新老师点评】网络安全方面的关键技术要求如下： ①各种服务器及网络核心设备宜放置在专门的电子设备机房。 ②信息网络平台中涉及的防火墙、防病毒系统等网络安全软硬件设备应通过国家相关安全测评认证机构的认证。 ③结构安全。 ④访问控制。(网络，主机和应用通用) ⑤网络设备防护。 ⑥安全审计(网络，主机和应用通用) ⑦边界完整性 ⑧入侵防范。(网络，主机通用) ⑨恶意代码防范(网络，主机通用)——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨。"},{"label":"B","text":"②③④⑤⑥⑦⑧⑨。"},{"label":"C","text":"①②⑥⑦⑧⑨。"},{"label":"D","text":"①②③④⑤⑥⑦。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.9.2 网络安全 《信息系统监理师教程 第2版》第572页 网络安全关键技术表格： ①各种服务器及网络核心设备宜放置在专门的电子设备机房。 ②信息网络平台中涉及的防火墙、防病毒系统等网络安全软硬件设备应通过国家相关安全测评认证机构的认证。 ③结构安全。 ④访问控制。(网络，主机和应用通用) ⑤网络设备防护。 ⑥安全审计(网络，主机和应用通用) ⑦边界完整性 ⑧入侵防范。(网络，主机通用) ⑨恶意代码防范(网络，主机通用) ③结构安全。具体包括： a 网络全局和结构设计应保证关键网络设备的业务处理能力具备冗余空间，满足网络各个部分业务高峰期需要，等级保护第三级以上系统，应保证主要网络设备的以上能力； b 应绘制与实际部署情况相符的网络拓扑结构图，需标识出所有服务器、网络设备和安全设备，及相应的设备型号、IP地址和连接端口等，标识出安全区域划分情况； c 等级保护第三级以上系统，应在业务终端与业务服务器之间进行路由控制建立安全的访问路径，如使用静态路由或启用加密认证的相关技术手段； d 等级保护第三级以上系统，应避免将重要网段(如服务器区、数据存储区)部署在网络边界处且直接连接外部信息系统，重要网段与其他网段之间采取可靠的技术隔离手段(如防火墙、网闸等)； e 等级保护第三级以上系统，应按照对业务服务的重要次序来指定带宽分配优先级别，保证在网络发生拥堵的时候优先保护重要主机，在核心交换机或边界设备上配置并启用QoS策略； f 应根据各部门的工作职能、重要性和所涉及信息的重要程度等因素，划分不同的子网或网段，并按照方便管理和控制的原则为各子网、网段分配地址段。 ④访问控制。具体包括： a 应在网络边界处部署访问控制设备(如防火墙等)，启用访问控制功能，并配置合理的访问控制策略； b 应能根据会话状态信息为数据流提供明确的允许/拒绝访问的能力，控制粒度为网段级，等级保护第三级以上系统要求控制粒度为端口级； c 等级保护第三级以上系统，应对进出网络(Internet边界)的信息内容进行过滤，实现对应用层HTTP、FTP、Telnet、SMTP、POP3等协议命令级的控制； d 网络应具备会话超时中断、最大并发数限制功能；重要网段应采取IP/MAC地址绑定，或其他防地址欺骗手段； e 应按用户和系统之间的允许访问规则，决定允许或拒绝用户对受控系统进行资源访问，控制粒度为单个用户； f 如网络提供了拨号接入功能，需要对拨号用户数量进行限制。 郑房新老师陪你一起刷题 20 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 网络安全关键技术续： ⑤网络设备防护。具体包括： a 应对登录网络设备的用户进行身份鉴别，网络设备的管理用户标识应具有唯一性； b 应对网络设备的管理员登录地址进行限制； c 管理用户的身份鉴别信息应具有不易被冒用的特点，口令应有复杂度要求并定期更换，设备具备口令复杂度限制和口令生存周期限制功能的，应启用； d 等级保护第三级以上系统的网络中，网络设备与安全设备应对同一用户选择两种或两种以上组合的鉴别技术来进行身份鉴别； e 应具有登录失败处理功能，可采取结束会话、限制非法登录次数和当网络登录连接超时自动退出等措施； f 当对网络设备进行远程管理时，应采取必要措施防止鉴别信息在网络传输过程中被窃听，如启用SSH、HTTPS等安全协议进行远程管理登录。 ⑥安全审计。具体包括： a 应对网络系统中的网络设备运行状况、网络流量、用户行为等进行日志记录，审计记录应包括事件的日期和时间、用户、事件类型、事件是否成功及其他与审计相关的信息； b 等级保护第三级以上系统，应对审计记录进行保护，避免受到未预期的删除、修改或覆盖等，应能够根据记录数据进行分析，并生成审计报表。 ⑦边界完整性。具体包括： a 应部署终端管理系统对内部网络用户私自联到外部网络(如越权访问、授权的无线网络和私自安装4G或5G上网卡连接Internet)的行为进行检查，并对其进行有效阻断； b 等级保护第三级以上系统，应部署基于802.1X等认证的网络准入控制系统，对非授权设备私自联到内部网络(如非授权的终端、服务器及网络设备)的行为进行检查，并对其进行有效阻断。 ⑧入侵防范。具体包括： a 应在网络边界处部署IPS、UTM等设备，或在网络核心部署IDS设备，监视以下攻击行为:端口扫描、强力攻击、木马后门攻击、拒绝服务攻击、缓冲区溢出攻击、IP碎片攻击和网络蠕虫攻击等； b 等级保护第三级以上系统，应在检测到攻击行为时，记录攻击源IP、攻击类型、攻击目的、攻击时间，在发生严重入侵事件时应提供报警。 ⑨恶意代码防范。具体包括： a 等级保护第三级以上系统，应在网络边界处部署网络反病毒设备(如防毒墙、UTM等)，对恶意代码进行检测和清除； b 等级保护第三级以上系统，网络反病毒设备应具备恶意代码库自动升级和检测系统更新功能。 郑房新老师陪你一起刷题 21 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】 第2版第24章习题24：以下属于主机安全方面的关键技术要求的是（____）。 ①身份鉴别。 ②访问控制。 ③安全审计。 ④剩余信息保护。 ⑤入侵防范。 ⑥恶意代码防范。 ⑦资源控制。 ⑧完整性和保密性。 【参考答案】B 【郑房新老师点评】主机安全方面的关键技术要求如下： ①身份鉴别。(主机和应用通用) ②访问控制。(网络，主机和应用通用) ③安全审计。(网络，主机和应用通用) ④剩余信息保护。(主机和应用通用) ⑤入侵防范。(网络，主机通用) ⑥恶意代码防范。(网络，主机通用) ⑦资源控制。(主机和应用通用)——B正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧。"},{"label":"B","text":"①②③④⑤⑥⑦。"},{"label":"C","text":"③④⑤⑥⑦⑧。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第24章)","category":"章节练习","chapter":"第24章","time_label":"2025年5月","question_number":24,"question":"24.9.3 主机安全 《信息系统监理师教程 第2版》第574页 主机安全关键技术表格： ①身份鉴别。(主机和应用通用) ②访问控制。(网络，主机和应用通用) ③安全审计。(网络，主机和应用通用) ④剩余信息保护。(主机和应用通用) ⑤入侵防范。(网络，主机通用) ⑥恶意代码防范。(网络，主机通用) ⑦资源控制。(主机和应用通用) 第2版第24章习题25：以下属于应用系统安全方面的关键技术要求的是（____）。 郑房新老师陪你一起刷题 22 际需求，配合业主单位组织深化设计评审工作。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨。"},{"label":"B","text":"①②③⑤⑥⑧⑨。"},{"label":"C","text":"③④⑤⑥⑦⑧⑨。"},{"label":"D","text":"①②③④⑤⑥⑦。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1 概述 《信息系统监理师教程 第2版 2024年1月出版》 第520页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.1 基本概念 《信息系统监理师教程 第2版 2024年1月出版》 第520页 重要性 ★★ | 序号 | 基本概念 | 内容 | 例子 | |:---:|:---|:---|:---| | 1 | 数据中心 | 1.数据中心:以信息技术为支撑，由电子设备机房、其他基础设施、信息系统软硬件、信息资源(数据)和人员以及相应的规章制度组成的，以实现应用集中处理和数据集中存放，提供数据的构建、交换、集成、共享等信息服务的基础环境。 | | | 2 | 设计交底 | 1.设计交底:一种由业主单位组织，数据中心设计单位将已通过评审的施工图向承建单位、监理单位进行详细说明的技术活动，帮助承建单位和监理单位正确贯彻设计意图，掌握关键工程部位的质量要求，确保工程质量。 | | | 3 | 深化设计 | 1.深化设计:承建单位在原设计方案和图纸基础上，结合现场实际情况，对图纸进行细化、补充、完善后形成施工设计文件的过程。 | | | 4 | 上电自检 | 1.上电自检:计算机设备按照正常电压接通电源后执行自我检查例行程序，在固件控制的输出设备上显示结果的过程。 | | 郑房新老师陪你一起刷题 1 | 序号 | 基本概念 | 内容 | 例子 | |:---:|:---|:---|:---| | 5 | 信息资源规划 | 1.信息资源规划:对企事业单位或政府部门业务管理信息的采集、处理、传输和利用进行全面规划，侧重数据流分析，为实现信息资源整合与应用系统集成的总体规划。 | | | 6 | 服务级别指标 | 1.服务级别指标:用于评估、衡量供方信息技术服务能力的参数。 | | | 7 | 服务级别协议(SLA) | 1.服务级别协议:信息技术服务供方与需方之间签署的，描述服务和约定服务级别的协议。 | | 第2版第23章习题2：数据中心工程主要建设任务有哪些？ 【参考答案】 【郑房新老师点评】数据中心工程主要建设任务:①电子设备机房②其他基础设施③信息系统软硬件④信息资源(数据)规划⑤主要人员的角色、职能⑥数据中心的主要规章制度","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★ | 序号 | 主要建设任务 | 内容 | 例子 | |:---:|:---|:---|:---| | 一 | 数据中心工程主要建设任务 | 一．数据中心工程主要建设任务:（背：机其软资角规） 重要性 ★★★★ ①电子设备机房 ②其他基础设施 ③信息系统软硬件 ④信息资源(数据)规划 ⑤主要人员的角色、职能 ⑥数据中心的主要规章制度 | | 第2版第23章习题3：数据中心电子设备机房的主要建设任务包括哪些？ 【参考答案】 【郑房新老师点评】数据中心电子设备机房的主要建设任务包括:","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★ | 序号 | 主要建设任务 | 内容 | 例子 | |:---:|:---|:---|:---| | ① | 电子设备机房 | 一.数据中心电子设备机房的主要建设任务包括:（背:供空消安环动） 重要性 ★★★★","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★★ 序号\t主要建设任务\t内容 ①\t电子设备机房\t一.数据中心电子设备机房的主要建设任务包括：(背：供空消安环动) 重要性 ★★★★★","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 郑房新老师陪你一起刷题 9 重要性 ★★★★☆ 序号\t主要建设任务\t内容 4\t信息资源(数据)规划\t一、信息资源规划的基本思路 ①通过对所涉及的业务所有数据应用与展现的规范化和结构化分析，进行数据流的定性和定量分析，从中抽取信息资源规划的基本数据元素和基本表单； ②通过分析信息资源应用全范围的数据库，以概念数据库及逻辑数据库等方式构筑典型专业化数据模型，并通过体系结构模型指导物理实体库表的设计与建造。 二、信息资源规划的步骤 信息资源规划的步骤具体如下： ①应用数据资源规划 ②数据信息资源规划 ③保障数据资源规划 ①应用数据资源规划。主要包括： a体现业务行业职能的整体需求，构建既符合信息化要求又符合业务职能履职要求的数据系统； b满足服务对象的需求，从划分行政职能功能和应用服务的角度提取和整合行政管理逻辑相关的信息数据。 ②数据信息资源规划。主要包括： a做好数据信息资源共享的底层规划，例如网络、运行环境、软件平台、物联网、分析工具等方面的数据信息； b做好各类应用系统和功能模块产生、控制和使用的数据实体分析，按照数据信息的相关逻辑，对数据进行分析、筛选、整合、归并等技术论证，确定数据库之间的关系以及主要数据表等。 ③保障数据资源规划。主要包括： a从物理层、网络层、系统层、应用层、管理层等层次的安全措施及管理制度等方面进行规划，满足各阶层业务用户对远程访问和可视展示的智能化展示、安全管理等要求； b以应用架构为基础的标准化的评估体系，规划可以量化的考核指标，同时提出绩效评估方法，能根据不同的分类标准，进行内评估、外评估、事前评估和事后评估等； c依照明确的政策法规、规范标准和组织机构等方面的规划需求、规划范围和相关内容进行规划。 第2版第23章习题8：数据中心涉及的管理制度包括（ ）。 ①出入口禁管理办法。 ②各角色人员职责明示。 ③设备故障报告流程。 ④安全事故报告流程。 ⑤故障、事故处理确认流程。 【参考答案】A 【郑房新老师点评】数据中心涉及的管理制度包括但不限于： ①出入口禁管理办法； ②各角色人员职责明示； ③设备故障报告流程； ④安全事故报告流程； ⑤故障、事故处理确认流程。——A正确。","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"②③④⑤。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"①③⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★☆ 序号\t主要建设任务\t内容 6\t数据中心的主要规章制度\t1.数据中心涉及的管理制度包括但不限于：(熟读蓝色字体) ①出入口禁管理办法； ②各角色人员职责明示； ③设备故障报告流程； ④安全事故报告流程； ⑤故障、事故处理确认流程。 郑房新老师陪你一起刷题 10 第2版第23章习题9：服务类管理岗位人员及主要职能包括（ ）。 ①参与数据中心网络的架构设计、建设，负责其日常维护、优化等工作。 ②负责数据中心网络安全策略的评估、制定和实施。 ③负责数据中心网络线路、网络设备及域名等的日常运维、监控和管理。 ④负责相关业务上线的网络方案的测试、实施及保障。 ⑤负责对数据中心管理制度的监督执行、检查和考核。 【参考答案】A 【郑房新老师点评】服务类管理岗位人员及主要职能 数据中心管理岗以数据中心管理员为主，根据需要可适当配备其他必要的人员。其主要职责包括但不限于： ①参与数据中心网络的架构设计、建设，负责其日常维护、优化等工作； ②负责数据中心网络安全策略的评估、制定和实施； ③负责数据中心网络线路、网络设备及域名等的日常运维、监控和管理； ④负责相关业务上线的网络方案的测试、实施及保障； ⑤负责对数据中心管理制度的监督执行、检查和考核。——A正确。","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①②③⑤。"},{"label":"C","text":"①②③。"},{"label":"D","text":"④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.1.2 数据中心工程主要建设任务 《信息系统监理师教程 第2版 2024年1月出版》 第521页 重要性 ★★★★☆ 序号\t主要建设任务\t内容 5\t主要人员的角色、职能\t1.数据中心人员主要分为两大类:研发实施类的技术岗位、服务类的管理岗位。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.2 招标阶段监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第525页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.2.1 招标阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》 第526页 重要性 ★★ 序号\t监理活动\t内容 1\t招标阶段主要监理活动\t数据中心工程招标阶段的主要监理活动如下： ①在业主单位的授权下，参加招标文件的编制过程，提供咨询服务，针对业主单位的质询，提供监理意见；(通用,之前讲过,再次重复) ②在业主单位的授权下，参加业主单位与承建单位合同或服务级别协议(SLA)谈判过程，提供咨询服务，针对业主单位的质询，提供监理意见。(通用,之前讲过,再次重复) 郑房新老师陪你一起刷题 11 第2版第23章习题11：监理机构应对招标文件重点审核以下哪些内容（ ）。 ①审核招标方式与立项批复招标方式的符合性。 ②结合工程建设需求和现状，审核招标内容与工程初步设计及概算批复的符合性。 ③审核投标单位资质要求的合理性，注意规避可能存在的歧视和违规性表述。 ④审核招标文件获取及递交时间的合规性。 ⑤审核资格审查程序和条件的合规性。 ⑥审核投标保证金、履约保证金约定的合理性。 ⑦审核评标办法、评分标准的合理性。 ⑧审核废标条件的合规性。 【参考答案】A 【郑房新老师点评】监理机构应对招标文件重点审核以下内容：①审核招标方式与立项批复招标方式的符合性； ②结合工程建设需求和现状，审核招标内容与工程初步设计及概算批复的符合性； ③审核投标单位资质要求的合理性，注意规避可能存在的歧视和违规性表述； ④审核招标文件获取及递交时间的合规性； ⑤审核资格审查程序和条件的合规性； ⑥审核投标保证金、履约保证金约定的合理性； ⑦审核评标办法、评分标准的合理性； ⑧审核废标条件的合规性； ⑨根据工程初步设计报告、招标技术需求等，审核工程质量要求和进度要求的合规性； ⑩根据工程/项目的初步设计报告、概预算批复意见和当前市场行情等，审核安全生产和文明施工等措施费用与计价合规性； ⑪审核变更、计量、材料及人工费调整、违约、结算审计等约定的合规性； ⑫响应业主单位提出的其他咨询要求，提出监理意见和建议。——A正确。","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧。"},{"label":"B","text":"②③④⑤⑥⑦⑧。"},{"label":"C","text":"①②③⑦⑧。"},{"label":"D","text":"①②③④⑤⑥。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.2.2 监理要点 《信息系统监理师教程 第2版 2024年1月出版》 第526页 重要性 ★★ 序号\t监理要点\t内容 1\t数据中心招标文件的审核要点\t1.监理机构应对招标文件重点审核以下内容：(通用,有个印象) ①审核招标方式与立项批复招标方式的符合性； ②结合工程建设需求和现状,审核招标内容与工程初步设计及概算批复的符合性； ③审核投标单位资质要求的合理性,注意规避可能存在的歧视和违规性表述； ④审核招标文件获取及递交时间的合规性； ⑤审核资格审查程序和条件的合规性； ⑥审核投标保证金、履约保证金约定的合理性； ⑦审核评标办法、评分标准的合理性； ⑧审核废标条件的合规性； ⑨根据工程初步设计报告、招标技术需求等,审核工程质量要求和进度要求的合规性； ⑩根据工程/项目的初步设计报告、概预算批复意见和当前市场行情等,审核安全生产和文明施工等措施费用与计价合规性； ⑪审核变更、计量、材料及人工费调整、违约、结算审计等约定的合规性； ⑫响应业主单位提出的其他咨询要求,提出监理意见和建议。 第2版第23章习题12：监理机构可以根据数据中心建设需求及招标文件，对承建合同或服务级别协议(SLA)的如下哪些方面进行重点审核，并提出咨询意见？（ ）。 ①审核合同范围、双方职责、权利和义务的描述与招标文件的一致性，比对合同或协议与招标文件、投标文件可能存在的差异。 ②审核采购货物参数和服务级别指标的明确性。 ③审核实施工艺、工序及验收指标的合规性。 ④审核交付过程与交付成果的可操作性与合规性。 郑房新老师陪你一起刷题 12 【参考答案】A 【郑房新老师点评】监理机构可以根据数据中心建设需求及招标文件，对承建合同或服务级别协议(SLA)的如下方面进行重点审核，并提出咨询意见： ①审核合同范围、双方职责、权利和义务的描述与招标文件的一致性，比对合同或协议与招标文件、投标文件可能存在的差异； ②审核采购货物参数和服务级别指标的明确性； ③审核实施工艺、工序及验收指标的合规性； ④审核交付过程与交付成果的可操作性与合规性。——A正确。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第23章)","category":"章节练习","chapter":"第23章","time_label":"2025年5月","question_number":23,"question":"23.2.2 监理要点 《信息系统监理师教程 第2版 2024年1月出版》 第526页 重要性 ★★ | 序号 | 监理要点 | 内容 | 例子 | |:---:|:---|:---|:---| | 2 | 承建单位合同或服务级别协议(SLA)的审核重点 | 1.监理机构可以根据数据中心建设需求及招标文件，对承建合同或服务级别协议(SLA)的如下方面进行重点审核，并提出咨询意见： ①审核合同范围、双方职责、权利和义务的描述与招标文件的一致性，比对合同或协议与招标文件、投标文件可能存在的差异； ②审核采购货物参数和服务级别指标的明确性； ③审核实施工艺、工序及验收指标的合规性； ④审核交付过程与交付成果的可操作性与合规性。 | 陷阱多 | 第2版第23章习题13：以下属于数据中心工程设计阶段的主要监理活动有哪些（ ）。 ①根据数据中心工程建设实际需要，可向业主单位提供咨询服务，协助建立起符合项目建设需求的规章制度体系。 ②根据合同要求，对承建单位报送的开工手续进行审查，对开工条件进行核验，出具监理意见，签 2025年5月","question_number":3,"question":"3.监理响应措施——D正确。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题20：以下属于数据中心设计的需求分析审核要点的有（ ）。 ①最大化地适应业务需求的高可用性。 ②准确的数据挖掘、整理、再计算的高可靠性。 ③高效节约、绿色低排放的建设方案。 ④最适宜的运营维护策略等。 【参考答案】A 【郑房新老师点评】数据中心设计的需求分析审核要点 ①最大化地适应业务需求的高可用性； ②准确的数据挖掘、整理、再计算的高可靠性； ③高效节约、绿色低排放的建设方案； ④最适宜的运营维护策略等。——A正确。 第2版第23章习题21：数据中心设计方案的评审要点包括以下哪些（ ）。 ①设计方案整体架构要做到层次明了、架构清晰、主次分明、易读易懂。 ②每一项设计内容要做到有分析、有结论，结论要明确，描述要精练。 ③设计思路和设计展示要基于科学、严谨、有依据的数据推导过程和分析，切忌猜测。 ④设计方案应充分展示高度的逻辑思维、判断和推导，语言表述能够被读懂。 ⑤设计方案一定要基于广泛收集的、可靠的数据，论据完整、可信。 ⑥设计方案应适当以图表展示，结合必要的文字表述，既简练又达意。 ⑦设计方案应具备完整性，宜以\"发现问题→分析问题→解决问题→关闭问题\"的闭环思路进行表述。 ⑧设计方案既要提出解决方案，也要提出必要的辅助性、支撑性的建议。 【参考答案】A 【郑房新老师点评】数据中心设计方案的评审要点： ①设计方案整体架构要做到层次明了、架构清晰、主次分明、易读易懂； ②每一项设计内容要做到有分析、有结论，结论要明确，描述要精练； ③设计思路和设计展示要基于科学、严谨、有依据的数据推导过程和分析，切忌猜测； ④设计方案应充分展示高度的逻辑思维、判断和推导，语言表述能够被读懂； ⑤设计方案一定要基于广泛收集的、可靠的数据，论据完整、可信； ⑥设计方案应适当以图表展示，结合必要的文字表述，既简练又达意； ⑦设计方案应具备完整性，宜以\"发现问题→分析问题→解决问题→关闭问题\"的闭环思路进行表述； ⑧设计方案既要提出解决方案，也要提出必要的辅助性、支撑性的建议。——A正确。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题22：工程变更，若因以下哪些客观原因发生变更的，报业主单位审批方能组织洽商（ ）。 a 变更建设地点的。 b 变更建设性质的。 c 变更业主单位的。 d 变更招标方案的。 e 变更建设内容、建设规模、建设标准、技术方案等，导致项目主要使用(服务)功能发生变化的。 f 项目实施过程中投资变动超过批准初步设计概算总投资的约定比例的(如10%)。 【参考答案】B 【郑房新老师点评】协助业主单位严格控制工程变更，及时做好工程结算。对于确因以下客观原因发生变更的，报业主单位审批方能组织洽商： a 变更建设地点的； b 变更建设性质的； c 变更业主单位的； d 变更招标方案的； e 变更建设内容、建设规模、建设标准、技术方案等，导致项目主要使用(服务)功能发生变化的； f 项目实施过程中投资变动超过批准初步设计概算总投资的约定比例的(如10%)。——B正确。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题23：数据中心工程实施阶段的监理活动一般应包括以下哪些（ ）。 ①监督承建单位严格按照设计图纸、施工标准和规范进行施工 ②督促承建单位建立健全工程质量保证体系，落实现场工程质量自检制度、重要结构部位和隐蔽工程质量预检复检制度、设备材料质量检查制度。 ③加强对施工各阶段的质量、投资、进度、安全控制管理，确保工程质量。 ④协助业主单位严格控制工程变更，及时做好工程结算。 ⑤协调业主单位、承建单位、材料设备供应商等各方工作，有效推进施工进度。 ⑥协助业主单位、承建单位认真落实安全管理制度，保障施工安全。 ⑦对数据中心工程的信息系统软硬件实施过程进行旁站和检查，实施随工检测，做好监理记录。 ⑧对数据中心工程的信息资源(数据)实施过程进行审查和组织评审，做好监理记录。 ⑨对数据中心工程的人员及相关规章制度实施过程进行咨询和协调，做好监理记录。 【参考答案】C 【郑房新老师点评】数据中心工程实施阶段的监理活动一般应包括： ①监督承建单位严格按照设计图纸、施工标准和规范进行施工 ②督促承建单位建立健全工程质量保证体系，落实现场工程质量自检制度、重要结构部位和隐蔽工程质量预检复检制度、设备材料质量检查制度。 ③加强对施工各阶段的质量、投资、进度、安全控制管理，确保工程质量。 ④协助业主单位严格控制工程变更，及时做好工程结算。 ⑤协调业主单位、承建单位、材料设备供应商等各方工作，有效推进施工进度。 ⑥协助业主单位、承建单位认真落实安全管理制度，保障施工安全。 ⑦对数据中心工程的信息系统软硬件实施过程进行旁站和检查，实施随工检测，做好监理记录。 ⑧对数据中心工程的信息资源(数据)实施过程进行审查和组织评审，做好监理记录。 ⑨对数据中心工程的人员及相关规章制度实施过程进行咨询和协调，做好监理记录。——C正确。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题24：数据中心工程实施阶段监理内容，有哪些？ 【参考答案】 【郑房新老师点评】数据中心工程实施阶段监理内容： ①实施方案的审核 ②实施阶段的随工检测 ③软硬件设备资产的审核 ④其他监理控制措施 ⑤信息资源(数据)监理 ⑥人员及相关规章制度监理 第2版第23章习题25：以下属于实施方案的审核的是（ ）。 ①到货日程安排是否符合工程实际要求。 ②软硬件到货清单是否符合合同要求，到货批次安排是否合理。 ③到货验收的清点方式、工具、技术要求和指南性文件是否符合设备的技术说明。 ④到货验收环境及必要的资源是否齐备，例如备件、知识库等。 ⑤到货验收过程中的安全要求及保障措施是否合理。 ⑥到货验收手续清单及预定结论是否妥当。 ⑦出现异议及遗留问题的处理原则是否得当、可行等。 【参考答案】A 【郑房新老师点评】实施方案的审核： ①到货日程安排是否符合工程实际要求； ②软硬件到货清单是否符合合同要求，到货批次安排是否合理； ③到货验收的清点方式、工具、技术要求和指南性文件是否符合设备的技术说明； ④到货验收环境及必要的资源是否齐备，例如备件、知识库等； ⑤到货验收过程中的安全要求及保障措施是否合理； ⑥到货验收手续清单及预定结论是否妥当； ⑦出现异议及遗留问题的处理原则是否得当、可行等。——A正确。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题26：以下说法错误的是（ ）。 【参考答案】A 【郑房新老师点评】信息应用系统的随工检测包括以下内容： ①检测部位：信息应用系统中展示数据中心处理的关键工作流程的子系统、功能模块、核心节点等； ②主体项目检测内容：被检查设备的性能指标(建议以技术规范或设计方案、技术方案中预定的指标与实际检测指标两项数值为记录项)、业务功能和业务流程、应用软件功能和性能测试、应用软件修改后的回归测试； ③一般项目检测内容：应用软件功能和性能测试情况、运行软件产品的设备中与应用软件无关的软件检查。——A错误，选A。 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 第2版第23章习题27：根据数据中心业务系统的范围和特点，应对承建单位编制的计算机软硬件设备资产清单和参数配置档案进行审核，重点审核的内容，以下错误的是（ ）。 【参考答案】D 【郑房新老师点评】根据数据中心业务系统的范围和特点，应对承建单位编制的计算机软硬件设备资产清单和参数配置档案进行审核，重点审核以下内容： ①资产清单台账和配置参数与实际状况的一致性； ②设备资产入库手续的合规性、完备性； ③资产标识的规范性、可追溯性。——选D，不包括D。 第2版第23章习题28：数据中心工程实施阶段的其他监理控制措施包括（ ）。 ①监督承建单位按照数据中心设计的拓扑结构，对验货合格的软硬件设备进行合理摆放、安装、集成、配置和上电自检，并根据应用需求进行性能调优，做好监理工作记录； ②检查承建单位对数据中心计算机软硬件设备的施工质量保证措施落实情况，防止出现工程质量事故与质量缺陷； ③提醒并指导业主单位、敦促承建单位整理竣工图纸、安装措施、施工记录、检测材料等资料，做好工程档案管理； ④协助业主单位做好工程协调工作，包括数据中心工程设计与实施、设备及材料供应等单位的计划协调。 【参考答案】A 【郑房新老师点评】数据中心工程实施阶段的其他监理控制措施包括： ①监督承建单位按照数据中心设计的拓扑结构，对验货合格的软硬件设备进行合理摆放、安装、集成、配置和上电自检，并根据应用需求进行性能调优，做好监理工作记录； ②检查承建单位对数据中心计算机软硬件设备的施工质量保证措施落实情况，防止出现工程质量事故与质量缺陷； ③提醒并指导业主单位、敦促承建单位整理竣工图纸、安装措施、施工记录、检测材料等资料， 求。 ③对文档编制过程的要求。 ④对文档维护的要求。——B正确。 文档编制 第2版第22章习题34：软件工程配置管理过程的监理内容和要点，以下说法错误的是（____）。 【参考答案】D 【郑房新老师点评】软件工程配置管理过程的监理内容和要点如下： ①敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线。 ②监督承建单位配置管理的执行情况，包括控制软件项的修改和发行，记录和报告软件项的状态和修改申请。 ③与业主单位、承建单位共同对配置管理做出要求，----选D,不包括D。","options":[{"label":"A","text":"敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线。"},{"label":"B","text":"监督承建单位配置管理的执行情况，包括控制软件项的修改和发行，记录和报告软件项的状态和修改申请。"},{"label":"C","text":"与业主单位、承建单位共同对配置管理做出要求。"},{"label":"D","text":"应要求承建单位提交项目计划。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":22,"question":"22.6.2 配置管理过程的监理 《信息系统监理师教程 第2版 2024年1月出版》 第517页 序号 配置管理过程的监理 内容 例子 1 监理内容和要点 1. 软件工程配置管理过程的监理内容和要点如下： ①敦促承建单位建立有效的配置管理过程，确定实施管理和技术规程的策略，以及标识、定义系统中的软件项并制定基线。 ②监督承建单位配置管理的执行情况，包括控制软件项的修改和发行，记录和报告软件项的状态和修改申请。 ③与业主单位、承建单位共同对配置管理做出要求，----选D,不包括D。应包含如下内容： a 配置项的完整性、协调性和正确性； b 对配置项的储存、处理和交付的控制。 代码版本管理工具SVN 第2版第22章习题35: 软件工程质量保证过程的监理内容和要点有以下哪些（ ）。 ①要求承建单位制订执行质量保证过程活动和任务的计划文档。 ②要求承建单位实施计划中的以及持续的质量保证活动和任务。 ③要求承建单位编制并保存质量活动和任务及其实施情况、发现的问题以及解决办法的过程记录。 ④存在分包工程时，协助业主单位要求承建单位对分包单位进行必要的质量管理、过程控制并承担各自角色的责任，落实到位。 【参考答案】B 【郑房新老师点评】软件工程质量保证过程的监理内容和要点如下： ①要求承建单位制订执行质量保证过程活动和任务的计划文档。 a 计划应包含如下内容开展质量保证活动的质量标准、方法、规程和工具； b 质量记录的标识、收集、归档、维护和处理的规程； c 开展质量保证活动的资源、日程和职责； d 活动和任务。 ②要求承建单位实施计划中的以及持续的质量保证活动和任务。 ③要求承建单位编制并保存质量活动和任务及其实施情况、发现的问题以及解决办法的过程记录。 ④存在分包工程时，协助业主单位要求承建单位对分包单位进行必要的质量管理、过程控制并承担各自角色的责任，落实到位。----B 正确。","options":[{"label":"A","text":"①④。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":22,"question":"22.6.3 质量保证过程的监理 《信息系统监理师教程 第2版 2024年1月出版》第517页 序号 质量保证过程的监理 内容 例子 3 监理内容和要点 1.软件工程质量保证过程的监理内容和要点如下： ①要求承建单位制订执行质量保证过程活动和任务的计划文档。 a 计划应包含如下内容开展质量保证活动的质量标准、方法、规程和工具； b 质量记录的标识、收集、归档、维护和处理的规程； c 开展质量保证活动的资源、日程和职责； d 活动和任务。 ②要求承建单位实施计划中的以及持续的质量保证活动和任务。 ③要求承建单位编制并保存质量活动和任务及其实施情 追溯性。 b 与概要(结构)设计的一致性。 c 所采用的设计方法和标准的适宜性。 d 测试的可行性、完备性。 e 软件运行和维护的可行性。 f 压力测试对主要指标的验证。 g 回归测试的验证、管控等管理事项。 【参考答案】B 【郑房新老师点评】监理在详细设计和测试需求评价时应遵守如下准则： a 软件各项需求的可追溯性； b 与概要(结构)设计的一致性； c 所采用的设计方法和标准的适宜性； d 测试的可行性、完备性； e 软件运行和维护的可行性； f 压力测试对主要指标的验证； g 回归测试的验证、管控等管理事项。——B正确。 第2版第22章习题20：设计阶段的需求管理主要包括以下哪几个过程（　　）。 ①需求获取。 ②需求分析。 ③需求规格编写。 ④需求验证。 ⑤需求计划。 【参考答案】D 【郑房新老师点评】设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。——D正确。","options":[{"label":"A","text":"abcde。"},{"label":"B","text":"abcdefg。"},{"label":"C","text":"defg。"},{"label":"D","text":"abcfg。"},{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①②⑤。"},{"label":"C","text":"②③④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。 第2版第22章习题21：验证需求可采用以下哪些方式进行（　　）。 ①审查需求文档。 ②依据需求编写监理验证用的测试用例。 ③敦促编写用户手册。 ④确定合格的标准。 【参考答案】A 【郑房新老师点评】其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。——A正确。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.其中，验证需求可采用以下方式进行：①审查需求文档；②依据需求编写监理验证用的测试用例；③敦促编写用户手册；④确定合格的标准。——A正确。 第2版第22章习题22：以下属于软件工程实施阶段的主要监理活动的是（____）。 ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作。 ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量。 ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求。 ④及时对变更进行响应，并做好变更控制工作。 【参考答案】A 【郑房新老师点评】软件工程实施阶段的主要监理活动如下： ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作； ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量； ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求； ④及时对变更进行响应，并做好变更控制工作。——A正确。","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"①④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.要求承建单位制定软件编码规范，并督促承建单位实施。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.要求承建单位制定软件编码规范，并督促承建单位实施。软件编码规范应满足以下要求：(常考案例 重要性 ★★★) ①遵循开发流程，在设计的指导下进行代码编写； ②代码编写以实现设计的功能和性能为目标； ③程序具有良好的结构，能够提高程序的封装性、降低程序的耦合程度； ④程序可读性强，易于理解； ⑤软件易于使用和维护； ⑥软件具有良好的可扩展性。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.应在系统部署之前，审查软件产品是否具备系统集成实施的条件和环境。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":2,"question":"2.要求承建单位制定软件编码规范，并督促承建单位实施。软件编码规范应满足以下要求：（常考案例 重要性 ★★★） ①遵循开发流程，在设计的指导下进行代码编写； ②代码编写以实现设计的功能和性能为目标； ③程序具有良好的结构，能够提高程序的封装性、降低程序的耦合程度； ④程序可读性强，易于理解； ⑤软件易于使用和维护； ⑥软件具有良好的可扩展性。——A正确。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"第2版第22章习题1：软件工程在（____）过程中，从（____）等多个方面如何进行有效监管，需要监理人员掌握监理服务的关键活动、主要内容和要求，以及软件监理服务的监理要点、监理主要输出文档等。\n【参考答案】招标、设计、实施和验收，需求分析、设计、编码、测试到部署\n【郑房新老师点评】软件工程在招标、设计、实施和验收过程中，从需求分析、设计、编码、测试到部署等多个方面如何进行有效监管，需要监理人员掌握监理服务的关键活动、主要内容和要求，以及软件监理服务的监理要点、监理主要输出文档等。\n\n第2版第22章习题2：以下说法错误的是（____）。\nA.用计算机科学理论和技术以及工程管理原则和方法，按预算和进度，实现满足用户要求的软件产品的定义、开发、发布和维护的工程或进行研究的科学。\nB.就绪可用软件产品：可供任何用户使用，不需要经过实施开发活动的软件产品。\nC.集成测试，也叫组装测试或联合测试。\nD.系统测试是技术测试的最后一个阶段，也称为交付测试。\n【参考答案】D\n【郑房新老师点评】应用计算机科学理论和技术以及工程管理原则和方法，按预算和进度，实现满足用户要求的软件产品的定义、开发、发布和维护的工程或进行研究的科学。——A正确。\n就绪可用软件产品：可供任何用户使用，不需要经过实施开发活动的软件产品。——B正确。\n集成测试，也叫组装测试或联合测试。——C正确。\n系统测试是对整套系统的测试，将硬件、软件、操作人员看作一个整体，检验它是否有不符合系统说明书的地方。——D错误，描述的是验收测试。\n\n第2版第22章习题3：单元测试，以下说法正确的有（____）。\n①对软件中的最小可测试单元进行检查和验证。\n②对于单元测试中单元的含义，一般来说，要根据实际情况去判定其具体含义。\n③总的来说，单元就是人为规定的最小的被测功能模块。\n④单元测试是在软件开发过程中要进行的最低级别的测试活动，软件的独立单元将在与程序的其他部分相隔离的情况下进行测试。\nA.①②③④。\nB.①④。\nC.②③④。\nD.①②。\n【参考答案】A\n【郑房新老师点评】单元测试：①对软件中的最小可测试单元进行检查和验证。②对于单元测试中单元的含义，一般来说，要根据实际情况去判定其具体含义，如C语言中单元指一个函数，Java中单元指一个类，图形化软件中单元可以指一个窗口或一个菜单等。③总的来说，单元就是人为规定的最小的被测功能模块。④单元测试是在软件开发过程中要进行的最低级别的测试活动，软件的独立单元将在与程序的其他部分相隔离的情况下进行测试。——A正确。\n第2版第22章习题4：软件工程规划的主要监理任务是为业主单位提供咨询服务，在业主单位的要求下，可以包含以下哪些内容（____）。\n①协助业主单位梳理业务目标，制定软件系统建设目标。\n②协助业主单位开展软件系统需求分析工作。\n③协助业主单位对软件系统建设方案进行可行性分析、必要性分析，确定软件系统的技术架构和建设方案。\n④协助业主单位确定软件系统的工程造价。\nA.①②③④。\nB.①②④。\nC.②③④。\nD.①②③。\n【参考答案】A\n【郑房新老师点评】软件工程规划的主要监理任务是为业主单位提供咨询服务，在业主单位的要求下，可以包含如下内容：①协助业主单位梳理业务目标，制定软件系统建设目标；②协助业主单位开展软件系统需求分析工作；③协助业主单位对软件系统建设方案进行可行性分析、必要性分析，确定软件系统的技术架构和建设方案；④协助业主单位确定软件系统的工程造价。——A正确。\n\n第2版第22章习题5：以下软件工程监理过程，不属于招标阶段的是（____）。\nA.系统部署的监理。\nB.招标准备的监理。\nC.招标的监理。\nD.合同签订的监理。\n【参考答案】A\n【郑房新老师点评】招标阶段：①招标准备的监理；②招标的监理；③合同签订的监理——选A，不包括A。\n\n第2版第22章习题6：以下软件工程监理过程，属于设计阶段的是（____）。\n①计划制订的监理\n②需求分析的监理\n③概要(结构)设计的监理\n④详细设计的监理\n⑤招标的监理\n⑥合同签订的监理\nA.①②③④⑤⑥。\nB.①②④⑤⑥。\nC.②③④⑤⑥。\nD.①②③④。\n【参考答案】D\n【郑房新老师点评】设计阶段：①计划制订的监理；②需求分析的监理；③概要(结构)设计的监理；④详细设计的监理——D正确。\n第2版第22章习题7：以下软件工程监理过程，不属于实施阶段的是（____）。\n①编码及测试的监理\n②系统部署的监理\n③概要(结构)设计的监理\n④详细设计的监理\nA.①②③④。\nB.③④。\nC.②③④。\nD.①②。\n【参考答案】B\n【郑房新老师点评】实施阶段：①编码及测试的监理；②系统部署的监理——选B，③④都不属于。\n\n第2版第22章习题8：以下软件工程监理过程，属于验收阶段的是（____）。\n①项目初验的监理。\n②项目试运行的监理。\n③项目终验的监理。\n④培训的监理。\nA.①②③④。\nB.②③④。\nC.①③④。\nD.①②。\n【参考答案】A\n【郑房新老师点评】验收阶段：①项目初验的监理；②项目试运行的监理；③项目终验的监理；④培训的监理——A正确。\n第2版第22章习题9：简述软件工程招标阶段的主要监理活动。\n【参考答案】\n【郑房新老师点评】软件工程招标阶段的主要监理活动如下：\n①招标前收集相关资料，了解软件工程项目建设相关的业务目标、软件系统建设目标、现行和预期的业务模式、信息化基础和发展规划、软件系统建设需求等信息，协助业主单位开展招标准备工作，参与编制招标文件，或审核招标文件技术需求、招标实施合规性等；\n②接受业主单位委托参加招标活动，协助业主单位开展招标工作、选定软件工程的承建单位；\n③参与业主单位与承建单位合同谈判，协助业主单位签订承建合同，提出必要的监理意见。\n\n第2版第22章习题10：以下哪些是招标准备的监理内容（____）。\n①收集软件工程的相关资料，了解和掌握软件需求。\n②梳理软件工程建设需求，明确监理质量、进度等控制目标。\n③参与招标文件的编制，或审核招标文件技术需求、招标实施合规性等。\n④协助审查已有可利用产品的再用价值、可用性等。\nA.①②③④。\nB.①③④。\nC.②③④。\nD.①②③。\n【参考答案】A\n【郑房新老师点评】招标准备的监理内容具体如下：①收集软件工程的相关资料，了解和掌握软件需求。②梳理软件工程建设需求，明确监理质量、进度等控制目标。③参与招标文件的编制，或审核招标文件技术需求、招标实施合规性等。④协助审查已有可利用产品的再用价值、可用性等。——A正确。\n第2版第22章习题11：以下哪些是软件工程设计阶段的主要监理活动（____）。\n①审查承建单位提交的软件工程项目计划，促使项目计划合理、可行，并符合承建合同的要求。\n②参与调研工作，督促承建单位形成调研记录，监督承建单位系统需求分析过程，促使系统需求具有正确性、完备性、可测试性和一致性。\n③组织和参与对承建单位在设计阶段形成的文档的评审，促使设计阶段文档符合承建合同的要求，满足软件工程项目的系统需求，符合有关法规、标准的要求。\n④及时对变更进行响应，并做好变更控制工作。\n⑤收集软件工程的相关资料，了解和掌握软件需求。\n⑥梳理软件工程建设需求，明确监理质量、进度等控制目标。\nA.①②③④⑤⑥。\nB.①②④⑤。\nC.④⑤⑥。\nD.①②③④。\n【参考答案】D\n【郑房新老师点评】软件工程设计阶段的主要监理活动如下：①审查承建单位提交的软件工程项目计划，促使项目计划合理、可行，并符合承建合同的要求；②参与调研工作，督促承建单位形成调研记录，监督承建单位系统需求分析过程，促使系统需求具有正确性、完备性、可测试性和一致性；③组织和参与对承建单位在设计阶段形成的文档的评审，促使设计阶段文档符合承建合同的要求，满足软件工程项目的系统需求，符合有关法规、标准的要求；④及时对变更进行响应，并做好变更控制工作。——D正确。\n第2版第22章习题12：以下哪个不是设计阶段监理监理内容和要点（____）。\nA.参与业主单位与承建单位合同谈判，协助业主单位签订承建合同，提出必要的监理意见。\nB.应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。\nC.应根据下列准则审核项目计划，并提出监理意见。\nD.应要求承建单位提交项目计划。\n【参考答案】A\n【郑房新老师点评】设计阶段监理监理内容①应要求承建单位提交项目计划。②应根据下列准则审核项目计划，并提出监理意见。③应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。——A正确。\n设计阶段监理内容和要点：\n①应要求承建单位提交项目计划。\n②应根据下列准则审核项目计划，并提出监理意见。\n●确定范围，明确与其他关联任务及计划的关系、边界；\n●遵循的标准；\n●项目的组织结构（包括外部组织）、人员职责及其能力要求；\n●项目环境，包括生产环境、测试环境、程序库、设备、设施、标准、规程和工具；\n●任务分解安排，包括人员、资源和相关的任务进度安排；\n●进度跟踪和报告方法；\n●软件产品或服务的质量特性的管理，必要时制订独立的质量保证计划；\n●软件配置管理，包括活动、技术及方法、工具、对供货单位的控制、记录的收集维护和保存；\n③应组织业主单位和承建单位对项目计划和相关文档进行评审，并及时取得各方对项目计划的书面批准和承诺。\n●与承建合同的一致性、可追溯性；\n●系统范围及工作任务分解的完整性；\n●项目过程及主要里程碑划分的合理性，包括适宜的软件生存周期模型；\n●项目规模估算方法的正确性，包括项目任务和工作产品规模、时间安排、资源使用等；\n●项目进度的合理性，包括项目质量保证计划、配置管理计划等；\n●项目计划中部署全部可用产品（软件和硬件）的可行性；\n●对项目风险有必要的识别、分析、处理和跟踪。\n第2版第22章习题13：简述需求分析的监理中，审查系统需求文档，需求规格说明书检查表的检查类目有哪些？\n【参考答案】\n【郑房新老师点评】审查系统需求文档，需求规格说明书检查表的检查类目有：清晰性、完整性、依从性、一致性、可行性、可管理性。\n\n需求分析的监理监理内容和要点如下：\n①要求承建单位提交需求分析过程的详细计划，审查后报业主单位。\n②监督承建单位按照计划开展需求分析的各项活动，并协调业主单位予以相应的配合。\n③宜组织业主单位及承建单位，定义并分析系统建设目标：如适用，宜定义和分析业务流程再造、业务持续改进、信息资源规划及业务指标评价体系。\n④要求承建单位提交系统需求文档，需求文档应符合相关标准要求。\n⑤审查系统需求文档，组织业主单位和承建单位对需求规格说明书进行检查及对需求进行评审，形成需求规格说明书检查表、需求评审意见。\n检查类目（背：清完依一 可行可管）：\n●清晰性（文档通用）\n●完整性（文档通用）\n●依从性（文档通用）\n●一致性（文档通用）\n●可行性（文档通用）\n●可管理性\n⑥参与系统需求的联合评审，形成需求确认表。评审时需要考虑的准则包括：\na.与承建合同的可追溯性、一致性；（通用）\nb.与业务目标和系统建设目标的可追溯性、一致性；（通用）\nc.软件设计的可行性；（通用）\nd.运行和维护的可行性。（通用）\n⑦在需求调研阶段，监理机构应要求承建单位开始编制系统验收初步方案。\n⑧督促承建单位解决系统需求分析中发现的问题和不合格项，提出监理意见。\n表22-2 需求规格说明书检查表\n\n检查类目 | 检查内容\n清晰性：系统的目标是否已定义；是否对关键术语和缩略语进行了定义和描述；所使用的术语是否和用户使用的一致；需求的描述是否清晰，不含糊；是否对整个系统进行了功能概述；是否已详细说明了软件环境(共存的软件)和硬件环境(特定的配置)；如果有可能影响实施的假设情况，是否已经声明；是否已经对每个业务逻辑进行输入、输出以及过程的详细说明；图表是否清楚，在不补充说明时。\n完整性：是否规定了用户要求的功能；是否完整、清晰、准确地反映用户的要求；是否列出了系统所必需的依赖、假设以及约束；是否对每个提交物或阶段实施都进行了需求说明；需求说明书是否已经包括了主要的质量属性，例如有效性、高效性、灵活性、完整性、互操作性、可靠性、健壮性、可用性、可维护性、可移植性、可重用性和可测试性等；是否有业务流程图和数据流程图；是否包含接口需求。\n依从性：是否遵从了该项目的文档编写标准。\n一致性：需求说明是否存在直接相互矛盾的条目；需求说明书是否与相关需求素材一致。\n可行性：所描述的功能是否必要，并充分满足用户/系统目标；需求说明书的描述是否满足下一阶段设计所需；是否已经详细说明已知的限制(局限)；是否已确定每个需求的优先级别。\n可管理性：是否将需求分别陈述，确保每个需求都是独立的，并且是可检查的；是否所有需求都可以回溯到相应的需求素材，反之亦然；是否已详细说明需求变更的过程。\n第2版第22章习题14：以下有哪些是需求分析的监理监理内容和要点（____）。\n①要求承建单位提交需求分析过程的详细计划，审查后报业主单位。\n②监督承建单位按照计划开展需求分析的各项活动，并协调业主单位予以相应的配合。\n③宜组织业主单位及承建单位，定义并分析系统建设目标。\n④要求承建单位提交系统需求文档，需求文档应符合相关标准要求。\n⑤审查系统需求文档，组织业主单位和承建单位对需求规格说明书进行检查及对需求进行评审，形成需求规格说明书检查表、需求评审意见。\n⑥参与系统需求的联合评审，形成需求确认表。\n⑦在需求调研阶段，监理机构应要求承建单位开始编制系统验收初步方案。\n⑧督促承建单位解决系统需求分析中发现的问题和不合格项，提出监理意见。\nA.①②③④⑤⑥⑦⑧。\nB.④⑤⑥⑦⑧。\nC.①②③⑥⑦⑧。\nD.①②③④⑤⑥⑦。\n【参考答案】A\n【郑房新老师点评】①②③④⑤⑥⑦⑧都是需求分析的监理内容和要点。——A正确。\n第2版第22章习题15：概要(结构)设计的监理中，概要(结构)设计检查表的检查类目有以下哪些（____）。\n①清晰性②完整性③依从性④一致性⑤可行性⑥管理性⑦功能性⑧接口\nA.①②③④⑤⑦⑧。\nB.①②③④⑤⑥⑦⑧。\nC.③④⑤⑥⑦⑧。\nD.①②③④⑤。\n【参考答案】A\n【郑房新老师点评】①清晰性②完整性③依从性④一致性⑤可行性⑥数据使用⑦功能性⑧接口⑨可维护性⑩性能⑪可靠性⑫易测性⑬可追溯性——A正确。\n概要(结构)设计的监理内容和要点如下：\n①督促承建单位按照计划的要求开展系统概要(结构)设计活动。\n②宜配合业主单位制定相应的业务指标评价体系，监督承建单位对系统结构开展合理的方案设计。\n③要求承建单位提交系统概要(结构)设计文档，概要(结构)设计文档应符合相关标准要求。\n④组织业主单位和承建单位对系统概要(结构)设计文档进行检查，形成概要(结构)设计检查表。\n检查类目（背：清完依一 可行 数功接维 性靠易追）：\n●清晰性（文档通用）\n●完整性（文档通用）\n●依从性（文档通用）\n●一致性（文档通用）\n●可行性（文档通用）\n●数据使用\n●功能性\n●接口\n●可维护性\n●性能\n●可靠性\n●易测性\n●可追溯性\n⑤协助业主单位以审核、确认、联合评审等方式对系统概要(结构)设计进行评价。监理在概要(结构)设计评价时应遵守如下准则：\na.与承建合同的可追溯性、一致性；（通用）\nb.与业务目标的符合性；（通用）\nc.系统需求的可追溯性、一致性；（通用）\nd.所使用的设计标准和方法的适宜性；（通用）\ne.软件满足指定需求的可行性；（通用）\nf.基于信息资源规划和业务指标评价体系的可测试性；\ng.业务流程再造、业务持续改进、信息资源开发的可行性；\nh.运行和维护的可行性。\n⑥监督承建单位及时解决系统概要(结构)设计中发现的问题和不合格项，并提出监理意见。\n表22-3 概要(结构)设计检查表\n\n检查类目 | 检查内容\n清晰性：是否所设计的架构都被清楚地表达了，包括数据流、控制流和接口；是否所有的假设、约束、策略及依赖都被记录了；是否定义了总体设计目标。\n完整性：是否所有以前的软件需求都已经被解决了。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.监理机构应督促承建单位开展详细设计活动。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。——D正确。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.设计阶段的需求管理主要包括四个过程，即①需求获取②需求分析③需求规格编写④需求验证。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.软件工程实施阶段的主要监理活动如下： ①督促承建单位开展编码、测试、系统部署活动，提交详细的、符合承建合同及项目计划的阶段计划，并按计划开展工作； ②对软件编码、测试的过程和成果进行检查，促使软件编码及测试符合相关技术标准的要求，保证软件产品的质量； ③监督承建单位的单元测试、集成测试和系统测试情况，验证软件符合系统需求和系统设计的要求； ④及时对变更进行响应，并做好变更控制工作。——A正确。 第2版第22章习题23：编码及测试的监理内容有以下哪些（____）。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.要求承建单位为软件编码过程和单元测试过程的实施提交详细的计划，并督促承建单位按照计划的要求开展工作。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第22章)","category":"章节练习","chapter":"第22章","time_label":"2025年5月","question_number":1,"question":"1.要求承建单位提交系统部署计划。该计划应包括应用环境和基础设施需求、职责和进度安排。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.1.1 规划阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》第439页 第2版第20章习题3：规划阶段典型监理工作具体包括哪些（　　）方面。 ①参与编制可行性研究报告，协助编制投资概算。 ②协助业主单位构建信息系统架构。 ③根据业主单位的委托，可以参与编写初步设计方案，协助编制投资预算。 ④协助业主单位策划招标方法，适时提出咨询意见。 ⑤协助组织有关评审活动，验证项目需求。 ⑥协助做好招投标准备工作，提出适当的招标方法。 【参考答案】D 【郑房新老师点评】规划阶段典型监理工作具体包括以下几个方面：","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①②③④⑤。"},{"label":"C","text":"①②③⑤⑥。"},{"label":"D","text":"①③⑤⑥。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第2 :"邀请招标的缺点:采购风险较大。"},{"label":"D","text":"公开招标的优点:有效避免弄虚作假舞弊等行为。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.1.2 规划阶段典型监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第440页 第2版第20章习题13: 以下说法错误的是( )。 【参考答案】D 【郑房新老师点评】邀请招标，也称选择性招标，是由采购人根据供应商或承包商的资信和业绩，选择一定数目的法人或其他组织(不能少于3家)，向其发出投标邀请书，邀请他们参加投标竞争，从中选定中标供应商的一种招标方法。——D错误。","options":[{"label":"A","text":"邀请招标，也称选择性招标。"},{"label":"B","text":"邀请招标最少选择3家供应商参加投标竞争。"},{"label":"C","text":"邀请招标的优点:招标工作量和招标费用相对较小。"},{"label":"D","text":"邀请招标最多选择3家供应商参加投标竞争。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.1.2 规划阶段典型监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第440页 第2版第20章习题14: 以下情况不可采用邀请招标方式的是( )。 【参考答案】C 【郑房新老师点评】招投标注意事项 为避免招投标出现违规事项，国家有关部门对有关招标工作严格执行有关规定。依法应当公开招标的项目存在下列情形之一时，经招标项目有关监督管理部门审批、核准或认定后，方可采用邀请招标方式: ①涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的; ②项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的; ③采用公开招标方式的费用占项目合同金额的比例过大的。","options":[{"label":"A","text":"涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的。"},{"label":"B","text":"项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的。"},{"label":"C","text":"项目技术复杂或有特殊要求，或者受自然地域环境限制，但有大量潜在投标人可供选择的。"},{"label":"D","text":"采用公开招标方式的费用占项目合同金额的比例过大的。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.1.2 规划阶段典型监理工作 《信息系统监理师教程 第2版 2024年1月出版》 第440页 第2版第20章习题15: 招标阶段的监理要求具体有( )。 ①协助业主单位明确项目需求，确定项目建设目标和招标要求。 ②促使招标文件与用户需求、项目建设目标和范围相符合。 ③宜见证招标过程合法、合规。 ④协助业主单位选择适合的承建单位。 ⑤促使业主单位、承建单位所签订的承建合同在技术、经济上合理有效，满足法律法规和相关标准的要求。 ⑥在签订的承建合同中明确要求承建单位接受监理机构的监理。","options":[{"label":"A","text":"①②④⑤⑥。"},{"label":"B","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2 招标阶段监理基础工作 《信息系统监理师教程 第2版 2024年1月出版》 第445页","options":[],"answer":"","analysis":""},{"sou bel":"C","text":"对投标单位标书中的质量控制计划进行审查，提出监理意见。"},{"label":"D","text":"如果工程涉及分包，协助业主单位对分包单位进行审查。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2.3 招标阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第445页 | 序号 | 监理内容 | 内容 | 例子 | |------|----------|----------------------------------------|------| | 3 | 参与招标工作 | 1.参与招标工作的具体内容包括： ①应业主单位的请求，监理机构可以参与招标答疑工作。协助业主单位对项目所涉及的功能、技术指标向投标单位进行解释，并保存会议纪要和相关文件。 ②应业主单位的请求，监理机构可以对评标标准提出监理意见。业主单位可以在此基础上最终确定评标标准和评标方法。 ③在业主单位和招标代理机构邀请的情况下，可以有限度地协助评标，针对投标文件与招标文件的符合性、一致性和合理性，提出监理意见。监理意见仅供参考，招标方可以综合考虑其他专家的意见、商务标的评选结果，最终确定中标单位。 ④对投标单位标书中的质量控制计划进行审查，提出监理意见。 ⑤必要的情况下，可以协助业主单位审查投标单位的工程能力，即是否可以承担得起招标内容的建设任务。包括： a 资质文件的充分性和有效性； b 投标单位的技术能力与本工程所需工程技术和特定要求的符合性； c 投标单位项目人员的资格与本项目所需工程技术和特定要求的符合性。 ⑥如果工程涉及分包，协助业主单位对分包单位进行审查。 ⑦监理机构在整个招标阶段的协调工作内容均应被记录，可以通过会议纪要的形式进行记录，协调结果应做工程备忘录。 ⑧妥善管理招标阶段所产生的与监理相关的文档资料，包括需求说明、招标投标文件和监理文档等。 ⑨对招标阶段的工作进度提出监理意见，确保招标工作进度不拖延。 ⑩与业主单位及相关单位建立信息沟通机制，保持各方项目目标、范围和业务需求等理解的一致性。 ⑪可按照业主单位的要求，安排人员见证开标过程，见证流程合规性、开标情况、专家评议情况、是否存在不公正现象等，开标结束后，监理单位根据见证情况出具专题监理报告。 | | 第2版第20章习题21：招标咨询工作的具体内容包括：（____）。 ①向业主单位提供与项目有关的法律法规和标准等信息。 ②进行市场调查和询价，起草合同条款。 ③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。 ④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。 ⑤对业主单位项目资金使用情况提供咨询意见，尽量做到\"好钢用在刀刃上\"。 【参考答案】D 【郑房新老师点评】招标咨询工作的具体内容包括： ①向业主单位提供与项目有关的法律法规和标准等信息。 ②进行市场调查和询价，起草合同条款，为业主单位进行商务谈判提供咨询服务，协助业主单位与承建单位签订合理、有效的承建合同，并为业主单位在合同签订过程中遇到的问题提供咨询服务。 ③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。 ④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。 ⑤对业主单位项目资金使用情况提供咨询意见，尽量做到\"好钢用在刀刃上\"。","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"②③④。"},{"label":"C","text":"①②④⑤。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2.3 招标阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第445页 | 序号 | 监理内容 | 内容 | 例子 | |------|----------|----------------------------------------|------| | 4 | 招标咨询工作 | 1.招标咨询工作的具体内容包括： ①向业主单位提供与项目有关的法律法规和标准等信息。 ②进行市场调查和询价，起草合同条款，为业主单位进行商务谈判提供咨询服务，协助业主单位与承建单位签订合理、有效的承建合同，并为业主单位在合同签订过程中遇到的问题提供咨询服务。 ③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。 ④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。 ⑤对业主单位项目资金使用情况提供咨询意见，尽量做到\"好钢用在刀刃上\"。 | | 第2版第20章习题22：关于：承建合同签订的监理工作，以下说法错误的是（____）。 【参考答案】A 【郑房新老师点评】承建合同签订的监理工作具体包括： ①参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。 ②如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理。 ③建议业主单位组织与合同执行或管理相关的部门参与合同评审工作。 ④协助业主单位对承建合同进行评审。 ⑤建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。 ⑥承建合同签订条款不得违背招投标文件约定的采购标的、数量、质量、价款或者报酬及付款方式、履约期限、违约责任、解决办法及有关影响采购标的使用效果的重要技术指标等实质性条款。","options":[{"label":"A","text":"向业主单位提供与项目有关的法律法规和标准等信息。"},{"label":"B","text":"参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。"},{"label":"C","text":"如果软件工程项目涉及分包，应协助业主要求承建单位负责对分包单位进行管理。"},{"label":"D","text":"建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2.3 招标阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第445页 | 序号 | 监理内容 | 内容 | 例子 | |:---:|:---|:---|:---:| | 5 | 承建合同签订的监理 | 1.承建合同签订的监理工作具体包括： ①参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。（重复） ②如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理。 ③建议业主单位组织与合同执行或管理相关的部门参与合同评审工作。 ④协助业主单位对承建合同进行评审，根据下列准则，对合同的相关内容提出监理意见，合同审核要点及关键条款关注点如下： 招标文件与投标文件的一致性，例如，建设任务、关键技术指标、工期约定、人员投入等要求和投标文件是否一致，若有差异，合同应再次明确约定； ●符合法律法规和标准的要求； ●明确了建设范围和建设内容； ●明确了质量要求，包括功能要求和性能要求、文档要求： ●明确了质量责任和改进机制； ●明确了总体进度和阶段进度要求： ●划分和界定了工程的里程碑，并作为工程阶段性付款的依据； ●规定了处理变更的必要规程； ●规定了相关各方接口与合作的规程、范围和费用支付方式 ●明确了系统测试标准和测试通过要求； ●明确了验收约定和验收要求； ●明确了安全性和保密性要求； ●明确了知识产权要求； ●明确了监理机构在质量控制、协调处理、工程款支付等重要工作中的作用； ●明确关于合同争议的处理方式； ●检查合同中测试标准、验收要求和质量责任条款的合规性。 ⑤建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。 ⑥承建合同签订条款不得违背招投标文件约定的采购标的、数量、质量、价款或者报酬及付款方式、履约期限、违约责任、解决办法及有关影响采购标的使用效果的重要技术指标等实质性条款。 | | 第2版第20章练习题23：审核承建单位及其人员能力时的质量控制要点包括哪些？ 【参考答案】 【郑房新老师点评】审核承建单位及其人员能力时的质量控制要点包括：（背：文能技管经质） ①证明技术和管理能力的文件是否真实、齐全； ②承建单位的能力等级是否与本工程的规模相适应； ③承建单位的主要技术领域是否与本工程需要的技术相符合； ④拟派往本工程的项目管理人员是否具有相应的项目管理能力； ⑤其他技术人员的技术经历是否与本工程的技术要求相符合； ⑥承建单位是否建立了完善的质量管理体系。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2.3 招标阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第445页 | 序号 | 监理内容 | 内容 | 例子 | |:---:|:---|:---|:---:| | 6 | 审核承建单位及其人员的能力 | 审核承建单位及其人员能力时的质量控制要点包括：（背：文能技管经质） ①证明技术和管理能力的文件是否真实、齐全； ②承建单位的能力等级是否与本工程的规模相适应； ③承建单位的主要技术领域是否与本工程需要的技术相符合； ④拟派往本工程的项目管理人员是否具有相应的项目管理能力； ⑤其他技术人员的技术经历是否与本工程的技术要求相符合； ⑥承建单位是否建立了完善的质量管理体系。 | | 第2版第20章练习题24：招标阶段其他监理内容，说法不正确的是（ ）。 【参考答案】D 【郑房新老师点评】尽量避免方案变更导致项目变更，从而引发新的误解。——D错误，尽量避免，没办法完全避免。","options":[{"label":"A","text":"协助业主单位组织召开业主单位、承建单位、监理单位三方参加的首次会议，明确项目沟通协调机制。"},{"label":"B","text":"合同中的质量条款应写清具体规格、型号、适用的标准等。"},{"label":"C","text":"合同中涉及变更、转让、解除等内容应详细说明。"},{"label":"D","text":"完全避免方案变更导致项目变更，从而引发新的误解。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.2.3 招标阶段监理内容 《信息系统监理师教程 第2版 2024年1月出版》 第445页 | 序号 | 监理内容 | 内容 | 例子 | |:---:|:---|:---|:---:| | 7 | 招标阶段其他监理内容 | 1.招标阶段其他监理内容包括： ①协助业主单位组织召开业主单位、承建单位、监理单位三方参加的首次会议，明确项目沟通协调机制。如有必要，应邀请其他工程相关方参加会议。 ②组织工程各方以顺利推进项目为目标，围绕质量控制、进度控制、投资控制、合同管理、文档管理、沟通协调等方面建立完整的项目管理制度和保障体系。 ③协调业主单位和承建单位建立变更管理机制，并在承建合同中明确工程变更处理程序。 ④合同中的质量条款应写清具体规格、型号、适用的标准等，可以避免合同订立后因为适用标准采用国际、国家、地方、行业还是其他标准等问题产生纠纷。 ⑤合同中涉及变更、转让、解除等内容应详细说明。 ⑥如果合同有附件，对于附件的内容应精心准备，并注意保持与主合同一致，不应相互矛盾。 ⑦对于既有投标文件，又有正式合同书、附件等包含多项内容的合同，应在合同条款中列明适用顺序。 ⑧尽量避免方案变更导致项目变更，从而引发新的误解。 ⑨注意合同内容的前后一致性等。 | | 第2版第20章练习题25：设计阶段的监理要求具体，正确的有（ ）。 ①应推动业主单位、承建单位对项目需求和设计进行规范化的技术描述，为项目实施提供优化的设计方案。 ②应促使项目计划、设计方案满足项目需求，符合相关的法律法规和标准，并与承建合同相符，具有可验证性。 ③应协助业主单位、承建单位消除设计文档在进入实施阶段前可预见的缺陷。 ④应协助业主单位组织专业人员评审设计方案。 ⑤对设计文档的管理。 ⑥对设计变更的管理。 【参考答案】B 【郑房新老师点评】设计阶段的监理要求具体如下： ①应推动业主单位、承建单位对项目需求和设计进行规范化的技术描述，为项目实施提供优化的设计方案。 ②应促使项目计划、设计方案满足项目需求，符合相关的法律法规和标准，并与承建合同相符，具有可验证性。 ③应协助业主单位、承建单位消除设计文档在进入实施阶段前可预见的缺陷。 ④ 到有效的约束。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.3.4 设计阶段监理流程 《信息系统监理师教程 第2版 2024年1月出版》 第454页 |序号|监理流程|内容|例子| |---|---|---|---| | |设计阶段监理流程|1.设计阶段监理流程：（方便） ①设计方案的报审流程 ②设计变更的控制流程|| |①|设计方案的报审流程|1.设计方案的报审流程具体如下： ①承建单位完成项目设计方案后，应及时向监理机构提交设计方案评审申请。评审的输入文档主要包括设计文件本身、标准规范、项目需求书、承建合同等。 ②监理机构收到承建单位提交的设计评审申请后，协助业主单位组织人员进行设计文档完整性审查。如果发现设计文档存在不完整的问题，应及时要求承建单位进行必要的整改；承建单位整改完毕后，应重新提请审查。 ③设计文档完整性审查完毕后，监理机构应组织人员(必要时请业主单位派人参与)进行设计方案的详细审查。 ④设计文档审查完毕后，三方应对评审完毕的设计方案进行签认。由于信息系统工程自身的复杂性，设计方案评审的实施过程可能多种多样，既可以分阶段评审(例如软件开发项目的设计评审可以分为概要设计评审、详细设计评审两大阶段)，也可以分部分评审(例如网络集成项目可以分为系统设计方案评审和系统测试方案评审两大部分)，成熟一部分评审一部分。|| |②|设计变更的控制流程|1.设计变更控制主要通过两个手段来实现： ①变更流程的控制 ②变更内容的控制。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.4.2 实施阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》 第456页 |序号| |内容|例子| |---|---|---|---| | |实施阶段监理活动|1.实施阶段监理活动包括：（背：质进投合文沟） ①质量控制 ②进度控制 ③投资控制 ④合同管理| ⑤文档资料管理 ⑥沟通协调| 第2版第20章习题35：关于质量控制的具体工作，以下说法错误的是（ ）。 【参考答案】A 【郑房新老师点评】项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见。——A错误，不是业主，是承建。","options":[{"label":"A","text":"项目实施前，组织审核业主单位提交的质量管理计划，签署监理审核意见。"},{"label":"B","text":"项目实施前，组织业主单位、承建单位召开工程实施准备会议。"},{"label":"C","text":"项目实施过程中，按计划检查承建单位的项目实施状况、人员与实施方案的一致性。"},{"label":"D","text":"监理单位及时处理承建单位提交的关键环节的施工申请，审核其合理性后签认，报业主单位批准。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":20,"question":"20.4.2 实施阶段监理活动 《信息系统监理师教程 第2版 2024年1月出版》 第456页 |序号| |内容|例子| |---|---|---|---| |①|质量控制|1.质量控制的具体工作如下： ①项目实施前，组织审核承建单位提交的质量管理计划，签署监理审核意见。 ②项目实施前，组织业主单位、承建单位召开工程实施准备会议。 ③依据确认的质量管理计划、实施方案、实施计划等文件，制定切合实际的监理实施细则，并根据质量控制点的设置原则合理设置质量控制点和选用合适的控制手段，主要的质量控制手段包括评审、测试、旁站和抽查。 ④组织对承建单位提供的产品及服务进行验收，对验收结果做验收记录，并对验收记录做三方签认手续;对不符合合同或相关标准规定的产品及服务应拒绝签认，没有被签认的产品及服务不得在工程实施中应用;具体检查项可依据相关标准及规范，组织业主单位、承建单位和监理单位共同协商确定。 ⑤项目实施过 章","time_label":"2025年5月","question_number":5,"question":"5. 协调项目实施过程中进度、质量与投资等目标之间的矛盾，包括： ①在确保项目质量的条件下，促进项目实施进度，符合进度计划； ②在寻求业主单位更大投资效益的基础上，正确处理合同目标之间的矛盾； ③在维护业主单位合同权益的同时，实事求是地维护承建单位的合法权益。 | | 第2版第20章习题40：实施阶段监理内容有（ ）。 ①对质量管理计划的审查 ②对实施方案的审查 ③组织实施准备会议 ④对质量问题的处理 郑房新老师陪你一起刷题 30 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123淘宝店铺【郑房新软考教育】 ⑤审核分包单位的工程实施资质 ⑥实施阶段产品及服务的验收 ⑦硬件设备的验收 ⑧质量事故处理程序 ⑨项目延期处理程序 ⑩索赔处理程序 【参考答案】A 【郑房新老师点评】","options":[{"label":"A","text":"①②③④⑤⑥⑦⑧⑨⑩。"},{"label":"B","text":"①②③⑥⑦⑧⑨⑩。"},{"label":"C","text":"②③④⑤⑥⑦⑧。"},{"label":"D","text":"⑤⑥⑦⑧⑨⑩。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":4,"question":"4.其中，监理内容是对关键监理活动进行的更细化、更深入的阐述。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":4,"question":"4.协助业主单位策划招标方法，适时提出咨询意见。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":4,"question":"4.协助做好招投标准备工作，提出适当的招标方法。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":4,"question":"4.邀请招标。 （1）邀请招标，也称选择性招标，是由采购人根据供应商或承包商的资信和业绩，选择一定数目的法人或其他组织(不能少于3家)，向其发出投标邀请书，邀请他们参加投标竞争，从中选定中标供应商的一种招标方法。 （2）邀请招标的优点: ①邀请招标能够按照项目需求特点和市场供应状态，有针对性地从已知了解的潜在投标人中，选择具有与招标项目需求匹配的资格能力、价值目标以及对项目重视程度均相近的投标人参与投标竞争，有利于投标人之间均衡竞争。 ②通过科学的评标标准和方法实现招标目标，招标工作量和招标费用相对较小，既可以省去招标公告和资格预审程序(招投标资格审查)时间，又可以获得基本或者较好的竞争效果。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题 (第20章)-25年5月课程","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":4,"question":"4.变更实施完毕后，承建单位应就变更后的设计文档提出评审申请。|| 第2版第20章习题34：简答一下，实施阶段监理活动包括哪些？ 【参考答案】 【郑房新老师点评】实施阶段监理活动包括：（背：质进投合文沟） ①质量控制 ②进度控制 ③投资控制 ④合同管理 ⑤文档资料管理 ⑥沟通协调","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_labe ry":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.招标工作按照组织方式可以划分为自行招标和委托招标。 ①自行招标，即业主单位自己组织招标和评标，要求业主单位自身具备组织招标和评标的能力。 ②委托招标，即委托有招标能力和招标资质的招标代理机构对项目进行招标，发布招标文件，接收投标文件，组织专家评审，确定招标入围推荐名次，发布招标公告等。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1. 与业主单位、承建单位共同建立必要的工作协调机制，运用监理会议、监理报告和沟通协调等组织协调的方法，做好监理机构内部协调、三方之间的协调、工程中各监理机构之间的协调工作，使项目各方能够充分协作。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.硬件设备的验收，应在三方完成设备开箱检查、设备加电测试等工作后进行。可参考以下设备验收流程： (1) 承建单位按照要求提供拟到货设备的清单、序列号及相关质量证明文件后，提前三天通知业主单位和监理机构具体的到货时间和地点。 (2) 业主单位、监理机构、承建单位安排人员对到货设备进行现场开箱检查，主要检查到货设备的外包装和外观是否有破损或缺陷，设备品牌和型号是否与投标文件及合同要求的一致。 第2版第20章习题49：质量事故处理程序，以下说法错误的是（ ）。 【参考答案】D 【郑房新老师点评】发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核承建单位提交的整改方案并监督承建单位进行整改。——D错误，不是业主单位，是审核承建单位提交的整改方案。","options":[{"label":"A","text":"要求承建单位在事故发生后立即采取措施，尽可能控制其影响范围，及时签发停工令，上报业主单位。"},{"label":"B","text":"审查承建单位提交的事故报告及复工申请，条件具备时，总监理工程师可以签发复工令，恢复施工。"},{"label":"C","text":"在接到事故报告后立即组织相关人员调查事故状况、分析原因，与业主单位、承建单位共同确定初步处理意见。"},{"label":"D","text":"发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核业主单位提交的整改方案并监督承建单位进行整改。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.质量事故处理程序具体如下： (1) 要求承建单位在事故发生后立即采取措施，尽可能控制其影响范围，及时签发停工令，上报业主单位。 (2) 在接到事故报告后立即组织相关人员调查事故状况、分析原因，与业主单位、承建单位共同确定初步处理意见。 (3) 督促承建单位采取相应措施，查清事故原因，审核承建单位提交的事故解决方案及预防、补救措施，提出监理意见，提交业主单位签认。 (4) 审查承建单位提交的事故报告及复工申请，条件具备时，总监理工程师可以签发复工令，恢复施工。 (5) 发现存在重大质量隐患时向承建单位签发停工令，并上报业主单位。审核承建单位提交的整改方案并监督承建单位进行整改。整改完毕后，处理承建单位提交的复工申请。 第2版第20章习题50：项目延期处理程序，以下说法错误的是（ ）。 【参考答案】B 【郑房新老师点评】项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经三方签认后，做工程备忘录。——不是业主单位，是三方签认。","options":[{"label":"A","text":"监理机构根据项目情况，分析延期原因、影响程度等，研究整改措施，确认其延期申请的合理性，与业主单位、承建单位协商确认后，由总监理工程师对项目延期申请予以确认。"},{"label":"B","text":"项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经业主单位签认后，做工程备忘录。"},{"label":"C","text":"组织审查进度纠偏措施的合理性、可行性，监理机构可出具监理意见并跟踪整改。"},{"label":"D","text":"当发生由于延期造成的索赔时，总监理工程师应综合考虑项目延期和费用索赔的关系，做出费用索赔和项目延期的建议。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.项目延期处理程序具体如下： (1) 监理机构根据项目情况，分析延期原因、影响程度等，研究整改措施，确认其延期申请的合理性，与业主单位、承建单位协商确认后，由总监理工程师对项目延期申请予以确认。 (2) 项目延期影响项目总体进度计划时，要求承建单位修改项目总体进度计划，经三方签认后，做工程备忘录。 (3) 组织审查进度纠偏措施的合理性、可行性，监理机构可出具监理意见并跟踪整改。 (4) 当发生由于延期造成的索赔时，总监理工程师应综合考虑项目延期和费用索赔的关系，做出费用索赔和项目延期的建议。 第2版第20章习题51：索赔处理程序有（ ）。 ①申请方应在合同规定的期限内向监理机构提交索赔申请。 ②总监理工程师指定监理人员收集与索赔有关的资料。 ③总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用。 ④总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见。 ⑤当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议。 【参考答案】D 【郑房新老师点评】","options":[{"label":"A","text":"②③④⑤。"},{"label":"B","text":"①②④⑤。"},{"label":"C","text":"①②③④。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.索赔处理程序具体如下： (1) 申请方应在合同规定的期限内向监理机构提交索赔申请。 (2) 总监理工程师指定监理人员收集与索赔有关的资料。 (3) 总监理工程师进行索赔审查，与承建单位和业主单位协商索赔费用。 (4) 总监理工程师应在承建合同规定的期限内签发索赔审批意见，或在承建合同规定的期限内发出要求申请方提交详细资料的监理意见。 (5) 当申请方的索赔要求与项目延期要求相关联时，总监理工程师应综合考虑费用索赔和项目延期的关系，提出费用索赔和项目延期的建议。 第2版第20章习题52：以下说法错误的是（ ）。 【参考答案】C 【郑房新老师点评】承建单位做好项目实施前的各项准备工作后，向监理机构提出项目实施申请。——C错误。","options":[{"label":"A","text":"实施阶段监理流程有：①实施阶段监理工作流程。②合同管理监理工作流程。"},{"label":"B","text":"如果合同管理问题申请的理由充分、合理，监理机构应予以批准;三方就申请处理结果达成一致后，及时签署工程备忘录并落实合同变更，否则及时签发监理通知单，告知申请方不同意申请的意见并说明原因。"},{"label":"C","text":"承建单位做好项目实施前的各项准备工作后，向业主单位提出项目实施申请。"},{"label":"D","text":"条件具备时，监理机构应及时签发开工令;监理机构如认为不具备开工条件，应出具监理意见并跟踪整改。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.实施阶段监理流程： ①实施阶段监理工作流程。 ②合同管理监理工作流程。 ①实施阶段监理工作流程","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.监理机构在实施阶段的主要任务是受理项目实施申请，并对项目实施过程进行监理，对于其中发现的项目问题及时出具监理意见并跟踪整改。具体的处理流程如下： (1) 承建单位做好项目实施前的各项准备工作后，向监理机构提出项目实施申请。监理机构收到项目实施申请后，及时检查和落实各项准备工作的完成情况。 ①一般情况下，准许开工的条件至少应包括：完成了项目实施质量管理计划、系统设计方案和项目实施方案;合格的项目实施人员已经到位(以上内容监理机构已通过审核并进行了签认);项目实施所需的软硬件设施具备。 ②条件具备时，监理机构应及时签发开工令;监理机构如认为不具备开工条件，应出具监理意见并跟踪整改。 (2) 项目实施启动后，监理机构依据签认的项目质量管理计划、实施方案、实施计划和监理实施细则的要求对现场实施监理。对于监理实施过程中发现的问题及时出具监理意见并跟踪整改。项目实施过程的阶段性成果应进行三方签认。 (3) 项目实施过程结束后，承建单位及时提交项目实施报告，监理机构及时提交监理报告。 ②合同管理监理工作流程","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.合同管理具体的处理流程如下： ①业主单位或承建单位就合同管理相关问题(例如变更问题、延期问题、索赔问题等)提出申请，申请中应对相关问题产生的原因、责任归属、处理方式做出说明。其后，监理机构根据项目实际情况，收集相关信息，并进行相应的审查。 ②如果合同管理问题申请的理由充分、合理，监理机构应予以批准;三方就申请处理结果达成一致后，及时签署工程备忘录并落实合同变更，否则及时签发监理通知单，告知申请方不同意申请的意见并说明原因。 ③合同变更处理完毕后，项目实施过程根据变更予以一定的修正，监理机构须相应调整监理实施细则，落实合同变更内容。 第2版第20章习题53：验收阶段的监理要求具体包括：（ ） ①应审核项目测试验收方案(验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等)的符合性及可行性。 ②应协调承建单位配合第三方测试机构进行项目系统测评。 ③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求。 ④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。 【参考答案】B 【郑房新老师点评】","options":[{"label":"A","text":"①③④。"},{"label":"B","text":"①②③④。"},{"label":"C","text":"②③④。"},{"label":"D","text":"①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.验收阶段的监理要求具体包括： ①应审核项目测试验收方案(验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等)的符合性及可行性； ②应协调承建单位配合第三方测试机构进行项目系统测评； ③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求； ④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。 第2版第20章习题54：以下说法错误的是（ ）。 【参考答案】D 【郑房新老师点评】跟踪承建单位现场人员是否到位并正常工作，属于系统试运行的监理基础内容。——D错误。","options":[{"label":"A","text":"项目验收中的管理工作包括项目初验、系统试运行和项目终验。"},{"label":"B","text":"项目初验的监理基础内容包括:初验条件的检查、初验前的监理准备工作、初验中的监理工作、初验验收会议的监理工作。"},{"label":"C","text":"系统试运行的监理基础内容包括：要求业主单位、承建单位以初验合格报告作为启动试运行的依据。"},{"label":"D","text":"验收阶段的其他监理内容包括：跟踪承建单位现场人员是否到位并正常工作。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.一般情况下，项目验收中的管理工作包括项目初验、系统试运行和项目终验。 ①项目初验的监理 ②系统试运行的监理 ③项目终验的监理 ④验收阶段其他监理内容 ①项目初验的监理","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.项目初验，即初步验收，是指项目完成合同要求的全部内容后，对该项目是否符合设计要求、施工和设备安装是否符合质量要求等进行全面检测的过程。项目初验的监理基础内容包括： ①初验条件的检查。 ②初验前的监理准备工作。 ③初验中的监理工作。 ④初验验收会议的监理工作:协助业主单位安排会场(例如签到表、会签等);按会议议程执行;做好记录;会议纪要和验收报告落实签字。 ②系统试运行的监理","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.系统试运行的监理基础内容包括： ①要求业主单位、承建单位以初验合格报告作为启动试运行的依据。 ②审核承建单位的试运行申请，若符合条件，协调三方允许系统进入试运行阶段。 ③有计划地监督系统的试运行，督促承建单位解决试运行中出现的问题。 ④跟踪承建单位现场人员是否到位并正常工作。 ⑤定时或不定时了解用户对现场人员是否满意，若有问题，核实后可对承建单位提出要求。 ⑥抽查承建单位现场人员的工作记录(解决用户问题)，对问题比较集中、有未解决的问题、有部分工作量调整的情况做好记录，根据实际情况可召开三方会议讨论解决方法、时间等。 ⑦督促承建单位及时解决出现的问题。 ⑧根据初验前备忘录的内容，核实承建单位落实情况。 ⑨试运行结束后，建议用户出具用户使用意见，要求承建单位出具试运行报告和试运行期间的问题总结报告(若有问题未解决，可作为试运行时间延长的依据)。 第2版第20章习题55：项目终验的监理基础内容包括：（ ）。 ①及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。 ②协调项目相关方确定终验方案（含承建单位总结报告）及终验形式(三方会议或专家会议)、参与人员、议程等。 ③准备好监理的发言材料（监理总结报告）。 ④项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。 ⑤三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。 ⑥业主单位同意进行终验，在终验申请中予以签认，并报业主单位签认。 【参考答案】B 【郑房新老师点评】","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①②④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.项目终验也称竣工验收，是指在通过初验并试运行合格后，对项目的总体进行检测和认证、综合评价和鉴定的活动。项目终验的监理基础内容包括： (1) 协助业主单位审核承建单位提交的终验计划及其方案，明确验收目标、各方责任、验收内容、验收标准、验收方式和验收结果等内容，并签署审核意见。 (2) 及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。 (3) 如果符合如下终验条件，在终验申请中予以签认，并报业主单位签认： ●项目建设内容按照合同要求全部完成;各种技术文档和验收资料完备; ●系统的功能和性能满足设计要求; ●系统已通过初验、试运行，用户出具了初验和试运行意见; ●初验和试运行中出现的问题已经得到解决; ●试运行时间符合承建合同的要求; ●完成了约定的培训工作，培训效果符合要求; ●承建单位提交了符合要求的终验方案和计划，并且已通过审核; ●业主单位同意进行终验。 (4) 如果不符合上述终验条件，向承建单位提出整改意见（若此时由于某些客观原因还有未完成的事项，需协调三方事先做好沟通，承建单位签好承诺书）。 (5) 协调项目相关方确定终验方案（含承建单位总结报告）及终验形式(三方会议或专家会议)、参与人员、议程等。 (6) 协助业主单位做好终验准备、组织项目终验;对于大型或重要信息系统工程建设项目，应业主要求，可以聘请有关专家参与终验评审，以评估项目完成情况。 (7) 准备好监理的发言材料（监理总结报告）。 (8) 根据已定的验收议程召开会议，做好记录，会议纪要和验收报告落实签字。 (9) 三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。 (10) 项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。 (11) 整理与项目有关的全部监理文档,并提交业主单位。 (12) 协助业主单位和承建单位完成项目移交工作。 第2版第20章习题56：验收阶段的其他监理内容包括（ ）。 ①对验收各阶段进度安排提出监理意见。 ②审核承建单位初验、终验和项目整改计划的可行性。 ③由总监理工程师审核承建单位提交的付款申请，根据承建合同规定的付款条件，签发工程款支付意见。 ④及时向业主单位、承建单位通报承建合同、协议及相关变更所规定项目内容的执行情况，提出监理意见。 ⑤协助业主单位与承建单位签署其他补充协议。 ⑥督促业主单位、承建单位及时整理项目文档。 ⑦督促承建单位完成承建合同及项目实施方案中确定的培训。 【参考答案】D 【郑房新老师点评】","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③⑤⑥⑦。"},{"label":"C","text":"①②③④⑤。"},{"label":"D","text":"①②③④⑤⑥⑦。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第20章)","category":"章节练习","chapter":"第20章","time_label":"2025年5月","question_number":1,"question":"1.验收阶段的其他监理内容包括： ①对验收各阶段进度安排提出监理意见。 ②审核承建单位初验、终验和项目整改计划的可行性。 ③由总监理工程师审核承建单位提交的付款申请，根据承建合同规定的付款条件，签发工程款支付意见。 ④及时向业主单位、承建单位通报承建合同、协议及相关变更所规定项目内容的执行情况，提出监理意见。 ⑤协助业主单位与承建单位签署其他补充协议。 ⑥对于项目中的关键性技术指标，应要求承建单位出具第三方测试机构的测试报告。第三方测试机构应经业主单位和监理机构同意。 ⑦协助业主单位和承建单位做好对知识产权的管理工作。在项目终验前，监理机构应检查所完成的信息系统中，承建单位是否提供了非正版软件。如果提供了非正版软件，监理机构应要求承建单位进行整改并跟踪落实。 ⑧管理项目验收阶段的文档，例如验收方案、验收申请、验收报告等。 ⑨敦促业主单位、承建单位，按照约定编制、签署和保存验收阶段项目文档。 ⑩督促业主单位、承建单位及时整理项目文档。 ⑪督促承建单位完成承建合同及项目实施方案中确定的培训。 小红书-用户-郑房新软考通 淘宝店铺：郑房新软考通 淘宝店铺：郑房新老师 免费公益课：哔哩哔哩搜索 郑房新软考教育 配套信息： 公益Q群：212862940（VIP同学可以不加） 刷题软件：微信小程序 郑房新软考通 抖音：郑房新软考教育 小红书：郑房新软考通 哔哩哔哩：郑房新软考教育 某宝店铺：郑房新软考通 郑房新软考培训 郑房新老师陪你一起刷题 42","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":21,"question":"21.1 概述 《信息系统监理师教程 第2版 2024年1月出版》第470页","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":21,"question":"21.1.1 基本概念 《信息系统监理师教程
