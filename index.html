操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，包括： a 软件设计与需求的一致性； b 程序与软件设计的一致性； c 文档描述与程序的一致性、完整性、准确性和标准化程度等。 第2版第21章习题38: 入口控制(门禁)系统的软件检测。具体包括以下哪些（____）。 ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论。 ⑤系统对非法强行入侵及时报警的能力。 ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生。 【参考答案】D 【郑房新老师点评】出入口控制(门禁)系统的软件检测。具体包括： ①演示软件的所有功能，以证明软件功能与任务书或合同要求一致。 ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③对软件系统操作的安全性进行测试，如系统操作人员的分级授权，系统操作人员操作信息的存储记录等。 ④在软件测试的基础上，对被验收软件进行综合评审，给出综合评审结论，——D正确。包括： a 软件设计与需求的一致性； b 程序与软件设计的一致性； c 文档描述与程序的一致性、完整性、准确性和标准化程度等。 第2版第21章习题39: 以下属于安全防范系统工程视频监控系统的监理要点的是（____）。 ①系统功能检测 ②图像质量检测 ③系统整体功能检测 ④系统联动功能检测应包括与出入口控制(门禁)系统、入侵报警系统、巡更管理系统等的联动控制功能 ⑤视频安全防范监控系统的图像记录保存时间应满足管理要求 【参考答案】A 【郑房新老师点评】安全防范系统工程视频监控系统的监理要点具体如下：","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①⑤⑥⑦。"},{"label":"C","text":"①②③④⑤⑥⑦。"},{"label":"D","text":"①③④⑤⑥⑦。"},{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"②③④⑤⑥。"},{"label":"C","text":"①②③⑥。"},{"label":"D","text":"①②③④。"},{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①④⑤。"},{"label":"C","text":"②③④⑤。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":9,"question":"9.检查设备和系统的防雷接地应符合GB/T 2887《计算机场地通用规范》和 GB/T 9361《计算机场地安全要求》的有关规定和设计文件的要求。——B 正确。 第2版第21章习题37：出入口控制(门禁)系统的功能检测。具体包括以下哪些（ ）。 ①系统主机在离线的情况下，出入口(门禁)控制器独立工作的准确性、实时性和储存信息的功能； ②根据需求说明书中规定的性能要求，包括时间、适应性、稳定性等，以及图形化界面友好程度，对软件逐项进行测试。 ③检测掉电后系统启用备用电源应急工作的准确性、实时性、信息的存储和恢复能力； ④通过系统主机、出入口(门禁)控制器及其他控制终端，实时监控出入控制点的人员状况； ⑤系统对非法强行入侵及时报警的能力； ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生； ⑦出入口管理系统的数据存储记录保存时间应满足管理要求。 【参考答案】D 【郑房新老师点评】 监理一本通 郑房新老师 高项Q群1136743739 中项Q群212862940 监理Q群423649123 淘宝店铺【郑房新软考教育】","options":[{"label":"A","text":"①②③④⑤。"},{"label":"B","text":"①⑤⑥⑦。"},{"label":"C","text":"①②③④⑤⑥⑦。"},{"label":"D","text":"①③④⑤⑥⑦。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":8,"question":"8.系统功能与主要性能检验应由具有检测资质的机构检测，并出具检测报告，检测内容、合格判据应执行GB/T9361《计算机场地安全要求》的有关规定。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":7,"question":"7.检查现场的设备安装必须符合GB/T2887《计算机场地通用规范》的有关规定和设计文件要求。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":6,"question":"6. 施工过程的监理。 实施过程监理关注点（常考：参数）： ①机架、配线箱等设备的规格、容量、位置应符合设计文件要求，垂直偏差度不应大于3mm。 ②为便于施工和维护人员操作，机柜单排安装时，前面净空不应小于1000mm，后面及侧面净空不应小于800mm；多排安装时，列间距不应小于1200mm。以便人员施工、维护和通行。相邻机架设备应靠近，同列机架和设备的机面应排列平齐。 ③在数据中心的主机房内通道与设备间的距离还应符合下列规定： a 用于搬运设备的通道净宽不应小于1.5m。 b 面对面布置的机柜(架)正面之间的距离不宜小于1.2m。 c 背对背布置的机柜(架)背面之间的距离不宜小于0.8m。 d 当需要在机柜(架)侧面和后面维修测试时，机柜(架)与机柜(架)、机柜(架)与墙之间的距离不宜小于1.0m。 e 成行排列的机柜(架)，其长度超过6m时，两端应设有通道；当两个通道之间的距离超过15m时，在两个通道之间还应增加通道。通道的宽度不宜小于1m，局部可为0.8m。 ④在公共场所安装配线箱时，壁嵌式箱体底面距地不宜小于1.5m，墙挂式箱体底面距地不宜小于1.8m。 ⑤缆线桥架的安装应符合下列规定： a 安装位置应符合施工图要求，左右偏差不应超过50mm； b 安装水平度每米偏差不应超过2mm； c 垂直安装应与地面保持垂直，垂直度偏差不应超过3mm； d 桥架截断处及拼接处应平滑、无毛刺； e 吊架和支架安装应保持垂直，整齐牢固，无歪斜现象； f 金属桥架及金属导管各段之间应保持连接良好，安装牢固； g 采用垂直槽盒布放缆线时，支撑点宜避开地面沟槽和槽盒位置，支撑应牢固。 习题32续： 第2版第21章习题33：通用布缆系统工程验收阶段的监理内容具体有哪些？ 【参考答案】 【郑房新老师点评】通用布缆系统工程验收阶段的监理内容具体如下：①工程自测。②竣工文档的审查。 (1) 工程自测。 承建单位应对完成的工程进行自测，监理机构对承建单位的自测进行检查，具体如下： ●检查承建单位的测试仪器的有效性和可用性； ●要求承建单位对通用布缆系统工程包括的所有链路进行测试，并提交自测报告； ●审核承建单位提交的测试报告，测试应符合设计方案依据的验收标准； ●对于测试不合格的链路，监理机构应要求承建单位在测试报告中记录，采取整改措施，直至复测合格； ●监理机构应对布缆系统、无线信号进行抽检测试，验证承建单位施工及测试记录，采取整改措施，并向业主单位提交抽检测试报告。 (2) 竣工文档的审查。 通用布缆系统工程中，承建单位的竣工文档主要包括以下内容： ●承建合同，招标文件，投标文件，设计方案，工程实施组织设计方案，工程施工报告，隐蔽工程记录，变更记录，自测报告，信息点分布图(表)，园区、楼宇、水平配线表，楼层平面图及无线设备点位图，无线设备信息表，竣工图纸等。 习题33续： 第2版第21章习题34：以下属于计算机网络系统工程设计阶段的监理内容的是（ ）。 ①系统需求分析的审核。 ②工程设计方案的审核。 ③工程设计方案中网络基础设施的审核。 ④工程设计方案中网络服务的审核。 ⑤工程设计方案中网络管理系统的审核。 ⑥网络安全性设计的审核。 【参考答案】C 【郑房新老师点评】计算机网络系统工程设计阶段的监理内容具体如下： ①系统需求分析的审核。 ②工程设计方案的审核。 ③工程设计方案中网络基础设施的审核。 ④工程设计方案中网络服务的审核。 ⑤工程设计方案中网络管理系统的审核。 ⑥网络安全性设计的审核。——C正确。 习题34续： 第2版第21章习题35：以下属于计算机网络系统工程实施阶段的监理内容的是（ ）。 计算机网络系统工程实施阶段的监理内容具体如下： ①工程实施方案的审核。 ②工程实施过程的监理。 ③主要设备到货验收的监理。 ④系统安装调试的监理。 ⑤验收测试的监理。 【参考答案】C 【郑房新老师点评】计算机网络系统工程实施阶段的监理内容具体如下：","options":[{"label":"A","text":"①②⑤⑥。 B.①③④⑤⑥。 C.①②③④⑤⑥。 D.①②③④⑤。"},{"label":"A","text":"①⑤。 B.②③④⑤。 C.①②③④⑤。 D.①②③。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":6,"question":"6.安全防范系统的电缆桥架、电缆沟、电缆竖井、电线导管的施工及线缆敷设应符合GB/T2887《计算机场地通用规范》的有关规定，如有特殊要求应以设计施工图为准。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":5,"question":"5. 线材、连接硬件验收。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":5,"question":"5. 验收测试的监理。——C正确。 习题35续：（页面内容较少，为习题35的延续部分） 计算机网络系统工程实施阶段监理内容对应教材第490页。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":5,"question":"5.安全防范系统线缆敷设、设备安装前，现场应具备下列条件:预埋管、预件、桥架等的安装符合设计要求，机房、弱电竖井的施工已结束。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":5,"question":"5.视频安全防范监控系统的图像记录保存时间应满足管理要求。——A正确。 第2版第21章习题40: 安全防范系统工程入侵报警系统的监理要点，以下哪些属于?（ ）。 ①探测器的盲区检测，防动物侵入功能检测。 ②探测器的防破坏功能检测应包括报警器的防拆报警功能，信号线开路、短路报警功能，电源线被剪的报警功能。 ③探测器的灵敏度检测。 ④系统功能检测应包括系统的布设、撤出功能，关机报警功能，系统后备电源自动切换功能等。 ⑤系统通信功能检测应包括报警信息传输，报警响应功能。 ⑥报警系统报警事件存储记录的保存时间应满足管理要求。 ⑦报警系统管理软件(含电子地图)功能检测。 ⑧报警信号联网上传功能的检测。 【参考答案】D 【郑房新老师点评】安全防范系统工程入侵报警系统的监理要点具体如下： ①探测器的盲区检测，防动物侵入功能检测； ②探测器的防破坏功能检测应包括报警器的防拆报警功能，信号线开路、短路报警功能，电源线被剪的报警功能； ③探测器的灵敏度检测； ④系统功能检测应包括系统的布设、撤出功能，关机报警功能，系统后备电源自动切换功能等； ⑤系统通信功能检测应包括报警信息传输，报警响应功能； ⑥系统的联动功能检测应包括报警信号对相关报警现场照明系统的自动触发，对监控摄像机的自动启动，视频安全防范监视画面的自动调入，相关的出入口自动启闭，录像设备的自动启动等； ⑦报警系统管理软件(含电子地图)功能检测； ⑧报警信号联网上传功能的检测； ⑨报警系统报警事件存储记录的保存时间应满足管理要求。——D正确。 第2版第21章习题41: 以下哪些属于安全防范系统工程巡更管理系统的监理要点?（ ）。 ①按照巡更路线图检查系统的巡更终端、读卡机的响应功能。 ②检查巡更管理系统的编程、修改功能，撤防、布防功能。 ③检查系统的运行状态、信息传输、故障报警和指示故障位置的功能。 ④检查巡更管理系统对巡更人员的监督和记录情况，安全保障措施，对意外情况及时报警的处理手段； ⑤对在线联网式巡更管理系统，还需要检查电子地图上的显示信息，遇有故障时的报警信号，与视频安全防范监控系统的联动功能。 ⑥巡更系统的数据存储记录保存时间应满足管理要求。 【参考答案】A 【郑房新老师点评】安全防范系统工程巡更管理系统的监理要点具体如下： ①按照巡更路线图检查系统的巡更终端、读卡机的响应功能； ②检查巡更管理系统的编程、修改功能，撤防、布防功能； ③检查系统的运行状态、信息传输、故障报警和指示故障位置的功能； ④检查巡更管理系统对巡更人员的监督和记录情况，安全保障措施，对意外情况及时报警的处理手段； ⑤对在线联网式巡更管理系统，还需要检查电子地图上的显示信息，遇有故障时的报警信号，与视频安全防范监控系统的联动功能； ⑥巡更系统的数据存储记录保存时间应满足管理要求。——A正确。 第2版第21章习题42: 以下哪个不属于安全防范系统工程防鼠害的监理要点?（ ）。 【参考答案】D 【郑房新老师点评】安全防范系统工程防鼠害的监理要点具体如下： ①机房内所有的孔洞在施工完成后都应及时封堵； ②所有的线槽都应盖好、密封； ③所有电缆竖井都应用防火泥封堵。——选D，没有D。 第2版第21章习题43: 环境系统工程是指电子设备机房的以下哪些系统工程?（ ）。 ①室内空间环境 ②室内电磁环境 ③室内空气环境 ④视觉照明环境 ⑤室内噪声环境 【参考答案】A 【郑房新老师点评】环境系统工程是指电子设备机房的以下系统工程： ①室内空间环境 ②室内电磁环境 ③室内空气环境 ④视觉照明环境 ⑤室内噪声环境。——A正确。 第2版第21章习题44: 以下哪些属于环境系统工程设计阶段的监理内容?（ ）。 ①审核室内空间、照明设计是否满足材料、电气设备的安装及使用要求。 ②审核设计方案中通信设备、电气设备等产生的电磁干扰是否符合国家电磁辐射防护规定。 ③审核设计方案中室内空气指标是否符合GB/T18883《室内空气质量标准》的规定。 ④审核环境噪声指标是否满足国家噪声标准的规定要求。 【参考答案】A 【郑房新老师点评】环境系统工程设计阶段的监理内容具体如下： ①审核室内空间、照明设计是否满足材料、电气设备的安装及使用要求； ②审核设计方案中通信设备、电气设备等产生的电磁干扰是否符合国家电磁辐射防护规定； ③审核设计方案中室内空气指标是否符合GB/T18883《室内空气质量标准》的规定； ④审核环境噪声指标是否满足国家噪声标准的规定要求。——A正确。 第2版第21章习题45: 以下哪些属于环境系统工程实施阶段的监理内容?（ ）。 ①室内空间环境的监理要点。 ②电磁环境的监理要点。 ③室内空气环境的监理要点。 ④室内照明的监理要点。 ⑤室内噪声环境的监理要点。 【参考答案】A 【郑房新老师点评】环境系统工程实施阶段的监理内容具体如下： ①室内空间环境的监理要点。 ②电磁环境的监理要点。 ③室内空气环境的监理要点。 ④室内照明的监理要点。 ⑤室内噪声环境的监理要点。——A正确。 第2版第21章习题46: 动力环境监控系统的监测对象分为以下哪几类?（ ）。 ①动力系统②环境系统③空调及节能系统④安保系统⑤IT系统 【参考答案】B 【郑房新老师点评】动力环境监控系统的监测对象分为以下几类： ①动力系统:交流供电系统，包括高低压配电、列头柜、UPS、ATS、柴油发电机、稳压器、逆变器等；直流供电系统，包括整流电源、逆变器、蓄电池组、DC/DC变换电源等； ②环境系统:温湿度、水浸、液位、消防等； ③空调及节能系统:普通空调、精密空调、大型冷水机组、新风系统、照明控制等； ④安保系统:门禁管理、视频监控、入侵防盗、IP对讲等； ⑤IT系统:服务器、路由器、交换机、防火墙、操作系统等。——B正确。 第2版第21章习题47: 动力环境监控系统工程设计阶段的监理内容有以下哪些?（ ）。 ①审核系统架构及集成管理平台是否满足业主的使用需求。 ②审核对电气、通信电源、通风空调等相关设备的监测参数，以及对温度、湿度及漏水探测等环境监测是否满足环境要求。 ③审核各类传感设备布置方案是否满足技术规范要求。 ④协助业主根据需求确定动环组网的IP地址规划。 ⑤审核弱电机柜、设备安装是否满足使用技术要求。 ⑥审核集成管理平台提供的远程访问接口类型、网络安全设计是否满足业主的使用要求。 ⑦审核集成管理平台客户端界面的功能模块是否满足业主的使用要求。 ⑧审核设备平面布置是否满足业主的使用要求。 ⑨审核存储设备空间是否满足使用技术要求。 【参考答案】A 【郑房新老师点评】动力环境监控系统工程设计阶段的监理内容具体如下： ①审核系统架构及集成管理平台是否满足业主的使用需求； ②审核对电气、通信电源、通风空调等相关设备的监测参数，以及对温度、湿度及漏水探测等环境监测是否满足环境要求； ③审核各类传感设备布置方案是否满足技术规范要求； ④协助业主根据需求确定动环组网的IP地址规划； ⑤审核弱电机柜、设备安装是否满足使用技术要求； ⑥审核集成管理平台提供的远程访问接口类型、网络安全设计是否满足业主的使用要求； ⑦审核集成管理平台客户端界面的功能模块是否满足业主的使用要求； ⑧审核设备平面布置是否满足业主的使用要求； ⑨审核存储设备空间是否满足使用技术要求。——A正确。 （续习题47内容，设计阶段监理内容第⑤-⑨条同上） 第2版第21章习题48: 以下哪些属于动力环境监控系统工程实施阶段的监理内容？（____）。 ①进场的设备、材料的检验。 ②电线管、线槽施工的检查。 ③对线、电缆穿管和线槽敷设施工的检查。 ④设备安装情况的检查。 【参考答案】A 【郑房新老师点评】动力环境监控系统工程实施阶段的监理内容具体如下： ①进场的设备、材料的检验。检验工程所用安装材料、监测设备是否符合设计规范要求，对检验不合格的设备、材料不应在工程中使用。 ②电线管、线槽施工的检查。 ③对线、电缆穿管和线槽敷设施工的检查。 ④设备安装情况的检查。——A正确。 动力环境监控系统一般由前端探头、信号采集转换设备、控制主机、监控软件平台、报警系统等部分组成。设备安装过程中，应注意以下事项： ①温湿度传感器安装在机房发热设备比较密集的房顶位置，安装应牢固，接好温湿度电源线及信号线，用万用表查网线是否完好及通断。 ②安装漏水感应线探头前要将地面打扫干净，安装漏水感应线要紧贴地面，在可能出现漏水的地方(例如空调排水管等)密布感应线探头，安装漏水控制器及引出线，接漏水系统电源线及信号线，用万用表查网线是否完好及通断。 ③数字电表安装牢固，美观，接线标准无误。电线的颜色采用国标点线。分清互感器正负、倍率，确定互感器一端接地良好。不能带电作业，施工完成后注意清扫，清除工作中留下的杂物。 ④信号防雷器串接在设备中，电源防雷器并接入电路中，信号防雷器的接地线≥2.5mm²，电源防雷器的接地线≥10mm²。接地线连接应牢固美观。 第2版第21章习题49: 动力环境监控系统一般由以下哪些部分组成。（____）。 ①前端探头②信号采集转换设备③控制主机④监控软件平台⑤报警系统 【参考答案】A 【郑房新老师点评】动力环境监控系统一般由前端探头、信号采集转换设备、控制主机、监控软件平台、报警系统等部分组成。——A正确。 第2版第21章习题50: 以下哪些属于动力环境监控系统工程验收阶段的监理内容？（____）。 ①核实IP地址的分配情况是否满足前期IP地址规划要求。 ②检查各类参数的数值、刷新时间等是否符合技术规范和使用要求。 ③检查集成管理平台的各项功能是否符合技术规范和设计要求。 ④检查数据传输是否可靠，传输时间是否符合设计和使用要求。 ⑤审查测试遗留问题的整改结果是否符合设计要求。 ⑥审查竣工文档和竣工图纸是否符合要求。 【参考答案】A 【郑房新老师点评】动力环境监控系统工程验收阶段的监理内容具体如下： ①核实IP地址的分配情况是否满足前期IP地址规划要求； ②检查各类参数的数值、刷新时间等是否符合技术规范和使用要求； ③检查集成管理平台的各项功能是否符合技术规范和设计要求； ④检查数据传输是否可靠，传输时间是否符合设计和使用要求； ⑤审查测试遗留问题的整改结果是否符合设计要求； ⑥审查竣工文档和竣工图纸是否符合要求。——A正确。 （本页为第41页内容续，动力环境监控系统设备安装注意事项续） 设备安装注意事项续： ④信号防雷器串接在设备中，电源防雷器并接入电路中，信号防雷器的接地线≥2.5mm²，电源防雷器的接地线≥10mm²。接地线连接应牢固美观。 （本页为习题50验收阶段监理内容完整版及页尾推广信息） 动力环境监控系统工程验收阶段的监理内容具体如下： ①核实IP地址的分配情况是否满足前期IP地址规划要求； ②检查各类参数的数值、刷新时间等是否符合技术规范和使用要求； ③检查集成管理平台的各项功能是否符合技术规范和设计要求； ④检查数据传输是否可靠，传输时间是否符合设计和使用要求； ⑤审查测试遗留问题的整改结果是否符合设计要求； ⑥审查竣工文档和竣工图纸是否符合要求。——A正确。 页尾信息：公益Q群212862940，微信小程序郑房新软考通，抖音郑房新软考教育，小红书郑房新软考通，哔哩哔哩郑房新软考教育，淘宝店铺郑房新软考通、郑房新软考培训。 （本页为页尾推广信息续页） 配套信息： 、视频CCTV系统、消防检测系统、消防系统、综合布线系统、门禁系统、照明系统、防火玻璃隔断、门禁管理系统、红外防盗系统、地板系统、供配电系统、天花骨架、集中监控系统) 第2版第21章习题6：以下是基础设施工程招标阶段的主要监理活动的有（ ）。 ①协助业主单位明确工程需求。②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划。③宜了解业主单位估算的工程总投资，了解招投标分包策略。④对本阶段的工作进度提出监理意见。⑤妥善保管招标阶段所产生的与监理相关的文档资料。⑥协助业主单位参与招标文件的编制或对招标文件提出监理意见。 【参考答案】B 【郑房新老师点评】 基础设施工程招标阶段的主要监理活动如下： ①协助业主单位明确工程需求； ②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划； ③宜了解业主单位估算的工程总投资，了解招投标分包策略； ④协助业主单位参与招标文件的编制或对招标文件提出监理意见； ⑤可协助评标，对投标文件与招标文件的符合性及投标文件的合理性提出监理意见； ⑥对本阶段的工作进度提出监理意见； ⑦参与承建合同的签订过程，促使合同相关条款符合业主单位招标文件的要求； ⑧与业主单位、承建单位以及相关单位建立信息沟通和协调机制，明确本阶段需要各方提交的文档； ⑨妥善保管招标阶段所产生的与监理相关的文档资料，包括需求说明、招投标文件和监理文档等。----B正确。","options":[{"label":"A","text":"②③④⑤⑥。"},{"label":"B","text":"①②③④⑤⑥。"},{"label":"C","text":"①③④⑤⑥。"},{"label":"D","text":"①②③⑥。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.基础设施工程招标阶段的主要监理活动如下: ①协助业主单位明确工程需求; ②宜参与招标前的准备工作，协助业主单位编制基础设施工程的工作计划; ③宜了解业主单位估算的工程总投资，了解招投标分包策略; ④协助业主单位参与招标文件的编制或对招标文件提出监理意见; ⑤可协助评标，对投标文件与招标文件的符合性及投标文件的合理性提出监理意见； ⑥对本阶段的工作进度提出监理意见； ⑦参与承建合同的签订过程，促使合同相关条款符合业主单位招标文件的要求； ⑧与业主单位、承建单位以及相关单位建立信息沟通和协调机制，明确本阶段需要各方提交的文档； ⑨妥善保管招标阶段所产生的与监理相关的文档资料，包括需求说明、招投标文件和监理文档等。——B正确。 第2版第21章习题7：基础设施工程招标阶段的主要监理内容，以下说法错误的是（ ）。 【参考答案】B 【郑房新老师点评】基础设施工程招标阶段的主要监理内容如下：①梳理工程需求②招标文件的监理③承建合同的监理——不包括B。","options":[{"label":"A","text":"梳理工程需求。"},{"label":"B","text":"质量控制。"},{"label":"C","text":"招标文件的监理。"},{"label":"D","text":"承建合同的监理。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.梳理工程需求 监理机构应依据项目概算批复文件及初步设计方案，从如下几个方面梳理业主单位对基础设施工程的需求： ①工程建设目标；②工程建设范围；③基础设施工程中的功能、性能和安全需求；④工程投资规模；⑤工程进度计划；⑥工程建设应遵循的法律、法规、技术标准和管理标准；⑦若存在现有基础设施，应考虑目标系统与现有系统的兼容性，以保护业主单位的原有投资。——A正确。 第2版第21章习题9：通常情况下，招标文件技术需求部分的要点内容有以下哪些（ ）。 ①工程/项目总的需求。②投标单位的资质要求。③工程/项目的技术和质量要求。④工程/项目的时间和进度要求。⑤主要设备、产品及服务的要求。⑥验收方法、移交规程。⑦投标文件的要求。⑧分包合同的要求。⑨合同主要条款约定要求。⑩可以向所有投标单位公布的有关评分规则等。 【参考答案】B 【郑房新老师点评】通常情况下，招标文件技术需求部分的要点内容如下：①工程/项目总的需求；②投标单位的资质要求；③工程/项目的技术和质量要求；④工程/项目的时间和进度要求；⑤主要设备、产品及服务的要求；⑥验收方法、移交规程；⑦投标文件的要求；⑧分包合同的要求；⑨合同主要条款约定要求；⑩可以向所有投标单位公布的有关评分规则等。——B正确。","options":[{"label":"A","text":"④⑤⑥⑦⑧⑨⑩。"},{"label":"B","text":"①②③④⑤⑥⑦⑧⑨⑩。"},{"label":"C","text":"①②③④⑤⑥⑦⑧。"},{"label":"D","text":"①②③⑤⑥⑧⑨。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.招标文件的监理 (1)监理机构应协助业主单位，根据初步设计方案概算清单编制采购工程量清单，分项设计设备、系统的技术指标，作为基础设施工程项目招标的技术要求。 (2)通常情况下，招标文件技术需求部分的要点内容如下：①工程/项目总的需求；②投标单位的资质要求；③工程/项目的技术和质量要求；④工程/项目的时间和进度要求；⑤主要设备、产品及服务的要求；⑥验收方法、移交规程；⑦投标文件的要求；⑧分包合同的要求；⑨合同主要条款约定要求；⑩可以向所有投标单位公布的有关评分规则等。——B正确。 第2版第21章习题10：监理机构参与承建合同的签订，协助业主单位对承建合同的如下哪些内容进行检查（ ）。 ①工程建设目标、范围。②业主单位和承建单位的责任、权利和义务。③工程使用的主要技术标准。④基础设施工程中各系统的功能和性能要求、测试和验收要求。⑤要求承建单位按照项目管理计划实施项目。⑥明确监理机构在工程款支付中的作用和操作手续。 【参考答案】A 【郑房新老师点评】监理机构参与承建合同的签订，协助业主单位对承建合同的如下内容进行检查：①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。——B正确。（注：原答案点评写的B正确，但实际应为A正确）","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"①③⑤。"},{"label":"C","text":"②④⑥。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.承建合同的监理 监理机构参与承建合同的签订，协助业主单位对承建合同的如下内容进行检查： ①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。 对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。 第2版第21章习题11：承建合同的监理机构参与承建合同的签订，协助确定合同付款约定。参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的（ ），不高于合同金额的（ ）；进度款按不低于工程价款的（ ），不高于工程价款的（ ）向承包人支付工程进度款。 【参考答案】C 【郑房新老师点评】对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。——C正确。 承建合同的监理（续）： ①工程建设目标、范围；②业主单位和承建单位的责任、权利和义务；③工程使用的主要技术标准；④基础设施工程中各系统的功能和性能要求、测试和验收要求；⑤要求承建单位按照项目管理计划实施项目；⑥明确监理机构在工程款支付中的作用和操作手续；⑦工程阶段划分及其质量和进度要求，以及和工程付款相关的约束关系；⑧主要设备的保修条款以及系统的运行维护等相关服务的要求；⑨各阶段需要承建单位提交的工程文档，及需要完成的培训等相关服务内容；⑩协助确定合同付款约定；⑪协助确定合同违约或合同纠纷处理约定；⑫协助确定合同其他必要约定，或合同附件有关约定，或合同谈判备忘录等。 对于第⑩项工作，可参考《建设工程价款结算管理暂行办法》的规定，包工包料工程的预付款原则上预付比例宜不低于合同金额的10%，不高于合同金额的30%；进度款按不低于工程价款的60%，不高于工程价款的90%向承包人支付工程进度款。——C正确。 第2版第21章习题12：以下是基础设施工程设计阶段的主要监理活动的有（ ）。 ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程 ②确定工程/项目各方往来文档的种类、格式、签批人等事宜 ③协助业主单位组织、评审承建单位制订的计划、设计方案 ④协助业主单位组织设计交底工作，记录交底结果 ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见 ⑥审核工程设计方案，并提出监理意见等。 【参考答案】C 【郑房新老师点评】基础设施工程设计阶段的主要监理活动如下： ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程； ②确定工程/项目各方往来文档的种类、格式、签批人等事宜； ③协助业主单位组织、评审承建单位制订的计划、设计方案； ④监督承建单位系统需求分析过程，促使需求具备正确性、完备性、可测试性和一致性； ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见； ⑥协助业主单位组织设计交底工作，记录交底结果； ⑦审核设计变更的合理性，并对变更引起的质量、进度和投资变化提出监理意见，协调业主单位和承建单位就设计变更内容达成一致； ⑧审核工程设计方案，并提出监理意见等。——C正确。","options":[{"label":"A","text":"30%、30%、60%、90%。"},{"label":"B","text":"10%、50%、60%、90%。"},{"label":"C","text":"10%、30%、60%、90%。"},{"label":"D","text":"30%、50%、60%、90%。"},{"label":"A","text":"①③⑤⑥。"},{"label":"B","text":"②③④⑤⑥。"},{"label":"C","text":"①②③④⑤⑥。"},{"label":"D","text":"①②③④⑤。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.基础设施工程设计阶段的主要监理活动如下： ①协助业主单位和承建单位明确工程/项目建设具体需求，规范工程设计过程； ②确定工程/项目各方往来文档的种类、格式、签批人等事宜； ③协助业主单位组织、评审承建单位制订的计划、设计方案； ④监督承建单位系统需求分析过程，促使需求具备正确性、完备性、可测试性和一致性； ⑤审核设计需求说明书，对其是否可作为工程设计的依据提出监理意见； ⑥协助业主单位组织设计交底工作，记录交底结果； ⑦审核设计变更的合理性，并对变更引起的质量、进度和投资变化提出监理意见，协调业主单位和承建单位就设计变更内容达成一致； ⑧审核工程设计方案，并提出监理意见等。——C正确。 第2版第21章习题13：以下属于基础设施工程设计阶段的主要监理内容有（ ）。 ①质量控制 ②投资控制 ③文档资料管理 ④协调 ⑤梳理工程需求 ⑥承建合同的监理 【参考答案】D 【郑房新老师点评】基础设施工程设计阶段的主要监理内容如下①质量控制②投资控制③文档资料管理④协调——D 正确,不包括⑤⑥。","options":[{"label":"A","text":"①②③④⑤⑥。"},{"label":"B","text":"③④⑤⑥。"},{"label":"C","text":"②③④⑤⑥。"},{"label":"D","text":"①②③④。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.质量控制 在质量控制方面的主要监理内容包括： (1) 审查设计人员的执业资格是否能够满足设计工作要求。 (2) 检查勘察、测量设备是否满足勘察、测量要求。 (3) 审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。 (4) 检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。 (5) 审查工程设计方案的如下内容： ●审查设计文件:是否符合合同要求和设计规范，勘查成果是否能够作为初步设计和施工 ●图设计的依据，施工图设计文件能否指导施工； ●审查设计说明:工程概况、设计依据、技术方案措施及总体要求是否合理，内容是否详尽； ●审查设计图纸:是否符合机房、网络、管线路由的实际情况，是否详细具体，设计审核责任人签字是否齐全；——D正确 审查概预算编制是否符合相关规定，能否满足工程项目的投资需求。 (6) 组织承建单位确认工程建设目标、关键部位、工艺工序质量要求、进度要求，督促承建单位制订项目计划，适时开展深化设计活动。 (7) 协助业主单位组织设计交底工作，具体包括： ●设计会审交底前应让相关参建方到现场考察，核对设计图纸，审查设计文件，并征求参建各方意见； ●召开设计技术交底会，澄清设计技术细节，并做会议纪要； ●审查设计人员是否对会审交底的意见做出说明，并形成会议纪要，按照要求由设计人员修改设计文件，并对修改文件进行核查。 第2版第21章习题15：在质量控制方面的主要监理内容包括以下哪些（ ）。 ①审查设计人员的执业资格是否能够满足设计工作要求。②检查勘察、测量设备是否满足勘察、测量要求。③审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。④检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。 【参考答案】A 【郑房新老师点评】在质量控制方面的主要监理内容包括：(1)审查设计人员的执业资格是否能够满足设计工作要求。(2)检查勘察、测量设备是否满足勘察、测量要求。(3)审核工作计划内容是否具体详细、合理、可行，是否符合合同要求，质量保证措施是否有效。(4)检查设计过程是否严格按照工作计划实施，工作记录是否详细、准确。——A正确。 第2版第21章习题16：以下不是在投资控制方面的主要监理的内容的是（ ）。 【参考答案】A 【郑房新老师点评】投资控制 在投资控制方面的主要监理的内容包括： (1) 协助业主制定建设工程造价目标； (2) 审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化； (3) 宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案；——选A，不包括A。 投资控制：","options":[{"label":"A","text":"①②③④。"},{"label":"B","text":"②③。"},{"label":"C","text":"①④。"},{"label":"D","text":"①②③。"},{"label":"A","text":"审查设计人员的执业资格是否能够满足设计工作要求。"},{"label":"B","text":"协助业主制定建设工程造价目标。"},{"label":"C","text":"审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化。"},{"label":"D","text":"宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.投资控制 在投资控制方面的主要监理的内容包括： (1) 协助业主制定建设工程造价目标； (2) 审核概要预算，确定投资合理性，提出改进和优化意见，力求使设计投资合理化； (3) 宜协助业主单位组织设计方案比选，在能够满足业主需求的前提下，选择投资少、技术先进的设计方案；——选A，不包括A。 第2版第21章习题17：以下哪个不是在协调方面要做到的点（ ）。 【参考答案】A 【郑房新老师点评】协调:在协调方面要做到以下几点: (1) 配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作; (2) 监控设计资料和设计文件的交付进度; (3) 审查设计文件中所列设备、材料价格、用量的合理性。——选A，不包括A。","options":[{"label":"A","text":"做好设计阶段文档收集、分类、分析、存储、传递和应用等工作，保证设计文档收集及时、准确、完整。"},{"label":"B","text":"配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作。"},{"label":"C","text":"监控设计资料和设计文件的交付进度。"},{"label":"D","text":"审查设计文件中所列设备、材料价格、用量的合理性。"}],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.文档资料管理: 做好设计阶段文档收集、分类、分析、存储、传递和应用等工作，保证设计文档收集及时、准确、完整。 协调：","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.协调:在协调方面要做到以下几点: (1) 配合业主单位做好设计方案、设备配置、选型和工程选址等事项确认工作; (2) 监控设计资料和设计文件的交付进度; (3) 审查设计文件中所列设备、材料价格、用量的合理性。——选A，不包括A。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1. 工程实施组织设计方案的审核。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1. 工程实施方案的审核。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.安全防范施工质量检查和观感质量验收，应根据合同技术文件、设计施工图纸，从以下几个方面进行监理： ①电(光)缆敷设与布线应检验管线的防水、防潮，电缆排列位置，布放、绑扎质量，桥架的架设质量，缆线在桥架内的安装质量，焊接及插接头安装质量和接线盒接线质量等； ②对接地线应检验接地材料、接地线焊接质量、接地电阻等； ③对系统的各类探测器、摄像机、云台、防护罩、控制器、辅助电源、电锁、对讲设备等的安装部位、安装质量和观感质量等进行检验，应符合GB/T2887《计算机场地通用规范》的有关规定； ④同轴电缆的敷设，摄像机、机架、监视器等的安装质量检验，应符合GB/T2887《计算机场地通用规范》的有关规定； ⑤控制柜/箱与控制台的安装质量检验，应符合GB/T2887《计算机场地通用规范》的有关规定。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1.系统功能检测:云台转动，镜头、光圈的调节，调焦变倍，图像切换，防护罩功能的检测。","options":[],"answer":"","analysis":""},{"source":"第2版 监理练习题(第21章)","category":"章节练习","chapter":"第21章","time_label":"2025年","question_number":1,"question":"1. 出入口控制(门禁)系统的功能检测。具体包括： ①系统主机在离线的情况下，出入口(门禁)控制器独立工作的准确性、实时性和储存信息的功能； ②系统主机对出入口(门禁)控制器在线控制时，出入口(门禁)控制器工作的准确性、实时性和储存信息的功能，以及出入口(门禁)控制器和系统主机之间的信息传输功能； ③检测掉电后系统启用备用电源应急工作的准确性、实时性、信息的存储和恢复能力； ④通过系统主机、出入口(门禁)控制器及其他控制终端，实时监控出入控制点的人员状况； ⑤系统对非法强行入侵及时报警的能力； ⑥检测本系统与消防系统报警时的联动功能，保证火灾情况下的紧急逃生； ⑦出入口管理系统的数据存储记录保存时间应满足管理要求。——D 正确。","options":[],"answer":"","analysis":""},{"source":"2024年11月信息系统监理师综合知识真题.docx","category":"真题","time_label":"2024年11月","question_number":1,"question":"2024年11月信息系统监理师综合知识真题（仅30题） 1、监理工程师在组织协调工作中，应坚持的基本原则不包括()。 A公平、公正、独立原则\t\tB科学原则\t\tC先进性原则\tD守法原则","options":[{"label":"A","text":"laaS\tB.DaaS\tC.SaaS\tD.PaaS"},{"label":"A","text":"2001年\t\tB.1997年\t\tC.1984年\t\tD.1990年"},{"label":"A","text":"quality policy\tB.quality check1ist\t\tC.quality performance\tD.quality requirement"},{"label":"A","text":"质量方针B.质量检查表C.质量性能D.质量需求"},{"label":"A","text":"CPU和GPU\t\tB.TPU和DPU\t\tC云侧芯片和端侧芯片\t\tD训练芯片和推理芯片"},{"label":"A","text":"What you do\t\tB.What you have\tC.Who you are\t\tD.Where you are"},{"label":"A","text":"Iaas\tB.Paas\tC.Saas\tD.Laas"}],"answer":"B","analysis":"本题考查监理实施细则。参考《信息系统监理师教程(第2版)》第9.4小节，P234。"},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":70,"question":"【2023年05月 -第70题】-第13章信息系统工程建设的组织协调 郑房新老师 监理Q群423649123 高项扣扣群：658661882  中项扣扣群：725873151淘宝店铺：郑房新软考教育  或郑房新老师 70、关于组织协调原则的描述，不正确的 是 ( _  ) A 、在建设单位与承建单位意见不统一时，监理单位一定要坚持“一碗水端平 ”,这是谁的责任谁来承担 B 、监理单位在处理监理事务时，应该首先征询建设单位的意见，要求承建单位按照建设单位的要求及时改进 C 、监理单位在处理监理事务中，要全面地分析和思考，保持对问题的综合分析能力，不要被表面现象或局部问题干扰 D 、监理单位要用科学的思维、科学的方法，处理事务一定要有可靠的依据和凭证 【参考答案】 B 【郑房新老师点评】 P280-P281 13.2.1公平、公正、独立原则 在监理活动中体现公平、公正、独立的原则，就是在解决建设单位与承建单位可能发生的意见不统一或纠纷时， 绝不能因为监理单位是受建设单位的委托而故意偏袒建设单位，  一定要坚持“一碗水端平 ”,该是谁的责任就由谁来承 担--A正确；该  维护哪方的权益，就维护那方的权益。这样做既会得到建设单位的理解和支持，也会得到承建单位的拥 护和欢迎。 (2)监理单位在处理实际监理事务中，要有大局观， 要全面地分析和思考，保持对问题的综合分析能力，不要被表面现 象或局部问题所干扰--C 正确。 13.2.4科学的原则 所谓科学的原则，就是在监理实践中 ，要依据科学的方案(如监理规划),运用科学的手段(如测试设备或测试工具软 择真题.docx","category":"真题","time_label":"2023年5月","question_number":68,"question":"【2023年05月 -第68题】-第11章信息安全管理 68、某信息应用系统对于系统可靠性和持续运行要求较高，应采用 (_)   备份方式，当一台主机出现故障，可及时启 动另一台主机接替原主机任务。 A 、全备份   B 、磁盘镜像    C 、双机容错    D 、存储保护 【参考答案】 C 【郑房新老师点评】 P245 双机容错 双机容错是计算机应用系统稳定、可靠、有效、持续运行的重要保证。它通过系统冗余的方法解决计算机应用系 统的可靠性问题，并具有安装维护简单、稳定可靠、监测直观等优点。  当一台主机出现故障，双机容错软件可及时启 动另一台主机接替原主机任务，采用智能型磁盘阵列可保证数据永不丢失，采用双机容错软件可保证系统永不停机，保证 数据永不丢失和系统永不停机，保证了用户数据的可靠性和系统的持续运行。它的基本架构共分两种模式：双机互备援 (dual    active)  模式和双机热备份 (hot     standby)模式。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":67,"question":"【2023年05月 -第67题】-第11章信息安全管理 67 、 (_)   表现在使服务器充斥大量要求响应的信息，消耗网络带宽或系统资源，导致网络或系统不胜负荷，以至于 瘫痪而停止提供正常的网络服务，是目前最为常见的网络攻击方法。 A 、逻辑炸弹攻击   B 、特洛伊木马攻击   C 、异步攻击     D 、拒绝服务攻击 【参考答案】 D 【郑房新老师点评】 P227  ( 小郑口诀：看到瘫痪选拒绝-DOS。) (13)拒绝服务攻击DOS DOS攻击行为表现在使服务器充斥大量要求响应的信息，消耗网络带宽或系统资源，导致网络或系统不胜负荷， 以至 于瘫痪而停止提供正常的网络服务，是目前最为常见的网络攻击方法。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":66,"question":"【2023年05月 -第66题】 -第11章信息安全管理 66 、管理在信息安全中举足轻重 ，信息系统安全的管理体系由 (    )组成。 A、法律管理、制度管理、培训管理   B、行业管理、法律管理、标准管理 郑房新老师 监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育 或 郑房新老师 C 、标准管理、体系管理、培训管理   D 、设施管理、通信管理、网络管理 【参考答案】A 【郑房新老师点评】 P216 3。管理体系 管理是信息系统安全的灵魂 。信息系统安全的管理体系由(  小郑口诀：法制培) 法律管理、制度管理和培训管理 三部分组成。管理安全设置的机制有：人员管理、培训管理、应用系统管理、软件管理、设备管理、文档管理、数据管 理、操作管理、运行管理和机房管理。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":65,"question":"【2023年05月 -第65题】 -第10章信息系统工程的合同管理 65、关于知识产区保护的措施， 不正确的 是 (_) A 、为保护建设单位的知识产区，监理单位要求承建单位遵守相关法律 B 、监理单位与建设单位的合同中应明确工程涉及的知识产权归属 C 、监理单位应保护建设单位的知识产权，要求承建单位不得使用盗版软件 D 、监理单位要求承建单位出具非自主产权软件的使用权合法文件和证明 【参考答案】 B 【郑房新老师点评】 P208 2技术措施 根据北京市地方标准 DB11/T160-2002《 信息系统监理规范》 中的要求，在项目监理的整个过程中，必须对建设单 位和承建单位有关技术方案、软件文档、源代码及有关技术秘密等涉及知识产权的内容进行检查、监督和保护。具体 监理措施包括： (1)保护建设单位的知识产权权益。监理会根据信息系统工程建设项目的性质审查承建单位的资质，要求承建单位遵守 知识产权保护的相关法律法规--A正 确，确保在项目实施过程中采取正版软件， 坚决不使用盗版软件-C正 确。 (2)项目文档的知识产权保护控制。监理单位协助建设单位在承建合同中明确知识产权及其相关资源如何所有或共享， 建立严格的项目资料管理制度，从制度上保护项目各方的知识产权。 (3)外购软件的知识产权保护控制。监理单位要在外购软件订单之前，对采购软件 的用户数、许可证书数和软件开被中限假灯让件和证明。 .监理单位要检查非自主产权软件的使用权合法文件和证明。 - - D正确 (4)待开发软件的知识产权保护控制。 监理单位要及时提醒建设单位在承建合同中明确规定知识产权归属，避免产生不 必要的知识产权纠纷。--B错 误","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":64,"question":"【2023年05月 -第64题】- 第10章信息系统工程的合同管理 64建设单位对于由承建单位造成的且实际发生的损失，向承建单位要求赔偿，称为(    ) A、索赔   B、变 更    C、反索赔  D、延 期 【参考答案】C 【郑房新老师点评】 P189 2.反索赔 反索赔是指建设单位向承建单位提出的索赔。--选C。建设单位向承建单位索赔的主要途径： 一是减少或防止可能产 生的索赔；二是反索赔，对抗(平衡)承建单位的索赔要求。建设单位向承建单位提出索赔的包括以下内容。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":63,"question":"【2023年05月 -第63题】-第10章信息系统工程的合同管理 63、按照信息系统工程范围划分，信息系统工程合同可以分为： (    ) A、总承包合同、单项项目承包合同、分包合同","options":[{"label":"B","text":"总承包合同、单价合同、分包合同"},{"label":"C","text":"总价合同、单项项目承包合同、分包合同 D 、总价合同、单价合同、成本加酬金合同 【参考答案】 A 【郑房新老师点评】P174 1.按信息系统工程范围划分 从信息系统工程的不同范围和数量进行划分，可以分为信息系统工程(小郑口诀：总单分) 总承包合同、单项项目承 包合同、分包合同"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":62,"question":"【2023年05月 - 第62题】 -第9章变更控制 62.合同变更的一般特征不 包 括 (    ) A 、项目合同的双方当事人必须协商一致         B、改变了合同的内容或标的 C 、其法律后果是产生新的债权和债务关系      D 、能够规避项 目风险 【参考答案】 D 【郑房新老师点评】 P169 9.4.4对合同变更的控制 项目合同变更一般特征有如下几点： (小郑口诀：致内务) (1)项目合同的双方当事人必须协商一致； (2)改变合同的内容与标的： 郑房新老师 监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育 或 郑房新老师 (3)合同变更的法律后果是将产生新的债权和债务关系。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":61,"question":"【2023年05月 - 第61题】 -第9章变更控制 61、关于进度控制的描述， 正 确的 是 ( _  ) A 、制定的进度计划必须是现实可行的    B 、每个项 目必须建立变更控制系统管理进度变更 C 、每一次进度变更都要通过会议申请    D 、进度变更必须获得全部项 目干系人的书面批准 【参考答案】 A 【郑房新老师点评】 P168 9.4.2对进度变更的控制 在控制进度变更中涉及很多问题 ，第一个要点是要保证项 目进度计划是现实的-A正 确 ，许多项 目，尤其信息技术 领域 ，经常会制订一些不切实际的进度计划 。第二个要点是要有强调遵守并达到项 目进度计划的重要性 。监理人员可 以执行一系列的实际检查 。来帮助他们管理项 目进度计划的变更 。有几种方法可以用来控制与人有关的进度变更。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":60,"question":"【2023年05月 -第60题】-第9章变更控制 60关于变更控制基本原则的描述，不正确的 是( _ ) A 、在项目实施过程中，变更处理越早，损失越小 B 、变更需要获得三方(建设单位、监理单位、承建单位)的确认 C 、在进行变更决策时，成员要对变更保密，防止动摇军心 D 、防止变更范围的扩大化对项目变更范围要有明确的界定 【参考答案】 C 【郑房新老师点评】 P163-P164 9.2.1对变更申请快速响应 郑房新老师  监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育  或郑房新老师 项目变更是正常的、不可避免的。在项目实施过程中，变更处理越早，损失越小--A正 确；变更处理越迟，难度越大， 损失也越大 。项 目在失控的情况下 ，任何微小变化的积累 ，最终都会对项 目 的质量、成本和进度产生较大影响 ，这是一 个从量变到质变的过程 ， 因此监理单位在接到变更申请之后 ，要快速按照变更处理程序进行变更处理 ，并迅速下达是否 可以进行变更的监理通知。 9.2.2任何变更都要得到三方确认 任何变更都要得到三方(建设单位、监理单位和承建单位)书面的确认-B正 确 ，并且要在接到变更通知单之后才能 进行 ，严禁擅自变更 ，在任何一方或者两方同意下做出变更而造成的损失应该由变更方承担。 9.2.3 明确界定项目变更的目标 变更的真实 目 的是为了解决问题 ，如果变更后项 目 的 目标模糊不清 ，那么在实施过程中就难以确定努力的方向， 即使完成了项 目 ，也难以确定完成的 目标是否真的达到当时想象中的 目标。 9.2.4防止变更范围的扩大化 对项目变更范围要有明确的界定，而且三方对变更范围的理解上没有任何的异议--D 正 确。 9.2.5三方都有权提出变更 一般地说 ，承建单位和建设单位是变更的主要申请方 ，但是并不是说监理单位就不可以提出变更 ，监理单位也可 以根据项 目实施的情况 ，提出变更 ， 比如在监理过程中发 现了前期设计的缺陷 ，发现原来计划采购的设备有了更新的产品 ，而且价格下降 ，这时也要主动提出变更申请。 9.2.6加强变更风险以及变更效果的评估 变更对项 目质量 、进度 、成本都会产生影响 ，要多方面评估变更的风险 ，制定详细的变更风险处理措施 ，并且要 对变更实施过程进行监控 ，对变更实施效果进行评估 ，如果发现异常情况 ，要及时中止变更 ，对变更重新进行评估。 9.2.7及时公布变更信息 只有项 目 的关键人员才清楚和控制着项 目变更的全过程 ，而其他人员未获得项自变更的全面信息 ， 因此在决策层 做出变更决策时， 应及时将变更信息公之于众，这样才能调整所有人员的工作，朝着新的方向努力-C 错 误。 9.2.8选择冲击最小的方案 项 目 的 目标 、预算 、项 目 的进度以及承建单位是决定项 目计划的主要因素 ，做出项 目变更时 ，力求在尽可能小的 变动幅度内对这些主要因素进行微调 。如果它们发生较大的变动 ，就意味着项 目计划的彻底变更 ，这会使 目前的工作 陷入瘫痪状态。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":59,"question":"【2023年05月 -第59题】 -第8章投资控制 59、监理工程师在进行预算审核时，采用(_)使用与预算编制过程基本相同的方法计算项目成本，优点是审核细致、 质量高、差错少。","options":[{"label":"A","text":"全面审核法   B、分解对比审核法    C、重点审核法   D、经验审核法 【参考答案】A 【郑房新老师点评】 P147 1.全面审核法其具体计算和审核过程与编制过程基本相同。优点是全面细致、缺点是工作量过大，需要组织一批分专业 的计划预算工程师、经济师进行。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.do ，提出设计质量标准。 (3)进行设计过程跟踪 ，及时发现质量问题 ，并及时与承建单位协调解决。 (4)审查阶段性设计成果，并提出监理意见。 (5)审查承建单位提交的总体设计方案，主要审查以下内容： 确保总体方案中已包括了建设单位的所有需求-A 包括； 要满足建设单位所提出质量、工期和造价等工程目标； 总体方案要符合有关规范和标准--B包括；  质量保证措施的合理性、可行性； 方案要合理可行，不仅要有明确的实施目标， 还要有可操作的实施步骤；对整个系统的体系结构、开发平台和开发工具 的选择、 网络安全方案等要进行充分论证-C 包 括 。 当前信息技术发展迅速 ，许多技术还没有达到成熟阶段，就被更先 进的技术所替代 ，而且所花费的成本可能还更低 。但是 ， 需要注意的是 ，在信息系统工程中采用最新的 、最先进的技 术 ，会给质量控制带来技术风险： 对总体设计方案中有关材料和设备进行比较，在价格合理基础上确认其符合 要求。 (6)审查承建单位对关键部位的测试方案 ，如主机网络系统软硬件测试方案 、应用软件开发的模块功能浏试方法等。 (7)协助承建单位建立、完善针对该信息工程建设的质量保证体系 ，包括完善计量及质量检测技术和手段。 (8)协助总承建单位完善现场质量管理制度 ，包括现场会议制度 、现场质量检验制度 、质量统计报表制度和质量事故 报告及处理制度等。 (9)组织设计文件及设计方案交底会  ，熟悉项 目设计 、实施及开发过程 ，根据有关设计规范 ，实施验收及软件工程验收 等规范、规程或标准，对有的工程部位下达质量要求标准。  --D不包括，并没有说规划 。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":45,"question":"【2023年05月 -第45题】 -第6章质量控制 45关于监理单位在招投标阶段质量控制要点的描述， 不 正 确的 是(_) A 、应提出工程需求方案 ，确定工程的整体质量目标 B 、协助评标时 ，应对投标单位标书中的质量控制计划进行审查 C 、应对项 目招标文件进行审核 ，对涉及的商务内容和技术内容进行确认 D 、应参与招标文件的编制 ，并对可能影响工程质量的因素明确提出要求 【参考答案】A 【郑房新老师点评】 P80-P81 1.招投标过程的质量控制 信息工程的招标一般由建设单位 、监理单位 、招标公司 、专家 、纪检或者公证部门参加 ，监理单位在招投标阶段质量 控制的注意要点有： (1) 协助建设单位提出工程需求方案，确定工程的整体质量目标--A错，只是协助而已； (2)参与标书的编制 ，并对工程的技术和质量 、验收准则 、投标单位资格等可能对工程质量有影响的因素明确提出要 求； (3)协助招标公司和建设单位制定评标的评定标准； (4)对项 目 的招标文件进行审核 ，对招标书涉及的商务内容和技术内容进行确认； 郑房新老师 监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育 或郑房新老师 (5)监理在协助评标时 ，应对投标单位标书中的质量控制计划进行审查 ，提出监理意见； (6)对招标过程进行监控 ，如招标过程是否存在不公正的现象等问题； (7)协助建设单位与中标单位洽商并签订工程合同 ，在合同中要对工程质量目标提出明确的要求。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":44,"question":"【2023年05月 -第44题】 -第6章质量控制-质量控制手段 44 、在信息系统工程中 ，承建单位编制了总体技术方案、工程实施方案、系统集成方案等重要文档 。将 (     ) 作为质 量控制手段 ，可以及时发现文档中存在的重大问题。","options":[{"label":"A","text":"评 审    B、测 试      C 、旁 站    D 、抽 样 【参考答案】 A 【郑房新老师点评】 P89 评 审的主要目 的是本着公正的原则检查项 目的当前状态，项 目评审一般是在主要的项 目里程 碑接近完成时进行 ， 比如总体设计 、产品设计 、编码或测试完成的时候 。  通过专家评审 ，可以及时发现重大问题 ，并 给出处理意见。"}],"answer":"","analysis":""},{"source":"20  ，并未发现任何问题 ，但仍有可能出现由于系统设计留有缺陷而 导致不能全部满足实际应用的情况--选A 。众所周知 ，某些工程上质量隐患的暴露需要一定的时间和诱因 ，利用现有的 技术手段和方法 ，并不可能保证所有问题都能及时发现 。 同时 ， 由于人力 、财力和技术资源的限制 ，监理无法对施工 过程的所有部位 、所有环节的问题都能及时进行全面细致的检查发现 ，必然需要面对风险。 4.管理风险 明确的管理目标 、合理的组织机构 、细致的职贵分工 、有效的约束机制 ，是监理组织管理的基本保证 。如果管理机制 不健全 ， 即使有高素质的人才 ，也会出现这样或那样的问题。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":38,"question":"【2023年05月-第38题】 -法律法规-超纲题 38 、 《关键信息基础设施安全保护条例》 的实施日期是 (    )。","options":[{"label":"A","text":"2021 年 7 月 1 7 日     B、2021 年 7 月 3 0 日   C、2021 年 9 月 1 日     D、2021 年 9 月 1 7 日 【参考答案】 C 【郑房新老师点评】  《关键信息基础设施安全保护条例》  的实施日期是202 1 年9 月 1 日 . 郑房新老师  监理Q群423649123  高项扣扣群：658661882  中项扣扣群：725873151淘宝店铺：郑房新软考教育  或郑房新老师 国家法律法规数据库 关键信息基础设施安全保护条例 法律效力位阶：行政法规 制定机关：国务院 时效性：有效 施行日期：2021-09-01 公布日期：2021-07-30"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":36,"question":"【2023年05月-第36题】 -第4章监理单位的组织建设   36.关于监理单位权利和义务的描述，不正确的 是 ( _  ) 。 A 、监理单位应按照“守法、公平、公正、独立 ”的原则开展监理工作。 B 、监理单位应按照监理合同和所分配的承建任务取得收入。 C 、监理单位不得与被监理项目的承建单位存在隶属关系 D 、监理单位不得侵害建设单位和承建单位的知识产权 【参考答案】 B 【郑房新老师点评】 P53  1.监理单位的权利与义务 在信息产业部正式颁布的《信息系统工程监理暂行规定》 中。第18条详细规定了监理单位的权利与义务： (1)应按照“ 守法、公平、公正、独立 ”的原则  - A 正 确，开展信息系统工程监理工作，维护建设单位与承建单位的合 法权益； (2)按照监理合同取得监理收入--B错误，是监理任务： (3)不承建信息系统工程； (4)不得与被监理项目的承建单位存在隶属关系和利益关系-C正 确，不得作为其投资者或合伙经营者； (5)不得以任何形式侵害建设单位和承建单位的知识产权；--D正确。 (6)在监理过程中因违犯国家法律、法规，造成重大质量、安全事故的，应承担相应的经济责任和法律赞任。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":35,"question":"【2023年05月 -第35题】 -第2章信息系统项目管理 35、监理活动的主要内容被概括为“ 四控、三管、一协调 ”,其中“ 四控 ”不包括。 A 、质量控制     B 、进度控制     C 、投资控制     D 、安全控制 【参考答案】 D 郑房新老师 监理Q群423649123 高项扣扣群：658661882  中项扣扣群：725873151淘宝店铺：郑房新软考教育 或郑房新老师 【郑房新老师点评】P8  送分题，必须得分。 2. 监理内容 监理活动的主要内容被概括为“ 四控、三管、一协调 ”。 1)四控 信息系统工程质量控制-A包括：信息系统工程进度控制-B包括：信息系统工程投资控制-C包括：信息系统工程变更控制。 2 ) 三 管 信息系统工程合同管理：信息系统工程信息管理；信息系统工程安全管理。 3) 一 协调 在信息系统工程实施过程中协调有关单位及人员间的工作关系。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":34,"question":"【2023年05月 -第34题】 -第2章信息系统项目管理 34、在信息系统项目建设过程中，可以采用的质量控制工具不包括： (_)","options":[{"label":"A","text":"统计抽样 B、六西格玛    C、帕累托分析    D、挣值分析 【参考答案】 D 【郑房新老师点评】 P23 处理事故，例如决定是否返工，是否需要组织专门的小组负贵解决和纠正质量问题。 4)采取措施 使用质量控制工具和技术 (1)测试：单元测试、综合测试、系统测试等。 (2) 统计抽样和标准差、六西格玛等 。--A,B    包括 (3) 帕累托分析。--C 包括 (4)其他。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":33,"question":"【2023年05月 -第33题】 - 第 1章信息系统工程监理引论 33、关于信息应用系统项目及项目管理的描述，不 正 确的是： (     ) A 、一般采取集中办公方式，项目实施过程可视性较好  B 、项目建设过程中工期经常会超出计划 C 、项目监理在项目执行过程中应被重视               D 、强项目管理能够确保顺利完成项目实施 【参考答案】A 【郑房新老师点评】 P15 建筑工程项目可视性强，信息系统工程可视性差 4。关于方法与手段 由 于  建筑工程可视性强，所以广泛采用现场监理手段，如旁站、巡视、进场材料核查、工序检查等等。同样的手段对 信息系统工程监理基本不适用，而需要独辟蹊径。例如，在设计阶段采用专家会审的方法，而在验收阶段则强调定量测 试等","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":32,"question":"【2023年05月-第32题】 -  第19章信息应用系统建设基础知识 32 、某政府单位批量替换了一批办公终端，其芯片架构由x86   改为了ARM,   为了使单位的业务应用系统能够在新环境 下正常使用，需要对其进行升级。这种软件升级属于 (     ) 郑房新老师  监理Q群423649123  高项扣扣群： 658661882   中项扣扣群： 725873151淘宝店铺： 郑房新软考教育   或郑房新老师","options":[{"label":"A","text":"纠错性维护  B、适应性维护   C、预防性维护    D 、完善性维护 【参考答案】 B 【郑房新老师点评】 P453 19.6.1软件维护类型 1. 纠错性维护 纠正在开发阶段产生而在测试和验收过程没有发现的错误。其主要内容包括： (1)设计错误； (2)程序错误； (3)数据错误； (4)文档错误。 2.适应性维护(适应改变-适应环境)--选B 为适应软件运行环境改变而作的修改。环境改变的主要内容包括： (1)影响系统的规则或规律的变化： (2)硬件配置的变化，如机型、终端、外部设备的改变等： (3)数据格式或文件结构的改变； (4) 软件支持环境的改变，如操作系统、编译器或实用程序的变化等。 3. 完善性维护 为扩充功能或改善性能而进行的修改。修改方式有插入、删除、扩充和增强等。主要内容包括： (1)为扩充和增强功能而做的修改，如扩充解题范围和算法优化等； (2)为改善性能而作的修改，如提高运行速度、节省存储空间等； (3)为便于维护而做的修改，如为了改进易读性而增加一些注释等。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":31,"question":"【2023年05月 -第31题】 -第 19章信息应用系统建设基础知识 31、某政务应用软件项目覆盖省市县三级行政机构，规模大，安全性等级高。在设计阶段，建设单位组织了外部评审， 计划邀请9名专家组成评审委员会，其中软件专家人数最少为 (    ) A 、4          B 、5       C 、6       D 、7 【参考答案】 B 【郑房新老师点评】 P450 2.外部评审 对规模等级大和安全性关键等级高的软件必须进行外部评审。外部评审由业主单位主持，承建单位组织，成立评 审委员会 。评审委员会由业主单位、承建单位和一定数量(占评审委员会总人数的50%以上)的软件专家组成员组成， 人数七人以上(单数),设主任一人、副主任若干人  。评审委员会与软件专家组共同进行评审。评审分专家组审查和评 委会评审两步完成。软件专家组进行审查，评审委员会进行评审。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":30,"question":"【2023年05月 -第30题】 -第 19章信息应用系统建设基础知识 30.软件开发模型中，原型模型可以细分为 (    ) A 、增量模型和喷泉模型   B 、螺旋模型和喷泉模型    C 、渐进模型和螺旋模型    D 、增量模型和渐进模型 【参考答案】 D 【郑房新老师点评】 P443 2.原型模型 原型模型也称演化模型，此方法主要针对所要开发的系统的需求不是很清楚，需要一个可实际运行的工作演示系统， 即原型，作为软件开发人员和用户学习研究、试验和确定软件需求的工作平台。  原型模型又可细分为增量模型和渐进模 型。--选D 1)原型化开发方法在实际应用中一般用的步骤 (1)快速分析。快速确定软件系统的基本要求。 (2)构造原型。尽快实现一个可运行的系统。 (3)运行和评价原型。验证原型的正确程度，根据用户的新设想，提出全面的修改意见。 (4)修正和改进。首先修改并确定需求规格说明，然后再重新构造或修改原型。 (5)判定原型是否完成。如果用户认可，迭代过程可以结束；否则，继续迭代。 (6)判断原型细部是否说明。 (7)原型细部的说明。 (8)判定原型效果。 (9)整理原型和提供文档。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":29,"question":"【2023年05月 -第29题】 -第 19章信息应用系统建设基础知识 29 、关于面向对象的软件开发方法 (OMT)   的描述，不正确的 是(    ) A 、OMT的基础是对软件系统功能的逐层分解","options":[{"label":"B","text":"OMT  的第一步是从问题的陈述入手，构造系统模型"},{"label":"C","text":"OMT  是一种自底向上和自顶向下相结合的方法"},{"label":"D","text":"OMT  提升了软件的可维护性 【参考答案】A 【郑房新老师点评】 P473-P474 页 OMT  的第一步是从问题的陈述入手，构造系统模型。  --B对 OMT 是一种自底向上和自顶向下相结合的方法。 --C对 OMT提升了软件的可维护性。 --D对"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":28,"question":"【2023年05月-第28题】 -第 19章信息应用系统建设基础知识 28 、JAVA语言采用了(_)机制，使得编译产生的泛代码程序可以在各种平台上执行，从而做到了程序执行与平台无","options":[{"label":"A","text":"构件对象    B、虚拟机  C、CORBA     D、COM/DCOM 【参考答案】 B 【郑房新老师点评】 P479  页 JAVA语言由于巧妙地采用了虚拟机的机制，使得编译后产生的泛代码程序可以在各种平 台上执行，从而做到了程序执行与平台无关。 郑房新老师 监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育 或 郑房新老师"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":27,"question":"【2023年05月-第27题】 -第 19章信息应用系统建设基础知识 27、在信息应用系统建设中，软件测试的目的是 (     ) A 、验证开发团队的能力   B 、验证软件是否满足需求   C 、证明软件的正确性  D 、为软件规定的功能提供依据 【参考答案】 B 【郑房新老师点评】 P441 页 5.软件测试 在设计测试用例的基础上检验软件的各个组成部分 。单元测试检查每一单独的模块部件的功能和性能。组装测试提供 了构造软件模块结构的手段，同时测试其功能和接口。确认测试检查所有的需求是否都得到满足-B对。在每一个测试 步骤之后，都要进行调试，以诊断和纠正软件的故障。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":26,"question":"【2023年05月 -第26题】 -第22章分析设计阶段监理 26、关于软件配置管理的描述， 不正确的 是 (     ) A 、配置管理的软件工作产品，其更改是受控的 B 、软件配置管理是保证软件质量和软件研制进度的重要手段 C 、已送审的软件配置管理计划是实施软件配置管理活动的基础","options":[{"label":"D","text":"软件配置管理计划涉及软件需求、软件设计、软件代码单元等内容 【参考答案】 C 【郑房新老师点评】P562-563 页 22.2.4软件配置管理监理 软件配置管理是保证软件质量和软件研制进度的重要手段-B对 ，软件配置管理包括标识给定时间点的软件配置(即所 选择的工作产品及其描述),系统地控制这些配置的更改，并在软件生命周期中保持这些配置的完整性和可跟踪性。 1. 软件配置管理监理的目标 (1)确保软件配置管理活动是有计划的； (2)确保所选择的软件工作产品是经过标识、受到控制并具有可用性的： (3)监督所标识的软件工作产品的更改是受控的；---A对 (4)及时了解软件基线的状态和内容。 2. 软件配置管理监理的主要活动 (1)确保应用软件系统建设承建单位的配置管理组织和环境按照软件项目计划的要求成立并配备。 (2)控制承建单位依据书面规程，为应用软件系统建设项目制定软件配置管理计划。 (3)监督承建单位使用审批通过的、文档化的软件配置管理计划作为实施软件配置管理活动的基础-C 错，该计划包括： 要执行的活动、活动的进度安排、指定的职贵和所需的资源：监督承建单位标识将置于配置管理下的软件工作产品， 工 作产品包括与过程相关的计划、标准或规程、软件需求、软件设计、软件代码单元、软件测试规程、为软件测试活动 建立的软件系统、软件系统产品和编译程序。--D 对 (4)控制承建单位依据书面规程，对所有配置项/单元的更改请求和问题报告实施初始准备、记录、评审、批准和跟踪。 (5)监督承建单位依据书面规程，控制对基线的更改。监督承建单位依据书面规程， 由软件基线库生成软件产品并对其 发布进行控制。监督承建单位依据书面规程，记录配置项/单元的状态。 (6)控制承建单位编制软件配置管理报告，证明软件配置管理活动和软件基线库的内容，并提供给业主。 (7)监督承建单位依据书面规程，进行软件基线库审核。进行软件配置管理活动状态的跟踪和记录。 (8)定期审查软件配置管理活动和软件配置管理基线， 以验证它们与文档定义的一致性。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":25,"question":"【2023年05月 - 第25题】 -第 16章信息网络系统建设设计阶段的监理 25、某信息网络系统服务器选型时，建设单位提出稳定可靠是第一位的 。监理工程师应建议使用(     ) 衡量服务器的可 靠性 。","options":[{"label":"A","text":"RAID   B、MTBF      C、CPU 主 频   D、RAM 容 量 【参考答案】 B 郑房新老师  监理Q群423649123  高项扣扣群： 658661882   中项扣扣群： 725873151淘宝店铺： 郑房新软考教育   或郑房新老师 【郑房新老师点评】 P346 页系统可靠性。通常用MTBF (平均无故障时间)值衡量。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":24,"question":"【2023年05月 - 第24题】 -第 14章信息网络系统监理基础 24 、(              ) 只有用于信息处理的基础物理环境(如电线、空调、地板等),灾难发生时，所有设备都必须运送到站点上， 同时从基础开始安装 ， 因此故障恢复时间可能会很长。 A 、热 站     B 、温 站    C 、冷 站    D 、设备站 【参考答案】 C 【郑房新老师点评】 P308 (3)灾难恢复站点类型 (小郑口诀： 热镜像 ，冷基础 ，温站有个CPU) ·热站 (Hot Site) 在恢复站点，服务器、数据与应用程序与主服务器随时同 步 ( 镜 像 ) 运 行，这种方式的灾难恢复过程非常快速， 几乎难于察觉 。装备了数据中心 ，完全可以在灾难来临时发挥作用 。但由于这种方案意味着软硬件的重复投资 ， 因此 这种方案一般投资高昂。 ·冷站(Cold Site) 只有用于信息处理的基础物理环境(如电线 、 空调 、地板等)  ,灾难发生时 ，所有设备都必须运送到站点上 ， 同时 从基础开始安装 ， 因此故障恢复时间可能会很长。 ·温站(Warm Site) 用于信息处理的网络连接和一些外围设备只是部分进行了配置 ，如磁盘 、磁带 ，但主要的计算机系统没有备份 。 有 时 ，  温站装配 一 些小功率的CPU, 这样的安排有利于灾难发生时 ，计算机能立即投入使用 ， 同时 ，还比热站的费用 低 。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":23,"question":"【2023年05月 - 第23题】 - 第22 章分析设计阶段监理 23、软件质量保证的目标不包括： (    )","options":[{"label":"A","text":"监督承建单位制定软件质量保证计划"},{"label":"B","text":"客观地验证软件产品及其活动是否遵守应用的标准、规程和需求"},{"label":"C","text":"促进各方及时处理软件项 目开发过程中的不一致问题"},{"label":"D","text":"记录并保管软件计划数据 ，审查软件项 目计划的活动情况 【参考答案】 D 【郑房新老师点评】 P561 页 2. 软件质量保证监理的 目标： (小郑口诀： 剑客出) (1)监督承建单位对软件质量保证活动做到有计划： (2)客 观地验证软件产品及其活动是否遵守应用的标准、规程和需求； (3)促进由各方及时处理软件项目开发过程中的不一致性问题。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":22,"question":"【2023年05月 - 第22题】 -第 16章信息网络系统建设设计阶段的监理 22 、信息网络系统设计方案的基本原则不包括(    )","options":[{"label":"A","text":"标准化原则   B.安全性原则    C.可管理性原则    D.技术前瞻性原则 郑房新老师 监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育 或 郑房新老师 【参考答案】 D 【郑房新老师点评】 P340-P341  页 1 、标准化原则；--A 包括 2、先进性和实用性原则； 3、 可靠性和稳定性原则； 4、可扩展性原则； 5、 安全性原则；--B包 括 6、可管理性原则；--C 包 括 7、对原有设备和资源合理整合的原则； 8、经济和效益性原则。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":21,"question":"【2023年05月-第21题】 -第14章信息网络系统监理基础 21、 网络按照所覆盖的区域分为 ( _  ) ①局域网②区域网  ③城域网 ④广域网","options":[{"label":"A","text":"①②③④   B、①②④  C、①③④   D、①②③ 【参考答案】 c 【郑房新老师点评】 P291  页网络按照所覆盖的区域分为 (  小 s":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":5,"question":"【2023年05月-第5题】 -第 15 章信息网络系统建设准备阶段的监理-立项评审的基本原则 5.某信息网络系统立项评审时，评审专家提出了下述意见。其中不正确的是： (_) A 、系统设计应该尽量简单，以提高运行效益 B 、系统对外界条件的变化应具有较强的适应能力","options":[{"label":"C","text":"系统体系架构设计时，应优先选择性能高的硬件设备 D 、系统建设工程应具备经济性，在投资和绩效之间取得平衡 【参考答案】C 【郑房新老师点评】 P326 页 15.1.1立项评审的基本原则  1。简单性 工程设计应该尽量简单。这样可以提高运行效益--A 对，同时也可以节省投资和提高系统的运行质量。 2。灵活性 工程对外界条件的变化应具有较强的适应能力--B对。 由于信息网络工程是复杂的系统工程，要求系统的结构要具有较 好的灵活性和可塑性。 3。完整性 信息网络系统工程是各个子工程的集合，并作为一个有机的整体而存在，因此信息网络工程要求各子系统功能规范、 接口统一。各子系统的协调工作是保证整个网络系统正常运行的基础。 4。可靠性 系统的可靠性是评定工程质量的主要指标之一。可靠性的要求包括： (1)系统体系结构设计合理，具有良好的可扩展性； (2)硬件设备稳定性高； (3)良好的可管理性； (4)安全防护措施完善。 5. 经济性 同其他工程一样，信息网络系统工程的长远目标是为使用者带来相应的效益，因此，如何在投资和绩效之间取得平衡 是项目建设的重要目标之一--D对。这也是监理方在为业主进行项目经济分析时必须考虑的问题。"}],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":4,"question":"【2023年05月 -第4题】 -第 19章信息应用系统建设基础知识-软件工程基本原则 4、关于软件工程基本原则的描述，不正确的是： (    ) A 、合适的设计方法应考虑软件的模块化、抽象与隐蔽性、局部化等特征 B 、必须认识到需求定义具有不变性，应采用安全的开发范型及时验证需求  C 、要提供高质量的工程支持 ，软件工具与环境对软件过程的支持较为重要 D 、仅当软件过程得以有效管理时 ，才能实现有效的软件工程 【参考答案】 B 【郑房新老师点评】 P438-439  页 。不是不变性，是易变形。 软件工程有四条基本原则。 (1) 选取适宜开发范型 。 该原则与系统设计有关 。在系统设计中，软件需求、硬件需求以及其他因素之间是相互制约、 相互影响的，经常需要权衡。因此，必须认识需求定义的易变性，采用适宜的开发范型予以控制， 以保证软件产品满足用 户的要求。 (2) 采用合适的设计方法 。 在软件设计中，通常要考虑软件的模块化、抽象与信息隐蔽、局部化、 一致性以及适应性 郑房新老师  监理Q群423649123高项扣扣群：658661882中项扣扣群：725873151淘宝店铺：郑房新软考教育  或郑房新老师 等特征。合适的设计方法有助于这些特征的实现， 以达到软件工程的目标。 (3) 提供高质址的工程支持。 “工欲善其事，必先利其器 ”。在软件工程中，软件工具与环境对软件过程的支持颇为 重要。软件工程项目的质量与开销直接取决于对软件工程所提供的支撑质量和效用。 (4) 重视开发过程的管理。软件工程的管理，直接影响可用资源的有效利用，生产满足目标的软件产品，提高软件组 织的生产能力等问题。因此，仅当软件过程得以有效管理时，才能实现有效的软件工程。","options":[],"answer":"","analysis":""},{"source":"2023年5月选择真题.docx","category":"真题","time_label":"2023年5月","question_number":3,"question":"【2023年05月 -第3题】 -超纲题目机器学习-监督学习-无监督学习 3、人工智能的核心是机器学习，在机器学习过程中 ，  (_)    的学习方式提供对错指示等导师信号，通过算法让机器 自我减少误差。 A 、监督学习     B 、无监督学习     C 、 逻辑学习   D 、强化学习 【参考答案】 A 【郑房新老师点评】 (小郑口诀： 监督对 定义级(Defined)。开发过程，包括技术工作和管理工作，均已实现标准化、文档化。建立了完善的培训制度和专家评审制度，全部技术活动和管理活动均可控制，对项目进行中的过程、岗位和职责均有共同的理解。(4)已管理级(Managed)。产品和过程已建立了定量的质量目标。开发活动中的生产率和质量是可量度的。已建立过程数据库。已实现项目产品和过程的控制。可预测过程和产品质量趋势，如预测偏差，实现及时纠正。(5)优化级(Optimizing)。可集中精力改进过程，采用新技术、新方法。拥有防止出现缺陷、识别薄弱环节以及加以改进的手段。可取得过程有效性的统计数据，并可据进行分析，从而得出最佳方法。151 信息系统监理师-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362班班QQ2332791497)19.9.10 模式(Pattern)与框架（Framework)技术（P482，了解，考选择题1．设计模式（P482，了解，考选择题设计模式(Design Patterns)是在面向对象的系统设计过程中反复出现的问题解决方案。这个术语是在 1990 年代式，因为算法致力于解决实现问题而非设计问题。设计模式通常描述了一组相互紧密作用的类与对象。设计模式提供一种讨论软件设计的公共语言，使得熟练设计者的设计经验可以被初学者和其他设计者掌握。设计模式还为软件重构提供了目标。一般来讲，一个模式要有四个基本要素。(1)模式名称（patterm name):它用一两个词来描述模式的问题、解决方案和效果。命名一个新模式增加了我们的设计词汇。基于一个模式词汇表，软件工程师及其同事之间就可以讨论模式并在文档编写时利用它们。模式名可以帮助设计者思考，设计者之间交流设计思想及设计结果。(2)模式问题<pattern problem):描述应该在何时使用模式。它解释了设计问题和问题存在的前因后果，可能描述特定的设计问题，也可能描述了导致不灵活设计的类或对象结构。(3)解决方案(solution):描述设计的组成成分，它们之间的相互关系及各自的职责和协作方式。它并不描述一个特定而具体的设计或实现，而是提供抽象问题的描述和怎样用一个具有一般意义的元素（类或对象）组合来解决这过问题。(4)效果(consequences):描述模式应用的效果及使用模式应权衡的问题。模式效果包括对系统的灵活性、扩充性、可以执行的影响，显式列出这些效果对理解和评价模式很有帮助2．框架（P483，了解，考选择题框架(Framework）是构成一类专业领域可复用设计的一组相互协作的类，它规定了应用的体系结构，系统中的类和对象的分割及协作，各部分的主要责任，控制流程。框架预定义了设计参数，以便应用设计者或实现者能集中精力于应用本身的特定细节。框架记录了其应用领域的共同的设计决策，因而更强调设计复用。一个框架就是一个用于构建针对专门客户应用的可重用的“半成品\"应用。与其他早期基于类的可重用的面向对象技术相比，框架更专注于具体的业务单元（如数据处理、通信功能单元)和专业领域（如用户界面、实时电子应用)。目前有许多框架系统，例如用户界面方面的框架有MVC、ET++等，其中ET++采用C++语言实现，运行于UNIX 等系统中;针对其他领域的则有 FOIBLE、Mac App、FACE（Framework Adaptive CompositionEnvironment）等。19.9.11 统一建模语言 UML 和统一开发过程 RUP（P485，了解，考选择题 UML.UML 是一种可视化的建模语言（不是编程语言）,可以应用于不同的软件开发过程。下面介绍UML涉及的一些基本概念。1）视图（Views)UML用模型来描述系统的静态结构和动态行为。(1）用例图(Use case diagram)用例图描述系统的功能，由系统、用例和角色(Actor）三种元素组成。图中显示若干角色以及这些角色和系统提供的用例之间的连接关系。用例是系统对外提供的功能的描述，是角色和系统在一次交互过程中执行的相关事务的序列。角色是与系统、子系统或类交互的外部人员、进程或事物。152 信息系统监理师-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362班班 QQ2332791497)(2）类图(Class diagram)类图用来表示系统中的类以及类与类之间的关系，描述系统的静态结构,用于逻辑视图中。类是对象的抽象描述。所谓对象就是可以控制和操作的实体，类是具有共同的结构、行为、关系、语义的一组对象的抽象。类的行为和结构特征分别通过操作和属性表示。(3）对象图(Object diagram)对象图是类图的示例，类图表示类和类与类之间的关系，对象图则表示在某一时刻这些类的具体实例以及这些实例之间的具体连接关系，可以帮助人们理解比较复杂的类图。对象图也可以用于显示类图中的对象在某一点的连接关系。对象图常用于用例视图和逻辑视图中。(4）状态图(State diagram)状态图主要用来描述对象、子系统、系统的生命周期。通过状态图可以了解一个对象可能具有的所有状态、导致对象状态改变的事件，以及状态转移引发的动作。状态是对象操作的前一次活动的结果，通常由对象的属性值来决定。事件指的是发生的且引起某些动作执行的事情。状态的变化称做转移，与转移相连的动作指明状态转移时应该做的事情。状态图是对类描述的事物的补充说明，用在逻辑视图中描述类的行为。2)图(Diagrams)每个视图都由一个或者多个图组成，一个图是系统体系结构在某个侧面的表示，所有的图在一起组成系统的完整视图。UML提供了九种不同的图,分为静态图和动态图两大类。静态图包括用例图、类图、对象图、组件图和配置图，动态图包括序列图、状态图、协作图和活动图。(1）用例图(Use case diagram)用例图描述系统的功能，由系统、用例和角色(Actor）三种元素组成。图中显示若干角色以及这些角色和系统提供的用例之间的连接关系。用例是系统对外提供的功能的描述，是角色和系统在一次交互过程中执行的相关事务的序列。角色是与系统、子系统或类交互的外部人员、进程或事物。(2)类图(Class diagram)类图用来表示系统中的类以及类与类之间的关系，描述系统的静态结构，用于逻辑视图中。类是对象的抽象描述。所谓对象就是可以控制和操作的实体，类是具有共同的结构、行为、关系、语义的一组对象的抽象。类的行为和结构特征分别通过操作和属性表示。(3）对象图(Object diagram)对象图是类图的示例，类图表示类和类与类之间的关系，对象图则表示在某一时刻这些类的具体实例以及这些实例之间的具体连接关系，可以帮助人们理解比较复杂的类图。对象图也可以用于显示类图中的对象在某一点的连接关系。对象图常用于用例视图和逻辑视图中。(4)状态图(State diagram)状态图主要用来描述对象、子系统、系统的生命周期。(5)序列图(Sequence diagram)面向对象系统中对象之间的交互表现为消息的发送和接收。(6)协作图(Collaboration diagram)协作图主要描述协作对象之间的交互和链接。协作图和序列图同样反映对象间的动态协作，也可以表达消息序153 信息系统监理帅-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362列，但重点描述交换消息的对象之间的关系，强调的是空间关系而非时间顺序。(7)活动图(Activity diagram)活动图显示动作及其结果，着重描述操作实现中所完成的工作以及用例实例或对象中的活动。活动图中反映了一个续的活动流，常用于描述一个操作执行过程中所完成的工作。活动图也有其他的用途，如显示如何执行-一组相关的动作，以及这些动作如何影响它们周围的对象，说明一次商务活动中的工人、工作流、组织和对象是如何工作的等。(8) 组件图(Component diagram)组件图用来反映代码的物理结构。组件可以是源代码、二进制文件或可执行文件，包含逻辑类的实现信息。实现视图由组件图构成。(9)配置图(Deployment diagram)配置图用来显示系统中软件和硬件的物理架构。图中通常显示实际的计算机和设备及它们之间的关系。配置图用来构成配置视图，描述系统的实际物理结构。历年真题2021上-(23）不属于软件维护中的完善性维护。(23)A、为适应软件环境而做的修改，如操作系统、应用程序的变化。B、为改善性能而做的修改，如提高运行速度、节省存储空间C、为便于维护而做的修改，如为了改进易读性而增加一些注释D、为了扩充和增强功能而做的修改，如扩充解题范围和算法优化【错误次数统计（正）】【参考答案】A为适应软件环境而做的修改，如操作系统、应用程序的变化是适应性维护。2021上对规模等级大和安全等级高的软件项目必须进行外部评审。关于外部评审的描述，不正确的是（22)A、评审委员会应由7人及以上(单数的专家组成)B、评审委员会应由业主单位、承建单位和软件专家组成C、建设单位需要至少提前10天提出外部评审申请。D、评审分专家组审查和评委会评审两步完成【错误次数统计（正）】【参考答案】℃承建方。2021 上-(21)不属于面向对象系统分折的模型。(21)A.对象-行为模型B.类-对象模型C.对像-关系模型D.数据流-对象模型。【错误次数统计（正）】【参考答案】D数据流-对象模型不属于面向对象。2021上-(17)不属于软件开发过程中需求分析阶段的输出。(17)A.质量 件图C.类图(33)A.对象图D.配置图【答案】C【解析】对象图是类图的示例，类图表示类和类与类之间的关系，对象图则表示在某一时刻这些类的具体实例以及这些实例之间的具体连接关系，可以帮助人们理解比较复杂的类图。对象图也可以用于显示类图中的对象在某一点的连接关系。对象图常用于用例视图和逻辑视图中。组件图用来反映代码的物理结构。组件可以是源代码、二进制文件或可执行文件，包含逻辑类的实现信息。实现视图由组件图构成。类图用来表示系统中的类以及类与类之间的关系，描述系统的静态结构，用于逻辑视图中。类是对象的抽象描述。所谓对象就是可以控制和操作的实体，类是具有共同的结构、行为、关系、语义的一组对象的抽象。类的行为和结构特征分别通过操作和属性表示。类与类之间有多种关系，如关联、依赖、通用化、聚合等。关系提供了对象之间的通信方式。关联关系用于描述类与类之间的连接，通常是双向的。通用化又称继承，是通用元素和具体元素之间的一种分类关系，具体元素完全拥有通用元素的信息，并且还可以附加其他信息。聚合关系具有较强的耦合性，描述整体与部分的关系。依赖关系描述两个模型元素之间语义上的连接关系，其中一个元素是独立的，另一个元素依赖于独立的模型元素，独立元素的变化将影响到依赖元素。配置图用来显示系统中软件和硬件的物理架构。图中通常显示实际的计算机和设备及它们之间的关系。配置图用来构成配置视图，描述系统的实际物理结构。面向对象分析设计中，多态机制的作用是（34）。(34)A.信息隐藏B.实现“一种接口，多种方法”159 信息系统监理师-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362C.数据抽象D.实现“多种接口，一种方法”【答案】B【解析】多态(Polymorphism)按字面的意思就是“多种状态”。在面向对象语言中，接口的多种不同的实现方式即为多态。引用Charlie Calverts 对多态的描述一一多态性是允许你将父对象设置成为意个或更多的他的子对象相等的技术，赋值之后，父对象就可以根据当前赋值给它的子对象的特性以不同的方式运作。第 20 章信息应用系统监理工作（P491-P5373 分选择3 分案例多刷题）个人学习记录：学习日期第几次学习正确率（或者填写错题数目）这一章主涉及的内容比较多，难度较大，性价比一般，，一般考 3 分选择 3 分案例题，学了不一定能拿满分，尽量得分。历年真题2017上-在软件开发项目监理工作中，如果承建单位2个项目成员使用不同版本的设计说明书，这时监理工程师首先应该检查(29)_°(29)A.信息管理系统B.配置管理系统。C.CPID.SPI【错误次数统计（正）】【参考答案】B版本问题检查配置管理。2020下-关于软件测试技术的描述，正确的是:(24)。A.静态测试分为白盒测试和黑盒测试B.白盒测试不需要运行程序，较少关心程序内部的实现过程C.代码审查需要专门的测试工具和设备D.Purify、Macabe 都是具备静态分析功能的软件测试工具。【错误次数统计（正）】【参考答案】D白盒测试和黑盒测试是黑盒。白盒要看内部逻辑。代码审查不需要特殊工具。2019下-软件配置管理通过标识产品的组成元素来实现产品的():A． 适用性B．安全性160 信息系统监理帅-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362班班QQ2332791497)C． 易用性D．完整性。【错误次数统计（正）】【参考答案】D软件配置管理通过标识产品的组成元素来实现产品的完整性2019上-软件配置管理通过标识产品的组成元素、管理和控制变更、验证、记录和报告配置信息，来控制产品的进化和（25）。A．可靠性B．安全性C. 连续性D.完整性【错误次数统计（正）】【参考答案】D软件配置管理通过标识产品的组成元素、管理和控制变更、验证、记录和报告配置信息，来控制产品的进化和完整性2020下-软件测试工程师设计测试用例时，测试用例的输入必须包括(23)。①初始值②)合理的(有效等价类)值③边界值④不合理的(无效等价类)值A.00?c.034B.@?④ .D.0④【错误次数统计（正）】【参考答案】B可以不包括初始值。2020下-(21)不是对软件质量的描述。A.软件符合合同中明确提出的要求与需要B.软件符合通过调研获取的要求与需要C.软件符合范围说明书D.软件符合 WBS 分解的阶段、子项目要求。【错误次数统计（正）】【参考答案】D质量是满足各组需求（要求）的程度。2018年上-关于信息系统工程的描述，不正确的是（35）。（35）A.信息系统工程项目属于技术密集型项目B.信息系统工程项目可视性差，而且在度量和检查方面难度较高C.信息系统工程在实施过程中不断面对用 包括哪些？验收目标、各方责任、验收内容、验收标准、验收方式。(每个1分，共5分)任何验收都要有工作方案指导为宜。本着这个思路，验收方案重点表述验收目标、各方责任、验收内容、验收标准、验收方式等关键内容。对于子项验收工作，由于验收工作较为简单，且是为整体项目验收做相关准备，故验收方案仅就子项目验收工作做相应论述，可以适当简略。项目验收方案，在通过监理审查后，报建设单位审核、确认，并酌情予以实施。另外，作为子项目验收还要为整体项目验收做好协调、配合工作，如有需要也要加以论述为宜，如验收测试的系统联调测试、项目档案管理和验收手续符合整体项目验收要求等【问题3】请指出事件2中的不当之处。(1)验收委员会还应该有承建单位参加。房新(2)审查承建单位验收申请是总监理工程师的职责。(3)组织监理人员进行验收是总监理工程师的职责(每项2分，最多得5分)本问题主要考查项目验收组织活动中，监理参与其中的工作程序、监理机构各角色职责分工和有关权限等内容。事件2 有三处不当。一是，验收组织不全。既然是项目验收，验收的对象就是承建单位和承建单位提交的验收成果，而承建单位不参与验收活动，显然不妥。至于是否参加到项目验收委员会当中，可以适当酌情处理。二是，组织监理机构对验收申请的审查是总监理工程师的职责，而不能委托监理工程师承担。三是，参与项目验收审查活动也是应该由总监理工程师承担的，而不能由监理工程师组织并代行总监理工程师职责。2014年11 月　试题四【说明】某重点大型电子政务工程项目建设中，建设单位甲与承建单位乙签订了实施合同，工期为18个月。合同规定，项自完成后首先进行各子项目内部验收，再按照《国家电子政务工程建设项目管理暂行办法》的相关规定进行项目验收，并委托某监理公司丙承担项目全过程的监理任务。建设过程中发生了以下事件：事件1：承建单位根据项目建设需要制定了周密的实施计划，部分节点是：项目实施后第8个月完成主机等设备的安装调试工作和子项目内部验收，第9个月完成软件开发和子项目内部验收，第10个月开始进行试运行，第14个月完成信息安全风险评估，第15个月完成项目出入验收…·事件2；承建单位项目经理在安排软件测试任务的动员会上讲：软件测试环节是软件系统质量形成的主要环节，各222 信息系统监理师-真题通高项Q群1136743739中项Q群212862940监理Q群423649123系规708089362开发小组，特别是测试小组，应重视软件集成此时的工作。因此，项目经理安排测试组进行测试的时间非常充足，测试周期占整个软件系统开发周期的40%，约15周。在软件系统测试的过程中，项目经理安排了详细的测试跟踪计划，统计每周所发现的软件系统故障数量，以及所解决的软件故障。根据每周集成测试结果分析，软件系统故障10周发现2个故障，第11周发现1个故障，第12周和第13周发现0个故障。因此，项目经理认为应用软件达到了内部经验验收的条件。事件3：项目初步验收完成后，建设单位要求监理机构协助整理提交竣工验收申请报告时所需要的、作为附件一并上交的其他文件。【问题1】不可行。理由：进度计划缺乏科学性。应通过活动定义、活动排序、活动资源估算和活动持续时间估计这四个过程制定项目的进度计划。同时在制定进度计划时应考虑资源日历、项目日历、风险等因素。【问题2】针对事件2,作为监理工程师，请指出：(2）第12周和第13周发现0个故障，因此项目经理认为应用软件达到了内部验收的条件，这种说法妥当吗？说出理由。(1)不妥。理由：测试只是保证软件质量的重要手段，而不是主要环节。质童源自于开发计划、设计和实施，并非出自于检查。应重视开发过程(管理过程)的质量，也应重视产品的质量。(2）妥当。理由：故障缺陷数已经呈整体下降并趋于稳定的趋势，可以认为达到内部验收条件。【问题3】请给出事件3中提交竣工验收申请报告时所需的，作为附件一并上交的其他文件。初步验收合格后，项目建设单位应向项目审批部门提交竣工验收申请报告，并将项目建设总结、初步验收报告、财务报告、审计报告和信息安全风险评估报告等文件作为附件一并上报。2014 年05月试题四【说明】某行业协会组织开发了一套信息系统,准备完成系统终验后即在地方协会部署，为了保证部署效果，招入第三方监理机构和测试机构对系统最终验收工作提供咨询服务。事件1:协会要求第三方测试机构测试通过后，由监理机构针对第三方测试提出监理意见。事件2:协会要求监理机构开展地方协会部署过程的监理工作，并要求监理机构出具相关监理方案。事件3:协会要求监理机构提供验收工作的咨询意见，协助编制验收工作步骤。【问题1】针对事件1，请指出监理机构的监理意见主要包括哪些内容。223 信息系统监理师-真题通高项Q群1136743739中项Q群212862940D监理Q群423649123系规 者其他组织投标；②邀请招标，是指招标人以投标邀请书的方式邀请特定的法人或者其他组织投标。3.公开招标。（1）公开招标的优点：①最大限度地保证项目的公开、公平、公正、透明：②促使供应商保质保量按时完成项目目标，并获得最具竞争力的价格：③有效避免弄虚作假舞弊等行为。（2）公开招标的缺点：①程序较为复杂，招投标耗时较久，费用支出也较多：②采购风险较大，例如，投标者之间可能出现串通投标，任意提高或压低报价，给其他投标者造成困扰和损失；或者投标者以不合理的低价恶意抢标，可能导致项目偷工减料、交付延期等风险。4.邀请招标。（1）邀请招标，也称选择性招标，是由采购人根据供应商或承包商的资信和业绩，选择一定数目的法人或其他组织（不能少于3家），向其发出投标邀请书，邀请他们参加投标竞争，从中选定中标供应商的一种招标方法。（2）邀请招标的优点：①邀请招标能够按照项目需求特点和市场供应状态，有针对性地从已 知了解的潜在投标人中，选择具有与招标项目需求匹配的资格能力、价值目标以及对项目重视程度均相近的投标人参与投标竞争，有利于投标人之间均衡竞争。②通过科学的评标标准和方法实现招标目标，招标工作量和招标费用相对较小，既可以省去招标公告和资格预审程序(招投标资格审查)时间，又可以获得基本或者较好的竞争效果5.招投标注意事项为避免招投标出现违规事项，国家有关部门对有关招标工作严格执行有关规定。依法应当公开招标的项目存在下列情形之一时，经招标项目有关监督管理部门审批、核准或认定后，方可采用邀请招标方式:①涉及国家安全、国家秘密或者抢险救灾，适宜招标但不宜公开招标的;②项目技术复杂或有特殊要求，或者受自然地域环境限制，只有少量潜在投标人可供选择的；③采用公开招标方式的费用占项目合同金额的比例过大的。第2版第20章习题4：以下属于需求评审的主要内容有（①系统定义的目标是否与用户的需求一致②需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求。③主要功能是否已包括在规定的需求范围之内，是否都已充分说明。④设计的约束条件或限制条件是否符合实际。③是否详细制定了检验标准，其能否对系统定义成功进行确认。A.02346.B. 036.C.0230.D.2346.【参考答案】A【郑房新老师点评】需求评审的主要内容包括：①系统定义的目标是否与用户的需求一致；②需求分析阶段提供的文档、资料是否齐全；③需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求；④与所有其他系统的重要接口是否都已得到描述；③主要功能是否已包括在规定的需求范围之内，是否都已充分说明。③系统的行为和其必须处理的信息、必须完成的功能是否一致；③设计的约束条件或限制条件是否符合实际；③对开发过程中可能存在的技术风险是否采取了必要的规避措施；③是否详细制定了检验标准，其能否对系统定义成功进行确认。20.1.2规划阶段典型监理工作《信息系统监理师教程第2版2024年1月出版》第440页序号内容0234560890111314151118192典型监理工作例子需求评审的主1.需求评审的主要内容包括：要内容包括：①系统定义的目标是否与用户的需求一致;②需求分析阶段提供的文档、资料是否齐全；③需求分析文档中的所有描述是否完整、清晰、准确地反映了用户要求: ④与所有其他系统的重要接口是否都已得到描述；③主要功能是否已包括在规定的需求范围之内，是否都已充分说明。③系统的行为和其必须处理的信息、必须完成的功能是否一致：③设计的约束条件或限制条件是否符合实际；③对开发过程中可能存在的技术风险是否采取了必要的规避措施；③是否详细制定了检验标准，其能否对系统定义成功进行确认。第2版第20章习题5：需求验证的基本方法不包括（A.自查法。B.用户审查法。C.业主审查法。D.专家审查法。【参考答案】C【郑房新老师点评】需求验证的基本方法包括：①自查法②用户审查法③专家审查法④原型法20.1.2规划阶段典型监理工作《信息系统监理师教程第2版2024年1月出版》第440页序号内容0234560891011213141511181920典型监理工作例子需求验证的基1.需求验证的基本方法包括：本方法包括①自查法：需求分析人员对自已完成的工作内容进行审查和验证，纠正存在的问题;②用户审查法：将需求分析文档交给用户，由用户对需求分析进行审查;③专家审查法：将需求分析文档交给专家，由专家对需求分析进行审查;④原型法：通过建立原型系统对存在争议或不确定的需求进行验证，以此来确定需求是否正确。第2版第20章习题6：招标工作按照组织方式可以划分为（A.自行招标和委托招标。B.公开招标和邀请招标C.公开招标和自行招标。D.自行招标和邀请招标。【参考答案】A【郑房新老师点评】招标工作按照组织方式可以划分为自行招标和委托招标20.1.2规划阶段典型 标、范18 围和业务需求等理解的一致性。①可按照业主单位的要求，安排人员见证开标过程，见证流程合规性、开标情况、专家评议情况、是否存在不公正现象等，开标结束后，监理单位根据见证情况出具专题监理报告。第2版第20章习题21：招标咨询工作的具体内容包括：（①向业主单位提供与项目有关的法律法规和标准等信息。③协助业主单位根据项目预算②进行市场调查和询价，起草合同条款。④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。③对业主单位项目资金使用情况提供咨询意见，尽量做到“好钢用在刀刃上”。A. 2345.B. 230.C.0205.D.02306.【参考答案】D【郑房新老师点评】招标咨询工作的具体内容包括：①向业主单位提供与项目有关的法律法规和标准等信息。②进行市场调查和询价，起草合同条款，为业主单位进行商务谈判提供咨询服务，协助业主单位与承建单位签订合理、有效的承建合同，并为业主单位在合同签订过程中遇到的问题提供咨询服务。③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。①根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。③对业主单位项目资金使用情况提供咨询意见，尽量做到“好钢用在刀刃上”20.2.3招标阶段监理内容《信息系统监理师教程第2版2024年1月出版》第445页序号监理内容内容02345608910112131415161181920例子招标咨询工作1.招标咨询工作的具体内容包括：①向业主单位提供与项目有关的法律法规和标准等信息。②进行市场调查和询价，起草合同条款，为业主单位进行商务谈判提供咨询服务，协助业主单位与承建单位签订合理、有效的承建合同，并为业主单位在合同签订过程中遇到的问题提供咨询服务。③协助业主单位根据项目预算，在招标文件中对项目的目标、范围、内容和产品及服务的技术要求、提供时间等做出明确说明。④根据业主单位已确认的预算情况及建设需求，对采购的产品、服务的级别及质量标准向业主单位提供咨询意见。③对业主单位项目资金使用情况提供咨询意见，尽量做到“好钢用在刀刃上”。第2版第20章习题22：关于：承建合同签订的监理工作，以下说法错误的是（A.向业主单位提供与项目有关的法律法规和标准等信息。B.参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理C.如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理。D.建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据。【参考答案】A【郑房新老师点评】承建合同签订的监理工作具体包括：19 ①参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理②如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理。③建议业主单位组织与合同执行或管理相关的部门参与合同评审工作。④①协助业主单位对承建合同进行评审。③建议业主单位在承建合同中明确项目阶段划分及其质量和进度要求，并以此作为项目阶段性付款依据，③承建合同签订条款不得违背招投标文件约定的采购标的、数量、质量、价款或者报酬及付款方式、履约期限、违约责任、解决争议办法及有关影响采购标的使用效果的重要技术指标等实质性条款20.2.3招标阶段监理内容《信息系统监理师教程第2版2024年1月出版》第445页监理内容序号例子承建合同签订的1.承建合同签订的监理工作具体包括：监理①参与承建合同的签订过程，在承建合同中应明确要求承建单位接受监理机构的监理。（重复)②如果软件工程项目涉及分包，应协助业主单位要求承建单位负责对分包单位进行管理③建议业主单位组织与合同执行或管理相关的部门参与合同评审工作。④协助业主单位对承建合同进行评审，根据下列准则，对合同的相关内容提出监理意见，合同审核要点及关键条款关注点如下：招标文件与投标文件的一致性，例如，建设任务、关键技术指标、工期约定、人员投入等要求和投标文件是否一致，若有差异，合同应再次明确约定；符合法律法规和标准的要求；明确了建设范围和建设内容：明确了质量要求，包括功能要求和性能要求、文档要求：明确了质量责任和改进机制；明确了总体进度和阶段进度要求：划分和界定了工程的里程碑，并作为工程阶段性付款的依据；规定了处理变更的必要规程；规定了相关各方接口与合作的规程、范围和费用支付方式明确了系统测试标准和测试通过要求；明确了验收约定和验收要求：明确了安全性和保密性要求；明确了知识产权要求；明确了监理机构在质量控制、协调处理、工程款支付等重要工作中的作用；明确关于合同争议的处理方式；检查合同中测试标准、验收要求和质量责任条款的合规性。③建议业主单位在 施方案、实施计划和监理实施细则的要求对现场实施监理。对于监理实施过程中发现的问题及时出具监理意见并跟踪整改。项目实施过程的阶段性成果应进行三方签认。（3）项目实施过程结束后，承建单位及时提交项目实施报告，监理机构及时提交监理报告。合同管理监理工作流程1.合同管理具体的处理流程如下：①业主单位或承建单位就合同管理相关问题（例如变更问题、延期问题、索赔问题等)提出申请，申请中应对相关问题产生的原因、责任归属、处理方式做出说明。其后，监理机构根据项目实际情况，收集相关信息，并进行相应的审查。②如果合同管理问题申请的理由充分、合理，监理机构应予以批准；三方就申请处理结果达成一致后，及时签署工程备忘录38 并落实合同变更，否则及时签发监理通知单，告知申请方不同意申请的意见并说明原因③合同变更处理完毕后，项目实施过程根据变更予以一定的修正，监理机构须相应调整监理实施细则，落实合同变更内容。第2版第第20章习题53：验收阶段的监理要求具体包括：（①应审核项目测试验收方案（验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等）的符合性及可行性。②应协调承建单位配合第三方测试机构进行项目系统测评。③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求。④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。A. 034.B.0230.C. 230.D.023.【参考答案】B【郑房新老师点评】20.5验收阶段监理基础工作监理流程《信息系统监理师教程第2版2024年1月出版》第 464 页20.5.1验收阶段监理要求交《信息系统监理师教程第2版2024年1月出版》第464页序号内容02306608901113145161181920例子验收阶段1.验收阶段的监理要求具体包括：监理要求①应审核项目测试验收方案（验收目标、双方责任、验收提交清单、验收标准、验收方式、验收环境等)的符合性及可行性；②应协调承建单位配合第三方测试机构进行项目系统测评；③应促使项目的最终功能和性能符合承建合同、法律法规和标准的要求；④应促使承建单位所提供的项目各阶段形成的技术、管理文档的内容和种类符合相关标准。第2版第第20章习题54：以下说法错误的是（A.项目验收中的管理工作包括项目初验、系统试运行和项目终验B.项目初验的监理基础内容包括：初验条件的检查、初验前的监理准备工作、初验中的监理工作、初验验收会议的监理工作。C.系统试运行的监理基础内容包括：要求业主单位、承建单位以初验合格报告作为启动试运行的依据。D.验收阶段的其他监理内容包括：跟踪承建单位现场人员是否到位并正常工作。【参考答案】D【郑房新老师点评】跟踪承建单位现场人员是否到位并正常工作，属于系统试运行的监理基础内容错误。20.5.2验收阶段监理内容《信息系统监理师教程第2版 2024年1月出版》第464页序号监理内容内容02346608901113141511181920例子管理工作1.一般情况下，项目验收中的管理工作包括项目初验、系统试运行和项目终验。①项目初验的监理②系统试运行的监理③项目终验的监理④验收阶段其他监理内容 项目初验的监理1.项目初验，即初步验收，是指项目完成合同要求的全部内容后，对该项目是否符合设计要求、施工和设备安装是否符合质量要求等进行全面检测的过程。项目初验的监理基础内容包括：①初验条件的检查②初验前的监理准备工作。③初验中的监理工作④初验验收会议的监理工作：协助业主单位安排会场（例如签到表、会签等）；按会议议程执行；做好记录；会议纪要和验收报告落实签字。系统试运行的监1.系统试运行的监理基础内容包括：①要求业主单位、承建单位以初验合格报告作为启动试运行的依据。②审核承建单位的试运行申请，若符合条件，协调三方允许系统进入试运行阶段。③有计划地监督系统的试运行，督促承建单位解决试运行中出现的问题。④跟踪承建单位现场人员是否到位并正常工作。③定时或不定时了解用户对现场人员是否满意，若有问题，核实后可对承建单位提出要求。③抽查承建单位现场人员的工作记录（解决用户问题），对问题比较集中、有未解决的问题、有部分工作量调整的情况做好记录，根据实际情况可召开三方会议讨论解决方法、时间等。③督促承建单位及时解决出现的问题。③根据初验前备忘录的内容，核实承建单位落实情况③试运行结束后，建议用户出具用户使用意见，要求承建单位出具试运行报告和试运行期间的问题总结报告（若有问题未解决，可作为试运行时间延长的依据）。第2版第第20章习题55：项目终验的监理基础内容包括：（①及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。②协调项目相关方确定终验方案（含承建单位总结报告）及终验形式（三方会议或专家会议）、参与人员、议程等。③准备好监理的发言材料（监理总结报告）。④项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。③三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。③业主单位同意进行终验，在终验申请中予以签认，并报业主单位签认。A.23456.B.023450.C.02456.D.02346.【参考答案】B【郑房新老师点评】《信息系统监理师教程 第2版2024年1月出版》20.5.2验收阶段监理内容第464 页序号监理内容内容0234560891011213141511181920例子项目终验的监理1.项目终验也称工验收，是指在通过初验并试运行合格后，对项目的总体进行检测和认证、综合评价和鉴定的活动。项目终验的监理基础内容包括：40 （1）协助业主单位审核承建单位提交的终验计划及其方案，明确验收目标、各方责任、验收内容、验收标准、验收方式和验收结果等内容，并签署审核意见。（2）及时处理承建单位提交的终验申请，根据承建合同有关条款，核实实际情况是否满足终验要求。（3）如果符合如下终验条件，在终验申请中予以签认，并报业主单位签认：项目建设内容按照合同要求全部完成：各种技术文档和验收资料完系统的功能和性能满足设计要求；系统已通过初验、试运行，用户出具了初验和试运行意见；初验和试运行中出现的问题已经得到解决；试运行时间符合承建合同的要求；完成了约定的培训工作，培训效果符合要求；承建单位提交了符合要求的终验方案和计划，并且已通过审核；业主单位同意进行终验。（4）如果不符合上述终验条件，向承建单位提出整改意见（若此时由于某些客观原因还有未完成的事项，需协调三方事先做好沟通，承建单位签好承诺书）。（5）协调项目相关方确定终验方案（含承建单位总结报告）及终验形式（三方会议或专家会议）、参与人员、议程等。（6）协助业主单位做好终验准备、组织项目终验；对于大型或重要信息系统工程建设项目，应业主单位要求，可以聘请有关专家参与终验评审，以评估项目完成情况。（7）准备好监理的发言材料（监理总结报告）。（8）根据已定的验收议程召开会议，做好记录，会议纪要和验收报告落实签字。（9）三方签订终验合格报告，要求业主单位和承建单位以终验合格报告作为项目验收结束的依据。（10）项目终验后，审核承建单位的项目结算，可协助业主单位进行项目决算。（11）整理与项目有关的全部监理文档，并提交业主单位。（12）协助业主单位和承建单位完成项目移交工作。第2版第第20章习题56：验收阶段的其他监理内容包括（）。①对验收各阶段进度安排提出监理意见。②审核承建单位初验、终验和项目整改计划的可行性③由总监理工程师审核承建单位提交的付款申请，根据承建合同规定的付款条件，签发工程款支付意见。④及时向业主单位、承建单位通报承建合同、协议及相关变更所规定项目内容的执行情况，提出监理意见。③协助业主单位与承建单位签署其他补充协议。③督促业主单位、承建单位及时整理项目文档。③督促承建单位完成承建合同及项目实施方案中确定的培训A.2345@.B.023560."},{"label":"C","text":"02346.D.0234660.【参考答案】D【郑房新老师点评】20.5.2验收阶段监理内容《信息系统监理师教程第2版2024年1月出版》第 464 页内容023066089101121314516118192序号监理内容例子验收阶段其他监1.验收阶段的其他监理内容包括：理内容①对验收各阶段进度安排提出监理意见。②审核承建单位初验、终验和项目整改计划的可行性。③由总监理工程师审核承建单位提交的付款申请，根据承建合同规定的付款条件，签发工程款支付意见。④及时向业主单位、承建单位通报承建合同、协议及相关变更所规定项目内容的执行情况，提出监理意见。③协助业主单位与承建单位签署其他补充协议③对于项目中的关键性技术指标,应要求承建单位出具第三方测试机构的测试报告。第三方测试机构应经业主单位和监理机构同意。③协助业主单位和承建单位做好对知识产权的管理工作。在项目终验前，监理机构应检查所完成的信息系统中，承建单位是否提供了非正版软件。如果提供了非正版软件，监理机构应要求承建单位进行整改并跟踪落实。③管理项目验收阶段的文档，例如验收方案、验收申请、验收报告等。③敦促业主单位、承建单位，按照约定编制、签署和保存验收阶段项目文档。督促业主单位、承建单位及时整理项目文档。①督促承建单位完成承建合同及项目实施方案中确定的培训。小红书-用户一郑房新软考通淘宝店铺：郑房新软考通淘宝店铺：配套内容公益Q群212862940（VIP同学可以不加）刷题软件微信小程序郑房新软考通抖音小红书郑房新软考通哗哩哗哩某宝店铺郑房新软考通郑房新软考培训42 第21章 信息网络系统建设准备阶段的监理 第2版监理第21章基础设施工 程应用需求；设备间内的环境要求明确且符合设计规范；屏蔽系统的接地措施符合设计规范或要求；关键施工点的工艺流程符合施工规范或要求；隐蔽工程实施方案应明确；图纸与实际环境的相符性。④审查工程设计方案中无线局域网部署技术关键点，包括：设备与天线的选型符合标准规范；每个无线点的天线增益、高度、方位及信道的选择符合设计规范;25 天线架设位置应合适，接收发射信号方向上应无遮挡物，所有天线位置应在避雷针的保护范围内；架设天线的支架或铁塔应与接地系统良好连接，天线接地电阻满足标准要求；室内设计方案应包括无线点部署位置图，考虑无线电信号覆盖区域接入信号强度、接入容量和接入速率的要求。如有可能，应提供无线信号覆盖场强模拟示意图，应避免同频无线点之间的干扰。第2版第第21章习题32：通用布缆系统工程实施阶段的监理内容具体有哪些？【参考答案】【郑房新老师点评】通用布缆系统工程实施阶段的监理内容具体如下：1.工程实施组织设计方案的审核。2.工程分包的审核3.施工准备的审核。4.承建单位质量保证措施的审核5.线材、连接硬件验收6.施工过程的监理《信息系统监理师教程第2版2024年1月出版》21.6.1通用布缆系统工程第485 页序号内容0234560890112131415161181920通用布缆系统工程例子一.通用布缆系统工程实施阶段的监理内容具体如下：实施阶段监理内容（背：实分准质验过)1.工程实施组织设计方案的审核2.工程分包的审核3.施工准备的审核。4.承建单位质量保证措施的审核5.线材、连接硬件验收6.施工过程的监理 实施过程监理关注点：（常考：参数）①机架、配线箱等设备的规格、容量、位置应符合设计文件要求，垂直偏差度不应天于3mm。②为便于施工和维护人员操作，机柜单排安装时，前面净空不应小于1000mm，后面及侧面净空不应小于800mm；多排安装时，列间距不应小于1200mm。以便人员施工、维护和通行。相邻机架设备应靠近，同列机架和设备的机面应排列平齐。③在数据中心的主机房内通道与设备间的距离还应符合下列规定：a用于搬运设备的通道净宽不应小于1.5m。b面对面布置的机柜（架)正面之间的距离不宜小于1.2m。c 背对背布置的机柜(架)背面之间的距离不宜小于0.8m。d当需要在机柜（架）侧面和后面维修测试时，机柜（架）与机柜（架）、机柜(架）与墙之间的距离不宜小于1.0m。e成行排列的机柜（架），其长度超过，6m时，两端应设有通道；当两个通26 道之间的距离超过15m时，在两个通道之间还应增加通道。通道的宽度不宜小于 lm，局部可为 0.8m。④在公共场所安装配线箱时，壁嵌式箱体底面距地不宜小于1.5m，墙挂式箱体底面距地不宜小于1.8m。③缆线桥架的安装应符合下列规定：a安装位置应符合施工图要求，左右偏差不应超过50mm;b 安装水平度每米偏差不应超过 2mm;c垂直安装应与地面保持垂直，垂直度偏差不应超过3mm;d桥架截断处及拼接处应平滑、无毛刺；e 吊架和支架安装应保持垂直，整齐牢固，无歪斜现象；f金属桥架及金属导管各段之间应保持连接良好，安装牢固：g采用垂直槽盒布放缆线时，支撑点宜避开地面沟槽和槽盒位置，支撑应牢固。第2版第第21章习题33：通用布缆系统工程验收阶段的监理内容具体有哪些？【参考答案】【郑房新老师点评】通用布缆系统工程验收阶段的监理内容具体如下：①工程自测。②竣工文档的审查。《信息系统监理师教程第2版2024年1月出版》通用布缆系统工程21.6.1第485 页序号内容0234560891011213145161181920通用布缆系统工程例子通用布缆系统工程验收阶段的监理内容具体如下：验收阶段监理内容背：①工程自测②工文档的审查。(1）工程自测。承建单位应对完成的工程进行自测，监理机构对承建单位的自测进行检查，具体如下：检查承建单位的测试仪器的有效性和可用性；要求承建单位对通用布缆系统工程包括的所有链路进行测试，并提交自测报告；审核承建单位提交的测试报告，测试应符合设计方案依据的验收标准；对于测试不合格的链路，监理机构应要求承建单位在测试报告中记录，采取整改措施，直至复测合格；监理机构应对布缆系统、无线信号进行抽检测试，验证承建单位施工及测试记录，采取整改措施，并向业主单位提交抽检测试报告。(2）竣工文档的审查。通用布缆系统工程中，承建单位的工文档主要包括以下内容：承建合同，招标文件，投标文件，设计方案，工程实施组织设计方案，工程施工报告，隐蔽工程记录，变更记录，自测报告，信息点分布图(表），园区、楼宇、水平配线表，楼层平面图及无线设备点位图，无线设备信息表，竣工图纸等。第2版第第21章习题34：以下属于计算机网络系统工程设计阶段的监理内容的是（①系统需求分析的审核。②工程设计方案的审核。 ③工程设计方案中网络基础设施的 中涉及的防火墙、防病毒系统等网络安全软硬件设备应通过国家相关安全测评认证机构的认证。③结构安全。④访问控制。（网络，主机和应用通用）③网络设备防护。③安全审计（网络，主机和应用通用）边界完整性③入侵防范。（网络，主机通用）③恶意代码防范（网络，主机通用）③结构安全。具体包括：a网络全局和结构设计应保证关键网络设备的业务处理能力具备亢余空间，满足网络各个部分业务高峰期需要，等级保护第三级以上系统，应保证主要网络设备的以上能力；b应绘制与实际部署情况相符的网络拓扑结构图，需标识出所有服务器、网络设备和安全设备，及相应的设备型号、P地址和连接端口等，标识出安全区域划分情况；c等级保护第三级以上系统，应在业务终端与业务服务器之间进行路由控制建立安全的访问路径，如使用静态路由或启用加密认证的相关技术手段；d等级保护第三级以上系统，应避免将重要网段（如服务器区、数据存储区）部署在网络边界处且直接连接外部信息系统，重要网段与其他网段之间采取20 可靠的技术隔离手段（如防火墙、网闸等）；e等级保护第三级以上系统，应按照对业务服务的重要次序来指定带宽分配优先级别，保证在网络发生拥堵的时候优先保护重要主机，在核心交换机或边界设备上配置并启用OoS策略；f应根据各部门的工作职能、重要性和所涉及信息的重要程度等因素，划分不同的子网或网段，并按照方便管理和控制的原则为各子网、网段分配地址段。④访问控制。具体包括：a应在网络边界处部署访问控制设备（如防火墙等），启用访问控制功能，并配置合理的访问控制策略；b应能根据会话状态信息为数据流提供明确的允许/拒绝访问的能力，控制粒度为网段级，等级保护第三级以上系统要求控制粒度为端口级；c等级保护第三级以上系统，应对进出网络（Internet边界）的信息内容进行过滤，实现对应用层HTTP、FTP、Telnet、SMTP、POP3等协议命令级的控制;d网络应具备会话超时中断、最大并发数限制功能;重要网段应采取IP/MAC地址绑定，或其他防地址欺骗手段；e应按用户和系统之间的允许访问规则，决定允许或拒绝用户对受控系统进行资源访问，控制粒度为单个用户；f如网络提供了拨号接入功能，需要对拨号用户数量进行限制，③网络设备防护。具体包括：a应对登录网络设备的用户进行身份鉴别，网络设备的管理用户标识应具有唯一性;b应对网络设备的管理员登录地址进行限制；c管理用户的身份鉴别信息应具有不易被冒用的特点，口令应有复杂度要求并定期更换，设备具备口令复杂度限制和口令生存周期限制功能的，应启用；d等级保护第三级以上系统的网络中，网络设备与安全设备应对同一用户选择两种或两种以上组合的鉴别技术来进行身份鉴别；e应具有登录失败处理功能，可采取结束会话、限制非法登录次数和当网络登录连接超时自动退出等措施；f当对网络设备进行远程管理时，应采取必要措施防止鉴别信息在网络传输过程中被窃听，如启用SSH、HTTPS等安全协议进行远程管理登录。③安全审计。具体包括：a应对网络系统中的网络设备运行状况、网络流量、用户行为等进行日志记录，审计记录应包括事件的日期和时间、用户、事件类型、事件是否成功及其他与审计相关的信息；b等级保护第三级以上系统，应对审计记录进行保护，避免受到未预期的删除、修改或覆盖等，应能够根据记录数据进行分析，并生成审计报表。边界完整性。具体包括:a应部署终端管理类系统对内部网络用户私自联到外部网络（如越权访问、授权的无线网络和私自安装4G或5G上网卡连接Internet)的行为进行检查，并对其进行有效阻断；b等级保护第三级以上系统，应部署基于802.1X等认证的网络准入控制系统，对非授权设备私自联到内部网络（如非授权的终端、服务器及网络设备）的行为进行检查，并对其进行有效阻断。21 ③入侵防范。具体包括：a应在网络边界处部署IPS、UTM等设备，或在网络核心部署IDS设备，监视以下攻击行为：端口扫描、强力攻击、木马后门攻击、拒绝服务攻击、缓冲区溢出攻击、IP碎片攻击和网络蠕虫攻击等；b等级保护第三级以上系统，应在检测到攻击行为时，记录攻击源P、攻击类型、攻击目的、攻击时间，在发生严重入侵事件时应提供报警。③恶意代码防范。具体包括：a等级保护第三级以上系统，应在网络边界处部署网络反病毒设备（如防毒墙、UTM等），对恶意代码进行检测和清除；b等级保护第三级以上系统，网络反病毒设备应具备恶意代码库自动升级和检测系统更新功能。第2版第24章习题24：以下属于主机安全方面的关键技术要求的是（①身份鉴别。②访问控制。③安全审计。④剩余信息保护③入侵防范。③恶意代码防范。?资源控制。8完整性和保密性A.02346608.B.0234660.C.346608.D.02346.【参考答案】B【郑房新老师点评】主机安全方面的关键技术要求如下：①身份鉴别。（主机
