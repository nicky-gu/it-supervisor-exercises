能还更低 。但是 ， 需要注意的是 ，在信息系统工程中采用最新的 、最先进的技术 ，会给质量控制带来技术风险： 对总体设计方案中有关材料和设备进行比较，在价格合理基础上确认其符合 要求。(6)审查承建单位对关键部位的测试方案 ，如主机网络系统软硬件测试方案 、应用软件开发的模块功能浏试方法等。(7)协助承建单位建立、完善针对该信息工程建设的质量保证体系 ，包括完善计量及质量检测技术和手段。(8)协助总承建单位完善现场质量管理制度 ，包括现场会议制度 、现场质量检验制度 、质量统计报表制度和质量事故 报告及处理制度等。(9)组织设计文件及设计方案交底会  ，熟悉项 目设计 、实施及开发过程 ，根据有关设计规范 ，实施验收及软件工程验收 等规范、规程或标准，对有的工程部位下达质量要求标准。  --D不包括，并没有说规划 。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":45,"question":"【2023年05月 -第45题】 -第6章质量控制45关于监理单位在招投标阶段质量控制要点的描述， 不 正 确的 是(_) A 、应提出工程需求方案 ，确定工程的整体质量目标B 、协助评标时 ，应对投标单位标书中的质量控制计划进行审查C 、应对项 目招标文件进行审核 ，对涉及的商务内容和技术内容进行确认 D 、应参与招标文件的编制 ，并对可能影响工程质量的因素明确提出要求 【参考答案】A【郑房新老师点评】 P80-P811.招投标过程的质量控制信息工程的招标一般由建设单位 、监理单位 、招标公司 、专家 、纪检或者公证部门参加 ，监理单位在招投标阶段质量 控制的注意要点有：(1) 协助建设单位提出工程需求方案，确定工程的整体质量目标--A错，只是协助而已；(2)参与标书的编制 ，并对工程的技术和质量 、验收准则 、投标单位资格等可能对工程质量有影响的因素明确提出要 求；(3)协助招标公司和建设单位制定评标的评定标准；(4)对项 目 的招标文件进行审核 ，对招标书涉及的商务内容和技术内容进行确认； (5)监理在协助评标时 ，应对投标单位标书中的质量控制计划进行审查 ，提出监理意见；(6)对招标过程进行监控 ，如招标过程是否存在不公正的现象等问题；(7)协助建设单位与中标单位洽商并签订工程合同 ，在合同中要对工程质量目标提出明确的要求。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":44,"question":"【2023年05月 -第44题】 -第6章质量控制-质量控制手段44 、在信息系统工程中 ，承建单位编制了总体技术方案、工程实施方案、系统集成方案等重要文档 。将 (     ) 作为质 量控制手段 ，可以及时发现文档中存在的重大问题。A、评 审    B、测 试      C 、旁 站    D 、抽 样【参考答案】 A【郑房新老师点评】 P89 评 审的主要目 的是本着公正的原则检查项 目的当前状态，项 目评审一般是在主要的项 目里程 碑接近完成时进行 ， 比如总体设计 、产品设计 、编码或测试完成的时候 。  通过专家评审 ，可以及时发现重大问题 ，并 给出处理意见。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":43,"question":"【2023年05月 -第43题】 -第5章监理项目的组织和规划43、关于监理规划的描述， 不正确的 是 (    )A 、监理规划是监理单位实施监理项 目的行动指南B 、监理规划是建设单位考核监理单位执行监理合同的重要依据 C 、监理规划的 目 的是增强监理单位中标的可能性D 、监理规划是监理人员在项 目 中开展工作的依据和基础 【参考答案】 c【郑房新老师点评】 P60监理大纲的 目 的是增强监理单位中标的可能性表5-1监理大纲、监理规划和监理实施细则的主要区别","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":42,"question":"【2023年05月 -第42题】 第5章监理项目的组织和规划42、监理规划的内容(__)①工程项 目概况②监理的范围 、 内容和 目标③监理流程④监理依据 、程序 、措施及制度⑤监理方法及措施 A、①②③  B、②④⑤c、①③⑤ D、①②④【参考答案】 D【郑房新老师点评】 P64  排除法③和⑤都不选，因为是属于细则的。监理规划包括的主要内容有工程项目概况、监理范围、监理内容、监理目标、监理项目部的组织形式、监理项目部的 人员配备计划、监理项目部的人员岗位职责、监理依据、监理工作程序、监理工作方法及措施、监理工作制度、监理 工具和设施等。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":41,"question":"【2023年05月 -第41题】 - 第5章监理项 目的组织和规划41、关于监理大纲、监理规划、监理实施细则的描述， 不正确的 是 (   ) A 、项目监理公司在招标阶段编制监理大纲，供建设单位审查其监理能力 B 、项目总监理工程师在监理合同签订前，根据招标要求编制监理规划。C 、专业监理工程师根据项目特点及技术要求编制监理实施细则 D 、专业监理工程师编制监理实施细则，报送总监理工程师审批 【参考答案】 B【郑房新老师点评】 P60  项目总监理工程师在监理合同签订后，根据招标要求编制监理规划表 5 - 1  监理大纲 、监理规划和监理实施细则的主要区别","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":40,"question":"【2023年05月 - 第40题】 -第5章监理项 目 的组织和规划40监理实施细则的编制时间应当是 (_)A 、监理招标阶段                            B 、委托合同签订后，监理项目部建立前C 、监理项 目部建立后，人员责任明确后      D 、全部监理人员到岗后【参考答案】 c【郑房新老师点评】 P60监理实施细则的编制时间是监理项 目部建立后 ，人员责任明确后 表5-1监理大纲、监理规划和监理实施细则的主要区别","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":39,"question":"【2023年05月-第39题】 -第4章监理单位的组织建设-监理工作的风险类别39 、在软件开发过程中 ，监理工程师按照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但 仍有可能出现由于系统设计缺陷导致不能全部满足实际应用的情况 。这种属于 (    )   风险。A 、技术资源    B 、工作技能    C 、管 理    D 、进 度【参考答案】 A【郑房新老师点评】4.2.1监理工作的风险类别 1.行为责任风险行为责任风险来自三个方面：(1)监理工程师超出建设单位委托的工作范围 ，从事了自身职贵外的工作 ，并造成了工作上的损失；. (2)监理工程师未能正确地履行合同中规定的职责，在工作中发生失职行为造成损失； (3)监理工程师由于主观上的无意行为未能严格履行职责并造成了损失。2. 工作技能风脸监理工程师由于他在某些方面工作技能的不足 ，尽管履行了合同中建设单位委托的职责 ，实际上并未发现本应该发现 的问题和隐患 。现代信息技术日新月异 ，并不是每一位监理工程师都能及时 、准确 、全面地掌握所有的相关知识和技 能的，无法完全避免这一类风险的发生。3.技术资源风脸即使监理工程师在工作中没有行为上的过错 ，仍然有可能承受一些风险 。例如在软件开发过程中 ， 监理工程师按 照正常的程序和方法 ，对开发过程进行了检查和监督 ，并未发现任何问题 ，但仍有可能出现由于系统设计留有缺陷而 导致不能全部满足实际应用的情况--选A 。众所周知 ，某些工程上质量隐患的暴露需要一定的时间和诱因 ，利用现有的 技术手段和方法 ，并不可能保证所有问题都能及时发现 。 同时 ， 由于人力 、财力和技术资源的限制 ，监理无法对施工 过程的所有部位 、所有环节的问题都能及时进行全面细致的检查发现 ，必然需要面对风险。4.管理风险明确的管理目标 、合理的组织机构 、细致的职贵分工 、有效的约束机制 ，是监理组织管理的基本保证 。如果管理机制 不健全 ， 即使有高素质的人才 ，也会出现这样或那样的问题。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":38,"question":"【2023年05月-第38题】 -法律法规-超纲题38 、 《关键信息基础设施安全保护条例》 的实施日期是 (    )。A、2021 年 7 月 1 7 日     B、2021 年 7 月 3 0 日   C、2021 年 9 月 1 日     D、2021 年 9 月 1 7 日【参考答案】 C【郑房新老师点评】  《关键信息基础设施安全保护条例》  的实施日期是202 1 年9 月 1 日 . 国家法律法规数据库关键信息基础设施安全保护条例 法律效力位阶：行政法规制定机关：国务院时效性：有效 施行日期：2021-09-01公布日期：2021-07-30","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":36,"question":"【2023年05月-第36题】 -第4章监理单位的组织建设   36.关于监理单位权利和义务的描述，不正确的 是 ( _  ) 。A 、监理单位应按照“守法、公平、公正、独立 ”的原则开展监理工作。 B 、监理单位应按照监理合同和所分配的承建任务取得收入。C 、监理单位不得与被监理项目的承建单位存在隶属关系 D 、监理单位不得侵害建设单位和承建单位的知识产权【参考答案】 B【郑房新老师点评】 P53  1.监理单位的权利与义务在信息产业部正式颁布的《信息系统工程监理暂行规定》 中。第18条详细规定了监理单位的权利与义务：(1)应按照“ 守法、公平、公正、独立 ”的原则  - A 正 确，开展信息系统工程监理工作，维护建设单位与承建单位的合 法权益；(2)按照监理合同取得监理收入--B错误，是监理任务：(3)不承建信息系统工程；(4)不得与被监理项目的承建单位存在隶属关系和利益关系-C正 确，不得作为其投资者或合伙经营者；(5)不得以任何形式侵害建设单位和承建单位的知识产权；--D正确。(6)在监理过程中因违犯国家法律、法规，造成重大质量、安全事故的，应承担相应的经济责任和法律赞任。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":35,"question":"【2023年05月 -第35题】 -第2章信息系统项目管理 35、监理活动的主要内容被概括为“ 四控、三管、一协调 ”,其中“ 四控 ”不包括。 A 、质量控制     B 、进度控制     C 、投资控制     D 、安全控制【参考答案】 D 监理内容监理活动的主要内容被概括为“ 四控、三管、一协调 ”。1)四控信息系统工程质量控制-A包括：信息系统工程进度控制-B包括：信息系统工程投资控制-C包括：信息系统工程变更控制。 2 ) 三 管信息系统工程合同管理：信息系统工程信息管理；信息系统工程安全管理。 一 协调在信息系统工程实施过程中协调有关单位及人员间的工作关系。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":34,"question":"【2023年05月 -第34题】 -第2章信息系统项目管理34、在信息系统项目建设过程中，可以采用的质量控制工具不包括： (_)A、 统计抽样 B、六西格玛    C、帕累托分析    D、挣值分析【参考答案】 D【郑房新老师点评】 P23 处理事故，例如决定是否返工，是否需要组织专门的小组负贵解决和纠正质量问题。 4)采取措施使用质量控制工具和技术(1)测试：单元测试、综合测试、系统测试等。(2) 统计抽样和标准差、六西格玛等 。--A,B    包括(3) 帕累托分析。--C 包括(4)其他。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":33,"question":"【2023年05月 -第33题】 - 第 1章信息系统工程监理引论33、关于信息应用系统项目及项目管理的描述，不 正 确的是： (     )A 、一般采取集中办公方式，项目实施过程可视性较好  B 、项目建设过程中工期经常会超出计划C 、项目监理在项目执行过程中应被重视               D 、强项目管理能够确保顺利完成项目实施【参考答案】A【郑房新老师点评】 P15建筑工程项目可视性强，信息系统工程可视性差 4。关于方法与手段由 于  建筑工程可视性强，所以广泛采用现场监理手段，如旁站、巡视、进场材料核查、工序检查等等。同样的手段对 信息系统工程监理基本不适用，而需要独辟蹊径。例如，在设计阶段采用专家会审的方法，而在验收阶段则强调定量测 试等","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":32,"question":"【2023年05月-第32题】 -  第19章信息应用系统建设基础知识32 、某政府单位批量替换了一批办公终端，其芯片架构由x86   改为了ARM,   为了使单位的业务应用系统能够在新环境 下正常使用，需要对其进行升级。这种软件升级属于 (     )","options":[{"label":"A","text":"纠错性维护  B、适应性维护   C、预防性维护    D 、完善性维护【参考答案】 B【郑房新老师点评】 P45319.6.1软件维护类型 纠错性维护纠正在开发阶段产生而在测试和验收过程没有发现的错误。其主要内容包括：(1)设计错误； (2)程序错误； (3)数据错误； (4)文档错误。2.适应性维护(适应改变-适应环境)--选B为适应软件运行环境改变而作的修改。环境改变的主要内容包括：(1)影响系统的规则或规律的变化：(2)硬件配置的变化，如机型、终端、外部设备的改变等：(3)数据格式或文件结构的改变；(4) 软件支持环境的改变，如操作系统、编译器或实用程序的变化等。 完善性维护为扩充功能或改善性能而进行的修改。修改方式有插入、删除、扩充和增强等。主要内容包括：(1)为扩充和增强功能而做的修改，如扩充解题范围和算法优化等；(2)为改善性能而作的修改，如提高运行速度、节省存储空间等；(3)为便于维护而做的修改，如为了改进易读性而增加一些注释等。"}],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":31,"question":"【2023年05月 -第31题】 -第 19章信息应用系统建设基础知识31、某政务应用软件项目覆盖省市县三级行政机构，规模大，安全性等级高。在设计阶段，建设单位组织了外部评审， 计划邀请9名专家组成评审委员会，其中软件专家人数最少为 (    )A 、4          B 、5       C 、6       D 、7【参考答案】 B【郑房新老师点评】 P4502.外部评审对规模等级大和安全性关键等级高的软件必须进行外部评审。外部评审由业主单位主持，承建单位组织，成立评 审委员会 。评审委员会由业主单位、承建单位和一定数量(占评审委员会总人数的50%以上)的软件专家组成员组成，人数七人以上(单数),设主任一人、副主任若干人  。评审委员会与软件专家组共同进行评审。评审分专家组审查和评 委会评审两步完成。软件专家组进行审查，评审委员会进行评审。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":30,"question":"第30题 关于监理大纲、监理规划、监理实施细则的措述，正确的是()。 A监理规划的编制时间是监理招标阶段B监理实施细则的 P390。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":28,"question":"【2023年05月-第28题】 -第 19章信息应用系统建设基础知识28 、JAVA语言采用了(_)机制，使得编译产生的泛代码程序可以在各种平台上执行，从而做到了程序执行与平台无A、构件对象    B、虚拟机  C、CORBA     D、COM/DCOM【参考答案】 B【郑房新老师点评】 P479  页 JAVA语言由于巧妙地采用了虚拟机的机制，使得编译后产生的泛代码程序可以在各种平 台上执行，从而做到了程序执行与平台无关。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":27,"question":"第27题 关于系统集成的描述，不正确的是()。 A系统采用先进的技术才能确保系统的优势和较长的生存周期B系统集成在技术上需要遵循的基本原则包括开放性和先进性C复杂系统设计的精髓是流程化系统分析设计方法D构成系统的每一个产品都应有成熟的使用环境","options":[],"answer":"C","analysis":"本题考查系统集成的基本原则。参考《信息系统监理师教程(第2版)》第2.5.1小节，P77。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":27,"question":"【2023年05月-第27题】 -第 19章信息应用系统建设基础知识27、在信息应用系统建设中，软件测试的目的是 (     )A 、验证开发团队的能力   B 、验证软件是否满足需求   C 、证明软件的正确性  D 、为软件规定的功能提供依据【参考答案】 B【郑房新老师点评】 P441 页5.软件测试在设计测试用例的基础上检验软件的各个组成部分 。单元测试检查每一单独的模块部件的功能和性能。组装测试提供 了构造软件模块结构的手段，同时测试其功能和接口。确认测试检查所有的需求是否都得到满足-B对。在每一个测试 步骤之后，都要进行调试，以诊断和纠正软件的故障。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":26,"question":"第26题 某软件开发项目的初期，需求不能全部确定，可能因容户业务发展而不断变化。项目经理决定先基于初始需求指定一套高层级的计划，通过多次迭代开发科交付成果，需求可以迭代前才得到定义和批准。该项目采用的是()开发生命周期。","options":[{"label":"A","text":"适应型"},{"label":"B","text":"计划驱动型"},{"label":"C","text":"预测型"},{"label":"D","text":"瀑布型"}],"answer":"A","analysis":"本题考查项目生命周期类型，参考《信息系统监理师教程》(第2版)第16.3.1小节，P375。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":26,"question":"【2023年05月 -第26题】 -第22章分析设计阶段监理26、关于软件配置管理的描述， 不正确的 是 (     ) A 、配置管理的软件工作产品，其更改是受控的B 、软件配置管理是保证软件质量和软件研制进度的重要手段C 、已送审的软件配置管理计划是实施软件配置管理活动的基础D、 软件配置管理计划涉及软件需求、软件设计、软件代码单元等内容 【参考答案】 C【郑房新老师点评】P562-563 页22.2.4软件配置管理监理软件配置管理是保证软件质量和软件研制进度的重要手段-B对 ，软件配置管理包括标识给定时间点的软件配置(即所 选择的工作产品及其描述),系统地控制这些配置的更改，并在软件生命周期中保持这些配置的完整性和可跟踪性。 软件配置管理监理的目标(1)确保软件配置管理活动是有计划的；(2)确保所选择的软件工作 故障恢复时间可能会很长。 A 、热 站     B 、温 站    C 、冷 站    D 、设备站【参考答案】 C【郑房新老师点评】 P308(3)灾难恢复站点类型 (小郑口诀： 热镜像 ，冷基础 ，温站有个CPU) ·热站 (Hot Site)在恢复站点，服务器、数据与应用程序与主服务器随时同 步 ( 镜 像 ) 运 行，这种方式的灾难恢复过程非常快速， 几乎难于察觉 。装备了数据中心 ，完全可以在灾难来临时发挥作用 。但由于这种方案意味着软硬件的重复投资 ， 因此 这种方案一般投资高昂。·冷站(Cold Site)只有用于信息处理的基础物理环境(如电线 、 空调 、地板等)  ,灾难发生时 ，所有设备都必须运送到站点上 ， 同时 从基础开始安装 ， 因此故障恢复时间可能会很长。·温站(Warm Site)用于信息处理的网络连接和一些外围设备只是部分进行了配置 ，如磁盘 、磁带 ，但主要的计算机系统没有备份 。 有 时 ，  温站装配 一 些小功率的CPU, 这样的安排有利于灾难发生时 ，计算机能立即投入使用 ， 同时 ，还比热站的费用 低 。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":23,"question":"第23题 监理工程师在组织协调工作过程中，相关描述不正确的是()。 A监理通知单应完整，要包含受众需要了解的全部观点B监理联系单应简洁，即只包含受众需要了解的观点C监理意见必须以结构化的形式，把要传递的观点清晰地传递给受众D不做出紧急监理意见可能导致设备事故时，必须书面通知，不能口头或电话通知","options":[],"answer":"D","analysis":"本题考查监理通知与回复。参考《信息系统监理师教程(第2版)》第15.3.2小节，P363。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":23,"question":"【2023年05月 - 第23题】 - 第22 章分析设计阶段监理23、软件质量保证的目标不包括： (    )A. 监督承建单位制定软件质量保证计划B. 客观地验证软件产品及其活动是否遵守应用的标准、规程和需求C. 促进各方及时处理软件项 目开发过程中的不一致问题D. 记录并保管软件计划数据 ，审查软件项 目计划的活动情况 【参考答案】 D【郑房新老师点评】 P561 页2. 软件质量保证监理的 目标： (小郑口诀： 剑客出)(1)监督承建单位对软件质量保证活动做到有计划：(2)客 观地验证软件产品及其活动是否遵守应用的标准、规程和需求；(3)促进由各方及时处理软件项目开发过程中的不一致性问题。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":22,"question":"第22题 评价监理及相关服务需要综合考虑服务内容、服务质量以及项目建设的效果三个方面。监理服务的技术要求、工具等手段科学、可靠、合理，属于()方面的评价；监理服务成果准确、无疑义，监理服务过程安全可控、及时响应，属于()方面的评价。","options":[{"label":"A","text":"项目建设的效果、服务质量"},{"label":"B","text":"服务内容、服务质量"},{"label":"C","text":"项目建设效果、服务内容"},{"label":"D","text":"服务质量、服务内容"}],"answer":"B","analysis":"本题考查监理服务质量评价模型。参考《信息系统监理师教程(第2版)》第8.7小节，P225。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":22,"question":"【2023年05月 - 第22题】 -第 16章信息网络系统建设设计阶段的监理22 、信息网络系统设计方案的基本原则不包括(    )A.标准化原则   B.安全性原则    C.可管理性原则    D.技术前瞻性原则 【郑房新老师点评】 P340-P341  页1 、VOD 、视频会议等多媒体业务系统","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":5,"question":"第5题 在风险管理过程中，()定义如何实施项目风险管理活动。","options":[{"label":"A","text":"风险评估"},{"label":"B","text":"风险识别"},{"label":"C","text":"风险规划"},{"label":"D","text":"风险应对"}],"answer":"A","analysis":"本题考查风险管理过程。参考《信息系统监理师教程(第2版)》第18.2小节，P396。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":5,"question":"【2023年05月-第5题】 -第 15 章信息网络系统建设准备阶段的监理-立项评审的基本原则 5.某信息网络系统立项评审时，评审专家提出了下述意见。其中不正确的是： (_)A 、系统设计应该尽量简单，以提高运行效益B 、系统对外界条件的变化应具有较强的适应能力C、系统体系架构设计时，应优先选择性能高的硬件设备D 、系统建设工程应具备经济性，在投资和绩效之间取得平衡 【参考答案】C【郑房新老师点评】 P326 页 15.1.1立项评审的基本原则  1。简单性工程设计应该尽量简单。这样可以提高运行效益--A 对，同时也可以节省投资和提高系统的运行质量。 2。灵活性工程对外界条件的变化应具有较强的适应能力--B对。 由于信息网络工程是复杂的系统工程，要求系统的结构要具有较 好的灵活性和可塑性。3。完整性信息网络系统工程是各个子工程的集合，并作为一个有机的整体而存在，因此信息网络工程要求各子系统功能规范、 接口统一。各子系统的协调工作是保证整个网络系统正常运行的基础。4。可靠性系统的可靠性是评定工程质量的主要指标之一。可靠性的要求包括： (1)系统体系结构设计合理，具有良好的可扩展性；(2)硬件设备稳定性高； (3)良好的可管理性； (4)安全防护措施完善。5. 经济性同其他工程一样，信息网络系统工程的长远目标是为使用者带来相应的效益，因此，如何在投资和绩效之间取得平衡 是项目建设的重要目标之一--D对。这也是监理方在为业主进行项目经济分析时必须考虑的问题。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":4,"question":"第4题 信息系统的五个基本功能包括()。 A采集、保管、分析、发布和指导\tB录入、记忆、计算、展示和监督C输入、存储、处理、分析和反馈\tD输入、存储、处理、输出和控制","options":[],"answer":"D","analysis":"参考《信息系统监理师教程(第2版)》第2.1.1小节，P45。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":4,"question":"【2023年05月 -第4题】 -第 19章信息应用系统建设基础知识-软件工程基本原则4、关于软件工程基本原则的描述，不正确的是： (    )A 、合适的设计方法应考虑软件的模块化、抽象与隐蔽性、局部化等特征B 、必须认识到需求定义具有不变性，应采用安全的开发范型及时验证需求  C 、要提供高质量的工程支持 ，软件工具与环境对软件过程的支持较为重要 D 、仅当软件过程得以有效管理时 ，才能实现有效的软件工程【参考答案】 B【郑房新老师点评】 P438-439  页 。不是不变性，是易变形。 软件工程有四条基本原则。(1) 选取适宜开发范型 。 该原则与系统设计有关 。在系统设计中，软件需求、硬件需求以及其他因素之间是相互制约、 相互影响的，经常需要权衡。因此，必须认识需求定义的易变性，采用适宜的开发范型予以控制， 以保证软件产品满足用 户的要求。(2) 采用合适的设计方法 。 在软件设计中，通常要考虑软件的模块化、抽象与信息隐蔽、局部化、 一致性以及适应性 (3) 提供高质址的工程支持。 “工欲善其事，必先利其器 ”。在软件工程中，软件工具与环境对软件过程的支持颇为 重要。软件工程项目的质量与开销直接取决于对软件工程所提供的支撑质量和效用。(4) 重视开发过程的管理。软件工程的管理，直接影响可用资源的有效利用，生产满足目标的软件产品，提高软件组 织的生产能力等问题。因此，仅当软件过程得以有效管理时，才能实现有效的软件工程。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":3,"question":"第3题 ()的组织架构中，其项目经理为全职项目经理。同时也是项目预算的管理人，可用资漂高到几乎包括组织的全部资源。","options":[{"label":"A","text":"虚拟型"},{"label":"B","text":"项目导向型"},{"label":"C","text":"系统型"},{"label":"D","text":"强矩阵型"}],"answer":"D","analysis":"本题考查组织结构类型。参考《信息系统监理师教程(第2版)》第16.2小节，P372。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":3,"question":"【2023年05月 -第3题】 -超纲题目机器学习-监督学习-无监督学习3、人工智能的核心是机器学习，在机器学习过程中 ，  (_)    的学习方式提供对错指示等导师信号，通过算法让机器自我减少误差。A 、监督学习     B 、无监督学习     C 、 逻辑学习   D 、强化学习【参考答案】 A【郑房新老师点评】 (小郑口诀： 监督对错 ，非无指示 ，强化相加) 监督学习： 有对错指示。非监督学习： 无对错指示 。 (漫无 目 的的分类手段) 强 化 学 习 = 监 督 学 习 + 无 监 督 学 习","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":2,"question":"第2题 在信息系统工程建设项目中，  ()属于招标阶段的监理文档。","options":[{"label":"A","text":"工程合同评审表"},{"label":"B","text":"工程进度计划检查表"},{"label":"C","text":"合同阶段性支付申请表"},{"label":"D","text":"工程设计方案审核表"}],"answer":"A","analysis":"本题考查监理单位产出文档。参考《信息系统监理师教程(第2版)》第14.4.5小节，P343。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":2,"question":"【2023年05月 -第2题】 -第 1章信息系统工程监理引论2. (     ) 是指以信息技术为主要手段建立的信息处理、传输、交换、分发的计算系统。 A 、信息运维系统   B 、信息网络系统    C 、信息安全系统  D 、信息存储系统【参考答案】B【郑房新老师点评】 P7 页信息系统工程是指信息化工程建设中的 (小郑口诀： 网资应) 信息网络系统 、信息资源系统 信息应用系统的新建、升级、改造工程。信 息网 络系统是指以信息技术为主要手段建立的信息处理、传输、交换和分发的计算机网络系统。 信 息资 源系统是指以信息技术为主要手段建立的信息资源采集、存储、处理的资源系统。信 息应 用系统是指以信息技术为主要手段建立的各类业务管理的应用系统。","options":[],"answer":"","analysis":""},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":1,"question":"第1题 监理工程师在组织协调工作中，应坚持的基本原则不包括()。","options":[{"label":"A","text":"公平、公正、独立原则"},{"label":"B","text":"科学原则"},{"label":"C","text":"先进性原则"},{"label":"D","text":"守法原则"}],"answer":"C","analysis":"本题考查组织协调的基本原则。参考《信息系统监理师教程(第2版)》第15.2小节，P359。"},{"source":"信息系统监理师_真题与练习题合集.docx","category":"真题与练习合集","time_label":"综合","question_number":1,"question":"【2023年05月 -第1题】 -第 14章信息网络系统监理基础1、计算机网络系统可以划分成网络基础平台、 网络服务平台、 网络安全平台、  (    ) 和环境平台。A 、 网络管理平台  B 、 网络调度平台  C 、 网络计费平台   D 、 网络计算平台【参考答案】 A【郑房新老师点评】 P292-293   页信息网络系统的体系框架： (小郑口诀： 基服安管环) :  基础平台 、 网络服务平台、网络安全平 台 、 (网络管理平 台)和环境平 台。","options":[],"answer":"","analysis":""}];
const chapters = ["第20章", "第21章", "第22章", "第23章", "第24章", "第25章"];
const chapterSelect = document.getElementById('chapterFilter');
chapters.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; chapterSelect.appendChild(o); });

function escapeHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(t, q) { if(!q) return escapeHtml(t); const r = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+")","gi"); return escapeHtml(t).replace(r,'<mark>$1</mark>'); }

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const ch = document.getElementById('chapterFilter').value;
  const list = document.getElementById('list');
  list.innerHTML = '';
  let count = 0;
  data.forEach((item, idx) => {
    if(ch && item.chapter !== ch) return;
    if(q && !item.question.toLowerCase().includes(q)) return;
    count++;
    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.idx = idx;
    const metaParts = [item.chapter, item.source, item.category].filter(Boolean);
    const optsHtml = (item.options||[]).map(o => `<li><b>${o.label}.</b> ${escapeHtml(o.text)}</li>`).join('');
    let bodyHtml = '';
    if(optsHtml) bodyHtml += `<ol class="options" type="A">${optsHtml}</ol>`;
    if(item.answer) bodyHtml += `<div class="answer-box"><span class="label">答案：</span>${escapeHtml(item.answer)}</div>`;
    if(item.analysis) bodyHtml += `<div class="analysis-box"><span class="label">解析：</span>${escapeHtml(item.analysis)}</div>`;
    div.innerHTML = `<div class="item-header" onclick="toggle(${idx})">
      <div class="title">${highlight(item.question, q)}</div>
      <div class="meta">${metaParts.join(' · ')}</div>
    </div>
    <div class="item-body">${bodyHtml}</div>`;
    list.appendChild(div);
  });
  document.getElementById('stats').textContent = `共 ${count} 题`;
  if(count === 0) list.innerHTML = '<div class="empty">没有找到匹配的题目</div>';
}
function toggle(idx) { document.querySelector(`.item[data-idx="${idx}"]`).classList.toggle('open'); }
function expandAll() { document.querySelectorAll('.item').forEach(el => el.classList.add('open')); }
function collapseAll() { document.querySelectorAll('.item').forEach(el => el.classList.remove('open')); }
render();
</script>
